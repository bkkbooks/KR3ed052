body:
  text: 凡例一古人因病立方加減出入俱有深意若不明其受病之由與用方之所以能治其病之故而概執方以治之其不至於誤世殃人者幾希茲集病情方意互相闡發庶便資用若每方皆釋則重復煩瑣反生厭瀆故前後間見詳略不一或釋制方之意或擬加減之法讀者匯觀而統會之可也一人身一小天地也當天地初開氣化濃密則受氣常強及其久也氣化漸薄則受氣常弱嘗考五帝之壽咸逾百歲三王之後及百者鮮矣故東漢之世仲景處方輒以兩計宋元而後東垣丹溪不過錢計而已豈非深明造化與時偕行者與今去宋元又遠元氣轉薄所以臨證施治多事調養專防克伐多事溫補痛戒寒涼此今時治法之變通也若執成方或矜家祕惟知盡劑不顧本元惟知古法不審時宜則輕病即重重病即死矣有利濟之心者宜加戰兢焉一成無己所注仲景之方不過循文訓釋而已近世如方中行喻嘉言周揚俊輩於仲景傷寒論俱有發明而喻氏尤能闡發其精義故本集採録獨多一吳鶴皋之醫方考門分七十則嫌其多方凡七百首每證不過數方則嫌其少如五積散逍遙散皆不入選不無闕略近日汪訒庵醫方集解門分二十有一正方三百有奇附方之數過之但專録古方未及新方茲集門分二十有五古方新方共一千一百餘首似已足盡醫療之法其有未備學者其神明而推廣之比例而善用之則得矣一集中所分門類醫學始於靈素故首列內經之方而人之由生全賴夫氣故先治氣血者所以配氣故次理血今人血氣虧者甚多故次補養而大虛者防滑脫故次澀固及受病則有汗吐下三法故次發表湧吐攻裡又有宜緩攻者故次消導若病在半表半裡法當和解故次和解又有表證未除里證又急者當表裡交治故次表裡而受病之因多起於六淫故次風寒暑濕燥火而病有因痰者故次除痰有因蟲者故次殺蟲至於婦人小兒癰瘍眼目各有專科茲集欲便於用故每科略取數方以備採擇又録救急之方以應倉猝
