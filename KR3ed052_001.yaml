front:
  text: 序內經醫之奧旨也諸方醫之粗跡也近代時醫相率以方授受而求經論者無之舍奧旨而務粗跡安望其術之神良乎雖然方亦何可廢也方以立法法以制宜譬之工倕匠心獨創斷未有偭規矩而為之者特神而明之存乎其人焉耳古昔方書得人乃傳扁鵲倉公皆稱禁方祕不輕授所以漢時以前成方絶少而仲景為方書之祖也仲景以後方書充棟無如制方者日益多而注方者不少概見宋成無己始將仲景一百十三方論而注之使觀者知其端緒漸得解會但循文訓釋仲景之良法精義不能盡徹迄明興始有吳鶴皋之醫方考因病分門詞旨明爽海內盛行但搜採不無闕略近日汪訒庵仿成氏吳氏之意而擴充之採輯古方名曰集解先詳受病之由次解用藥之意碩論名言採搜甚富然不能無承訛襲愆之說且於新方總未採録均未可以語全書也洛不揣愚陋取吳氏汪氏所輯而增改之得古今良方凡一千一百餘首稟諸經以觀其合訂之證以發其微編為十三卷題其端曰成方切用以所録皆取切於時用之方而尤其用方者之切於病情也何則邇來風氣浸薄人之稟受遠不及古故方有宜古不宜今者設起仲景於今日將必有審機察變損益無已者而謂録方可不切於時用乎且病有標本先後治有緩急逆從醫貴通變藥在合宜苟執一定之方以應無窮之證未免實實虛虛損不足而益有餘反致殺人者多矣用方之切於病豈易易哉然則如之何而後可曰研窮乎靈樞素問而經義無不通也詳求夫望聞問切而證因莫能遁也深悉於氣味陰陽而藥性剖其微也夫然後經之以法緯之以方從斯集而合離變化焉自迎刃而中其肯綮矣乾隆辛巳冬月澉水吳儀洛遵程書於硤川之利濟堂
