body:
  text: 卷十上經帶門婦人諸病本與男子無異而其有異者則唯經帶胎產之屬不得不另詳方論此外雜證但與男子相同者自有各門方治故不以男女分而資贅於此凡行經之際大忌寒涼諸藥飲食亦然溫經湯金匱治婦人少腹寒久不受胎兼治崩中去血或月水來過多及至期不來金匱曰婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥何也曰此病屬帶下何以故曾經半產瘀血在少腹不去何以知之其唇口乾燥故知之當以溫經湯主之徐忠可注曰此段言歷年血寒積結胞門而甚焉者也故就婦人之年暮經水斷絕者而亦必據證斷之以立法也謂婦人年五十其天癸已絕應不從經血起見矣然而病證下利數十日不止知非偶感矣暮即發熱病屬陰矣少腹裡急明乎病屬下焦矣因而腹滿是雖脾病而根於下焦矣手掌煩熱掌屬心心主血血鬱則煩熱也唇口必得脾家營氣而津潤營氣鬱則陰火從之故乾燥非渴也渴則為胸中熱胸無熱而但陰分有鬱火故不渴而乾燥也然皆非相因的對之證故疑而問仲景乃略其下利發熱腹滿而斷之為帶下且決其曾經半產瘀血在少腹不去謂下利而發熱陰虛者有之因而少腹裡急下多亡陰者有之腹滿脾虛者有之用手煩熱陰虛者有之若唇口乃營氣所主下利之病不應見此然而有是證又合之少腹裡急手掌煩熱明是血瘀而火鬱所以心得之而掌熱脾得之而唇口乾燥故曰其證唇口燥故知之藥用溫經湯者因半產之虛而積冷氣結血乃瘀而不去故以歸芍芎調血吳茱桂枝以溫其血分之氣而行其瘀肺為氣主麥冬阿膠以補其本土以統血參甘以補其虛丹皮以去標熱然下利已久脾氣有傷故以姜半正脾氣名曰溫經湯治其本也唯溫經故凡血分虛寒而不調者皆主之吳茱萸三兩當歸芎藭芍藥人參桂枝阿膠丹皮生薑甘草二兩麥冬去心半夏一升上十二味以水一斗煮取三升分溫三服膠艾湯金匱治婦人陷經漏下黑不解或損傷衝任月水過多淋瀝不斷方見卷十下胎產門婦人之經雖從下出實由心胃之氣主之故升降有期今曰漏下是無期也所漏者黑是下有因寒而滯之物故曰陷經陷者有降無升久則為黑色故以膠艾湯主之也四物通調肝血加甘膠峻補之病本於寒故以艾溫而行之丹溪謂婦人之經淡為有水紫為熱黑為熱極故兼水化假令其人素從熱病來者容有之然而仲景之言道其常也柏子仁丸良方治經行復止血少神衰女子善懷每多憂思憂多則傷心心傷則不能生血而血少血少則肝無所藏而衝任之脈枯故經閉不行也經曰月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上逼肺心氣不得下降故月事不來柏子仁去油牛膝酒浸卷柏五錢澤蘭續斷二兩熟地黃一兩蜜丸米飲下柏子仁安神而養心地黃續斷牛膝補肝腎而益衝任卷柏澤蘭活血脈而通經閉升陽舉經湯東垣治崩漏身熱自汗短氣倦怠懶食此由勞傷所致補中益氣湯見氣門加白芍黑山梔薑棗煎補中湯以益氣升陽退熱收汗加芍藥以劍陰黑梔以清熱又東垣蘭室秘藏升陽舉經湯黃耆當歸白朮各三錢羌活防風藁本各二錢獨活附子炮甘草炙各錢半人參熟地川芎各一錢細辛六分桃仁十個去皮尖研紅花肉桂芍藥各五分每服三錢漸加五錢治經水不止原文曰如右尺脈按之空虛是氣血俱脫大寒之證輕手其脈數疾舉指弦緊或澀皆陽脫之證陰火亦亡見熱證於口鼻眼或渴此皆陰躁陽欲先亡也當溫之舉之升之燥之當大升浮氣血切補命門之下脫也固經丸良方治經行不止及崩中漏下紫黑成塊衝任為經脈之海若無損傷則陰陽和平氣血調適矣若勞動過度損傷臟腑衝任之氣虛不能約制經血故經多暴下或由陰虛陽搏為熱所乘攻傷衝任血得熱則妄行也脈數疾小為順大者為逆紫黑成塊者熱甚而反兼水化非寒也玉機微義曰血得寒則凝既行而紫黑故知非寒也龜板炙四兩芍藥酒炒黃柏酒炒三兩黃芩二兩香附童便浸炒樗皮兩半酒丸經多不止者陰氣不足以制胞絡之火故越其常度也崩中漏下者虛而挾熱也紫黑成塊者火極似水也黃芩清上焦之火黃柏瀉下焦之火龜板芍藥滋陰而養血皆壯水以制陽光也香附辛以散郁樗皮澀以止脫通瘀煎治婦人氣滯血積經脈不利痛極拒按及產後瘀血實痛並男婦血逆血結等證歸尾三五錢山楂香附紅花新者炒黃二錢木香七分烏藥一二錢青皮澤瀉一錢五分水煎加酒一二小盅兼寒滯者加肉桂一錢或吳茱萸五分火盛內熱血燥不行者加炒梔子一二錢微熱血虛者加芍藥二錢血虛澀滯加牛膝血瘀不行者加桃仁二十粒去皮尖或加蘇木延胡之類瘀極而大便結燥者加大黃一二三錢或朴硝蓬朮亦可連附四物湯丹溪治經水過期紫黑成塊紫血熱也黑熱甚也過期而成塊氣滯也或風冷乘之也若淡白者虛也或挾痰停水以混之也如煙塵豆汁屋漏水混濁模糊者濕痰也四物湯見血門加香附黃連四物以益陰養血加黃連以清血熱香附以行氣鬱四物加芩術湯亦名溫六合丸治經水過多黃芩抑陽白朮補脾脾能統血四物加芩連湯治經水適斷五心煩熱經來色黑或如豆汁如豆汁者熱兼濕也芩連苦燥濕而寒勝熱四物加梔連為熱六合湯加姜附名寒六合湯加陳樸名氣六合湯加羌艽為風六合湯皆經產通用之藥也調經飲治經脈阻滯氣逆不調多痛而實者當歸三五錢牛膝山楂二錢香附青皮茯苓一錢五分如因不忌生冷而寒滯於內加肉桂吳茱萸之類如脹悶者加厚朴一錢或砂仁亦可氣滯者加烏藥一錢或痛在小腹者加小茴香一錢五分正氣天香散紺珠治一切諸氣氣上湊心心胸攻築脅肋刺痛月水不調婦人多憂鬱故氣病為多氣為血帥氣滯則血亦不能行故月候不調香附八錢烏藥二錢陳皮蘇葉一錢乾薑五分每五六錢煎烏藥陳皮專入氣分而理氣香附紫蘇能入血分而行氣引以乾薑使入氣分兼入血分用諸辛溫以解鬱散肝令氣調而血和則經行有常自無痛壅之患矣毓麟珠治婦人血氣俱虛經脈不調或斷續或帶濁或腹痛或腰痠或飲食不甘瘦弱不孕服一二斤即可受胎凡種子諸方無以加此甘草川芎一兩熟地蒸搗菟絲子制當歸四兩杜仲酒炒人參白朮土炒茯苓芍藥酒炒鹿角霜川椒二兩為末蜜丸彈子大空心嚼服一二丸用酒或白湯送下或為小丸吞服亦可如經遲腹痛宜加破故紙酒炒肉桂各一兩甚者再加吳茱萸五錢或加龍骨一兩醋煅如子宮寒甚或泄或痛加製附子或炮姜隨宜有鬱怒氣不順而為脹為滯者宜加香附酒炒二兩或甚者再加沉香五錢血熱多火經早內熱者加川斷地骨皮各二兩或另以湯劑暫清其火而後服此或以湯引送下亦可男子制服宜加枸杞胡桃肉鹿角膠山藥山茱萸巴戟肉各二兩啟宮丸治子宮脂滿不能孕育婦人肥盛不孕往往因此芎藭白朮半夏曲香附一兩茯苓神麯五錢橘紅甘草二錢粥丸橘半白朮燥濕以除其痰肥而不孕多由痰盛故以二陳為君而加氣血藥也香附神麯理氣以消其滯川芎散郁以活其血則壅者通塞者啟矣茯苓甘草用以去濕和中也抑氣散嚴氏治婦人氣盛於血變生諸證頭暈膈滿凡人血氣和平則無諸疾苟血少氣多壅於胸膈則滿上攻於頭則暈香附四兩陳皮二兩甘草炙茯神一兩每服二錢經曰高者抑之香附能散鬱氣陳皮能調諸氣茯神能安心氣甘草能緩逆氣氣得其平則無亢害之患矣氣盛於血固當抑氣若過用行氣之藥則真氣耗散陰火愈盛而氣血兩虛矣是方雖和平只可暫用須用滋血之藥使陰血充足則陽火自平乃正治之法蓋補其不足即所以制其有餘也五物煎治婦人血虛凝滯蓄積不行小腹急痛產難經滯等證此即四物湯加肉桂也當歸三五七錢熟地三四錢白芍二錢酒炒川芎一錢肉桂一二三錢如兼胃寒或嘔惡者加乾薑水道不利者加澤瀉或茯苓氣滯者加香附或丁香木香砂仁烏藥陰虛疝痛者加小茴香血瘀不行臍下若覆杯漸成積塊者加桃仁或酒炒紅花牡丹皮散良方治血瘕瘀血凝聚而成伏於隱僻之處盤結膠固須破血活血之品治之丹皮桂心歸尾延胡索三分牛膝赤芍藥莪朮六分三稜四分水酒各半煎丹皮桂心赤芍牛膝以行其血三稜莪朮歸尾延胡以行其血中氣滯氣中血滯氣血周流則結者散矣芎歸六君子湯治經水後期其來澀少形體肥盛體肥而經水後期澀少者氣虛而痰滯於經絡也當歸川芎人參白朮茯苓甘草橘紅半夏加姜煎二陳治其痰滯參朮補其氣虛氣行則痰行芎歸活其經血逍遙飲治婦人思郁過度致傷心脾衝任之源血氣日枯漸至經脈不調者當歸二三錢熟地三五錢棗仁二錢芍藥茯神一錢五分甘草一錢炙陳皮八分遠志三五分制如氣虛者加人參一二錢經水過期兼痛滯者加酒炒香附一二錢如聖散治崩漏不止凡非時血行淋瀝不已謂之漏下忽然暴下如山崩然謂之崩中有五色以應五臟棕櫚燒烏梅一兩黑姜兩半每服二錢烏梅湯下澀能止血故用棕櫚酸能收斂故用烏梅溫能守中故用乾薑黑能止血故並煅用人參荊芥散婦寶治血風勞血風勞者血脈空疏感受風邪寒熱盜汗展轉不已乃成勞也人參白朮熟地棗仁炒鱉甲童便炙羚羊角枳殼柴胡荊芥五分防風甘草炙芎當歸桂心三分加姜煎陳來章曰血中之風荊芥防風散之木盛生風羚角柴胡平之陰虛發熱地黃鱉甲滋之血氣痛滯月水不調芎藭當歸桂心枳殼調之倦怠食少盜汗心忡人參白朮炙草棗仁補而收之固下丸子和治赤白帶下帶下起於風寒濕熱所傷入於胞中或中經脈流入臟腑陰虛陽竭營氣不升衛氣下陷滯於下焦奇經之分因帶脈而得名故曰帶赤者屬血白者屬氣其狀如涕相連而下言帶者亦病形也有濕熱流滯下焦者有肝腎陰淫濕勝者有驚恐而木乘土位濁液下流者或思想無窮而為白淫者或余經濕熱屈滯於小腹之下者病本雖殊皆為氣血虛損營衛累滯而成也樗皮兩半白芍五錢良薑煅黑黃柏煅黑三錢粥丸米飲下陳來章曰樗皮苦燥濕寒勝熱澀固下故赤白帶因於濕熱者用之為君古方有蒼柏樗皮側柏樗皮苓木樗皮等丸隨證加香芎歸芍姜芷及星夏等藥芍藥之酸斂陰氣收下溜為臣良薑之熱以散寒濕黃柏之寒以祛熱濕並炒黑以止血收脫為佐使也白芷散良方治赤白帶滑脫不禁良方曰帶下由於風寒濕熱所傷傷肝經者色青如泥傷心經者色赤如津傷肺經者色白如涕傷脾經者黃如爛瓜傷腎經者黑如衃血白芷一兩煅海螵蛸二兩煅胎髮五錢煅酒調二錢白芷辛溫燥濕而祛風烏賊鹹溫收濕而和血發者血之餘補陰消瘀煅黑又能止血也當歸煎丸嚴氏治赤白帶下腹中痛不飲食羸瘦此血虛有熱之證法當涼補脈訣云崩中日久為白帶漏下多時骨本枯言崩久則血少復亡其陽故白滑之物下漏不止當歸熟地阿膠炒續斷白芍炒牡蠣煅粉二兩地榆炒黑三錢醋糊丸米飲下歸芍熟地續斷阿膠補肝滋腎以治血虛牡蠣地榆清熱收脫以止帶下赤芍酸寒能散惡血去瘀所以生新散之亦以收之也
