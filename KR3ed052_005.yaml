body:
  text: 卷十一上嬰孩門小兒之病與大人無異唯初生保護及痘疹等證不得不另集方法以便施用世俗所謂驚風即四時感證也方中行痙書喻嘉言寓意草中論之最詳當從傷寒門循經救治切不可用抱龍丸鎮驚丸等金石藥鎮墜外邪深入臟腑為害不淺初生拭口法嬰兒初生急以綿裹指拭兒口中舌上惡血穢露謂之玉銜若啼聲一發即入腹成百病薛氏曰嬰兒初生口含血塊啼聲一出隨即咽下而毒伏於命門遇天行時氣久熱或飲食停滯或外感風寒發熱等因發為瘡疹急須於未啼時用軟帛裹指揩去其血雖出痘亦輕矣又看舌下若連舌有膜如石榴子若啼不出聲不轉速以指爪摘斷之或用葦刀子割之微有血出即活若舌下血出多者以亂髮燒灰同豬脂少許和塗之聖惠云看齒根有黃筋兩條以葦刀割斷點豬乳佳如兒口難開先點豬乳甘草下胎毒法用粉甘草中指一節拍碎以水二蜆殼煎一蜆殼以綿纏蘸令兒吮之若吐出惡汁為佳若服一蜆殼不吐即不須更服不問嬰兒虛實寒熱皆須服之心鑑曰古方書言嬰兒始生落草服汞粉硃砂白蜜黃連牛黃欲下胎毒今人率承用之不知今人稟受攝養與古人不同其藥乃傷脾敗陽之物若與兒服後必生異證只宜用淡豆豉煎濃汁與三五口其毒自下又能助養脾氣消化乳食薛氏預以甘草細切少許臨産時以綿置沸湯盞內覆溫收生之際以軟綿裹指蘸甘草汁拭其口次用下胎毒諸法豬乳法嬰兒初生至滿月內常時時旋取豬乳滴口中佳豬兒飲母大便提後腳離乳急捋之即得襁褓法千金論云小兒用父故衣女用母故衣勿使新綿切不可過厚恐令兒壯熱生瘡發癇皆自此始巢氏云兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若不見風日則令肌膚脆軟便易損傷嬰兒常藏在帷幔之內重衣溫暖譬如陰地草木不見風日軟脆不任風寒嬰兒皆當以故絮著衣莫用新綿也天氣和暖無風之時令母常抱日中嬉戲數見風日則令血和氣剛肌肉硬密堪耐風寒不致疾病又當習薄衣之法當從秋習之不可於春夏卒減其衣令兒受風寒冬月但當著夾衣及衲衣之類極寒則漸加以舊綿人家多愛子乃以綿衣過厚適所以為害也又當消息無令汗出汗出則致虛損便受風寒晝夜寤寐皆當戒之乳哺法湯氏曰小兒乳哺須要得法乳者奶也哺者食也乳後不得便與食哺後不得便與乳小兒脾胃怯弱乳食相併難以克化周歲以上必成乳癖於腹中作疼作熱疳病從此起也丹溪曰小兒腸胃尚脆而窄若稠黏乾硬酸鹹甜辣一切魚肉水果濕面燒炙煨炒俱是發熱難化之物皆宜禁絶只與熟菜白粥非唯無病且不從口可以養德此外生栗味鹹乾柿性涼可為長陰之助然栗太補柿太澀俱為難化亦宜少與婦人無知唯務姑息畏其啼哭無所不與積成痼疾雖悔何及所以富貴嬌養有子多病逮至成人筋骨柔弱有食則不能忌口以自養居喪則不能食素以盡禮小節不謹大義亦虧可不慎與至於乳母尤宜謹節飲食下咽乳汁便通情欲中動乳脈便應病氣到乳汁必凝滯兒得此乳疾病立至不吐則瀉不瘡則熱或為口糜或為驚搐或為夜啼或為腹痛病之初來其溺必少便須詢問隨證治母母安亦安可消患於未形也乳兒法凡乳母氣血為乳汁也五情善惡悉氣血所生宜戒喜怒一切禁忌不用狐臭癭瘻氣嗽病者及身體疥癬頭瘡發少唇緊音啞耳聾齆鼻癇病等方可乳兒夏天盛熱時乳母浴後或兒啼不可與奶使兒胃有熱毒秋成赤白痢浴後可令定息良久乳之可無患也聶氏曰盛啼不可食乳恐氣逆不順聚而為𠸺亦能成疾千金論曰凡乳兒不可過飽飽則溢而成嘔吐若乳來多猛取出捏後再乳切須乳時合先令捏去宿熱乳然後乳之如乳母欲臥寐當以臂枕之令乳與兒頭平母欲睡著時即奪其乳恐其不知飽足亦成嘔吐父母交合之間兒臥於側或驚起不可乳兒蓋氣亂未定必能殺兒也聖惠方云醉淫喘乳能殺小兒聖濟經論乳者夏不欲熱熱則致吐逆冬不欲寒寒則致下痢母不欲怒怒則令上氣癲狂母不欲醉醉則令身熱腹滿母方吐下而乳則致虛羸母有積熱而乳則變黃不能食新房而乳則瘦悴交脛不能行哺兒法錢乙云兒多因愛惜過當兩三歲猶未飲食致脾胃虛弱平生多病半年後宜煎陳米稀粥時時與之十月後漸與稠粥爛飯以助中氣自然易養少病惟忌生冷油膩甜物等寶鑑云兒五十日可哺如棗核百日彈丸早晚二哺三歲未滿勿食雞肉及子恐腹內生蟲雜將護法嬰兒百日任脈生能反復乳母當存節喜怒適其寒溫嬰兒半晬尻骨已成乳母當教兒學坐嬰兒二百日外掌骨成乳母教兒地上匍匐嬰兒三百日臏骨成乳母教兒獨立嬰兒周晬膝骨已成乳母教兒行步上件並是定法世人不能如法往往抱兒過時損傷筋骨切宜戒之柴歸飲治痘疹初起發熱未退無論是痘是邪疑似之間均宜用此平和養營之劑以為先著有毒者可托有邪者可散實者不致助邪虛者不致損氣凡陽明實熱邪盛者宜升麻葛根湯如無實邪悉宜用此增減之小兒壯熱呵缺頓悶時發驚悸或吐或瀉手足時冷面頰腮赤嗽嚏者為痘症也呵缺頓悶肝之症也時發驚悸心之症也或吐或瀉手足時冷者脾之症也頰赤嗽嚏肺之症也腰痛喜寐腎之症也五臟之症盡顯者其痘必多但顯一二症者其痘必少其本總由於淫火之毒也當歸二三錢芍藥或生或炒一錢半荊芥一錢炙炙甘草七分或一錢柴胡一二錢加姜煎服血熱者加生地陰虛者加熟地氣虛脈弱者加人參虛寒者加炮姜肉桂腹痛者加木香砂仁嘔惡者加乾薑陳皮若治麻疹以乾葛易荊芥升麻葛根湯小兒初間發熱壯盛為風寒為痘疹莫能辨的此方穩當方見卷三上表散門表熱壯盛此邪實於表也經曰輕可去實故用升麻葛根以疏表甘草佐之可以和在表之氣芍藥佐之可以和在表之營去其實邪和其營衛風寒則解痘疹則出誠出間之良劑也如至四五日痘中夾疹者亦此方主之疹散只依常法治痘疏邪飲治痘疹初起發熱凡氣血強盛無藉滋補者單宜解邪此方為主以代升麻葛根湯及蘇葛等方最為穩當芍藥酒炒柴胡倍用甘草炙蘇葉荊芥穗減半水煎熱服無火者加生薑三片火盛內熱者加黃芩渴者加葛去蘇葉荊芥加乾葛黃芩連翹名柴葛煎治痘疹表熱及瘟疫等症參蘇飲治痘症初起風寒壯熱體重頭痛痰嗽壅盛方見卷五下表里門風寒客於外故用柴蘇乾葛以發表痰嗽壅於內故用半夏前胡桔梗陳皮茯苓以安里邪去之後中外必虛人參甘草急固其虛此則表和而痘易出里和而氣不虛表裡無失斯良劑矣惺惺散發熱之初未明是痘形體怯弱者宜之人參白朮甘草細辛白茯苓天花粉白芍藥桔梗各七分參苓朮草防其虛也細辛桔梗所以疏其陽花粉白芍所以和其陰透邪煎凡麻疹初熱未出之時惟恐誤藥故云未出之先不宜用藥然解利得宜則毒必易散而勢自輕減欲求妥當當先用此方為主當歸二三錢芍藥酒炒一二錢防風八分荊芥穗一錢升麻三分甘草炙七分水煎服如熱甚脈洪滑者加柴胡一錢此外凡有雜症俱可隨宜加減麻黃湯治痘疹天寒腠密表熱壯盛方見卷三上表散門解表之藥有三品辛涼辛溫辛熱也夏月表氣易泄宜用辛涼春秋表氣平調宜用辛溫若天寒之時表氣閉密辛涼辛溫不能解散故以麻黃桂枝之辛熱者以主之亦各當其可而已佐以杏仁利其氣也佐以甘草和其氣也加味葛根湯凡小兒發熱看有痘情耳冷指冷腳冷眼如含水懶於言笑是也宜用此服至見點升麻葛根前胡桔梗山楂青皮木通荊芥撫芎甘草加燈心高鼓峰曰如服此湯而不見點是毒盛也其症必重若熱甚氣悶譫語腰無力冬月可加麻黃一錢夏月加石膏一錢甚者加至二錢如冬月熱甚過四五日重症已見而舌灰白色者亦須以石膏合麻黃用之夏月蘇葉薄荷俱可進退用之如見點如糠粞齊布熱甚口臭此脾經痘也死不治矣去葛根青皮加紅花蟬蛻名紅花湯三日後宜用如見點三日痘已齊而大熱不退此是毒盛危候見矣須以涼藥涼血紅花湯去升麻撫芎山楂加生地丹皮與之然此是乾紅候百不一活如熱微者不妨紅花湯去升麻撫芎山楂木通加殭蠶大力子名桔梗湯六日已過痘腳已齊漿勢欲行者宜之又三日發熱起頂濃漿至矣當用木通殭蠶荊芥連翹花粉丹皮丹參等以和其毒其有變白色而發癢者氣血虧也五味異功散見卷一上四君子湯附方加白芍以救其元氣虛甚者參朮加至五六錢大劑用之自然有救或泥於庸醫發未盡而禁補或反咎發表缺透以致今日內陷者此殺人之論不可信也信手大補不一二劑必然窠下漿來生氣勃然矣即有撏掐破者亦自循皮爛臭而回生羌活透肌湯治痘出見點未盡羌活陳皮柴胡前胡半夏茯苓甘草桔梗川芎當歸山楂表氣未疏則出有不盡故用羌芎柴前以疏表裡氣未利則出有不速故用二陳桔梗以調里當歸活表裡之血山楂消表裡之滯血活滯消則痘之出也易易耳透肌散治氣弱痘出不盡紫草二錢木通一錢五分白芍藥酒炒人參蟬蛻升麻甘草五分人參甘草能益氣而補中紫草木通能透肌而起痘升麻蟬蛻能退熱而消風用芍藥所以調陰氣而和營衛也紫草化毒湯治痘已出未出熱壅不快紫草二錢陳皮一錢升麻甘草五分如小便赤加木通紫草活竅利血化毒陳皮快膈消痰利氣升麻消風發散瘡痍甘草補虛和中解熱木通加之為導熱邪由溺而泄爾搜毒煎解痘疹熱毒熾盛紫黑乾枯煩熱便結純陽等症紫草地骨皮牛蒡子黃芩木通連翹蟬蛻芍藥水煎渴者加花粉麥冬陽明熱甚頭面牙齦腫痛者加石膏知母大腸乾結臍腹實脹者加大黃芒硝血熱妄行者加犀角童便小水熱閉者加山梔車前子兼表熱者加柴胡涼血養營煎治痘瘡血虛血熱色紅熱渴或色燥不起及便結溺赤凡陽盛陰虛等症生地當歸白芍甘草地骨皮紫草黃芩紅花水煎服量兒大小加減渴加天粉肌熱無汗加紫胡血熱毒不透者加犀角毒熱甚者加牛蒡子木通連翹之屬甘桔湯治痘疹咽喉腫痛方見卷八下瀉火門消毒飲治痘疹咽喉腫痛膈上熱盛牛蒡子二錢荊芥穗一錢防風生甘草五分牛蒡子疏喉中風壅之痰荊芥穗清膈間風壅之熱生甘草緩喉中風壅之氣防風散諸風不去之邪加味如聖散治痘疹痰嗽風熱聲啞喉痛桔梗二錢牛蒡子麥門冬錢半甘草元參荊芥一錢防風七分生犀角黃芩五分牛蒡子麥門冬療風痰而清肺熱荊芥防風散風邪而升鬱熱甘草桔梗黃芩利咽喉而清氣熱犀角元參涼心膈而療結熱熱去則金清金清則聲啞瘥矣前胡化斑湯治痘疹中夾斑淡紅色淡紅色斑之輕者也其原由初間不能清熱解毒之故治痘中之斑與傷寒雜症不同傷寒之斑宜主寒涼痘中之斑寒之則血凝而痘不起雜症之斑間用溫補痘中之斑補之則血溢而斑愈盛此方利營調衛不寒不熱誠得治痘斑之理也酒紅花當歸一錢前胡八分荊芥四分白芷甘草節赤芍陳皮五分鬱金七分酒浸胡荽子三十粒紅花當歸赤芍所以活斑中之血前胡白芷陳皮荊芥所以利表裡之氣胡荽甘草鬱金所以散滯氣爾活血散治痘症氣血凝滯木香二錢當歸尾酒浸焙乾赤芍酒浸炒川芎紫草酒紅花五錢血竭一錢每服三錢氣貴利而不貴滯血貴活而不貴凝木香川芎調其氣滯赤芍歸尾紫草紅花血竭理其血凝犀角地黃湯治痘疹血熱及諸症失血方見卷一下理血門心生血生地黃所以涼心血肝藏血白芍藥所以和肝血火能載血牡丹皮所以去血中之火熱能動血生犀角所以解諸經之熱四順清涼飲治實熱內壅腹脹祕結痘不能出大黃當歸芍藥甘草痘以熱而出固不能以無熱若實熱內壅腹脹便祕則三焦之氣不化而痘不能以出矣故用大黃通其滯當歸活其血芍藥養其陰甘草調其胃通利之後表裡氣血皆承順矣故曰四順如形質虛弱而大便祕結不堪攻下者用蜜導黃連解毒湯治痘疹裡熱壅盛方見卷八下瀉火門無熱固不化毒熱壅則毒亦不化故用黃連瀉心火黃芩瀉肺肝之火黃柏瀉腎火梔子瀉上下之火無他症而惟熱雍故用藥亦精專焉人參白虎湯治痘症裡熱渴甚方見卷八下瀉火門白虎湯附方石膏清胃熱胃清則不渴人參知母甘草化氣而生津液液生則熱自除七正散治痘症小便祕澀車前子赤茯苓山梔仁生甘草梢木通扁蓄龍膽草治痘必欲利小便者水循其道而後地平天成故也是方也車前能滑竅赤苓能滲濕木通能通滯山梔能瀉火草梢能通莖扁蓄能利水膽草能利熱七物者導其熱邪正其中氣故曰七正加味導赤散治痘疹小便黃赤口乾煩渴生地黃人參麥門冬木通甘草竹葉燈心內熱故用生地黃小便赤黃故導以木通竹葉燈心口乾煩渴故潤以麥冬人參甘草乃氣化而津液自生也辰砂益元散治痘疹裡熱小便赤黃神氣不清方見卷七上消暑門六一散附方滑石清利六腑甘草解熱調中辰砂安神去怯去甘草滑石辰砂各一錢水飛過加冰片三釐每用冷水調服一錢名退火回生散治痘症血滯枯澀火炎則水乾是故枯澀用滑石辰砂導去其熱此釜底抽薪之意入冰片者欲其速達而無壅滯也當歸黃連湯治痘瘡毒盛灰白色不癢當歸黃連丹皮殭蠶荊芥牛蒡子花粉銀花生地加燈心保元湯自行起發至頂已起矣而因氣虛有險症者宜此人參黃耆甘草加生薑氣虛頂陷者此方主之汪機曰蕭山魏直著博愛心鑑三卷言小兒痘瘡惟有順險逆三症順者為吉不用藥逆者為凶不必用藥唯險乃悔吝之象當以藥轉危為安宜用保元湯加減主之此方原出東垣治慢驚土衰木旺之法今借而治痘以其內固營血外護衛氣滋助陰陽作為濃血其症雖異其理則同去白芍藥加生薑改名保元湯炙黃耆三錢人參二錢炙甘草一錢生薑一片水煎服之險症者初出圓暈乾紅少潤也將長光澤頂陷不起也繼出雖起慘色不明也漿行色灰不榮也漿足光潤不消也漿老濕潤不斂也結痂而胃弱內虛也痂落而口渴不食也痂後生癰毒也癰腫潰而斂遲也凡有諸症並宜此湯或加芎藭官桂糯米以助之嘉謨曰人參補中黃耆實表凡內傷脾胃發熱惡寒吐泄怠臥脹滿痞塞神短脈微者當以人參為君黃耆為臣若表虛自汗亡陽潰瘍痘症陰瘡者當以黃耆為君人參為臣不可執一也十二味異功散治痘出不光澤不起脹根窠不紅表虛癢塌人參豆蔻白朮當歸丁香肉桂厚朴陳皮半夏茯苓附子木香中氣有餘氣血充滿則痘光澤起發根窠紅活表無癢塌之患中氣不足則表亦虛而諸症作矣是方也人參白朮茯苓當歸所以補胃附子肉桂丁香豆蔻所以溫胃半夏木香陳皮厚朴所以調胃胃陽明也陳氏云陽明主肌肉胃氣充足則肌肉溫暖光澤起脹而無癢塌之患亦見道之言也如漿有不起頂不充滿而發癢窠殼脫落如梅花片下發瀉者虛甚也五味異功散加黃耆木香甚者附子肉桂吳茱萸俱當用九味異功煎治痘瘡寒戰咬牙並治男婦陽氣虛寒等症可代陳氏十二味異功散等方人參當歸熟地二三錢黃耆炙乾薑炮製附子一二錢肉桂一錢甘草炙七分或一錢丁香三五分或一錢上量兒大小加減用水一盅半煎七分徐徐與服如泄瀉腹痛加肉豆蔻麵炒一錢或白朮一二錢六物煎治痘疹氣血不足隨症加減用之神效不可盡述並治男婦氣血俱虛等症熟地或用生地甘草炙當歸芍藥俱隨宜加減川芎三四分不宜多人參或有或無隨虛隨實用之氣不虛者不宜用水煎服如發熱不解或痘未出之先宜加柴胡以疏利或加防風佐之見點後痘不起發或起而不貫或貫而漿薄均宜單用此湯或加糯米人乳好酒肉桂以助營氣紅紫血熱不退宜加紫草或犀角脾氣稍滯者宜加陳皮山楂胃氣虛寒多嘔者加乾薑炒用或加丁香腹痛兼氣滯者加陳皮木香表虛氣陷不起或多汗者加黃耆氣血俱虛未起未貫而先癢者加肉桂白芷元氣大虛寒戰咬牙泄瀉宜去芍藥加黃耆附子乾薑肉桂六氣煎治痘瘡氣虛癢塌倒陷寒戰咬牙並治男婦陽氣虛寒等症黃耆肉桂人參白朮當歸甘草炙上㕮咀水煎服加減法照前六物煎白朮茯苓澤瀉湯治痘症水泡中有實熱膈有停水淫熱外行初則痘色晶亮頃則痘皆水泡矣此乃水不能潤下灶底燃薪釜中發泡之義白朮茯苓澤瀉白朮甘而燥能益土以防水茯苓甘而淡能益土以決防澤瀉咸而潤能潤下而利水水利濕消泡自瘥矣補中益氣湯治中氣虛弱痘不起脹難經曰氣主煦之故氣者噓長萬物者也痘不起脹氣血弱也方見卷一上治氣門參耆朮草以補氣升柴以升陽當歸以活其營陳皮以利其氣四物湯治痘症根淡血弱痘至五六日氣尊血附之時根腳淡為血弱故用當歸活血川芎行血熟地補血芍藥斂血方見卷一下理血門當歸活血湯治痘瘡色紫色枯用此涼血活血生地當歸川芎赤芍紅花紫草色紫為血熱色枯為血滯熱者涼之枯者澤之調血之道也生地涼血之品余藥皆活血之品血涼而活壅熱可除矣內托散治表虛里實氣血皆弱在表者痘頂灰陷為氣虛痘根色淡為血虛若息重氣粗則為裡實人參黃耆甘草當歸川芎白芍厚朴防風白芷肉桂木香桔梗紅深黑陷屬熱毒者去桂加紫草紅花黃芩淡白灰陷屬虛寒者加丁香溫里肉桂溫表當貫膿而不貫膿者倍參耆當歸加糯米煎熟入人乳好酒氣虛故用參耆甘草血虛故用歸芍川芎然防風白芷肉桂能引諸藥自內而托之於外木香桔梗厚朴能調壅實以歸於和八珍湯治氣血兩虛醫貴未然之防痘症雖順若氣體虛弱不補恐有後失故用四君以補氣四物以養血方見卷一上治氣門四君子湯附方附子理中湯治胃中虛寒或又誤服涼藥瀉而手足厥冷者方見卷六下祛寒門理中湯附方十全大補湯治痘症十日以上血氣虛弱者方見卷一上治氣門四君子湯附方止痛活血散治痘漿已滿血滯瘀痛不可忍者白芍藥酒炒二錢為細末酒調下諸病癢者為虛痛者為實癢宜補而痛宜瀉此痛為血實而滯故用芍藥以平血酒調以行滯治痘瘡濕爛方或以敗草灰敷之或以蠶繭灰入枯礬少許敷之或以牆上白螺螄殼燒灰敷之或以蛤粉敷之四法者皆是濕者燥之之意痧症初起方升麻葛根芍藥甘草桑皮地骨皮桔梗牛蒡荊芥連翹痧症即疹子又名瘏子不宜依症施治惟當治本本者手太陰足陽明兩經之邪熱也解其邪熱則諸症自退矣若服前藥次日標形顴鼻見點多者最吉以其清陽喜上升也第二日葛根可去惡其開肌腠而干津液也若熱甚勢重前湯加白虎芩粉之類斷不可少若服藥後而熱愈甚者正毒達之故也得大汗而毒自解矣若略見標而不見形者此為痧毒不透後必防疳宜從養陰治甘露飲主之見潤燥門必多服乃效亦從汗解乃屢驗者有一等小兒乳痧一日可解不必盡三朝九朝之說以清火為主兼解可也緣小兒稟質尚弱神氣有限如遇粗工不審虛實發散過多必致正氣虛脫而不可救者多矣有痧毒痰喘甚者雖用石膏黃連如水淋石要知是痧毒痰火壅結上焦之故宜用瓜蔞霜枳殼花粉金沸草清痰清火如挾氣虛者加人參立應痧症多泄瀉慎勿止澀惟用升麻葛根黃連甘草則瀉自止痧家不忌泄瀉瀉則陽明邪熱得解是亦表裡分消之義痧後泄瀉及便濃血皆由邪熱內陷故也大忌止澀惟宜升散仍用升麻葛根湯加黃連扁豆若便濃血加滑石末必愈卷十一下癰瘍門外科方症至為繁多不能盡録茲量採數方以備擇用若夫瀉熱解毒活血托裡之劑多散見於諸門唯在用者之圓神而已內經曰營氣不從逆於肉理乃生癰腫又曰諸痛癢瘡皆屬心火丹溪曰癰疽皆因陰陽相滯而生蓋營行脈中衛行脈外相併周流寒與濕搏之則凝滯而行遲為不及熱與火搏之則沸騰而行速為太過氣得邪而鬱津液稠黏為痰為飲積久滲入脈中血為之濁此陰滯於陽也血得邪而鬱隧道阻滯或溢或結積久滲出脈外氣為之亂此陽滯於陰也百病皆由於此不止癰疽為然皂莢丸金匱治肺癰咳逆上氣時時唾濁但坐不眠肺者五臟之華蓋處於胸中主氣候在毛皮勞傷血氣腠理虛而風邪乘之內感於肺汗出惡風咳嗽短氣鼻塞項強胸膈脹滿久久不瘥則成肺痿風傷皮毛熱傷血脈風熱相搏氣血稽留蘊結於肺則成肺癰多吐涎沫而無膿者肺痿也口乾喘滿咽燥而渴甚則四肢微腫咳吐膿血胸中隱痛者肺癰也痿為正氣虛癰為邪氣實皂莢刮去皮弦酥炙為末蜜丸以棗膏和湯服三丸喻嘉言曰火熱之毒結聚於肺表之裡之溫之清之曾不少應堅而不可功者令服此丸庶幾無堅不入聿成洗蕩之功不可以藥之微賤而少之也加蛤粉等分為末名皂蛤丸每服二錢酒下治婦人風邪客於乳房而成奶癰此藥能導其乳汁散其風邪汗出而自愈矣桔梗杏仁煎治咳嗽吐膿痰中帶血或胸膈隱痛將成肺癰者此方為第一此桔梗湯之變方也桔梗杏仁甘草一錢阿膠麥冬百合金銀花夏枯草連翹二錢貝母紅藤三錢枳殼錢半水煎食遠服火盛兼渴者加天花粉腸癰祕方凡腸癰生於小肚角微腫而小腹隱痛不止者若毒氣不散漸大內攻而潰則成大患急宜以此藥治之先以紅藤一兩許以好酒二碗煎一碗午前一服醉臥一時午後用紫花地丁一兩許亦如前煎服服後痛必漸止為效然後服末藥除根蟬蛻殭蠶一錢當歸天龍大黃石蠍蚆草五錢老蜘蛛二個捉放新瓦上以酒盅蓋定外用火煅存性為末每空心用酒調送一錢日逐漸服自消金銀花酒治一切癰疽惡瘡不問發在何處或肺癰腸癰初起便服奇效癰疽之生始於喜怒憂思之不時飲食居處之不節或金石草藥之發動寒暑燥濕之不憂調致陰陽不平而蘊結營衛凝澀而腐潰輕者起於六腑浮達而為癰重者發於五臟沉澀而為疽大抵實者為癰淺者為癤深則為疽矣發於外者為背疽腦疽眉鬢等疽發於內者為肝癰肺癰腸肚等癰外症易識內症難明太陽經虛從背而出少陽經虛從鬢而出陽明經虛從髭而出督脈經虛從腦而出金銀花五兩乾者不及生者力速甘草一兩水二碗煎一碗再入酒一碗略煎分三服一日一夜服盡重者日二劑服至大小腸通利則藥力到外以生者爛搗酒調敷毒四圍金銀花寒能清熱解毒甘能養血補虛為癰瘡聖藥甘草亦扶胃解毒之上劑也金銀花二兩甘草一兩黃耆四兩酒一升重湯煮服名回毒金銀花湯治痛瘍色變紫黑者又黃耆當歸金銀花甘草大劑煎服名四仙飲治氣血俱虛服之未成即消已成即潰已潰即愈附長春藥酒黃耆十二兩蜜炙煎膏大生地六兩銅刀切片金銀花當歸各四兩甘草去皮蜜炙兩半地骨皮甘草水洗二兩廣陳皮去白一兩用白糯米二斗做酒釀一埕將前藥後六味用綿包好入埕內隔湯煮三炷香將黃耆膏傾入再煮三炷香將埕埋地下三尺余深七日七夜取起濾清聽用此酒不特外科虛症極妙凡勞傷虛損服之無不神效所以蘇州陸德敷家以此酒馳名於天下也附金銀花膏一名忍冬膏四月採鮮花搗汁熬膏茶酒任點服養陰退陽補虛療風尤宜於火熱熾盛之人永無疔疽之患窨酒亦佳花葉同功而花香尤勝真人活命飲治一切癰疽腫毒初起未潰者金銀花五錢陳皮去白當歸酒洗錢半防風七分白芷甘草節貝母天花粉乳香一錢沒藥二味另碾候藥熟下皂角刺五分穿山甲三片胕蛤粉炒去粉好酒煎善飲者多飲酒以行藥勢忌酸物鐵器酸性收斂凡藥皆忌鐵金銀花散熱解毒癰瘡聖藥故以為君花粉清痰降火白芷除濕祛風並能排膿消腫當歸和陰而活血陳皮燥濕而行氣防風瀉肺疏肝貝母利痰散結甘草化毒和中故以為臣乳香調氣托裡護心能使毒氣外出不致內功沒藥散淤消腫定痛故以為佐穿山甲善走能散皂角刺辛散剽鋭皆厥陰陽明正藥能貫穿經絡直達病所而潰壅破堅故以為使加酒者欲其通行周身使無邪不散也此藥當服於未潰之先未成者散已成者潰若已潰後不可服托裡散治一切惡瘡發背疔疽便毒始發脈弦洪實數腫甚欲作膿者脈弦洪實數乃實熱堅滿之症故宜下之金銀花當歸一兩大黃朴硝花粉連翹牡蠣皂角刺三錢黃芩赤芍一錢每五錢半酒半水煎金銀花清熱解毒癰瘡主藥當歸赤芍調營血大黃芒硝蕩胃熱黃芩清肺火牡蠣軟堅痰連翹花粉散結排膿角刺鋒鋭直達病所而潰散之也東垣曰瘡瘍及諸病面赤雖伏火熱毒禁不得攻裡為陽氣怫鬱邪氣在經宣發表以去之故曰火鬱則發之雖大便數日不見宜多攻其表以發散陽氣少加潤燥藥以潤之如見風脈風症只宜發表風藥便可以通利大便若止乾燥祕澀尤宜潤之慎不可下九竅不利瘡瘍鬱冒皆不可下汗之則愈綱目曰大便祕實不知其氣不降也便以為實而行大黃些少寒熱不知其氣血不和也便以為有外感而行表散如此害人最速芍藥蒺藜煎治通身濕熱瘡疹及下部紅腫熱痛諸瘡神效外以螵蛸粉敷之龍膽草梔子黃芩木通澤瀉錢半芍藥生地二錢白蒺藜連刺搗碎五錢甚者用一兩如火不甚者宜去龍膽草梔子加當歸茯苓米仁之屬如濕毒盛者加土茯苓五錢或一二兩當歸蒺藜煎治癰疽瘡疹血氣不行邪毒不化內無實熱而痛腫淋漓者悉宜用之此與芍藥蒺藜煎相為奇正也當酌其詳當歸熟地芍藥酒炒何首烏二錢甘草炙防風川芎白芷荊芥穗一錢白蒺藜炒搗碎三錢或五錢或水或酒煎然水不如酒或以水煎服後飲酒數杯以行藥力亦可陽虛不能化毒者加桂枝甚者再加乾薑附子氣虛不化者加人參黃耆毒陷不能外達者加穿山甲或皂刺灸法治一切癰疽惡瘡凡人初覺發背欲結未結赤腫焮痛以濕紙覆其上先干處即癰頭也取獨頭大蒜切片安於頭上用艾灸之三壯換一蒜片痛者灸至不痛不痛者灸至痛時方住最要早覺早灸為上若有十數頭者即用蒜研作餅鋪頭上聚艾於餅上燒之若初發赤腫一片中間有黃粟米頭子便用獨蒜片安於頭上著艾灸十四或四十九壯使毒氣外出則易愈李迅曰癰疽著灸勝於用藥三壯一易百壯為率但頭頂以上切不可用恐引氣上更生大禍也史源曰有灸至八百壯者約艾一篩初壞肉不痛直灸至好肉方痛至夜火焮滿背高阜頭孔百數則毒外出否則內逼五臟危矣綱目曰精要謂頭上發毒不得灸此言過矣頭為諸陽所聚艾炷宜小壯數宜少小者如椒粒少者三五壯而已按東垣灸元好問腦疽以大艾炷如兩核許者灸至百壯始覺痛而痊由是推之則頭上發毒灸之痛者艾炷宜小壯數宜少若不痛者艾炷大壯數多亦無妨也百草煎治百般癰毒諸瘡損傷疼痛腐肉腫脹或風寒濕氣留聚走注疼痛等症無不奇效百草凡田野山間者無論諸品皆可取用然以山草為勝辛香者佳冬月可用乾者不及鮮者力速須預為採取之上不論多少取以多煎濃湯乘熱熏洗患處仍用布帛蘸尉良久務令藥氣蒸透然後敷貼他藥每日二三次不拘但以頻敷為善蓋其性之寒者可以除熱熱者可以散寒香者可以行氣毒者可以解毒無所不用亦無所不到湯得藥氣則湯氣無害藥得湯氣則藥力愈行凡用百草以煎膏者其義亦以此此誠外科中最要最佳之法亦傳之方外人者也若洗水鼓腫脹每次須用二三十斤煎濃湯二三鍋用大盆盛貯以席簟遮風熏洗良久每日一二次內服廓清飲分利等劑妙甚蠟礬丸治一切瘡癰惡毒先服此丸護膜托裡使毒不攻心或為毒蟲蛇犬所傷並宜服之黃蠟二兩白礬一兩先將蠟溶化候少冷入礬和勻為丸酒下每服十丸二十丸漸加至百丸則有力瘡愈後服之亦佳加雄黃名雄礬丸治蠱毒蛇犬蟲咬毒心為君主不易受邪凡患癰疽及蛇犬所傷毒上攻心則命立傾矣黃蠟甘溫白礬酸澀並能固膜護心解毒定痛托裡排膿使毒氣不至內攻故為諸症所必用酒頓黃明膠亦妙方見本草從新黃明膠條下托裡十補散局方即外科精要十宣散治癰瘡初發或已發邪高痛下瘡盛形羸脈無力者癰疽不因膏粱丹毒火熱因虛勞氣鬱者止宜補形氣調經脈自當消散不待汗之下之也當歸黃耆人參二錢川芎桂心白芷防風厚朴桔梗甘草一錢每服二錢加至六錢熱酒調下千金加芍藥連翹木香乳香沒藥亦名托裡散治發背疔瘡參耆補氣芎歸活血甘草解毒桂心白芷桔梗排膿厚朴瀉實滿防風散風邪為表裡氣血之藥共成助陽內托之功也丹溪曰冬月腫瘍用之可轉重為輕若夏月潰瘍用之以桂朴之溫散佐以防風白芷吾恐雖有參耆難為倚仗世人不分冬夏無論經絡不能無誤也機要曰治瘍須明托裡疏通臟腑調和營衛三法內之外者其脈洪實發熱煩躁外無焮赤痛深於內其邪深矣當疏通臟腑以絶其源外之內者其脈浮數焮腫在外形症外顯恐邪氣極而內行當先托裹內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和營衛用此三者雖未即瘥必無變症托裡溫中湯治瘡瘍為寒變而內陷膿出清解皮膚涼心下痞滿腸鳴切痛大便微溏食則嘔逆氣短厄逆不得安臥時發昏憒此孫彥和治王伯祿臂瘍方也六脈沉微色變膚涼加以厄逆胃中虛寒極矣遂於盛夏用此大辛熱之劑蓋舍時從症之變法也附子炮四錢乾薑炮羌活三錢茴香丁香沉香益智仁甘草炙陳皮一錢木香錢半生薑五片衛生寶鑑曰經云寒淫於內治以辛熱佐以苦溫附子乾薑大辛熱溫中外發陽氣自里至表為君羌活味苦辛溫透關節炙草甘溫補脾胃行經絡通血脈胃寒則嘔吐不下食益智沉香丁香大辛熱以散寒邪為佐瘡氣內攻聚而為滿木香茴香陳皮辛苦溫治痞散滿為使托裡黃耆湯總録治諸瘡潰後膿多內虛潰後膿血出多陰陽兩竭宜大補氣血黃耆人參當歸桂心茯苓遠志麥冬五味子等分為末每服五錢食遠服人參黃耆補氣固衛當歸桂心活血生肌茯苓滲濕健脾麥冬清熱補肺遠志辛散專理癰疽五味酸溫善收腫大丹溪曰癰疽潰後補氣血理脾胃實為至要否則數月半年之後虛症仍見轉成他病矣螵蛸散治濕熱破爛毒水淋漓等瘡或下部腎囊足股腫痛下部諸瘡無不神效海螵蛸不必浸淡人中白或人中黃硇砂亦可等分為細末先以百草煎濃湯乘熱熏洗後以此藥摻之如干者以麻油或熬熟豬油或蜜水調塗之若腫而痛甚者加冰片少許更妙若濕瘡膿水甚者加密陀僧等分或煅過官粉亦可槐花蕊治楊梅下疳神方凡棉花毒或下疳初感或毒盛經久難愈用新槐蕊揀淨不必炒每食前用清酒送下三錢許早午晚每日三服之服至二三升則熱毒盡去可免終身餘毒之患亦無寒涼敗脾之慮此經驗神方也如不能飲即用滾水鹽湯俱可送之但不及酒送之功捷也棉花瘡點藥杏仁取霜真輕粉等分為末敷瘡上二三日即痂落又武定侯方雄黃錢半杏仁三十粒去皮尖輕粉一錢為末以雄豬膽汁調敷之二三日即愈天下第一方當歸補血湯加防風連翹方治瘡瘍有血無膿瘙癢不止有血無膿表氣不足也諸癢屬虛虛者可補當歸防風二錢黃耆五錢連翹二錢當歸黃耆大補其氣血連翹解諸經之客熱防風引歸耆直達於表二物得之而效愈速也此藥服之數劑諸瘡化毒生膿膿滿毒盡則去病根而無溫瘢之患若膿日久不幹者去黃耆加白朮茯苓以燥之如治爛痘之法則善矣十全大補湯治氣血虛弱頸面腹背皆瘡者瘡疥生於手足者為輕生於頸腹面背者乃氣血虛羸之甚小人道長之象故宜大補方見卷一上治氣門四君子湯附方四君同黃耆以大補其氣四物同桂心以大補其血氣血得其補則腹背之瘡先愈而君子道長小人道消矣參苓白朮散亦可酌用見補養門連翹金貝煎治陽分癰毒或在臟腑胸乳肺膈之間者此方最佳甚者速用數服無有不愈金銀花土貝母蒲公英夏枯草三錢紅藤七八錢連翹一兩或五七錢好酒二碗煎一碗服服後暖臥片時火盛煩渴氣腫者加天花粉若陽毒內熱或在頭項之間者宜用水煎連翹歸尾煎治一切無名腫毒丹毒流注等最宜用之連翹七八錢歸尾三錢甘草一錢金銀花紅藤四五錢好酒煎服如前如邪熱火盛者加槐蕊二三錢降癰散治癰疽諸毒消腫止痛散毒未成者即消已成者斂毒速潰可愈若陽毒熾盛而疼痛勢凶者先宜用此方其解毒散邪之功神效若堅頑深固者用後方薄荷葉新者茅根野菊花連根葉各一握土貝母減半上薄荷野菊乾者可為末鮮者可搗爛同貝母研勻外將茅根煎濃湯去渣用調前藥末乘熱敷患處仍留前剩湯頓暖不時潤於藥上但不可用冷湯冷則不散不行反能為痛約敷半日即宜換之真妙方也後方凡疽毒堅頑深固及結核痰滯宜用此方生南星土貝母朴硝等分薄荷倍用石灰風化者倍用或再倍用之上同為末用鹽滷杵稠黏敷患處經宿干則易之不必留頭若膿成者留頭亦可或炒熱攤絹上隔絹貼之亦可或用麻油調或用熱茅根湯調亦可若欲止痛速效加麝香或冰片少許更妙止痛當歸湯總録治腦疽背疽穿潰疼痛當歸生地黃芍藥黃耆人參甘草炙官桂當歸生地活血涼血人參黃耆益氣補中官桂解毒化膿毒化成膿則痛自止芍藥和脾酸以斂之甘草扶胃甘以緩之則痛自減矣齊得之曰世人皆謂乳沒珍貴之藥可住疼痛不知臨病制宜殊非一端熱痛涼之寒痛溫之風痛除其風濕痛導其濕燥痛潤之塞痛通之虛痛補之實痛瀉之膿鬱而閉者開之惡肉敗潰者引之陰陽不和者調之經絡閉澀者利之不可執一而無權也卷十二上眼目門目雖為肝竅而五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡氣之精為白眼肉之精為約束裹擷筋骨氣血之精而與脈併為系上屬於腦後出於項中此則眼具五臟六腑也故其症多而方亦廣茲僅録數方以備採用其疏風燥濕瀉火養血之劑散見於各門可以通用目有五輪白睛為氣輪屬肺金故獨堅青睛為風輪屬肝木內包膏汁涵養瞳神目角大小眥為血輪大眥屬心君火大眥赤者為實火小眥屬心包相火小眥赤者為虛火兩睥為肉輪屬脾土土藏萬物故包四輪開動為陽為應用閉靜為陰則睡矣目中有神膏此由膽中滲潤精汁積而成者能涵養瞳神有神水先天真氣所化潤澤之水也有神光原於命門通於膽發於心是火之用也有真血肝中升運滋目經絡之血也有真氣目之經絡中往來生用之氣先天之元陽也有真精先後天元氣所化精汁起於腎施於膽而及瞳神也目有堅殼數重真血滋神水神水包神膏膏中一點青瑩乃膽腎所聚之精華唯此一點鑑照萬物空闊無窮為水輪屬腎水人之邪正壽天貴賤皆可驗目而得之人參益胃湯治勞役飲食不節內障目病內障者睛里昏暗與不病之眼無異惟瞳神內有隱隱青白者東垣曰五臟六腑之精氣皆稟受於脾胃而上貫於目脾者諸陰之首也目者氣血之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主神宜靜而安相火代行其令相火者包絡也主百脈皆榮於目既勞役運動勢乃妄行及因邪氣所並而損其血脈故諸病生焉醫者不理脾胃及養血安神治標不治本不明正理也黃耆人參一兩甘草炙八錢白芍藥黃柏酒炒四次三錢蔓荊子二錢每四錢日二服參耆甘草大補中氣以強脾胃蔓荊升清陽而通九竅白芍入厥陰而和營血目得血而能視黃柏除濕熱而瀉相火樓全善曰治目不明氣虛而有火可於參耆中微加連柏若氣虛無火連柏等涼劑不可施矣使精氣足而清陽升則臟腑和而障翳退矣雞子黃連膏治火眼暴赤疼痛熱在膚腠泄而易解者用此點之即可愈若熱由內發火在陰分者不宜外用涼藥非惟不能去內熱且以閉火邪也用雞子一枚開一小孔單取其清盛以瓷碗用黃連一錢研為末摻於雞子清上以箸徹底連打沫得數百使成浮沫約得半盞許即其度矣安頓少頃用箸撥開浮沫傾出清汁用點眼眥勿得緊閉眼胞擠出其藥必熱淚擁出數次即愈內加冰片少許尤妙若雞子小而清少者加水二三匙同打亦可羊肝丸類苑治目疾內障倪仲賢曰經曰心者五臟之專精目者其竅也又為肝竅腎主骨骨之精為神水故肝木不平內挾心火為勢妄行火炎不制神水受傷上為內障此五臟病也諸脈皆屬於目相火者心包絡也主百脈上榮於目火盛則百脈沸騰上為內障此虛陽病也膀胱小腸三焦膽脈俱循於目其精氣亦上注為目之精四腑一衰則精氣盡敗邪火乘之上為內障此六腑病也神水黑眼皆法於陰白眼赤脈皆法於陽陰齊陽侔故能為視陰微不立陽盛則淫經曰壯火食氣壯火散氣上為內障此弱陰病也四者皆為陰弱不能配陽也夜明砂淘淨蟬蛻木賊去節當歸一兩酒洗以羊肝四兩水煮搗爛和丸蚊食血之蟲夜明砂皆蚊眼也故能散目中惡血而明目蝙蝠食蚊而眼不化其矢為夜明砂木賊輕揚而善磨木故能平肝散熱而去障蟬性善蛻故能退翳當歸能入厥陰養血而和肝用羊肝者羊性屬火取其氣血之屬能補氣血引諸藥入肝以成功也羊肝丸之方頗多茲量録其一二濟生羊肝丸黃連一兩羯羊肝一具去筋膜生用搗爛和丸本事方煮爛搗用治肝經有熱目赤睛痛及內障青盲樓全善曰誠哉河間之言目盲耳聾鼻不聞臭口不知味手足不能運動者皆由玄府閉塞而神氣出入升降之道路不通利也故先賢治目昏花如羊肝丸用羊肝引黃連等藥入肝解肝中諸郁蓋肝主目肝鬱解則目之玄府通利而明矣黃連之類解熱鬱也椒目之類解濕鬱也茺蔚之類解氣鬱也芎歸之類解血鬱也木賊之類解積鬱也羌活之類解經郁也磁石之類解頭目郁墜邪氣使下降也蔓荊下氣通中理亦同也凡此諸劑皆治氣血鬱結目昏之法河間之言信不誣矣至於東垣丹溪用參耆補氣血亦能明者蓋目主氣血盛則玄府得利出入升降而明虛則玄府無以出入升降而昏此則必用參耆四物等劑助氣血運行而明也圓明膏東垣治內障生翳及瞳子散大因勞心過度飲食失節柴胡麻黃黃連生地五錢訶子濕紙裹煨粉甘草二錢歸身三錢以水二碗先煮麻黃至一碗去沫入後藥同熬至滴水不散去渣入蜜少許再熬點之柴胡麻黃發表散邪當歸生地和肝養血黃連清肝火甘草和中州瞳子散大故加訶子以收之也兔矢湯治瘡疹入眼及昏暗障翳兔矢二錢茶清調或吞服須待瘡疹瘥後服之兔者明月之精得金之氣其矢名明月砂能解毒殺蟲故專能明目又可兼治勞疳也滋陰地黃丸東垣一名熟地黃丸治血弱氣虛不能養心心火旺盛肝木自實瞳子散大視物不清肝為心母子能令母實故心火旺則肝木作實肝主風心主火瞳子散大風火動搖之徵也水不能制火則清和之氣乖亂而精液隨之走散矣精液走則光華失故視物不清也綱目曰心脈挾目系肝脈連目系手足少陽之脈絡於目外小眥風熱從此道上攻頭目致偏頭痛腫瞳子散大視物昏花血虛陰弱故也宜涼血養血收火散火而除風熱熟地一兩生地一方兩半一方七錢半柴胡八錢黃芩酒炒當歸酒洗五錢黃連酒炒五味子地骨皮天門冬枳殼麩炒甘草炙人參二錢蜜丸茶清下日二服忌食辛熱之物助火寒冷之物損胃使藥不上行熟地當歸養血生地地骨涼血黃芩瀉肺火黃連瀉肝火天冬清肺而滋腎柴胡散肝而升陽五味收耗而斂散人參甘草以益氣補中枳殼以利氣行滯也消風養血湯治目赤腫痛風熱傷血則赤風熱作實則腫風熱攻注則痛目外向面者為外眥在內近鼻者為內皆上為外眥下為內眥目痛赤脈從上下者為太陽症宜溫之散之從下上者為陽明症宜寒之下之從外走內者為少陽症宜和解之荊芥蔓荊子菊花白芷麻黃防風桃仁去皮尖紅花酒炒川芎五分當歸酒洗白芍酒炒草決明石決明甘草一錢荊芥防風麻黃白芷甘菊蔓荊輕浮上升並能消風散熱桃仁紅花川芎歸芍辛散酸收並能養血去瘀兩決明皆除肝經風熱專治目疾淤去血活則腫消風散熱除則痛止又目為肝竅搜風養血皆以和肝加甘草者亦以緩肝而止痛也保命集云目病在腑則為表當除風散熱在臟則為里當養血安神暴發者為表易療久病者在裡難治金露散治目赤腫痛翳障諸疾天竺黃新香者海螵蛸不必浸洗月石二兩硃砂飛爐甘石片子者佳煅童便淬七次飛淨八錢為極細末瓷瓶收貯每用時旋取數分研入冰片少許諸目疾皆妙若治外內眥障取一錢許加珍珠八釐須放豆腐中蒸熟用膽礬三釐若爛弦風眼每一錢加銅緑飛丹各八釐如赤眼腫痛每一錢加乳香沒藥各五釐補陽湯治青白目翳陽不勝其陰則生目翳所謂陰盛陽虛則九竅不通乃陰埃障日之象也人參黃耆炙白朮炒茯苓甘草陳皮柴胡羌活獨活防風知母炒當歸酒洗生地酒洗熟地白芍酒炒澤瀉肉桂去皮參朮苓草黃耆陳皮甘溫益氣之品也固所以補陽羌獨柴防辛溫散翳之品也亦所以升陽二地歸芍知母澤瀉乃陰分之藥亦所以濟夫羌防柴獨使不散其真陽爾用肉桂者取其辛熱熱者火之象可以散陰翳辛者金之味可以平肝木蓋眼者肝木之竅也益陰腎氣丸東垣治腎虛目暗不明方見卷二上補養門六味地黃丸附方精生氣氣生神故腎精一虛則陽光獨治陽光獨治則壯火食氣無以生神令人目暗不明壯水之主以制陽光故用生熟地黃歸梢五味山萸澤瀉丹皮味厚之屬以滋陰養腎滋陰則火自降養腎則精自生山藥所以益脾而培萬物之母茯神所以養神而生明照之精柴胡所以升陽而致神明之氣於精明之窠也孫思邈云中年之後有目疾者宜補不宜瀉可謂開萬世之朦矣東垣此方其近之駐景丸治肝腎陰虛兩目昏暗目為肝竅瞳子神光屬腎故肝腎陰虛則目昏暗也枸杞子車前子二兩熟地黃五兩菟絲子八兩酒浸蜜丸酒下熟地枸杞補肝滋腎菟絲益精強陰車前利水而瀉肝腎邪熱也車前子清肝明目利小便而不走氣以此瀉邪則補藥更為得力張子和曰目赤腫是厥陰肝經風熱利小便能去肝經風熱加當歸五兩和氣血以益肝脾肝藏血脾統血目得血而能視五味二兩斂耗散而助金水能斂肺金滋腎水收瞳神散大川椒一兩補火以逐下焦寒滯名加味駐景丸定志丸局方治目不能遠視能近視者海藏曰目能近視責其有水不能遠視責其無火法當補心常服益心強志能療健忘遠志菖蒲二兩人參茯苓一兩蜜丸硃砂為衣張子和方無菖蒲加茯神柏子仁酸棗仁亦名定志丸酒糊丸薑湯下安魂定驚人參補心氣菖蒲開心竅茯苓能交心氣於腎遠志能通腎氣於心硃砂色赤清肝鎮心心屬離火火旺則光能及遠也地芝丸東垣治目能遠視不能近視海藏曰目能遠視責其有火不能近視責其無水法當補腎生地黃天冬四兩枳殼甘菊花二兩蜜丸茶清或酒下茶者欲火熱之下降酒者欲藥力之上行生地涼血生血天冬潤肺滋腎枳殼寬腸去滯甘菊降火除風真人明目丸治腎水虛竭肝有風熱目昏多淚腎主目之瞳子腎水虛竭則目昏肝之液為淚肝有風熱則淚出熟地黃生地黃川椒去目及閉口者微炒蜜丸桐子大每服五十丸空心鹽飲吞下熟地所以補腎生地所以涼肝川椒味辛而熱可以療肝腎之痹氣濕熱著而不散之氣又於空心以鹽飲吞之宜其直達肝腎矣病在標而治其本可謂神於病情者所以為真人之方與江陵傅氏目昏多淚家貧鬻紙為業性喜雲水見必邀迎一日有客方巾布袍過之授以此方服之不一月目明夜能視物防風飲子治倒睫拳毛倒睫拳毛由目急皮縮之故也蓋伏熱內攻陰氣外行當去其內熱併火邪使眼皮緩則眼毛立出矣黃連炒甘草炙人參一錢當歸錢半葛根防風五分細辛蔓荊子三分服後避風寒濕熱參甘以補其氣當歸以濡其血黃連以清其火防葛以散其風熱細辛入少陰而潤腎蔓荊走頭面而升陽除人參當歸黃連加黃耆名神效明目湯東垣治前症兼赤爛昏痛冷淚多眵眵音鴟眼脂又法摘去拳毛以蝨血點數次即愈二百味草花膏趙謙治目赤流淚或痛或癢書不能視夜惡燈光血熱則目赤肝熱則多淚熱微則癢熱甚則痛赤腫昏眊故書不能視陽勝故夜惡燈光羯羊膽蜂蜜入蜜膽中蒸熟候乾細研為膏每含少許或點目中又法臘月入蜜膽中紙籠套住懸屋檐下待霜出掃取點眼羊膽苦寒益膽瀉熱蜂蜜甘潤補中緩肝曰二百味草花膏者以羊食百草蜂採百花也時珍曰肝開竅於目膽汁減則目暗目者肝之外候膽之精華也故諸膽皆治目疾點服說云病有內外治各不同內疾既發非服不除外疾既成非點不退內疾始盛浚流不如塞源伐株不如去根不服藥而除者未之見也外障既成如物汙須濯鏡垢須磨不點而去者未之有也若內障不服而外點反激其火動其血氣無益反損若外障已成雖服藥不發不長而所結不除當內外夾攻方盡其妙飛絲芒塵入目方陳墨濃磨點之明目六事方損讀書減思慮專內觀簡外事早起晚夜眠早晉範寧常苦目疾就張湛求方湛書此六事仍尾之曰上方宋陽子少得其術以授魯東門伯次授左邱明遂世世相傳以及卜子夏晉左太衝凡此諸賢並有目疾得此方之用熬以視火下以氣篩蘊於胸中七日然後納諸方寸修之一時近可數其目睫遠可察夫簾垂長服不已洞見牆壁之外非但明目乃亦延年許學士評之曰審如是而行之非可謂之嘲謔真明目之奇方也目疾者戒沐頭宜濯足此二句者先賢之格言也太極之道動而生陽靜而生陰沐頭則上動矣必生陽而損目況夫濕氣難乾乘風而梳拂不已則風濕襲於首而並於目甚者至於喪明此沐頭之宜戒也然何以宜濯足也足太陽之經根於足之小趾端上貫於精明足少陽之經根於足大趾歧骨間上貫於瞳子髎足陽明之經根於足中趾內間上貫於承泣易曰水流濕火就燥若以溫水濯其兩足則頭目間之熱邪亦能引之而下況夫溫濯之餘腠理疏泄又足以瀉經中之邪是亦去病之一助也故曰宜濯足卷十二下救急門凡人以疾病死而得終其天年者雖曰不幸猶正命也若卒暴之疾暴橫之遭大如縊溺砒蠱蛇犬之傷小如骨哽刀斧湯火之害此等死者則非正命矣君子順受其正胡然而以非命歸耶茲採數方以備急用而臨用之際其要在隨症制宜以施活人手眼方為應變之才爾六君子方見卷一上治氣門四君子湯附方加天麻方治暴死卒然而倒不省人事口噤吐沫風燥則筋急故令口噤吐沫者風盛氣湧使然乃風來潮洶之象身體溫暖風為陽邪故令身體溫暖脈來虛大邪氣虛而正氣虛也脈虛而以辛散之劑驅風則懨懨之氣必絶非其治也故用參朮苓草之甘溫者急固其氣復用半夏陳皮之辛利者以平其沫天麻之加定風邪爾四君子方見卷一上治氣門加薑汁竹瀝方治暴死有痰聲者名曰痰厥若痰聲漉漉隨息漸至而甚者是氣已脫也不治痰厥者頑痰塞其清陽呼吸之道也痰既塞之氣欲通之故令喉中有聲經曰壯者氣行則愈怯者著而成病故用參朮苓草之溫補者以壯氣佐之竹瀝薑汁以行痰獨參湯行立之間暴眩僕絶喉無痰聲身無邪熱者陰虛陽暴絶也此方主之人參二兩去蘆煎陰陽之在人身互為其根而不可離者也若陰道虧乏則孤陽無所依附亦自飛越故令人暴僕眩絶過不在痰故無痰聲病不因感故無體熱斯時也有形之陰血不能急生無形之呼吸所宜急固況夫陰生於陽又太極之妙乎故以獨參主之取其為固元益氣之聖品爾五磨飲子治暴怒暴死名曰氣厥宜扶正坐使氣順即稍安再用皂角末吹鼻令嚏方見卷一上治氣門四磨飲附方怒則氣上氣上則上焦氣實而不行下焦氣逆而不吸故令暴死氣上宜降之故用沉香檳榔氣逆宜順之故用木香烏藥佐以枳實破其滯也磨以白酒和其陰也若挾虛者用四磨飲火醋熏鼻法凡感臭穢瘴毒暴絶者名曰中惡不治即死宜燒炭火一杓以醋沃之令患人鼻受醋氣則可復蘇既蘇以藿香正氣散主之方見卷五上和解門附子理中湯腹痛額頭黧黑手足收引脈來沉下無氣以息者中寒暴死也腹痛病因固有數種但額頭黧黑手足收引脈來沉下則中寒之驗也所以無氣以息者呼出主陽吸入主陰三陰受其真寒則病不能吸吸亡則呼不能獨存矣故令人暴死此方主之祛寒門姜附白通湯姜附湯等方俱可酌用方見卷六下祛寒門理中湯附方寒者溫之故用附子乾薑乃人參白朮甘草所以生其呼吸之氣也進藥後更著艾灸其關元此內外交治之法是症也有死一日夜而治之復蘇者幸勿因其危而輕棄之凡冬月凍死有氣者以灰炒熟盛囊中尉其心火冷即易之若遽以火烘冷與火爭必死浴以熱湯亦死或用薑汁熱酒各半溫服生脈散方見卷七上消暑門加香薷方人本陰虛復暑途飢困勞倦暴僕昏絶者此方主之人本陰虛則陽獨治復遇暑途則陽易亢加之飢困勞倦則陰益虧所以暴僕昏絶者一則陰虛而孤陽欲脫一則暑邪乘虛而犯神明之府也用人參益元而固脫香薷辟邪而卻暑麥冬之清所以扶其不勝之肺五味之酸所以斂其欲脫之真凡人平素體氣不虧暑月道中中熱卒死以路上熱土圍臍令人尿其中即活薑湯童便皆可灌之或用熱土大蒜等分搗水灌之或置日中或令近火以熱湯灌之即活切勿飲以冷水及臥冷地正如凍死人若遽近火即死脫陽脫陰凡男婦交感而死在男子名曰脫陽在女子名曰脫陰男子雖死陽事猶然不萎女子雖死陰戶猶然不閉俱不治若男女不曾離能緊緊抱住以口接氣暖氣呼通間有得生者但臨時慌忙焉知料理所以多死亦有夢中脫死者其陽必舉其陰必泄尸容有喜色為可辨也皆在不救縊死切不可割斷繩索急用手裹衣物緊塞穀道抱起解繩安放平正揪髮向上揉其項痕捻圓喉管腳踹兩肩以兩管吹氣入耳內或刺雞冠熱血滴口中男用雌女用雄鼻即氣轉再屈伸其手足將手摩之若氣不接將腰打三四拳或以皂角末搐鼻雖旦至暮身冷猶可活溺死急倒提出水用牛一頭令橫臥以腹合牛背上牽牛徐行令吐出腹中之水以老薑擦牙即活口噤者攪開橫一箸於牙間使水得出如無牛以鍋覆地將溺人臍對鍋臍俯臥以手托其頭水出即活或俯臥凳上腳後稍高鹽擦臍中待其水自流出或用皂角末綿裹納下部出水即活切忌火烘逼寒入內以致不救魘死如原有燈即得切忌火照但痛咬其腳跟或咬大拇指而唾其面或以皂角末吹入鼻中得嚏即醒中毒凡中蠱毒令嘗白礬不澀食黑豆不腥即是中毒可濃煎石榴皮汁飲之或熱茶化膽礬五分探吐出惡毒或米飲調真鬱金末三錢令下凡中砒霜毒急飲以人溺及人糞汁或搗烏柏樹根葉汁或藍汁令服或刺羊血熱服中鹽滷毒縱飲生豆腐漿解之中諸菌菌毒及蟲蜞入腹黃土和水飲下之緑豆湯甘草湯能解百毒服鉛粉以麻油調蜂蜜加飴糖與服蛇蟲犬咬傷凡惡蛇傷急於傷處上下扎縛使毒不散走隨浸糞缸內食蒜飲酒令飽使毒不攻心或礬石甘草等分冷水服二三錢更搗蒜敷患處加艾圓灸之此法兼治百蟲毒螫又方五靈脂一兩雄黃五錢為末酒調服滓敷患處又方貝母為末酒調盡醉飲之頃久酒自傷處為水流出候水盡以藥渣敷瘡上垂死可活凡蜈蚣傷取大蜘蛛放傷處吸去其毒急投蜘蛛於水中令吐毒以全其命又方鹽水洗淨雞糞塗之壁虎咬用桑柴灰水煎數沸濾濃汁調白礬末塗之蠍子螫用白礬半夏等分醋調塗之外臺曰凡遇一切毒螫之物切不可起惡念向之亦不得殺之若輒殺之後必遭螫慎之凡瘋狗咬傷用番木鱉半個碎切斑蝥七個去頭翅足若過一日加一個糯米一撮慢火炒脆去斑蝥取米研末好酒調服取下惡物多日凶者頭上有紅髮三根拔去之若仍凶腹內有狗聲者再加木鱉一個斑蝥草一個如前製法與服服後以黃連甘草湯解之三月不可聽鑼鼓聲再發則難治終身不得食羊犬肉稍輕者急於無風處捏去惡血孔乾者針刺出血用小便或鹽湯洗淨搗蔥貼上若常犬咬者淨洗血水用虎骨煅研敷患處或爛嚼杏仁敷之湯泡傷雞子清調大黃末塗之炒黃柏末亦可一法以冷燒酒澆淋甚妙刀斧傷海螵蛸末敷之血立止古壙石灰為末亦可金瘡血出不止用原蠶蛾炒為末敷之骨鯁凡魚骨鯁食橄欖即下如無鮮者用橄欖核磨水飲之橄欖木作舟楫魚觸著即死物之相畏有如此者又貓涎亦能下魚骨鯁凡雞骨鯁用野苧根搗爛如龍眼大雞湯化下如魚骨鯁魚湯化下諸骨鯁用犬吊一足取其涎徐徐咽下或用硼砂井花水洗化下或醋煎威靈仙咽下或加砂糖凡治哽之法可以類推如鸕鷀獺掌治魚哽磁石治針哽發灰治發哽虎犬治骨鯁亦各從其類也誤吞銅鐵金銀但多食肥肉自隨大便而出吞針者煮蠶豆同韭菜食針菜自從大便下而出誤吞銅者食荸薺茨菰即化吞發繞喉不出取自亂髮燒灰白湯調下一錢頰車開不能合醉之睡中用皂角末吹其鼻嚏透自合厄逆不止用紙捻刺鼻中得嚏即止舌脹滿口以生蒲黃末塗之或加乾薑末乳蛾喉痹丹乳蛾水漿不入先用皂角末點破再取杜牛膝汁和醋含咽又法艾葉搗汁口含良久腫自消冬月無葉掘根用之又喉閉者取山豆根汁含咽即開有藥不能進者急取病人兩臂捋數十次使血聚大指上以發繩扎住拇指針刺指甲縫邊出血指甲縫邊乃少商井穴如放痧一般左右手皆然其喉即寬霍亂攪腸痧以針刺手指近甲處一分半許出血即安仍先自兩臂捋下令惡血聚於指頭後刺之鼻衄不止亂髮燒灰存性細研水服並吹入鼻中又方白芨末新汲水調下又法紙數十層水浸濕安頂中以火尉之紙干立止又法用線扎中指中節左孔出血扎左指右孔出血扎右指兩孔出血則俱扎之又法以大蒜搗餅貼足心蟲入耳中以貓尿滴耳中蟲即出以生薑擦貓鼻貓即尿跌打損傷韭汁和童便飲散其淤血骨折者蜜和蔥白搗勻厚封酒調白芨末二錢服産婦血暈猝時昏暈藥有未及床前燒炭沃醋或以醋塗口鼻令酸氣入神收即醒或用破舊漆器或乾漆燒煙燻之使鼻受其氣産後血既大行氣隨脫去察其面白眼閉口開手冷脈微氣脫症也速用人參一二兩急煎濃湯灌之凡産後血暈本屬氣虛而血壅痰盛亦有之如果形氣脈氣俱有餘胸腹脹痛上衝血逆症也宜用失笑散若痰盛氣粗宜二陳湯如無脹痛氣粗之類悉屬氣虛宜大劑芎歸湯八珍湯之類主之産後子腸不收醋三分冷水七分和噀其面一噀一縮三噀即收又法萆麻仁一兩搗膏塗頂心收即去之又法皂角末吹鼻中嚏作立上
