body:
  text: 卷十下胎産門王節齊曰調理妊婦在於清熱養血白朮補脾為安胎君藥條實黃芩安胎聖藥清熱故也朱丹溪曰産後當大補氣血雖有雜證從末治之此二說雖若近理而實未可奉為定訓也蓋人之氣秉萬有不齊而胎前産後之虛實寒熱人人各殊是以用藥之難當如盤珠不可膠柱而鼓瑟今女科每執方以概治諸病其為害不知若干人矣膠艾湯金匱仲景云婦人有漏下者有半産後因續下血都不絶者有妊娠忽下血者假令妊娠腹中痛為胞阻膠艾湯主之此概言婦人下血宜以膠艾湯溫補其血而妊娠亦其一但致病有不同無端漏下者此平日血虛而加客邪半産後續下血不絶此因失血血虛而正氣難復若妊娠下血因瘕者固有之而兼腹中痛則是因胞阻阻者阻其欲行之血而氣不相順非症痼害也故同以膠艾湯主之養陰補血莫如四物血妄行必挾風而為痰濁膠以騾皮為主能去風以濟水煎成能澄濁艾性溫而善行能導血歸經甘草以和之使四物不偏於陰三味之力也而運用之巧實在膠艾乾地黃六兩艾葉當歸三兩芎藭阿膠芍藥四兩甘草二兩水五升清酒三升合煮取二升去渣內膠令消盡溫服一升日三服不瘥更作一方加乾薑二兩胡氏治胎動無干姜嚴氏治胎動經漏腰痛腹滿搶心短氣加黃耆千金翼治從高墜下損傷五臟吐血及金瘡傷經內絶者加乾薑又方阿膠一斤蛤粉炒艾葉數莖亦名膠艾湯良方治胎動不安腰腹疼痛或胎上搶心去血腹痛指迷方加秦艽當歸芍藥散金匱治婦人懷妊腹中㽲痛音鳩又音絞急痛也芍藥一斤澤瀉半斤茯苓白朮四兩當歸芎藭三兩六味杵為散取方寸匕酒和日三服㽲痛者正氣不足使陰得乘陽而水氣勝土脾郁不伸鬱而求伸土氣不調則急痛矣故以歸芍養血苓朮扶脾澤瀉瀉其有餘之舊水芎藭暢其欲遂之血氣不用黃芩㽲痛因虛則稍挾寒也然不用熱藥原非大寒正氣充則微寒自去爾桂枝茯苓丸金匱云婦人宿有症病經斷未及三月而得漏下不止胎動在臍上者此為症痼害妊娠六月動者前三月經水利時胎動也下血者後斷三月衃也所以血不止者其症不去故也當下其症桂枝茯苓丸主之徐忠可曰婦人行經時遇冷則余血留而為症症者謂有形為徵然症病女人恆有之或不在子宮則仍行經而受孕經斷即是孕矣未及三月將三月也既孕而仍見血謂之漏下今未三月而漏下不止則養胎之血傷故胎動也假使胎在臍下則真欲落矣今在臍上是每月湊集之新血因症氣相妨而為漏下實非胎病故曰症痼害宿疾難愈曰痼無端而纍之曰害至六月胎動此宜動之時矣但較前三月經水利時胎動下血則已斷血三月不行乃復血不止是前之漏下新血去而症反堅牢不去故須下之為安耳桂枝茯苓牡丹皮桃仁去皮尖熬芍藥等分末之煉蜜丸如兔屎大每日食前服一丸不知加至三丸桂枝芍藥一陽一陰茯苓丹皮一氣一血調其寒溫扶其正氣桃仁以之破惡血消症癖而不嫌於傷胎血者所謂有病則病當之也且症之初必因寒桂能化氣而消本寒症之成必挾濕熱為窠囊苓滲濕氣丹清血熱芍藥斂肝血而扶脾使能統血則養正即所以去邪耳然消症方甚多一舉而兩得莫有若此方之巧矣每服甚少而頻更巧要知症不礙胎其結原微故以漸磨之乾薑人參半夏丸金匱治妊娠嘔吐不止乾薑人參一兩半夏二兩末之以生薑汁糊為丸如梧子大每服十丸日三服諸嘔吐酸皆屬於火此言胃氣不清暫作嘔吐者也若妊娠嘔吐不止則因寒而吐上出為嘔不止則虛矣故以半夏治嘔人參補虛而以生薑汁協半夏以下其所逆之飲橘皮湯治妊娠嘔吐不下食惡阻以聞食而嘔責之脾虛嘔吐以食入復吐責之有火所謂諸逆衝上屬於火也乃厥陰之血既養其胎少陽之火虛而上逆也橘皮竹茹人參白朮十八銖生薑一兩厚朴十二銖竹茹能平少火厚朴能下逆氣橘皮生薑所以開胃人參白朮所以益脾開胃益脾欲其安穀云耳半夏茯苓湯治妊娠惡阻惡阻者噁心而妨阻飲食也此是下部氣血不足復盜脾胃之氣以固養胎元故令脾胃自弱一聞穀氣便噁心而妨阻也半夏生薑三十銖乾地黃十八銖旋覆花白芍藥人參芎藭細辛橘皮甘草桔梗十二銖半夏生薑能開胃而醒脾地黃芎芍能養陰而益血人參甘草能和中而益氣橘皮桔梗旋覆細辛皆辛甘調氣之品可以平惡逆之氣而進飲食者也半夏為妊娠所忌以其燥陰液也若惡阻之證則有當用者故孫真人養胎之劑用半夏者蓋五方焉鉤藤湯良方治瘛瘲胎動不安瘛瘲手足抽掣也熱為陽風主動肝風相火為病也鉤藤鉤當歸茯神人參二錢桔梗錢半桑寄生五分風熱加黃芩梔子柴胡白朮風痰加半夏南星竹瀝風勝加全蠍殭蠶鉤藤之甘寒以除心熱而散肝風柴胡桔梗之辛涼黃芩梔子之苦寒以平少陽厥陰之風熱風熱去則瘛瘲止矣人參茯神以益氣而寧神當歸寄生以養血而安胎也當歸貝母苦參丸金匱治妊娠小便難飲食如故當歸貝母苦參等分煉蜜丸如小豆大飲服三丸加至十丸從來小便難傷寒熱邪傳裡則有之必先見表證或化源鬱熱者有之上必見渴中氣不化者有之飲食必不調中氣下陷者有之必先見脾胃證下焦鬱熱有之必不渴而飲食如故今妊娠飲食如故然小便難必因便溺時得風冷鬱於下焦而為熱致耗膀胱之水故以苦參能入陰治大風開結氣除伏熱為君當歸辛溫能入陰利氣善治沖帶之病為臣其證雖不由肺然膀胱者氣化之門下竅難則上必不利故以貝母開肺氣之郁為佐全不用利水藥病不因水鬱也羚羊角散本事方治妊娠中風涎潮忽僕目吊口噤角弓反張名子癇陰主靜陽主動風陽邪也諸風掉眩皆屬肝木故有搐搦眩冒反張之證羚羊角屑一錢獨活防風芎藭當歸棗仁炒茯神杏仁薏仁五分木香甘草二分半加姜煎一方有五加皮羚羊角之辛涼以平肝火防風獨活之辛溫以散風邪茯神酸棗以寧神當歸川芎以活血杏仁木香以利氣薏仁甘草以調脾也扶土所以抑木故薏仁亦治筋急拘攣之證紫蘇飲嚴氏治胎氣不和湊上胸腹腹滿頭痛心腹腰脅痛名子懸由下焦氣實相火旺盛舉胎而上上逼心胸也蘇葉一錢當歸七分芎藭芍藥人參陳皮大腹皮五分甘草二分加姜煎空心服心腹痛甚者加木香延胡索芎歸芍藥以和其血蘇橘大腹以順其氣氣順血和則胎安矣既利其氣復以參甘養其氣者順則順其邪逆之氣養則養其沖和之氣也天仙藤散陳景初治子氣婦人衝任素受血風因妊娠而足腫喘悶妨食甚則腳趾出黃水病名子氣非水也天仙藤即青木香藤微炒香附炒烏藥陳皮甘草炙等分加紫蘇三葉木瓜生薑各三片空心煎服或為末鹽湯調下日三天仙藤之苦溫疏氣活血能解血中之風氣香附烏藥陳皮之辛溫以行鬱氣紫蘇生薑之辛溫以疏表氣甘草之甘緩以和正氣少加木瓜以除濕熱利筋骨調營衛也白朮散全生治子腫面目肢體虛浮如水狀胎中挾濕水與血搏濕氣流溢面目肢體浮腫亦名胎水原因煩渴引飲過多或泄瀉損傷脾胃脾虛不能制水五六個月多有之白朮一錢姜皮陳皮茯苓皮大腹皮五分為末米飲下指迷方有桑白皮無白朮此即五皮飲丹溪除姜皮腹皮加川芎木通水病當令上下分消姜皮橘皮辛而能散使水從毛竅出腹皮苓皮淡而能泄使水從溺竅出水盛由於土衰故用白朮之甘溫以扶脾土而堤防之不致泛溢也鯉魚湯千金治妊娠腹大胎間有水氣白朮五兩茯苓四兩當歸白芍三兩上細銼片以鯉魚一尾修事如食法煮取汁去魚不用每服四錢入魚汁一盞半生薑七片橘皮少許煎至七分去滓空心服或服鯉魚粥亦可按此方用歸芍以養血苓朮以實脾姜橘以和胃止用鯉魚汁以利水絶不雜用利水之藥走氣傷陰暗損胎元且制小其服以緩治之深為有見竹葉湯治妊娠心驚膽怯終日煩悶名子煩受胎四五個月相火用事或盛夏君火大行俱能乘肺以致煩躁胎動不安亦有停痰積飲滯於胸膈致令煩躁者麥冬錢半茯苓黃芩一錢人參五分淡竹葉十片如有痰者加竹瀝少許竹葉清煩黃芩消熱麥冬涼肺心火乘肺故煩出於肺茯苓寧心人參補虛妊娠心煩固多虛也紫菀湯良方治子嗽紫菀天冬一錢桔梗五分甘草炙桑白皮杏仁三分竹茹二分入蜜溫服子嗽由於火邪當以清火潤肺為務桔梗桑皮之涼以瀉之天冬竹茹之寒以清之紫菀炙草之溫杏仁白蜜之澤以潤之也安榮散本事治子淋心煩悶亂子淋膀胱小腸虛熱也虛則不能制水熱則不得通利故淋心與小腸相表裡故煩悶亦有因房勞內傷胞門衝任虛者宜八珍湯或腎氣丸等方人參細辛一兩當歸甘草燈草五錢木通滑石麥冬三錢為末每二錢麥冬湯調下陳來章曰虛熱宜補故用人參甘草之甘淋閟宜通故用木通燈草之滲滑石之滑肺燥則天氣不降而麥冬能清之腎燥則地氣不升而細辛能潤之經曰地氣上為云天氣下為雨上下交陰陽和而後便能通也血燥則溝瀆不濡而當歸能滋之也胎元飲治婦人衝任失守胎元不安不固者隨證加減用之或間日或二三日常服一二劑脾腎兩虧而胎不固者此方最宜蓋胎元不固皆因脾虛而因腎虛者為尤多人參隨宜當歸杜仲芍藥二錢熟地二三錢白朮錢半炙甘草一錢陳皮七分無滯者不用如下元不固而多遺濁者加山藥五味子補骨脂之屬氣分虛甚者倍白朮加黃耆但耆朮氣浮能滯胃口倘胸膈有飽悶不快者須慎用之倘虛而多寒兼嘔者加炮姜七八分或一二錢或虛而兼熱者加黃芩一錢五分或加生地二錢去杜仲陰虛小腹作痛加枸杞子二錢多怒氣逆者加香附無妨或砂仁亦妙有所觸而動血者加川斷阿膠各一二錢嘔吐不止加霞天曲二錢煨姜二三片固胎煎治肝脾多火多滯而屢墮胎者黃芩二錢白朮一二錢當歸一錢五分砂仁五分陳皮一錢芍藥一錢五分涼胎飲治胎氣內熱不安等證生地芍藥二錢黃芩當歸一二錢枳殼石斛一錢茯苓一錢五分甘草七分生用如熱甚者加黃柏一二錢參朮飲丹溪治妊娠轉胞轉胞者胎逼及胞壓在一邊胞系轉戾臍下急痛溲數或閉也因氣血虛弱痰飲壅滯以致之當歸熟地黃芎藭芍藥人參白朮陳皮留白半夏甘草炙加姜煎空心服此即八珍湯去茯苓加陳皮半夏以除痰也氣虛補以四君血虛補以四物痰飲消以二陳使氣得升舉而胞自通也丹溪曰轉胞之病婦之稟受弱者憂悶多者性躁急者食厚味者多有之古方用滑利藥鮮效因思胞不自轉為胎所壓胎若舉起胞系自疏水道自通矣近吳宅寵人患此脈似澀重則弦豫曰此得之憂患澀為血少氣虛弦為有飲血少則胎弱不能舉氣虛有飲中焦不清而隘則胎知所避而就下乃以上藥與服隨以指探喉中吐出藥汁候氣定又與之八帖而安此恐偶中後治數人皆效仲景云婦人本肥盛今反羸瘦胞系了戾但利小便則愈宜服腎氣丸以中有茯苓故也地黃為君功在補胞又法將孕婦倒豎胎轉而小便自通矣表實六合湯海藏治妊娠傷寒頭痛身熱無汗脈緊太陽經病四物湯每味一兩麻黃細辛五錢凡婦人傷寒六經治例皆同有懷妊者則以安胎為主藥中有犯胎者則不可用也海藏皆以四物為君養血安胎余同傷寒例分證而治麻黃細辛發汗解表故加用之治表實無汗者四物四兩加桂枝地骨皮各七錢名表虛六合湯治妊娠傷寒表虛自汗地骨皮涼血故能退熱止汗身熱惡寒頭痛項強脈浮而弱四物四兩加防風蒼朮各七錢名風濕六合湯治妊娠傷寒中風濕氣肢節煩痛頭痛身熱脈浮四物四兩加升麻連翹各七錢名升麻六合湯治妊娠傷寒下後過經不愈濕毒發斑如錦紋者四物四兩加柴胡黃芩各七錢名柴胡六合湯治妊娠傷寒胸脅滿痛而脈弦少陽經證四物四兩加大黃五錢桃仁十枚麩炒名大黃六合湯治妊娠傷寒大便閉小便赤氣滿而脈沉數太陽陽明本病也急下之大黃桃仁妊娠所忌然傷寒間有用之者謂有病病當之也經曰婦人重身毒之何如岐伯曰有故無損亦無損也此之謂與四物四兩加人參五味各五錢名人參六合湯治妊娠傷寒汗下後咳嗽不止四物四兩加厚朴枳實麩炒各五錢名朴實六合湯治妊娠傷寒虛痞脹滿陽明本虛者本胃府也四物四兩加梔子黃芩各五錢名梔子六合湯治妊娠傷寒汗下後不得眠四物四兩加石膏知母各五錢名石膏六合湯治妊娠傷寒大渴而煩脈長而大四物四兩加茯苓澤瀉各五錢名茯苓六合湯治妊娠傷寒小便不利太陽本病本膀胱府也四物四兩加阿膠艾葉各五錢名膠艾四物湯一方加甘草一方加甘草黃耆乾薑治妊娠傷寒汗下後血漏不止損動胎氣者四物四兩加附子肉桂各五錢名附子六合湯治妊娠傷寒四肢拘急身涼微汗腹中痛脈沉遲者少陰病也桂附雖辛熱動胎之藥然寒證用之適所以安胎四物四兩加生地酒浸大黃各五錢名四物大黃湯治妊娠傷寒蓄血證歌曰婦人妊娠若蓄血抵當桃仁莫妄施要教母子俱無損大黃四物對分之當歸散金匱妊娠有宜常服者婦人血少有熱胎動不安及數半産難産者並宜服之胎無疾苦臨盆易産産後百病悉皆主之當歸芎藭芍藥黃芩一斤白朮半斤為末酒調服日二衝任血盛則能養胎而胎安歸芎芍藥能養血而益衝任又懷妊宜清熱涼血血不妄行則胎安黃芩養陰退陽能除胃熱白朮補脾燥濕亦除胃熱胎氣繫於脾脾虛則蒂無所附故易落脾胃健則能運化精微取汁為血以養胎自無惡阻嘔逆之患矣易簡方加山茱萸治經三四月不行或一月再至數月不行者血少也滋之以芎歸芍藥補之以白朮山茱一月再至者脾虛有熱也白朮能補脾黃芩能涼血山茱能固經達生散丹溪亦名束胎散妊娠八九月服數十劑易生有力詩曰誕彌厥月先生如達達小羊也其生甚易産難多因氣血虛弱營衛滯澀服此則易生如達矣當歸酒洗芍藥酒炒人參白朮土炒紫蘇一錢甘草炙二錢大腹陳皮一錢蔥五葉黃楊腦子七個煎黃楊木主産難或加枳殼砂仁或春加川芎夏加黃芩冬如本方或有別證以意消息當歸芍藥以益其血人參白朮以益其氣腹皮陳皮紫蘇蔥葉以疏其壅氣血不虛不滯則臨産自無留難之患矣丹溪曰産難往往見於鬱悶安逸之人富貴奉養之家若貧賤者鮮有之古方有瘦胎飲為湖陽公主而作恐非至到之言豫族妹苦於難産遇胎則觸而去之豫甚憫焉視其形肥而勤於女工知其氣血久坐不運兒因母氣虛亦不能自運爾當補母氣則兒健易産令其有孕五六月以大全良方紫蘇飲加補氣藥與之數十貼得男甚快因以其方隨母之性稟與時令加減服無不應因名曰達生散云昔湖陽公主難産方士進瘦胎飲用枳殼四兩甘草二兩炙五月後日服一錢潔古改以枳朮名束胎丸寇宗奭明其不然蓋孕婦全賴血氣以養胎血氣充實胎乃易生彼公主奉養太過氣實有餘故可服之若一概濫施誤之甚矣按瘦胎飲又名枳殼散治胎肥難産臨月服之張氏加香附行氣寬膈薑湯下凡臨産坐草産母用力須待兒子順身臨逼門戶穀道挺迸漿破血下方可用力一送令兒下生若用力太早並妄服催生藥多致不救生不必催也催之則摘方苞之萼揠宋人之苗爾非唯無益而又害之矣古方有用兔腦者有用豬脂者有用油蜜蔥白者有用葵子者有用牛乳榆皮滑石者有用金鳳子者有用柞枝者有用萬年青子者大都取其滑澤之義雖近理而莫必其效也又有用弩牙灰者有用蛇蛻灰者有用筆頭灰者有用百草霜者有用伏龍肝者有用鑿頭灰者有用萆麻子貼於足心者有手握石燕者雖曰各有深意但燒灰而服者徒劫燥其津液手握足貼者勿驗爾噫平時失於將理至於臨産艱難頻以雜藥催之皆惑也又回生丹方書中大誇其催生之效併産後種種功能然不過破瘀之效爾今世執而用之者為害甚多所以不録殿胞煎治産後兒枕疼痛等證如神當歸五七錢或一兩川芎炙甘草茯苓一錢肉桂一二三錢或五七分水煎熱服如脈細而寒或嘔者加炒黃乾薑一二錢如脈弱陰虛者加熟地三五錢如氣滯者加香附一二錢或烏藥亦可腰痛加杜仲二三錢如血熱多火者去肉桂加酒炒芍藥一二錢張景嶽曰丹溪云芍藥性酸大伐發生之氣産後忌用之此亦言之過也夫芍藥之寒不過於生血藥中稍覺其清爾非若芩連輩之大苦大寒者也使芍藥猶忌則他之更寒者尤為不可用矣余每見産家過慎者或因太暖或因年力方壯而飲食藥餌大補過度以致産後動火者病熱極多若盡以産後為虛必須皆補豈盡然哉且芍藥性清味酸而收最宜於陰氣散失之證豈不為産後之要藥乎不可不辨也豬蹄湯靈苑治乳少豬蹄一支通草一兩豬蹄咸能潤下通草淡能通窮當歸補血湯加蔥白方治産後無乳乳者血氣之所成也故氣血充盛之婦未嘗無乳凡見無乳者皆氣體怯弱之婦也古方中用穿山甲王不留行及漏蘆等物唯氣血有餘而兼壅滯者宜之虛弱者當禁之矣當歸二錢黃耆一兩蔥白十枚當歸黃耆大補其氣血此養乳汁之源也蔥白辛溫直走陽明以達於乳房故用之為使此通乳汁之渠也參朮膏丹溪治産後胞損成淋瀝證或遺尿人參二錢五分白朮二錢黃耆錢半茯苓陳皮桃仁一錢炙甘草五分用豬羊胞煮湯入藥煎服産後胞損必令氣血驟長其胞可完若稍遲緩恐難成功故以參耆朮草以補之加陳皮以宣其滯桃仁以活其血茯苓以助其下行用豬羊胞煮湯入藥煎服取其以胞補胞之義不特引經也丹溪曰收生不謹以致損胞而得淋瀝有徐氏婦壯年患此因思肌肉破傷在外者且可補完胞雖在內自亦可治診其脈虛甚因悟曰難産之人多是氣虛難産之後氣血尤虛因用峻補以參朮膏煎以豬羊胞極飢時與之每劑一兩一月而安黑神散局方治産後惡露不盡攻衝作痛及胞衣不下胎死腹中由血滯不行也熟地黃歸尾赤芍蒲黃桂心乾薑炒甘草四兩黑豆炒去皮半升每服二錢酒童便各半煎便産須知有生地黃前證皆因血瘀不行熟地歸芍之潤以濡血蒲黃黑豆之滑以行血桂心乾薑之熱以破血乾薑辛熱能去惡生新故産後發熱多用之用甘草者緩其正氣用童便者散其瘀逆加酒者引入血分以助藥力也産後惡露不行坐蓐勞傷者以前四味從輕治之若挾宿冷氣滯血凝胞胎不下則宜全用快行之也寒多及秋冬宜之若性急形瘦有火之人及夏月均宜審用去蒲黃黑豆加茯苓錢半吳萸五分當歸全用熟地各三錢芍藥白者酒炒焦錢半炙甘草炒乾姜肉桂北細辛各一錢水煎名九蜜煎治産後陽氣虛寒或陰邪入臟心腹疼痛嘔吐不食四肢厥冷古黑神散百草霜白芷等分每二錢煎入童便醋少許和服治橫生逆産及胎前産後虛損崩漏等證清化飲治産後因火發熱及血熱妄行陰虧諸火不清等證白芍麥冬二錢丹皮茯苓生地石斛二三錢黃芩一錢骨蒸多汗者加地骨皮一錢半熱甚而渴或頭痛者加石膏一二三錢內熱便澀者加木通一二錢或黃柏梔子皆可隨證用之如兼外邪發熱加柴胡一二錢失笑散局方治惡露不行心包絡痛或死血腹痛惡血阻而不行上衝於包絡下阻於腹中皆悶而作痛蒲黃五靈脂等分為末煎膏醋調服生蒲黃性滑而行血五靈脂氣臊而散血氣臊入肝皆能入厥陰而活血止痛故治血痛如神本方各一兩加木通赤芍各五錢每四錢入鹽少許服名通靈散治九種心痛清魂散嚴氏治産後惡露已盡忽昏暈不知人産後氣血虛弱又感風寒也澤蘭葉炙甘草人參三分川芎五分荊芥一錢為末溫酒調下更宜燒漆器淬醋炭於床前使聞其氣氣血虛弱故以人參甘草補其氣外感風邪故以荊芥疏其風荊芥最散血中之風故以為君澤蘭川芎以去其未下之瘀血風邪去余血下氣血生則神清矣肝藏魂故曰清魂當歸羊肉湯治産後發熱自汗肢體疼痛名曰蓐勞黃耆一兩人參當歸七錢生薑五錢用羊肉一斤煮汁去肉入前藥煎服如惡露未盡加桂辛熱行血有寒加吳茱萸有熱加生地汁有氣加細辛參耆補氣而固衛當歸養血而調營生薑辛溫引氣藥入氣分而生新血羊肉甘熱用氣血之屬以補虛勞熱退而汗收矣吳綬曰産後不可輕易發汗蓋有産時傷力發熱有去血過多發熱有惡露不盡發熱有三日乳蒸發熱或早起勞動飲食停滯亦皆發熱狀類傷寒要須詳辨大抵産後大血空虛若汗之則變筋惕肉瞤或昏迷不醒或抽搦不定或大便閉澀其害匪輕凡有發熱且與四物湯芎歸君白芍須炒過酒蒸熟地黃佐之加軟苗柴胡乾薑人參主之蓋乾薑辛熱能引血藥入血分氣藥入氣分且能去惡生新有陽生陰長之道以熱治熱深合內經之旨如惡露不盡者益母丸黑神丸必兼用之胃虛食少加白朮茯苓嘔逆者加陳皮半夏其餘六經治例皆同必以四物湯為主及養血務本之要也劉河間曰大抵産病天行從增損柴胡雜證從增損四物宜詳脈證而治之除人參黃耆用羊肉一斤生薑五兩當歸三兩名當歸生薑羊肉湯金匱治産後腹中㽲痛及寒疝腹痛虛勞不足返魂丹産寶即益母草膏丸治胎前産後一切諸病及月經不調赤白帶下五月五日六月六日或小暑日益母草花正開時連根採收陰乾用花葉及子石臼搗末蜜丸或搗汁於砂鍋內文武火熬成膏服忌鐵如胎動腹痛下血不止當歸湯下橫生逆産胎衣不下炒鹽湯下産後血暈口渴狂言産後中風失音口噤及血結奔痛時發寒熱面赤心煩或鼻衄舌黑口乾並童便和酒下産後喘嗽噁心吐酸脅痛無力酒下産後瀉血棗湯下産後痢疾米湯下産後崩漏糯米湯下産後帶下膠艾湯下産後二便不通煩躁口苦薄荷湯下凡産後以童便化服一丸能調經絡破血痛益母草功擅消水行血去淤生新利大小便故為經産所需然其性辛散寒滑唯血滯血熱者宜之稍挾虛寒者服之為害不淺今人以其有益母之名而濫用之誤矣觀其能消疔腫散乳癰可知其性之全無補益矣時珍曰益母草根莖花葉實皆可用若治血分風熱明目調經用子為良若胎産瘡腫消水行血則可並用蓋根莖花實專於行子則行中有補也免懷湯欲摘乳者此方主之婦人之血上則為乳下則為經欲摘乳者通其月事則乳汁下行免乳脹之苦矣當歸尾赤芍藥酒紅花酒牛膝各五錢四味皆下行導血之品故以用之名曰免懷者子生三年然後免於父母之懷也
