body:
  text: 卷首方制總義靈樞刺節真邪篇曰真氣者所受於天與穀氣並而充身也素問疏五過論曰治病之道氣內為寶循求其理求之不得過在表裡素問陰陽應象大論曰陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也治病必求其本素問至真要大論帝曰氣有多少病有盛衰治有緩急方有大小願聞其約奈何五運六氣各有太過不及故曰氣有多少人之疾病必隨氣而為盛衰故治之緩急方之大小亦必隨其輕重而有要約也岐伯曰氣有高下病有遠近證有中外治有輕重適其至所為故也歲有司天在泉則氣有高下經有臟腑上下則病有遠近在裡曰中在表曰外緩者治宜輕急者治宜重也適其至所為故言必及於病至之所而不可過亦不可不及也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也大要大約也主病之謂君君當倍用佐君之謂臣比君當減奇者陽數即古所謂單方也偶者陰數即古所謂復方也故君一臣二其數三君二臣三其數五皆奇之制也君二臣四其數六君二臣六其數八皆偶之制也奇方屬陽而輕偶方屬陰而重故曰近者奇之遠者偶之汗者不以偶下者不以奇近者為上為陽故用奇方用其輕而緩也遠者為下為陰故用偶方用其重而急也汗者不以偶陰沉不能達表也下者不以奇陽升不能降下也按本節特舉奇偶陰陽以分汗下之概則氣味之陰陽又豈後於奇偶哉故下文復言之此其微意正不止於品數之奇偶而實以發明方制之義爾舊本云汗者不以奇下者不以偶而王太僕注云表汗藥不以偶方泄下藥不以奇制是注與本文相反矣然王注得理而本文似誤今改從之奇音箕補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也補上治上制以緩欲其留布上部也補下治下制以急欲其直達下焦也故欲急者須氣味之厚欲緩者須氣味之薄若制緩方而氣味厚則峻而去速用急方而氣味薄則柔而不前唯緩急厚薄得其宜則適其病至之所而治得其要矣病所遠而中道氣味之者食而過之無越其制度也言病所有深遠而藥必由於胃設用之無法則藥未及病而氣味在中道而止矣故當以食為助而使其無遠勿達是過之也如飲酒啜粥以助藥力之類由此類推則服食之疾徐根梢之升降以及湯膏丸散各有所宜故云無越其制度也王冰曰假如病在腎而心氣不足服藥宜急過之不以氣味飼心腎藥凌心心復益衰矣余上下遠近例同完素曰聖人治上不犯下治下不犯上治中則上下俱無犯故曰誅伐無過命曰大惑好古曰治上必防下治表必連里用黃芩以治肺必妨脾用蓯蓉以治腎必妨心服乾薑以治中必偕上服附子以補火必涸水按服藥節度古今相傳有食前食後之分然後宜食遠腹空然後服之食後斷不可服蓋飲食皆受納於胃胃氣散精於脾脾復傳精於肺肺主治節然後分布臟腑是胃乃人身分金之爐也未有藥不入胃而能即至於六經者況肺為華蓋竅皆下向以受飲食之薰蒸藥入於胃亦必遊溢精氣以上蒸於肺未聞心藥飲至心間而始入心肺藥飲至肺間而始入肺也若上膈之藥食後服之胃氣先為別食所填塞必待前食化完方能及後藥是欲速而反緩矣且經脈在肉理之中藥之糟粕如何得到其所到者不過氣味爾若云上膈之藥須令在上下膈之藥須令在下則治頭之藥必須在頭治足之藥必須在足乎此理之顯明易見者也不可不正其誤是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之平氣之道平其不平之謂也如在上為近在下為遠遠者近者各有陰陽表裡之分故遠方近方亦各有奇偶相兼之法如方奇而分兩偶方偶而分兩奇皆互用之妙也故近而奇偶制小其服小則數多而蓋於九蓋數多則分兩輕分兩輕則性力薄而僅及近處也遠而奇偶制大其服大則數少而止於二蓋少則分兩重分兩重則性力專而直達深遠也是皆奇偶兼用之法若病近而大其制則藥勝於病是謂誅伐無過病遠而小其制則藥不及病亦猶風馬牛不相及爾上文云近者奇之遠者偶之言法之常也此云近而奇偶遠而奇偶言用之變也知變知常則其應用不窮矣奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也此示人以圓融通變也如始也用奇奇之而病不去此其必有未合乃當變而為偶奇偶迭用是曰重方即後世所謂復方也若偶之而又不去則當求其微甚真假而反佐以取之反佐者謂藥同於病而順其性也如以熱治寒而寒拒熱則反佐於寒而入之以寒治熱而熱格寒則反佐以熱而入之又如寒藥熱用借熱以行寒熱藥寒用借寒以行熱是皆反佐變通之妙用也因勢利導則易為力爾王太僕曰夫熱與寒背寒與熱違微小之熱為寒所折微小之冷為熱所消甚大寒熱則必能與違性者爭雄能與異氣者相格聲不同不相應氣不同不相合如是則且憚而不敢攻之攻之則病氣與藥氣抗衡而自為寒熱以開閉固守矣是以聖人反其佐以同其氣令聲氣應合復令寒熱參合使其始同終異凌潤而敗堅剛強必折柔脆同消爾完素曰流變在乎病主病在乎方制方在乎人方有七大小緩急奇偶復也大小者制奇偶之法也假如小承氣湯調胃承氣湯奇之小方也大承氣湯抵當湯奇之大方也所謂因其攻裡而用之也桂枝麻黃偶之小方也葛根青龍偶之大方也所謂因其發表而用之也故曰汗不以奇下不以偶從正曰大方有二有君一臣三佐九之大方病有兼證而邪不一不可以一二味治者宜之有分兩大而頓服之大方肝腎及下部之病道遠者宜之王太僕以心肺為近肝腎為遠脾胃為中劉河間以身表為遠身里為近以豫觀之身半以上其氣三天之分也身半以下其氣三地之分也中脘人之分也小方有二有君一臣二之小方病無兼證邪氣專一可一二味治者宜之有分兩少而頓服之小方心肺及在上之病者宜之徐徐細呷是也完素曰肝腎位遠藥味多則其氣緩不能速達於下必大劑而數少取其性急下走也心肺位近藥味少則其氣急下走不能升發於上必小劑而數多取其易散上行也王氏所謂肺服九心服七脾服五肝服三腎服一乃五臟生成之數也從正曰緩方有五有甘以緩之之方甘草糖蜜之屬是也病在胸膈取其留戀也有丸以緩之之方比之湯散其行遲慢也有品件衆多之緩方藥衆則遞相拘制不得各騁其性也有無毒治病之緩方無毒則性純功緩也有氣味俱薄之緩方氣味俱薄則長於補上治上比至其下藥力已衰矣急方有四有急病急攻之急方中風關格之病是也有湯散蕩滌之急方下咽易散而行速也有毒藥之急方毒性能上湧下泄以奪病勢也有氣味俱厚之急方氣味俱厚則直趨於下而力不衰也奇方有二有獨用一物之奇方病在上而近者宜之有藥合陽數一三五七九之奇方宜下不宜汗偶方有三有兩味相配之偶方有古之二方相合之偶方古謂之復方皆病在上而遠者宜之有藥合陰數二四六八十之偶方宜汗不宜下王太僕言汗藥不以偶則氣不足以外發下藥不以奇則藥毒攻而致過而仲景制方桂枝汗藥反以五味為奇大承氣下藥反以四味為偶豈臨事制宜復有增損乎好古曰奇之不去復以偶偶之不去復以奇故曰復復者重也再也所謂十補一泄數泄一補也又傷寒見風脈傷風見寒脈為脈證不相應宜以復方主之從正曰復方有三有二方三方及數方相合之復方如桂枝二越婢一湯及五積散之屬是也又本方之外別加余藥如調胃承氣加連翹薄荷黃芩梔子為涼膈散之屬是也有分兩均齊之復方如胃風湯各等分是也王太僕以偶為復方今七方中有偶又有復豈非偶乃二方相合復乃數方相合之謂乎完素曰方有七劑有十方不七不足以盡方之變劑不十不足以盡劑之用方不對證非方也劑不蠲疾非劑也此乃太古先師設繩墨而取曲直叔世方士乃出規矩以為方圓夫物各有性制而用之變而通之施於品劑其功用豈有窮哉十劑大意散見於本草從新內素問至真要大論帝曰五味陰陽之用何如岐伯曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅以所利而行之調其氣使其平也湧吐也泄瀉也滲泄利小便及通竅也辛甘酸苦鹹淡六者之性辛主散主潤甘主緩酸主收主急苦主燥主堅咸主軟淡主滲泄臟氣法時論曰辛散酸收甘緩苦堅咸軟故五味之用升而輕者為陽降而重者為陰各因其利而行之則氣可調而平矣湧音湧如泉湧也耎軟同帝曰非調氣而得者治之奈何有毒無毒何先何後願聞其道非調氣謂病有不因於氣而得者也王太僕曰病生之類有四一者始因氣動而內有所成謂積聚癥瘕瘤氣癭氣結核癲癇之類也二者因氣動而外有所成謂癰腫瘡瘍疣疥疽痔掉瘛浮腫目赤瘭疹胕腫痛癢之類也三者不因氣動而病生於內謂留飲癖食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類也四者不因氣動而病生於外謂瘴氣賊魅蟲蛇蠱毒蜚尸鬼擊沖薄墜墮風寒暑濕所射刺割捶僕之類也凡此四類有獨治內而愈者有兼治內而愈者有獨治外而愈者有兼治外而愈者有須齊毒而攻擊者有須無毒而調引者其於或重或輕或緩或急或收或散或潤或燥或耎或堅用各有所宜也岐伯曰有毒無毒所治為主適大小為制也言但能去疾就安即為良方不論藥之有毒無毒一以所治之病為主方之大小當因病之輕重而為之制也帝曰請言其制岐伯曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也此言用方之制也寒者熱之熱者寒之治寒以熱治熱以寒此正治法也微者逆之甚者從之病之微者如陽病則熱陰病則寒真形易見其病則微故可逆之逆即下文之正治也病之甚者如熱極反寒寒極反熱假證難辨其病則甚故當從之從即下文之反治也王太僕曰夫病之微小者猶人火也遇草而爇得本而燔可以濕伏可以水滅故逆其性氣以折之攻之病之大甚者猶龍火也得濕而焰遇水而燔不知其性以水折之適足以光焰詣天物窮方止矣識其性者反常之理以火逐之則燔灼自消焰火撲減然逆之謂以寒攻熱以熱攻寒從之謂攻以寒熱須從其性用不必皆同是以下文曰逆者正治從者反治從少從多觀其事也此之謂乎堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故溫之溫養之也逸者奔逸潰亂也行之行其逆滯也平之安之也上之吐之也摩之按摩之也薄之追其隱藏也劫之奪其強盛也適事為故適當其為事之故也帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事也以寒治熱以熱治寒逆其病者謂之正治以寒治寒以熱治熱從其病者謂之反治從少謂一同而二異從多謂二同而一異必觀其事之輕重而為之增損然則宜於全反者自當盡同無疑矣按治有逆從者以病有微甚病有微甚者以證有真假也寒熱有真假虛實有真假真者正治知之無難假者反治乃為難爾如寒熱之真假者真寒則脈沉而細或弱而遲為厥逆為嘔吐為腹痛為飧泄下利為小便清頻即有發熱必欲得衣此浮熱在外而沉寒在內也真熱則脈數有力滑大而實為煩躁喘滿為聲音壯厲或大便祕結或小水赤澀或發熱掀衣或脹疼熱渴此皆真病真寒者宜溫其寒真熱者宜解其熱是當正治者也至若假寒者陽證似陰火極似水也外雖寒而內則熱脈數而有力或沉而鼓擊或身寒惡衣或便熱祕結或煩渴引飲或腸垢臭穢此則惡寒非寒明是熱證所謂熱極反兼寒化亦曰陽盛格陰也假熱者除證似陽水極似火也外雖熱而內則寒脈微而弱或數而虛或浮大無根或弦芤斷續身雖熾熱而神則靜語雖譫妄而聲則微或虛狂起倒而禁之即止或蚊跡假斑而淺紅細碎或喜冷水而所用不多或舌胎面赤而衣被不撤或小水多利而大便不結此則惡熱非熱明是寒證所謂寒極反兼熱化亦曰陰盛格陽也此皆假病假寒者清其內熱內清則浮陰退舍矣假熱者溫其真陽中溫則虛火歸原矣是當從治者也又如虛實之治實則瀉之虛則補之此不易之法也然至虛有盛候則有假實矣大實有羸狀則有假虛矣總之虛者正氣虛也為色慘形疲為神衰氣怯或自汗不收或二便失禁或夢遺精滑或嘔吐隔塞或病久攻多或氣短似喘或勞傷過度或暴困失志或外證雖實而脈弱無神者皆虛證之當補也實者邪氣實也或外閉於經絡或內結於臟腑或氣壅而不行或血留而凝滯必脈病俱盛者乃實證之當攻也然而虛實之間最多疑似有不可不辨其真爾如通評虛實論曰邪氣盛則實正氣奪則虛此虛實之大法也設有人焉正已奪而邪方盛者將顧其正而補之乎抑先其邪而攻之乎見有不的則死生系之此其所以宜慎也夫正者本也邪者標也若正氣即虛則邪氣雖盛亦不可攻蓋恐邪未去而正已先脫呼吸變生則措手無及故治虛邪者當先顧正氣正氣存則不致於害且補中自有攻意蓋補陰即所以攻熱補陽即所以攻寒世未有正氣復而邪不退者亦未有正氣竭而命不傾者如必不得已亦當酌量緩急暫從權宜從少從多寓戰於守斯可矣此治虛之道也若正氣無損者邪氣難微自不宜補蓋補之則正無與而邪反盛適足以藉寇兵而資盜糧故治實證者當直去其邪邪去則身安但法貴精專便臻速效此治實之法也要之能勝攻者方是實證實者可攻何慮之有不能勝攻者便是虛證氣去不返可不寒心此邪正之本末有不可不知也惟是假虛之證不多見而假實之證最多也假寒之證不難治而假熱之治多誤也然實者多熱虛者多寒如丹溪曰氣有餘便是火故實能受寒而不知氣不足便是寒故虛能受熱醫有不知真假本末者害無窮矣帝曰反治謂何岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已熱因寒用者如大寒內結當治以熱然寒甚格熱熱不得前則以熱藥冷服下嗌之後冷體即消熱性便發情且不違而致大益此熱因寒用之法也寒因熱用者如大熱在中以寒攻治則不入以熱攻治則病增乃以寒藥熱服入腹之後熱氣即消寒性遂行情且協和而病以減此寒因熱用之法也如五常政大論云治熱以寒溫而行之治寒以熱涼而行之亦寒因熱用熱因寒用之義塞因塞用者如下氣虛乏中焦氣壅欲散滿則更虛其下欲補下則滿甚於中治不知本而先攻其滿藥入或減藥過依然氣必更虛病必漸甚乃不知少服則資壅多服則宣通峻補其下以疏啓其中則下虛自實中滿自除此塞因塞用之法也如大熱內蓄或大寒內凝積聚留滯瀉利不止寒滯者以熱下之熱滯者以寒下之此通因通用之法也以上四治必伏其所主者制病之本也先其所因者求病之由也既得其本而以真治真以假對假其始也治類似同其終也病變則異矣是為反治之法故可使破積潰堅氣和而病必已也塞入聲帝曰善氣調而得者何如岐伯曰逆之從之逆而從之從而逆之疏氣令調則其道也氣調而得者言氣本調和而偶感於外也岐伯言其治法亦無過逆之從之而已其間有宜主治逆而佐從之者有宜主治從而佐逆之者皆所以疏泄其邪氣而令其調和此治氣調而病於外者之道也素問至真要大論帝曰方制君臣何謂也岐伯曰主病之謂君佐君之謂臣應臣之謂使非上下三品之謂也主病者對證之要藥也故謂之君君者味數少而分兩重賴之以為主也佐君者謂之臣味數稍多而分兩稍輕所以匡君之不逮也應臣者謂之使數可出入而分兩更輕所以備通行嚮導之使也此則君臣佐使之義非上下三品如下文善惡殊貫之調也使去聲帝曰三品何謂岐伯曰所以明善惡之殊貫也前言方制言處方之制故有君臣佐使此言藥性善惡故有上中下之殊神農云上藥為君主養命以應天中藥為臣主養性以應人下藥為佐使主治病以應地故在本草經有上中下三品之分此所謂善惡之殊貫也素問至真要大論帝曰病之中外何如岐伯曰從內之外者調其內從外之內者治其外從內之外者內為本從外之內者外為本但治其本無不愈矣從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內病雖盛於標治必先其本而後可愈此治病之大法也故曰治病必求其本中外不相及則治主病中外不相及自各一病也主病重病也此猶律家二罪俱發科其重也按此篇即三因之義也如金匱要略曰千般疢難不越三條一者經絡受邪入臟腑為內所因也二者四肢九竅血脈相傳壅塞不通為外皮膚所中也三者房室金刃蟲獸所傷也故無擇著三因方曰有內因有外因有不內外因蓋本於仲景之三條而仲景之論實本諸此爾疢昌震切病也帝曰善病之中外何如前問病之中外答以標本之義故此復問蓋欲明陰陽治法之詳也岐伯曰調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗之下之寒熱溫涼衰之以屬隨其攸利方法也陰陽三陰三陽也中外臟腑經絡也各守其鄉各安於其所也微者調之謂小寒之氣和之以溫小熱之氣和之以涼也其次平之謂大寒之氣平之以熱大熱之氣平之以寒也盛者奪之謂邪之甚者當直攻而取之如甚於外者汗之甚於內者下之凡宜寒宜熱宜溫宜涼各求其同氣者以衰去之是謂隨其所利也別必列切素問五常政大論帝曰有毒無毒服有約乎約度也禁服篇曰夫約方者猶約囊也囊滿而弗約則輸泄方成弗約則神與弗俱岐伯曰病有新久方有大小有毒無毒固宜常制矣病重者宜大病輕者宜小無毒者宜多有毒者宜少皆常制之約也大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九藥性有大毒常毒小毒無毒之分去病有六分七分八分九分之約者蓋以治病之法藥不及病則無濟於事藥過於病則反傷其正而生他患矣故常知約制而進止有度也王氏曰大毒之性烈其為傷也多小毒之性和其為傷也少常毒之性減大毒之性一等加小毒之性一等所傷可知也故至約必止之以待來證爾然無毒之藥性雖平和久而多之則氣有偏勝必有偏絶久攻之則臟氣偏弱既弱且困不可長也故十去其九而止穀肉果菜食養盡之無使過之傷其正也病已去其六七八九而有餘未盡者則當以穀肉果菜食養以盡病邪勿以毒藥盡病邪也如藏氣法時論曰毒藥攻邪五穀為養五果為助五畜為益五菜為充者是也然毒藥難有約制而飲食亦貴得宜不可使之太過過則反傷其正也不盡行復如法如此而猶有未盡則再行前法以漸除之寧從乎慎也必先歲氣無伐天和五運有紀六氣有序四時有令陰陽有節皆歲氣也人氣應之以生長收藏即天和也設不知歲氣變遷而妄呼寒熱則邪正盛衰無所辨未免犯歲氣伐天和矣天枉之由此其為甚無盛盛無虛虛而遺人夭殃邪氣實者復助之盛其盛矣正氣奪者復攻之虛其虛矣不知虛實妄施攻補以致盛者愈盛虛者愈虛真氣日消則病氣日甚遺人夭殃醫之咎也無致邪無失正絶人長命盛其盛是致邪也虛其虛是失正也重言之所以深戒夫伐天和而絶人長命以見歲氣不可不慎也厥陰木風司天巳亥年風淫所勝平以辛涼王注云厥陰氣未為盛熱故以涼藥平之佐以甘苦以甘緩之以酸瀉之風為木氣金能勝之故平以辛涼過於辛恐反傷其氣故佐以苦甘苦勝辛甘益氣也木性急故以甘緩之以酸瀉之者木之正味其瀉以酸也清反勝之治以酸溫佐以甘苦或氣有不及則金之清氣反能勝之故當治以酸溫酸求木之同氣溫以制清也佐以甘苦甘以緩肝之急苦以溫金也少陰火君司天子午年熱淫所勝平以鹹寒佐以苦甘以酸收之熱為火氣水能勝之故平以鹹寒佐以甘苦甘勝咸所以防咸之過也苦能泄所以去熱之實也熱盛於經而不斂者以酸收之寒反勝之治以甘溫佐以苦酸辛或氣有不及則水之寒氣反能勝之故當治以甘溫甘能勝水溫能制寒也佐以苦酸辛寒得苦而溫得辛而散且火為水勝則心苦緩故宜食酸以收之太陰濕土司天丑未年濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕為土氣燥能除之故平以苦熱酸從木化制土者也而辛勝酸所以防酸之過也故佐以酸辛以苦燥之者苦從火化也以淡泄之者淡能利竅也臟氣法時論曰脾苦濕急食苦以燥之是也濕上甚而熱治以苦溫佐以甘辛以汗為故而止濕鬱於上而成熱者治以苦溫苦以泄熱溫以行濕也佐以甘辛甘以和中辛以散郁也則濕熱之在上以微汗如故而止矣熱反勝之治以苦寒佐以苦酸苦寒所以祛熱熱勝則亡陰液故佐以苦酸少陽相火司天寅申年火淫所勝平以鹹冷佐以苦甘以酸收之以苦發之以酸復之熱淫同水能勝火故平以鹹冷苦能瀉火之實甘能緩火之急故佐以苦甘火盛而散越者以酸收之火鬱而留伏者以苦發之然以發去火未免傷氣故又當以酸復之而火熱二氣同治也寒反勝之治以甘熱佐以苦辛或氣有不及與上文寒勝熱淫大同陽明燥金司天卯酉年燥淫所勝平以苦溫佐以酸辛以苦下之燥為金氣火能勝之平以苦溫苦從火化也佐以酸辛酸能生津辛能潤燥也燥結不通則邪實於內故以苦下之熱反勝之治以辛寒佐以苦甘辛寒所以潤燥散熱苦甘所以瀉火生金太陽寒水司天辰戌年寒淫所勝平以辛熱佐以甘苦以咸瀉之辛熱足以散寒苦甘可以勝水以咸瀉之水之正味其瀉以咸也熱反勝之治以鹹冷佐以苦辛或氣有不及則熱反勝之故治以鹹冷抑火邪也佐以苦辛苦能泄熱辛能散熱也厥陰風木在泉寅申年風淫於內治以辛涼佐以甘苦以甘緩之以辛散之治以辛涼佐以甘苦以甘緩之俱與上文司天治同以辛散之者所謂肝欲散急食辛以散之也清反勝之治以酸溫佐以甘苦以辛平之治以酸溫佐以苦甘俱與司天反勝治同以辛平之者木之正味其補以辛金之正味其瀉以辛也少陰君火在泉卯酉年熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之治以鹹寒佐以甘苦以酸收之俱與上文司天治同以苦發之者熱鬱於內而不解者以苦發之寒反勝之治以甘熱佐以苦辛以鹹平之此與上文司天反勝大同以鹹平之者火之正味其補以咸水之正味其瀉以咸也太陰濕土在泉辰戌年濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之此與司天之治大同熱反勝之治以苦冷佐以鹹甘以苦平之或氣有不及則火之熱氣反能勝之故當治以苦冷抑火邪也佐以鹹甘鹹寒制熱甘溫補土也以苦平之即苦冷之義少陽相火在泉巳亥年火淫於內治以鹹冷佐以苦辛以苦發之相火畏火也故宜治以鹹冷苦能泄火辛能散火故用以為佐以酸收之以苦發之義與上文熱淫治同寒反勝之治以甘熱佐以辛苦以鹹平之或氣有不及與上文熱司於地者同其治陽明燥金在泉子午年燥淫於內治以苦溫佐以甘辛以苦下之燥為金氣火能勝之治以苦溫苦從火化也佐以甘辛木受金傷以甘緩之金之正味以辛瀉之也燥結不通則邪實於內故當以苦下之按上文燥淫所勝佐以酸辛與此甘辛稍異又如六元正紀大論子午年陽明在泉亦云下酸溫皆與此不同考之臟氣法時論曰肺苦氣上逆急食苦以泄之用酸補之辛瀉之正此之辨熱反勝之治以平寒佐以苦甘以酸平之以和為利或氣有不及則熱反勝之治以平寒以金司於地氣本肅殺若用大寒必助其慘故但宜平寒抑其熱爾佐以苦甘所以瀉火也以酸平之金之正味其補以酸也以和為利戒過用也即平寒之意太陽寒水在泉丑未年寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之寒為水氣土能勝水熱能勝寒故治以甘熱甘從土化熱從火化也佐以苦辛等義如臟氣法時論曰腎苦燥急食辛以潤之腎欲堅急食苦以堅之用苦補之咸瀉之也熱反勝之治以鹹冷佐以甘辛以苦平之或氣有不及則熱反勝之故治以鹹冷抑火邪也佐以甘辛甘瀉火而辛能散也以苦平之者水之正味其補以苦也王氏曰此六氣方治與前淫勝法殊貫其云治者瀉客邪之勝氣也云佐者皆所利所宜也云平者補已弱之正氣也時珍曰司天主上半年天氣司之故六淫謂之所勝上淫於下也故曰平之在泉主下半年地氣司之故六淫謂之於內外淫於內也故曰治之當其時而反得勝已之氣謂之反勝按六氣盛衰不常有所勝則有所復王氏亦曰凡先有勝後必復詳見至真要大論欲深造者當究心焉按以上所言乃五運六淫客氣隨每歲年辰而變遷者也又凡一歲之主氣始於大寒日交厥陰風木之初氣次至春分日交少陰君火之二氣次至小滿日交少陽相火之三氣次至大暑日交太陰濕土之四氣次至秋分日交陽明燥金之五氣次至小雪日交太陽寒水之終氣每氣各主六十日六氣分主四時歲歲如常故曰主氣客氣布行天令以加臨於主氣之上斯上下相召而病變生矣時珍曰經云必先歲氣毋伐天和又曰升降浮沉則順之寒熱溫涼則逆之故春月宜加辛溫之藥以順春升之氣夏月宜加辛熱之藥以順夏浮之氣長夏宜加甘苦辛溫之藥以順化成之氣秋月宜加酸溫之藥以順秋降之氣冬月宜加苦寒之藥以順冬沉之氣所謂順時氣而養天和也經又云春省酸增甘以養脾氣夏省苦增辛以養肺氣長夏省甘增咸以養腎氣秋省辛增酸以養肝氣冬省咸增苦以養心氣此則不伐天和而又防其太過所以體天地之大德也味者捨本從標春用辛涼以伐木夏用鹹寒以抑火秋用苦溫以泄金冬用辛熱以涸水謂之時藥殊背素問逆順之理以夏月伏陰冬月伏陽推之可知矣雖然月有四時日有四時或春得秋病夏得冬病神而明之機而行之變通權宜又不可執一也內經方內者性命之道經者載道之書其書乃黃帝與岐伯鬼臾區伯高少師少俞雷公六臣講求而成其方高簡奧妙不易測識今人罕能用之者然既為古聖之神方自不得不録之以冠於卷首用醇酒二十斤蜀椒一升乾薑一斤桂心一斤漬酒中浸以綿絮布巾用生桑炭炙巾以尉寒痹所刺之處靈樞壽夭剛柔篇神靈之樞要是謂靈樞按漢藝文志曰黃帝內經十八卷蓋靈樞九卷素問九卷即內經也二經各載八十一篇皆合黃盅九九之數而天人之道盡乎是矣黃帝曰余聞刺有三變何謂三變按史記黃帝姓公孫名軒轅有熊國君少典之子繼神農而有天下都軒轅之邱以土德王故號黃帝伯高答曰有刺營者有刺衛者有刺寒痹之留經者刺營者刺其陰刺衛者刺其陽刺寒痹者溫其經三刺不同故曰三變黃帝曰刺三變者奈何伯高答曰刺營者出血刺衛者出氣刺寒痹者內熱調經論亦曰取血於營取氣於衛內熱義如下文黃帝曰營衛寒痹之為病奈何伯高答曰營之生病也寒熱少氣血上下行營主血陰氣也病在陰分則陽勝之故為寒熱往來陰病則陰虛陰虛則無氣故為少氣邪在血故為上下妄行所以刺營者當刺其血分衛之生病也氣痛時來時去怫音佛愾音戲賁響風寒客於腸胃之中衛屬陽為水穀之悍氣病在陽分故為氣痛氣無定形故時來時去怫鬱怒也愾太息也賁響腹鳴如奔也皆氣分之病風寒外襲而客於腸胃之間以六腑屬表而陽邪歸之故病亦生於衛氣寒痹之為病也留而不去時痛而痹不仁寒痹久留不去則血脈不行或凝滯而為痛或皮膚不知痛癢而為不仁黃帝曰刺寒痹內熱奈何伯高答曰刺布衣者以火淬之刺大人者以藥尉之內熱謂溫其經也布衣血氣澀濁故當以火淬之即近世所用雷火針及艾蒜蒸炙之類淬音翠灼也黃帝曰藥尉奈何伯高答曰用醇酒二十升蜀椒一升乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈並納酒中置酒馬矢熅音慍中蓋封塗勿使泄五日五夜出布綿絮曝乾之干復漬以盡其汁每漬必晬音醉其日乃出干干並用滓音子與綿絮復音福布為復巾長六七尺為六七巾則用之生桑炭炙巾以尉寒痹所刺之處令熱入至於病所寒復炙巾以尉之三十遍而止汗出以巾拭身亦三十遍而止㕮咀者謂碎之如大豆其粒顆可以咀嚼之又吹去細末然後煎之取其清汁也漬浸也馬矢熅中者燃干馬屎而煨之也此西北方所常用者塗鹽泥封固也晬周日也復布為貯巾者重布為巾如今之夾袋所以盛貯綿絮藥滓也滓相也炙布以生桑炭者桑能利關節除風寒濕痹諸痛也大人血氣清滑故當於未刺之先及既刺之後但以藥尉則經通汗出而寒痹可除矣起步內中無見風每刺必尉如此病已矣此所謂內熱也刺後起步於密室內中欲其氣血行而慎避風寒也凡此者皆所謂內熱之法治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之治季春痹靈樞經筋篇曰足陽明之筋病足中趾支脛轉筋腳跳堅本經之筋起於中趾結於跗上邪外上行加於輔骨上結於膝外廉其直者上循骭結於膝也跳者跳動堅者堅強也伏兔轉筋髀前腫㿉癲同疝腹筋急其直者上循伏兔結於髀聚於陰器上腹而布也引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻僻歪斜也其筋自缺盆上頸頰挾口上合於太陽太陽為目上綱陽明為目下綱故凡目之不合不開口之急縱歪僻者皆足陽明之筋病寒則急而熱則緩也治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑炭置之坎中高下以坐等以膏尉急頰且飲美酒啖音淡美炙肉不飲酒者自強也為之三拊音府而已馬膏馬脂也口頰喎僻乃風中血脈也手足陽明之筋絡於口會太陽之筋絡於目寒則筋急而僻熱則筋緩而縱故左中寒則逼熱於右右中寒則逼熱於左寒者急而熱者緩也急者皮膚頑痹營衛凝滯治法急者緩之緩者急之故用馬膏之甘平柔緩以摩其急以潤其痹以通其血脈用桂酒之辛熱急束以塗其緩以和其營衛以通其經絡桑能治風痹通節竅以桑鉤鉤之者鉤正其口也復以生桑火炭置之地坎之中高下以坐等者欲其深淺適中便於坐而得其暖也然後以前膏尉其急頰且飲之美酒啖之美肉皆助血舒筋之法病在上者酒以行之甘以助之也雖不善飲亦自強之三拊而已言再三拊摩其患處則病自已矣治在燔針劫刺以知為數以痛為輕輸名曰季春痹也足陽明正盛之經應三月之氣也以千里水煮秫米半夏湯治目不瞑靈樞邪客篇黃帝問於伯高曰夫邪氣之客人也或令人目不瞑不臥出者何氣使然邪氣感人令人寐無從生故云不臥出也伯高曰五穀入於胃也其糟粕音朴津液宗氣分為三隧音遂故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉隧道也糟粕之道出於下焦津液之道出於中焦宗氣之道出於上焦故分為三隧喉嚨為肺之系而下貫於心故通宗氣而行呼吸營氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉營氣出於中焦中焦受水穀之精泌其津液變化以為血脈外而四肢內而臟腑無所不至故其運行之數與刻數皆相應焉泌音祕泉水貌衛氣者出其悍氣之剽疾而先行於四末分肉皮膚之間而不休者也晝行於陽夜行於陰常從足少陰之分間行於五臟六腑衛氣慓疾滑利不能入於脈中故先行於四末分肉皮膚之間而不休者也晝行於陽常從足太陽始夜行於陰常從足少陰始今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽躋陷不得入於陰陰虛故目不瞑邪氣逆於臟腑則衛氣不得入於陰分故偏盛於陽陽偏盛則陽躋陷陷者受傷之謂陽盛陰虛故目不瞑蹺有五音蹺皎喬腳又極虐切黃帝曰善治之奈何伯高曰補其不足瀉其有餘此刺治之補瀉也補其不足即陰蹺所出足少陰之照海也瀉其有餘即陽蹺所出足太陽之申脈也若陰盛陽虛而多臥者自當補陽瀉陰矣調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至謂既刺之後仍當用藥以治之凡不臥之證有邪實者多屬外因有營虛者多屬內因此半夏湯一法蓋專為邪實者設爾黃帝曰善此所謂決瀆壅塞經絡大通陰陽和得者也願聞其方伯高曰其湯方以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪古今量數不同大約古之黍量一斗合今之鐵斛數三升二合然則云八升者即今之二升五合六勺云五升者即今之一升六合許爾火沸置秫音術米一升治半夏五合徐炊令竭為一升半火沸者先以火沸其水而後置藥於中也秫即黃米乃梁米粟米之小者也味甘微寒能利大腸治陽盛陰虛夜不得臥半夏味辛性溫能和胃散邪除腹脹目不得瞑故並用之秫米一升約今之三合二勺半夏五合約今之一合六勺炊至一升半約今之四合八勺也去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已也合豕膏冷食治猛疽靈樞癰疽篇黃帝曰願盡聞癰疽之形與忌曰名岐伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日已猛疽言為害之急也若膿已瀉當服豕膏可以愈之即豬脂之煉淨者也萬氏方治肺熱暴喑用豬脂一斤煉過入白蜜一斤再煉少頃濾淨冷定不時挑服一匙即愈肘後方治五種疸疾用豬脂一斤溫熱服日三當利乃愈千金方治小便不通豬脂一斤水二升煎三沸飲之立通治關格閉塞豬脂薑汁各二升微火煎至二升下酒五合和煎分服陳文中方治痘瘡便閉用肥豬膘一塊水煮熱切如豆大與食自然臟腑滋潤痂疕易落無損於兒心鏡方治上氣咳嗽豬肪四兩煮百沸切和醋醬食之若無疾服此最能潤肺潤腸即是豕膏之屬老人痰嗽不利及大腸祕結者尤宜用之銼䔖𧄍草根各一升煮飲治敗疵靈樞癰疽篇岐伯曰癰發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼䔖音陵𧄍同翹草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已䔖芰也𧄍連翹也二草之根俱能解毒故各用一升大約古之一升得今之三合有零以水一斗六升煮取三升其折數類此馬玄臺曰䔖𧄍即今之連翹也以連翹及草根煮汁以強飲之雞矢醴治鼓脹素問腹中論平素所講問是謂素問黃帝問曰有病心腹滿旦食不能暮食此為何病岐伯對曰名為鼓脹心腹留滯脹滿不能再食其脹如鼓故名鼓脹帝曰治之奈何岐伯曰治之以雞矢醴一劑知二劑已一劑已知其效二劑可已其病王冰云本草雞屎利小便並不治蠱脹今方法當用湯漬服之爾李時珍曰鼓脹生於濕熱亦有積滯成者雞屎能下氣消積通利大小便故治鼓脹有殊功此岐伯神方也醴者一宿初來之酒醅也又按範汪方云宋青龍中司徒吏顏奪女苦風疾一髀偏痛一人令穿地作坑取雞尿荊葉燃之安脛入坑中熏之有長蟲出遂愈也普濟方云治鼓脹旦食不能暮食由脾虛不能制水水反勝土水穀不運氣不宣流故令中滿其脈沉實而滑宜雞矢醴主之何大英云諸腹脹大皆屬於熱精氣不得滲入膀胱別走於腑溢於皮裡膜外故成脹滿小便短澀雞矢性寒利小便誠萬全不傳之寶也用臘月乾雞矢白半斤袋盛以酒醅一斗漬七日溫服三杯日三或為末服二錢亦可正傳云用羯雞矢一升研細炒焦色地上出火毒以百沸湯淋汁每服一大盞調木香檳榔末各一錢日三服以平為度又按醫鑑等書云用干羯雞矢八合炒微焦入無灰好酒三碗共煎乾至一半許用布濾取汁五更熱飲則腹鳴辰巳時行二三次皆黑水也次日覺足面漸有皺紋又飲一次則漸皺至膝上而病愈矣凡鼓脹由於停積及濕熱有餘者宜用之挾虛者禁之吳鶴皋曰朝寬暮急病在營血雞矢穢物從陰化可入營血帝曰其時有復發者何也脹病多反復也岐伯曰此飲食不節故時有病也鼓脹之病本因停滯故不可復縱飲食也雖然其病且已時故當病氣聚於腹也言雖是飲食不節時有病者又有病且已之後其根未盡拔除病氣重聚於腹亦復發焉治之以蘭除陳氣也治脾疸素問奇病論帝曰有病口甘者病名謂何何以得之岐伯曰此五氣之溢也名曰脾疸五氣五味之所化也疸熱病也夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也脾主為胃行其津液者也故五味入胃則津液在脾脾屬土其味甘脾熱則口甘爾此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴肥者味厚助陽故能生熱甘者性緩不散故能留中熱留不去久必傷陰其氣上溢故轉為消渴之病治之以蘭除陳氣也蘭草性味甘寒能利水道闢不祥除胸中痰癖其氣清香能生津止渴潤肌膚故可除陳積蓄熱之氣按蘭草俗名省頭草即澤蘭之一類二種有以為即山蘭葉李時珍辨正之詳載本草從新澤蘭下以四烏鰂骨一藘茹二物合併丸以雀卵飲以鮑魚汁治血枯素問腹中論帝曰有病胸脅支滿者妨於食病至則先聞腥臊音騷臭出清液先唾血四支清目眩時時前後血病名謂何何以得之支滿者滿如支膈也肺主氣其臭腥肝主血其臭臊肺氣不能平肝則肝肺俱逆於上濁氣不降清氣不升故聞腥臊而吐清液也口中唾血血不歸經也四支清冷氣不能周也頭目眩暈失血多而氣隨血去也血氣既亂故於前陰後陰血不時見而月信反無期矣岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也血枯者月水斷絶也致此之由其源有二一則以少時有所大脫血如胎産既多及崩淋吐衄之類一則以醉後行房血盛而熱因而縱肆則陰精盡泄精去則氣去故中氣竭也夫腎主閉臟肝主疏泄不惟傷腎而且傷肝及至其久則三陰俱虧所以有先見諸症如上文所云而終必至於血枯則月事衰少不來也此雖以女子為言若丈夫有犯前證亦不免為精枯之病則勞損之屬皆是也帝曰治之奈何復以何術復者復其血氣之原也岐伯曰以四烏賊骨一藘茹二物併合之丸以雀卵大如豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也烏鰂即烏賊也骨名海螵蛸氣味鹹溫而澀主女子赤白漏下及血閉血枯亦能令人有子藘茹即蘭茹王冰言取其能散惡血以通經脈雀即麻雀也雀卵氣味甘溫能補益精血主男子陰痿不起故可使多精有子及女子帶下便溺不利後飯者先藥後飯也鮑魚即今之淡乾魚也諸魚皆可為之惟石首鯽魚者為勝其氣味辛溫無毒魚本水中之物故其性能入水臟通血脈益陰氣煮汁服之能同諸藥通女子血閉也以上四藥皆通血脈血主於肝故凡病傷肝者亦皆可用之蘇頌曰本草諸藥並不治血枯而經法用之是攻其所生所起爾時珍曰今人知雀卵能益男子陽虛不知能治女子血枯蓋雀卵益精血爾按藘茹甲乙經及太素新校正李氏綱目俱作蘭茹獨張景嶽以為即茜草也以茜草一名茹藘能止血治崩又能活血通經脈也存之以備參考以生鐵洛為飲治陽厥素問病能論帝曰有病怒狂者此病安生怒狂者多怒而狂也即罵詈不避親疏之謂岐伯曰生於陽也生於陽氣之逆也帝曰陽何以使人狂岐伯曰陽氣者暴折而難決故善怒也病名曰陽厥陽氣宜於暢達若暴有折挫不得剖決故令善怒而狂三陽之氣厥逆上行故名曰陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也陽明常動者謂如下關地倉大迎人迎氣衝衝陽之類皆有脈常動者也巨陽少陽不動者謂巨陽惟委中崑崙少陽惟聽會懸盅其脈雖微動而動不甚也於其不甚動者而動且大疾則其常動者更甚矣此即陽厥怒狂之候帝曰治之奈何岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食即已五味入口而化於脾食入於陰也藏於胃以養五臟氣長氣於陽也食少則氣衰故節奪其食不使胃火復助陽邪則陽厥怒狂者可已使之服以生鐵洛為飲夫生鐵洛者下氣疾也生鐵洛者即爐冶間錘落之鐵屑用水研浸可以為飲其屬金其氣寒而重最能墜熱開結平木火之邪故可以下氣疾除怒狂也凡藥中用鐵精鐵華粉針砂鐵鏽水之類皆同此意以澤瀉術各十分麋銜五分合以三指撮為後飯治酒風素問病能論帝曰有病身熱懈惰汗出如浴惡風少氣此為何病岐伯曰病名曰酒風此即風論中所謂漏風也酒乃麴櫱熱藥所成故令身熱濕熱傷筋縱而不收持故懈惰濕得熱而蒸故多汗多汗則氣屢泄而衛虛故惡風而少氣因酒得風而病故曰酒風帝曰治之奈何岐伯曰以澤瀉術各十分麋銜五分合以三指撮為後飯澤瀉味甘鹹性微寒能滲利濕熱術甘苦氣溫能補中燥濕止汗麋銜即薇銜一名無心草南人呼為吳風草即鹿銜草蓋麋鹿一類也味苦微寒主治風濕十分者倍之也五分者減半也合以三指用三指撮合以約其數而為煎劑也飯後藥先故曰後飯鬄其左角之發方一寸燔治飲以美酒治尸厥素問繆刺論曰邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角邪客於手少陰心經足少陰腎經手太陰肺經足太陰脾經足陽明胃經此五絡皆會於耳中上絡於左耳之額角五絡俱竭令人身脈皆動而形無知也其狀若尸故曰尸厥五絡俱竭陰陽離散也身脈皆動筋惕肉瞤也上下離竭厥逆氣亂昏憒無知故名尸厥刺其足大趾內側爪甲上去端如韭葉足太陰之井隱白穴也後刺足心足少陰之井湧泉穴也後刺足中趾爪甲上各一痏足陽明之井厲兌穴也痏委偉二音刺瘢也後刺手大指內側去端如韭葉手太陰之井少商穴也後刺手心主手厥陰之井中衝穴也上文五絡未及手心主而此刺之和胸中也少陰鋭骨之端各一痏立已謂神門穴手少陰之腧也不已以竹管吹其兩耳以小竹管納對耳孔用力吹之勿令氣泄所以溫助五絡氣可復通也新校正云按陶隱居謂吹其左耳極三度復吹其右耳三度也鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已發剃同左角之發五絡之血餘也燔治燒製為末也飲以美酒助藥力行血氣也補以其類故可使尸厥立已小金丹治五疫素問遺篇刺法論黃帝曰余聞五疫之至皆相傳易無問大小病狀相似不施救療如何可得不相移易者五疫即五運疫癘之氣如何可得不相移易者謂欲禁止其傳染也岐伯曰不相染者正氣內存邪不可干避其毒氣天牝從來復得其往氣出於腦即不邪干疫癘乃天之邪氣若吾身正氣內固則邪不可干故不相染也天牝鼻也鼻受天之氣故曰天牝老子謂之玄牝是亦此義氣自空虛而來亦欲其自空虛而去故曰避其毒氣天牝從來復得其往也蓋以氣通於鼻鼻連於腦中流布諸經令人相染矣氣出於腦為嚏或張鼻泄之則邪從鼻出毒氣可令散也氣出於腦即先想心如日日為太陽之氣應人之心想心如日即所以存吾之氣壯吾之神使邪不能犯也欲將入於疫室先想青氣自肝而出左行於東化作林木心之所至氣必至焉故存想之則神有所注而氣可王矣左行於東化作林木之壯所以壯肝氣也次想白氣自肺而出右行於西化作戈甲所以狀肺氣也次想赤氣自心而出南行於上化作焰明所以壯心氣也次想黑氣自腎而出北行於下化作水所以狀腎氣也次想黃氣自脾而出存於中央化作土所以壯脾氣也五氣護身之畢以想頭上如北斗之煌煌然後可入於疫室煌煌輝耀貌天行疫癘傳染最速故當謹避之如此又一法於立春之日日未出而吐之舊注曰用遠志去心以水煎之飲二盞吐之不疫又一法於雨水日後三浴以藥泄汗謂以祛邪散毒之藥煎湯三浴以泄其汗也又一法小金丹方辰砂二兩水磨雄黃一兩葉子雌黃一兩紫金半兩以金箔同研之可為細末同入閣中外固了地一尺築地實不用爐不須藥制用火二十斤煅之也七日終常令火不斷候冷七日取次日出合子埋藥地中七日取出順日研之三日煉白沙蜜為丸如梧桐子大每日望東吸日華氣一口冰水下一丸和氣咽之服十粒無疫干也合子即磁罐之屬順日研之謂左旋也按此遺篇之言乃出後人增附法非由古未足深信避疫之法必節欲節勞仍勿忍飢以近其氣自可無慮卷一上治氣門栝蔞薤白白酒湯金匱治胸痹喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞一枚薤白三兩白酒四升此上焦膻中藥也膻中兩乳中間經曰膻中者臣使之官喜樂出焉喻嘉言曰胸中陽氣如離照當空曠然無外設地氣一上則窒塞有加故知胸痹者陰氣上逆之候也仲景微則用薤白白酒以益其陽薤葉光滑露亦難佇故曰薤露其性滑泄能通氣滯故胸痹下重並用之甚則用附子乾薑以消其陰世醫不知胸痹為何病習用豆蔻木香訶子三稜神麯麥芽等藥坐耗其胸中之陽亦相懸矣加半夏名栝蔞薤白半夏湯金匱治胸痹不得臥心痛徹背徐忠可曰胸痹而加以不得臥此支飲之兼證又心痛徹背支飲原不痛飲由胸痹而痛應背故即前方加半夏以去飲下逆此條若無心痛徹背竟是支飲矣除白酒加枳實厚朴桂枝名枳實薤白桂枝湯金匱治胸痹心中痞留氣結在胸胸滿脅下逆搶心徐忠可曰胸痹而加以心中痞胸滿似痞與結胸之象乃上焦陽微而客氣動膈也注云留氣結在胸即客氣也更脅下逆搶心是不獨上焦虛而中焦亦虛陰邪得以據之為逆為搶故於薤白栝蔞又加枳朴以開其結桂枝行陽以疏其肝又曰人參湯亦主之者病由中虛去其太甚即可補正以化邪也胸痹之虛本陽氣微非營氣虛也陽無取乎補宣而通之即陽氣暢暢則陽盛矣故薤白方以行陽為主不取補也此曰人參湯亦主之因脅下逆由中氣虛故兼補中爾人參湯即理中湯等分而用乾薑者爾四君子湯治一切陽虛氣弱脈來虛軟脾衰肺損飲食少思體瘦而黃或痿白無採皮聚毛落言語輕微四肢無力及脾胃不和泄痢虛飽人參白朮土炒茯苓二錢甘草一錢加薑棗人參甘溫大補元氣為君白朮苦溫燥脾補氣為臣茯苓甘淡滲濕瀉熱為佐甘草甘平和中益土為使氣足脾運飲食倍進則餘臟受蔭而色澤身強矣加陳皮以理氣散逆名異功散錢氏調理脾胃再加半夏以燥濕除痰名六君子湯治脾胃氣虛飲食不進致成痰癖不時咳唾或胃氣虛寒動成嘔惡凡虛瘧及諸病後惟真陰虧損者大忌用此培土之劑以伐腎水加香附砂仁名香砂六君子湯治虛寒胃痛或腹痛泄瀉六君子加竹瀝麥冬治四肢不舉脾主四肢六君子加烏梅草果等分薑棗煎名四獸飲三因和四臟以輔脾故名治五臟氣虛七情兼併結聚痰飲與衛氣相搏發為瘧疾亦治瘴瘧六君子加柴胡葛根黃芩白芍名十味人參散治虛熱潮熱身體倦怠加黃耆山藥亦名六君子湯為病後調理助脾進食之劑加棗仁炒治振悸不得眠胡洽居土加薑汁竹瀝治半身不遂在右者屬氣虛亦治痰厥暴死加木香藿香乾葛名七味白朮散錢氏治脾虛肌熱泄瀉虛熱作渴參朮乾葛皆能生津楊仁齊再加五味柴胡治消渴不能食除人參加白芍名三白湯調理內傷外感治虛煩或渴或泄加山藥扁豆薑棗煎名六神散陳無擇治小兒表熱去後又發熱者世醫到此盡不能曉或再用涼藥或再解表或謂不治此表裡俱虛氣不歸元而陽浮於外所以再熱非熱證也宜此湯加粳米和其胃氣則收陽歸內而身涼矣挾寒者加肉桂兼陰虛加熟地四君合四物名八珍湯治氣血兩虛及胃損飲食不為肌膚若傷之重者真陰內竭虛陽外鼓諸證蜂起則於四物四君之中又加黃耆以助陽固表加肉桂以引火歸元名十全大補湯金匱曰虛者十補勿一瀉之此湯是也十全大補加防風為君再加羌活附子杜仲牛膝名大防風湯治鶴膝風十全大補去川芎加陳皮名溫經益元散節庵治汗後頭眩心悸筋惕肉瞤或汗出不止或下後下利不止身體疼痛太陽宜汗汗多則亡陽故有眩悸瞤惕之證陽明宜下下多則亡陰故有下利身痛之證補中益氣湯東垣治煩勞內傷身熱心煩頭痛惡寒懶言惡食脈洪大而虛氣短而渴或陽虛自汗宜本湯加麻黃根浮小麥升柴俱宜蜜水炒過或氣虛不能舉元致瘧痢脾虛久不能愈一切清陽下陷中氣不足之證黃耆蜜炙錢半人參甘草炙一錢白朮土炒陳皮留白當歸五分升麻柴胡三分姜三片棗二枚東垣原方黃耆只有一錢其餘各三分立齊常用參耆錢半白朮當歸一錢陳皮七分升柴五分如病甚者參耆或三錢五錢隨證加用東垣取輕清上升故數分少立齊每以濟危急故隨證加多高鼓峰曰凡六經內傷感證及暑月勞倦發熱汗出不止者但用本方加白芍一錢痢疾腹痛已除瀉猶未止是脾氣下陷也加酒炒白芍三錢瘧疾發久形體尪羸胃中有痰飲者加半夏一錢或內有火熱可加黃芩一錢凡婦女胎前氣虛以致胎動不安小産崩漏或産後血虛發熱但加酒炒白芍二錢此方凡屬中宮虛損病後失調無不相宜倪氏曰七情內傷脾胃先病治先脾土此方是也如血不足加當歸精神短少加人參五味肺熱咳嗽去人參干嗌加葛根風藥多燥葛根獨能止渴者以其能升胃中清氣入肺而生水爾頭痛加蔓荊子痛甚加川芎腦痛加藁本細辛風濕相搏一身盡痛加羌活防風有痰加半夏生薑胃寒氣滯加青皮蔻仁木香益智腹脹加枳實厚朴木香砂仁腹痛加白芍甘草熱痛加黃連能食而心下痞加黃連咽痛加桔梗有寒加肉桂濕勝加蒼朮陰火加黃柏知母陰虛去升柴加熟地山茱山藥大便祕加酒煨大黃咳嗽春加旋覆款冬夏加麥冬五味秋加麻黃黃芩冬加麻黃不去根節天寒加乾薑泄瀉去當歸加茯苓蒼朮益智如冬月惡寒發熱無汗脈浮而緊加麻黃若脈浮而緩有汗加桂枝芍藥東垣此方原為感證中有內傷一種故立此方以補傷寒書之所未及非補虛方也今感證家多不敢用而以為調理補虛服食之藥則謬矣調理補虛乃通其意而轉用之者爾肺者氣之本黃耆補肺固表為君脾者肺之母土能生金脾胃一虛肺氣先絶人參甘草補脾益氣和中瀉火為臣東垣曰參耆甘草瀉火之聖藥蓋煩勞則虛而生熱得甘溫以益元氣而虛熱自退故亦謂之瀉白朮燥濕強脾當歸和血養陰為佐補陽宜兼和陰不然則已亢升麻以升陽明清氣右升而復其本位柴胡以升少陽清氣左旋而上行陽升則萬物生清升則濁陰降加陳皮者以通利其氣陳皮同補藥則補獨用則瀉脾生薑辛溫大棗甘溫用以和營衛開腠理致津液諸虛不足先建其中中者何脾胃是也加炒芩神麯名益胃升陽湯治婦人經水不調或脫血後食少水瀉東垣曰脫血益氣古聖之法也故先補胃以助生髮之氣去白朮加草蔻神麯半夏黃柏名升陽順氣湯治飲食勞倦所傷滿悶短氣不思食不知味時惡寒東垣曰升麻柴胡味薄性陽引脾胃清氣行於陽道以滋春氣之和又引參耆甘草上行充實腠理使衛外為固凡補脾胃之藥多以升陽補氣名之者此也又曰但言補之以辛甘溫熱之劑及味之薄者諸風藥是也此助春夏之升浮者也此便是瀉秋收冬藏之藥也在人之身乃肝心也但言瀉之以酸味寒涼之劑並淡味滲泄之藥此助秋冬之沉降者也此便是瀉春生夏長之藥也在人之身肺腎是也吳鶴皋曰升柴辛甘升其清清升則陽氣順矣柏皮苦寒降其濁濁降則陰氣順矣參耆當歸甘草補其虛虛補則正氣順矣半夏陳皮利其膈膈利則痰氣順矣豆蔻神麯消其食食消則穀氣順矣加蒼朮倍分半夏黃芩益智各三分名參朮益胃湯治內傷勞倦燥熱短氣口渴無味大便溏黃除當歸白朮加木香蒼朮名調中益氣湯治脾胃不調胸滿肢倦食少短氣口不知味及食入反出加白芍五味亦名調中益氣湯以上俱東垣方治氣虛多汗余治同前本方純用甘溫所謂勞者溫之損者溫之此加白芍五味之酸以收耗散之氣有發有收此東垣別開一路以廣補中之妙者乎加羌活防風細辛川芎名調營養衛湯節庵治勞力傷寒頭痛身熱惡寒微渴汗出身痛脈浮無力加白芍細辛川芎蔓荊名順氣和中湯寶鑑治清陽不升頭痛惡風脈弦微細加黃柏生地名補中益氣加黃柏生地湯治陰火乘陽發熱晝甚自汗短氣口渴無味代赭旋覆湯仲景治傷寒發汗若吐若下解後心下痞硬噫氣未除汗吐下後大邪難解胃氣弱而不和虛氣上逆故痞硬噫氣即俗所謂噯氣也並善治反胃噎食氣逆不降旋覆花甘草三兩半夏半升人參二兩代赭石一兩生薑五兩大棗十二枚喻嘉言曰此亦伏飲為逆但因胃氣虧損故用法以養正而兼散餘邪大意在噫氣不除上既心下痞硬更加噫氣不除則胃氣上逆全不下行有升無降所謂弦絶者其聲嘶土敗者其聲噦也故用代赭領人參納氣歸元海以鎮安其逆微加散邪滌飲而痞自開爾升陽益胃湯東垣治脾胃虛弱怠惰嗜臥時值秋燥令行濕熱方退體重節痛口苦舌乾心不思食食不知味大便不調小便頻數兼見肺病灑淅惡寒慘慘不樂乃陽氣不升也黃耆二兩半夏甘草炙人參一兩白芍炒羌活獨活防風五錢以其秋旺故以辛溫瀉之陳皮四錢留白白朮土炒茯苓小便利不渴者勿用澤瀉無淋勿用柴胡三錢黃連二錢每三錢薑棗煎列證云治秋燥此方殊為不合六君子助陽益胃補脾胃之上藥也加黃耆以補肺而固衛芍藥以斂陰而調營羌活獨活防風柴胡以除濕痛羌活除百節之痛而升清陽茯苓澤瀉以瀉濕熱而降濁陰少佐黃連以退陰火補中有散發中有收使氣足陽生自正旺而邪服矣補脾胃瀉陰火升陽湯東垣治飲食傷胃勞倦傷脾火邪乘之而生大熱右關脈緩弱脾虛或弦木剋土或浮數東垣曰濕熱相合陽氣日虛不能上升脾胃之氣下流肝腎是有秋冬而無春夏也惟瀉陰火升陽氣用味薄風藥升發則陰不病而陽氣生矣黃耆蒼朮泔浸炒甘草炙羌活一兩升麻八錢柴胡兩半黃連酒炒五錢黃芩炒人參七錢石膏長夏用少許每服三錢或五錢柴胡升麻羌活助陽益胃以升清氣人參蒼朮黃耆甘草益氣除濕以補脾胃黃芩黃連石膏涼心清熱以瀉陰火橘皮竹茹湯金匱治久病虛羸嘔逆不已胃寒則嘔胃熱亦嘔有停痰有積飲皆作嘔此為久病虛火上逆而乾嘔者亦治吐利後胃虛噦逆橘皮竹茹二升甘草五兩人參一兩生薑半斤大棗三十枚徐忠可曰此胃虛而沖逆為噦然非真元衰弱之比故以參甘培胃中元氣而以橘皮竹茹一寒一溫下其上逆之氣以薑棗宣其上焦使胸中之陽漸暢而下達謂上焦固受氣於中焦而中焦亦稟承於上焦上焦既宣則中氣自調也加半夏麥冬赤茯枇杷葉亦名橘皮竹茹湯丁香柿蒂湯嚴氏治久病厄逆因於寒者丁香柿蒂二錢人參一錢生薑五片一方加陳皮半夏茯苓甘草良薑丁香泄肺溫胃而暖腎生薑去痰開鬱而散寒柿蒂苦澀而降氣人參所以輔真氣使得展布也朱丹溪曰人之陰氣因胃為養土傷則木挾相火直衝清道而上作厄逆古人以為胃寒用丁香柿蒂不能清痰利氣惟助火而已李時珍曰朱氏但執以寒治熱矯枉之過矣按古人治陰厄每用桂附乾薑吳萸丁香茴香諸辛熱藥多有收效者治陽厄用橘紅竹茹湯玉機微義曰厄逆本由陰氣已虛陽火暴甚直衝而上出於胃入於肺而作聲東垣用涼藥者所以瀉熱降火也若陰症厄逆以陰氣先消陽火亦竭浮於胸中亦欲散也故不用寒藥而反以溫藥養胃留其陽氣胃氣和則愈陽生則陰長之說也除人參生薑加竹茹橘紅名丁香柿蒂竹茹湯又名橘紅竹茹湯治陽厄或問治陽厄者何以不用知柏吳鶴皋曰此少陽虛邪非實邪也故用柿蒂竹茹之味薄者主之若知柏味厚則益戕其中氣痞塞不益甚乎古人蓋深權之矣除人參生薑亦名丁香柿蒂湯嚴氏寶鑑去人參加青皮陳皮三因去人參加良薑甘草名丁香散四磨湯嚴氏治七情氣逆上氣喘急悶開不食怒則氣上思則氣結憂愁不已氣多厥逆重則眩僕輕則上氣喘急滿悶妨食檳榔沉香烏藥人參等分濃磨煎三四沸溫服一方人參易枳殼一方去參加枳實木香白酒磨名五磨飲治暴怒卒死名曰氣厥氣上宜降之故用檳榔沉香檳榔性如鐵石沉香入水獨沉故皆能下氣氣逆宜順之故用烏藥加人參者降中有升瀉中帶補恐傷其氣也舉元煎景嶽治氣虛下陷血崩血脫亡陽垂危等證有不利於歸熟等劑而但宜補氣者以此主之黃耆炙人參三五錢白朮炒甘草炙一二錢升麻炒五七分如兼陽氣虛寒者桂附乾薑隨宜佐用如兼滑脫者可加烏梅二個或文蛤七八分獨參湯諸虛氣弱脈微危急及大失血者此方主之血脫者須益其氣蓋有形之血不能速生無形之氣所當急固陽生則陰長也方見卷十二下救急門有痰者加薑汁或竹瀝煩躁者加童便虛而有火身寒者加附子人參得天地衝和之氣以成形故用之以補沖和之氣使其一息尚存則可以次第而療諸疾是以病之危急而虛者良醫以氣為首務也卷一下理血門四物湯治一切血虛及婦人經病月經先期為熱後期為寒為虛為郁為痰丹溪曰經水者陰血也陰必從陽故其色紅上應於月其行有常故名曰經為氣之配因氣而行成塊者氣之凝將行而痛者氣之滯行後作痛者氣血俱虛也色淡亦虛也錯經妄行者氣之亂紫者氣之熱黑則熱之甚也今人見紫黑作痛成塊率指為風冷乘之而用溫熱之劑禍不旋踵矣經曰亢則害承乃制熱極則兼水化所以熱則紫甚則黑也若曰風冷必須外得設或有之十不一二也玉機微義曰寒則凝而不行既行而紫黑故知非寒也當歸酒洗生地三錢芍藥二錢芎藭錢半如涼血心加黃連肝條芩肺枯芩大腸實芩膽黃連腎膀胱黃柏脾生地胃大黃三焦地骨心包絡丹皮小腸梔子木通如清氣心與包絡加麥冬肺枳殼肝柴胡青皮脾白芍胃乾葛石膏大腸三焦連翹小腸赤茯膀胱滑石琥珀血虛加龜板血燥加人乳血瘀加桃仁紅花韭汁童便行之暴血加薄荷元參散之血不止加炒蒲黃京墨久不止加升麻引血歸經婦人經血紫黑脈數為熱加芩連血淡脈遲為寒加桂附人肥有痰加半夏南星橘紅人瘦有火加黑梔知母黃柏郁者加木香砂仁蒼朮神麯瘀滯加桃仁紅花延胡肉桂氣虛加參耆氣實加枳朴以上乃舊時加用法切不可執當歸辛苦甘溫入心脾生血為君生地甘寒入心腎滋血為臣芍藥酸寒入肝脾斂陰為佐芎藭辛溫通上下而行血中之氣為使也加黃柏知母名知柏四物湯再加玄參名滋陰降火湯治陰虛有火知柏四物蜜丸名坎離丸治陰虛嗽血加黃連胡黃連名二連四物湯元戎治氣旺血虛五心煩熱熱入血室夜分發熱血室衝脈也沖為血海晝靜夜劇陽陷陰中名熱入血室加黃柏黃芩甘草名三黃四物湯治陰虛潮熱用生熟二地加黃耆丹皮升麻柴胡名三黃補血湯治亡血血虛六脈俱大按之空虛二地補血丹皮涼血黃耆補氣升柴升陽陽旺則能生血也加桃仁紅花名元戎四物湯治血結便祕撲損瘀血加羌活防風一用秦艽名治風六合湯治風虛眩暈風祕便難蜜丸名補肝丸肝以散為補加木香檳榔名治氣六合湯治血虛氣滯或血氣上衝加羌活天麻蜜丸名神應養真丹治足厥陰經受風寒暑濕癱瘓不遂語言謇澀及血虛腳氣加桃仁紅花竹濕瀝薑汁治半身不遂在左者屬瘀血瘀血不去則新血不生故用桃仁紅花活血去瘀加薑汁竹瀝者以痰無分左右也去白芍加防風名防風當歸散治發汗過多而成痙證宜去風養血去地黃加乾薑名四神湯治婦人血虛心腹㽲痛㽲音鳩又音絞急痛也加艾葉四制香附童便鹽水酒醋各浸三日醋丸名艾附暖宮丸治子宮虛冷再加阿膠名婦寶丹治虛寒月水不調加丹皮地骨治婦人骨蒸除芍藥地黃名歸芎湯為末名佛手散又名一奇散又名君臣散治産後血虛頭痛胎動下血服此即安子死腹中服此即下催生神效四物各七錢加防風一兩梔子黃芩黃連各三錢每服五錢如脈實加大黃名生地黃連湯海藏治婦人血風證去血過多因而燥涸循衣摸床撮空閉目揚手擲足錯語失神脈弦浮而虛男子去血過多亦有此證陶節奄曰大承氣湯氣藥也自外而之內者用之生地黃連湯血藥也自內而之外者用之氣血合病循衣摸床證同自氣之血血而復之氣者大承氣湯下之自血之氣氣而復之血者生地黃連湯主之二者俱不大便此是承氣湯對子又與三黃石膏湯相表裡是皆三焦包絡諸火之病也病既危急只得以此降血中之伏火爾綱目曰四物與桂枝麻黃白虎柴胡理中四逆茱萸承氣涼膈等皆可作各半湯此易老用藥大略也加大黃芒硝甘草當歸用尾芍藥用赤名玉燭散子和治經閉腹痛體瘦善飢取爾雅四時和氣謂之玉燭之義也抵當湯仲景治太陽病六七日表證仍在發熱惡寒頭痛項強脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者必有蓄血令人善忘所以然者以太陽隨經於熱在裡故也水蛭三十個豬脂熬黑虻蟲三十個去頭足翅桃仁二十枚去皮尖研大黃四兩酒浸苦走血咸滲血虻蟲水蛭之苦鹹以除蓄血甘緩急苦泄熱桃仁大黃之甘苦以下結熱程郊倩曰表證仍在脈微而沉是有表證而無表脈熱在下焦可知非桂枝所能散桃仁所能攻緣熱結膀胱與瘀熱在裡邪有淺深故桃仁承氣與抵當湯攻有緩急減水蛭十個虻蟲桃仁各減五個分為四丸每水煮一丸名抵當丸治本病無喜忘如狂之證者附代抵當丸大黃四兩生地歸尾桃仁穿山甲元明粉各一兩桂心三錢蜜丸桃仁歸尾生地潤以通之桂心熱以動之大黃元明粉苦寒鹹寒以推蕩之加穿山甲引之以達於瘀所也桃仁承氣湯仲景治傷寒外證不解熱結膀胱小腹脹滿大便黑小便利燥渴譫語蓄血發熱如狂及血於胃痛腹痛肋痛瘧疾實熱夜發痢疾蓄血急痛桃仁五十枚去皮尖研大黃四兩芒硝甘草桂枝二兩大黃芒硝蕩熱去實甘草和胃緩中此調胃承氣湯也熱甚則搏血血聚則肝燥故加桃仁之甘苦以潤燥而緩肝加桂枝之辛熱直連於所而行之也攖寧生曰滑伯仁號攖寧生血溢血泄諸蓄妄者其始也率以桃仁大黃行血破於之劑折其鋭氣然後區別治之或問失血復下虛何以當伊舉曰血既妄行迷失故道不去蓄利瘀則以妄為常何以御之且去者自去生者自生何虛之有喻嘉言曰用桃仁以達血所加桂枝以解外邪亦猶大柴胡湯用柴胡解外相似益見太陽隨經之邪非桂枝不解爾程郊倩曰五苓散與桃仁承氣均為太陽犯府之藥一利前而主氣分一利後而主血分治各不同節奄加青皮枳實當歸芍藥酥木汁柴胡名桃仁承氣對子加青皮枳實破血必行氣也加當歸芍藥去瘀而生新也柴胡平肝升清而散表熱酥木助桃仁桂心以逐於血蒼朮地榆湯潔古治脾經受濕痢疾下血蒼朮泔浸炒三兩地榆炒黑一兩每一兩煎蒼朮燥濕強脾升陽而開鬱地榆清熱涼血酸收而斷下為治血痢腸風之平劑初起者勿用加芍藥阿膠捲柏名芍藥地榆湯河間治泄痢膿血乃到脫肛阿膠補血與液為肺大腸要藥能治熱劑芍藥湯潔古治下痢膿血稠黏腹痛後重下痢皆屬濕熱赤為傷血白為傷氣膿血稠黏氣血兩傷也腹痛後重氣血皆滯也劉河間曰行血則膿血自愈調氣則後重自除芍藥一兩歸尾黃芩黃連大黃三錢木香甘草炙檳榔二錢桂錢半每服五錢痢不減加大黃此為實熱者言也然今之熱者鮮矣芍藥酸寒瀉肝火斂陰氣和營衛故以為君大黃歸尾破積而行血木香檳榔通滯而行氣黃芩黃連燥濕而清熱痢由濕熱責於腸胃不得宣通故大便重急小便赤澀也辛以散之苦以燥之寒以清之甘以調之加肉桂者假其辛熱以為反佐也除桂甘草加枳殼名導滯湯一作導氣湯治前證兼渴者此方今人多用償遇虛寒者而誤用之禍不旋踵矣秦艽白朮丸東垣治痔瘡痔漏有膿血大便燥結痛不可忍桃仁研歸尾酒洗秦艽白朮一兩枳實麩炒皂角子燒存性澤瀉五錢地榆三錢麵糊丸秦艽歸尾桃仁潤燥和血秦艽為風藥中潤劑皂角仁以除風燥地榆以破血止血枳實苦寒以泄胃實澤瀉咸泄使氣歸於前陰以清濕邪也白朮之苦甘以瀉火而益元氣故曰甘寒瀉火乃假枳實之寒也大便祕澀以大黃推蕩之其津液益不足用當歸和血加油潤之劑自然軟利矣除地榆加大黃紅花名秦艽當歸湯治痔漏大便燥結疼痛用秦艽一味加羌活防風麻黃升麻柴胡藁本細辛黃耆炙草紅花名秦艽羌活湯治痔漏成塊下垂不任其癢除皂角枳實地榆加防風升麻柴胡陳皮大黃黃柏紅花炙草名秦艽防風湯治痔漏大便時疼痛東垣曰如無痛者非痔漏也除白朮枳實地榆加蒼朮黃柏大黃檳榔防風名秦艽蒼朮湯以上俱東垣方治同麻黃人參芍藥湯東垣治吐血外感寒邪內虛蘊熱麻黃去外寒黃耆實表益衛甘草炙補脾白芍藥安太陰各一錢人參益元氣而實表麥冬保肺氣各三分五味子五粒安肺氣當歸和血養血桂枝和營衛各五分熱服綱目曰觀此一方足以為萬世模範矣蓋取仲景麻黃湯與補劑各半服之但凡虛人當服仲景方者宜以此為則東垣治一貧士病脾胃虛與補藥愈後繼居曠室臥熱炕咳而吐血東垣謂此久虛弱冬居曠室衣服單薄是重虛其陽表有大寒壅遇裡熱火邪不得舒仲故血出於口當補表之陽瀉里之虛熱因思仲景治傷寒脈浮緊當以麻黃湯發汗而不與之遂成衄血卻與麻黃湯立愈與此甚同因作此湯一服而愈當歸補血湯東垣治傷於勞役肌熱面赤煩渴引飲脈大而虛黃耆炙一兩當歸酒洗二錢空心服當歸滋陰養血黃耆乃補氣之藥何以五倍於當歸而云補血湯乎蓋有形之血生於無形之氣又有當歸為引則從之而生血矣經曰陽生則陰長此其義爾槐花散本事治腸風臟毒下血槐花炒側柏葉杵荊芥炒黑枳殼炒等分為末每服三錢米飲下側柏養陰燥濕最清血分槐花疏肝瀉熱能涼大腸荊芥散瘀搜風為風病血病要藥枳殼寬腸利氣加當歸生地川芎入烏梅生薑煎名加減四物湯濟生治同補血涼血除柏葉荊芥加當歸黃芩防風地榆酒糊丸名槐角丸局方治同涼血疏血除柏葉枳殼加青皮等分亦名槐花散潔古治血痢腹不痛不裡急後重除柏葉枳殼加當歸川芎熟地白朮青皮升麻名當歸和血散東垣亦名槐花散治腸澼下血濕毒下血經驗方單用槐花荊芥炒黑為末酒服亦治下血咳血方丹溪治咳嗽痰血青黛水飛栝蔞仁去油海石去砂山梔炒黑訶子肉等分為末蜜丸噙化嗽甚加杏仁肝火上逆能爍肺金故咳嗽痰血青黛瀉肝而理血散五臟鬱火梔子涼心而清肺使邪熱下行二者所以治火栝蔞潤燥滑痰為治嗽要藥能清上焦痰火蕩除鬱熱垢膩海石軟堅止嗽清水之上源能軟堅痰痰除則嗽止肺為水之上源二者降火而兼行痰加訶子者以能斂肺而定痰喘也不用治血之藥者火退則血自止也龍腦雞蘇丸局方治肺有鬱熱咳嗽吐血衄血下血肺有鬱熱故咳嗽甚則逼血上行而吐衄肺移熱於大腸則下血熱淋消渴肺熱則膀胱絶其化源故淋悶肺熱則渴而多飲為上消口臭脾胃有熱口苦肝膽有熱清心明目雞蘇葉一名龍腦薄荷一兩六錢生地六錢麥冬四錢蒲黃阿膠木通銀柴胡二錢甘草錢半黃耆人參一錢先將木通柴胡浸二日熬汁地黃浸汁熬膏再用蜜三兩煉過和丸梧子大每服二十丸細嚼湯下一方有黃連肺本清肅或受心之邪焰或受肝之亢害故見諸證雞蘇輕揚升發瀉肺搜肝散熱理血故以為君生地涼血炒蒲黃止血以療諸血柴胡平肝解肌熱木通利水降心火麥冬阿膠潤燥清肺參耆甘草瀉火和脾此亦為熱而涉虛者設故少佐參耆也喻嘉言曰此丸兩解氣分血分之熱犀角地黃湯濟生治傷寒胃火熱盛吐血衄血嗽血便血蓄血如狂漱水不欲咽及陽毒發斑生地兩半白芍一兩犀角角尖尤良鹿取茸犀取尖其精氣盡在是也作器物者多被蒸煮不堪入藥丹皮二錢半每服五錢熱甚如狂者加黃芩一兩因怒致血者加梔子柴胡黃芩瀉上中二焦之火梔子瀉三焦之火柴胡平少陽厥陰之火血屬陰本靜因諸經火逼遂不安其位而妄行犀角大寒解胃熱而清心火芍藥酸寒和陰血而瀉肝火肝者心之母丹皮苦寒瀉血中伏火生地大寒涼血而滋水以共平諸經之僭逆也節庵加當歸紅花桔梗陳皮甘草藕汁名加味犀角地黃湯當歸引血歸經藕汁涼血散瘀桔梗以利上焦陳皮以導中焦紅花以行下焦歸脾湯濟生治思慮過度勞傷心脾怔忡健忘上氣不足下氣有餘腸胃實而心氣虛故善忘驚悸有觸而心動曰驚無驚而自動曰悸即怔忡也盜汗汗為心液心藏神而生血心傷則不能生血而血少故見前諸證發熱脾主肌肉體倦脾主四肢食少脾不健暈不眠血不歸經血脾主思而藏血脾傷故見前諸證或脾虛不能攝血致血妄行及婦人經帶或心脾傷痛嗜臥肢體作痛大便不調或瘰癧流注不能消散潰斂黃耆蜜炙當歸酒洗龍眼肉二錢棗仁炒研白朮土炒錢半人參茯神一錢遠志去心八分木香磨沖甘草炙五分薑棗煎醫貫曰心生血脾統血肝藏血凡治血證須按三經用藥遠志棗仁補肝以生心火茯神補心以生脾土參耆甘草補脾以固肺氣木香香先入脾總欲使血歸脾爾去白朮木香龍眼加茯苓陳皮入蓮肉薑棗煎名酸棗仁湯治虛煩不眠金匱酸棗仁湯亦治不眠見和解門人參養營湯治脾虛食少無味身倦肌瘦肺虛色枯氣短毛髮脫落小便赤澀營血不足驚悸健忘寢汗發熱經曰脾氣散精上輸於肺此地氣上升也肺主治節通調水道下輸膀胱此天氣下降也脾肺虛則上下不交而為否營血無所籍以生諸種虛證亦治發汗過多身振脈搖筋惕肉瞤汗為心液汗即血也發汗過多則血液枯涸筋肉無以榮養而然也人參白朮白芍錢半黃耆蜜炙當歸二錢茯苓一錢熟地三錢甘草炙陳皮桂心遠志五分五味七粒加薑棗煎熟地歸芍養血之品參耆苓朮甘草陳皮補氣之品血不足而補其氣此陽生則陰長之義也且參耆五味所以補肺肺主氣氣能生血甘陳苓朮所以健脾脾統血熟地所以滋腎腎藏精精血相生遠志能通腎氣上達於心桂心能導諸藥入營生血五臟交養互益故能統治諸病而其要則歸於養營也薛立齊曰氣血兩虛而變現諸證莫能名狀勿論其病勿論其脈但用此湯諸證悉退此十全大補對子也十全大補但分氣血此則五臟皆補無乎不到虛寒甚者高氏常加附子以治之三陰瘧更妙養心湯治心虛血少神氣不寧怔忡驚悸心主血而藏神經曰靜則神藏躁則消忘心血虛則易動故怔忡驚悸不得安寧也黃耆蜜炙茯苓茯神當歸川芎半夏曲一兩甘草炙一錢柏子仁去油棗仁遠志去心五味人參肉桂二錢半每服五錢參耆以補心肺之氣肺為心之華蓋芎歸以養心肝之血肝木能生心火二茯遠志以泄心熱柏仁酸棗以寧心神五味收神氣之散越半夏去擾心之痰涎甘草補土以培心子赤桂引藥以入心經潤以滋之溫以補之酸以收之香以舒之則心得其養矣還元水治咳血吐血及産後血暈陰虛久嗽火蒸如燎血生於心統於脾藏於肝宣布於肺靜則歸經熱則妄行火傷肺絡血隨咳出或帶痰中童便取十一二歲無病童子不茹葷辛清徹如水者去頭尾熱飲冬則用湯溫之或加藕汁阿膠和服有痰稍加薑汁童便鹹寒降火滋陰潤肺散瘀故治血證火嗽血暈如神北齊褚澄曰喉不容物毫髮必咳血既滲入愈滲愈咳愈咳愈滲飲溲溺百不一死服寒涼藥百不一生李時珍曰小便飲之入胃隨脾之氣上歸於肺下通水道而入膀胱乃其舊路故能治肺病引火下行其味鹹而走血故治血病當熱飲熱則真氣尚存其行自速冷則唯有鹹寒之性而已李士材曰煉成秋石真元之氣漸失不及童便遠矣飲自己溺名回輪酒獨聖散治多年咳嗽肺痿咯血紅痰白芨為末每服二錢臨臥糯米湯下人之五臟唯肺葉壞爛者可以復生白芨苦辛收澀得秋金之令能補肺止血故治肺損紅痰又能蝕敗疽死肌為去腐生新之聖藥清咽太平丸治膈上有火早間咯血肺屬金清肅之臟也木火焚灼肺金受刑故咯血早間寅卯木旺生火之時兩頰常赤肺肝之部咽喉不清十二經脈唯足太陽在表不歷膈咽余皆上循喉嚨盡能作病而君相二火為尤甚諸火上逆故咽喉不清薄荷十兩川芎防風犀角柿霜甘草二兩桔梗三兩蜜丸薄荷辛香升浮消風散熱消風故疏肝散熱故清肺是以能治血病防風血藥之使瀉肺搜肝防風瀉肺火散肝火為上部血藥之使川芎血中氣藥升清散瘀柿霜生津潤肺犀角涼心清肝甘草緩炎上之火勢桔梗截諸藥而上浮又甘桔相合為清咽利膈之上劑也小薊飲子治下焦結熱而成血淋心主血小腸其腑也熱甚搏血流入胞中與便俱出痛者為血淋不痛者為溺血蓋心熱者小腸必熱經所謂胞移熱於膀胱則癃溺血是也然熱必兼濕戴氏曰血鮮者心小腸實熱血瘀者腎膀胱虛冷準繩曰多有熱極而血凝黑者未可便以為冷也小薊薄黃炒黑藕節滑石木通生地梔子炒淡竹葉當歸甘草梢各五分小薊藕節退熱散瘀生地涼血蒲黃止血木通降心肺之火下達小腸梔子散三焦鬱火由小便出淡竹葉草清心而利小便心與小腸相為表裡滑石瀉熱而滑竅當歸能引血歸經草梢能徑達莖中也復元羌活湯湯名羌活而方內無之疑缺誤治從高墜下惡血留於肋下疼痛不可忍者不問傷在何經惡血心留於脅下以肝主血故也柴胡五錢當歸栝蔞根穿山甲炮甘草紅花二錢桃仁五十去皮尖研大黃一兩酒浸每服一兩加酒煎以利為度原文曰肝膽之經行於脅下屬厥陰少陽故以柴胡引用為君以當歸活血脈以甘草緩其急為臣以穿山甲花粉桃仁紅花破血潤血為佐以大黃蕩滌敗血為使惡血去而痛自除矣補陰益氣煎景嶽治勞倦傷陰精不化氣或陰精內乏以致外感不解寒熱痎瘧陰虛便結不通等證人參一錢熟地三五錢或一二兩當歸二三錢山藥酒炒二錢甘草炙陳皮一錢柴胡一二錢如無外邪不用升麻三五分火浮於上不用薑棗煎此補中益氣湯之變方也凡氣虛感邪者宜補中益氣湯精虛感邪者宜此張景嶽曰補中益氣湯乃東垣獨得之心法蓋以脾胃屬土為水穀之海凡五臟生成唯此是賴者在賴其發生之氣暈而上行故由胃達脾由脾達肺滋溉一身即如天地之土其氣皆然凡春夏之土能生能長者以得陽氣而上升升則向生也秋冬之土不生不長者以得陰氣而下降降則向死也今本方以升柴助升氣以參耆歸術助陽氣此東垣立方之意誠盡善矣第肺本象天脾本象地地天既交所以成泰然不知泰之前猶有臨臨之前獨有復此實三陽之元始故豫再製補陰益氣煎正所以助臨復之氣庶乎得根本之道而足補東垣之未備也四生丸治吐血衄血陽乘於陰血熱妄行此方甚良然但可暫用而已生荷葉生艾葉生地黃生側柏葉四件爛搗丸如雞子大每服一丸滾湯化統而論之生之則寒則四生皆能去火析而論之則荷艾輕香去火於氣芐柏質實瀉火於陰火去則血歸經而吐衄愈矣當歸六黃湯治陰虛有火盜汗發熱心之所藏在內者為血發於外為汗汗乃心之液臟腑表裡之陽皆心主之以行其變化隨其陽氣所在之處而生津亦隨其火擾之處泄而為汗汗者心之陽寢者腎之陰陰虛睡熟陽必湊之故汗出也有火者謂有面赤口乾唇燥便赤音重脈數諸證當歸生地黃熟地黃黃芩黃柏黃連等分黃耆加倍加麻黃根本湯加麻黃根治盜汗甚捷蓋其性能行周身肌表引諸藥至衛分而固腠理也陰虛有火睡去則衛外之陽乘虛陷入陰中表液失其固衛故濈濈然而汗出及覺則陽用事衛氣復出於表表實而汗即止歸地所以養陰芩連所以去火生地黃柏可以養陰亦可以去火而倍用黃耆所以補衛固表也準繩曰陰虛陽必湊故發熱盜汗宜當歸六黃湯加地骨皮陽虛陰必乘故發厥自汗宜黃耆建中湯甚者加附子或耆附湯卷二上補養門崔氏八味丸金匱治命門火衰不能生土以致脾胃虛寒飲食少思泄瀉腹脹仲景云氣虛有痰宜腎氣丸補而逐之吳茭山云八味丸治痰之本也或元陽虛憊陽痿精寒臍腹疼痛夜多漩溺膝酸腰軟目昏等證王冰所謂益火之原以消陰翳也尺脈弱者宜之亦有假有力者服之亦效熟地黃用懷生地水洗去砂土柳木甑砂鍋上蒸一日曬乾再蒸再曬九次為度臨用搗膏八兩山萸肉陳者酒潤懷山藥四兩茯苓乳拌丹皮澤瀉三兩肉桂去皮熟附子一兩蜜丸洛謂蜜性甘緩易豬腎煮爛為丸似更得空心鹽湯下吳鶴皋曰腎中水火俱虧者此方主之加五味鹿茸名十補丸治兩尺微弱陰陽俱虛右歸丸景嶽治元陽不足或先天稟衰或勞傷過度以致命門火衰不能生土而為脾胃虛寒飲食少進或嘔惡膨脹或反胃噎膈或欲寒畏冷或臍腹疼痛或大便不實瀉痢頻作或小水自遺虛淋寒疝或寒侵溪谷而肢節痛痹或寒在下焦而水邪浮腫總之真陽不足者必神疲氣怯或心跳不寧或四肢不收或眼見邪祟或陽衰無子等證速宜益火之原以培右腎之元陽而神氣自強矣八味丸治之不愈者宜服此或用右歸飲凡八味右歸用桂附等方唯肺陰有餘者宜之否則助火爍金反生肺病大懷熟八兩山藥山萸肉枸杞菟絲制杜仲薑湯炒鹿角膠炒珠四兩當歸三兩便溏勿用附子制肉桂二兩上丸法如前或丸如彈子大每嚼服二三丸白湯下其效尤速如陽衰氣虛必加人參以為之主或二三兩或五六兩隨人虛實以為增減蓋人參之功隨陽藥則入陽分隨陰藥則入陰分欲補命門之陽非加人參不能捷效如陽虛精滑或帶濁便溏加補骨脂酒炒三兩如飧泄腎泄不止加五味子三兩肉豆蔻三兩麵炒去油用如飲食減少或不易化或嘔惡吞酸皆脾胃虛寒之證加乾薑三四兩炒黃用如腹痛不止加吳茱萸二兩湯泡半日炒用如腰膝痠痛加胡桃肉連皮四兩如陰虛陽痿加巴戟肉四兩肉蓯蓉三兩或加黃狗外腎一二副以酒煮爛搗入之右歸飲景嶽此益火之劑也凡命門之陽衰陰勝者宜此方加減主之如治陰盛格陽真寒假熱等證宜加澤瀉二錢煎成用涼水浸冷服之尤妙熟地三四錢或加至一二兩山藥炒杜仲薑製枸杞二錢炙甘草一二錢肉桂一二錢製附子一二三錢萸肉一錢水二盞煎七分食遠服如氣虛血脫或厥或昏或汗或暈或虛狂或短氣者必大加人參白朮隨宜用之如小腹多痛加吳茱萸六七分如火衰不能生土為嘔噦吞酸者加炮姜二三錢如陽衰中寒泄瀉腹痛加人參肉豆蔻隨宜用之如淋帶不止加破故紙一錢如血少血滯腰膝軟痛者加當歸二三錢六味地黃丸仲陽治肝腎不足真陰虧損精血枯竭憔悴羸弱腰痛足酸自汗盜汗水泛為痰丹溪曰久病陰火上升津液生痰不生血宜補血以制相火其痰自除發熱咳嗽腎虛則移熱於肺而咳嗽按之至骨其熱烙手骨困不任為腎熱頭暈目眩直指方云淫欲過度腎氣不能歸元此氣虛頭暈也吐衄崩漏肝不攝血致血妄行此血虛頭暈也耳鳴耳聾遺精便血消渴淋瀝失血失音舌燥喉痛虛火牙痛足跟作痛下部瘡瘍等證諸證皆由腎水不足虛火上炎所致熟地八兩山茱肉酒潤山藥四兩茯苓乳拌丹皮澤瀉三兩上丸法如前空心鹽湯下腎中水虛不能制火者此方主之今人足心熱陰股熱腰脊痛率是此證乃咳血之漸也熟地滋陰補腎生血生精山萸溫肝逐風澀精祕氣牡丹瀉君相之伏火涼血退蒸時珍曰伏火即陰火也陰火即相火也世人專以黃柏治相火不知丹皮之功更勝丹皮能入腎瀉陰火退無汗之骨蒸山藥清虛熱於肺脾補脾固腎能澀精茯苓滲脾中濕熱而通腎交心澤瀉瀉膀胱水邪而聰耳明目壯水之主以制陽光即此方也加黃柏知母各二兩名知柏八味丸治陰虛火動骨痿髓枯因下焦濕火尺脈旺者宜之加桂一兩名七味地黃丸引無根之火降而歸元治肝經氣虛筋無所養變為寒證以致筋骨疼痛腳軟懶行及傷寒服涼藥過多木中無火手足牽引肝經血虛以致火燥筋攣變為結核瘰癧等證經曰辛以潤之此方是也加五味名都氣丸治勞嗽益肺之源以生腎水也加肉桂一兩五味二兩名加減八味丸治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰爛咽喉作痛或形體憔悴寢汗發熱五臟齊損加五味二兩麥冬三兩名八仙長壽丸治虛損勞熱加杜仲炒姜牛膝洗酒各二兩治腎虛腰膝痠痛去澤瀉加益智仁三兩鹽酒炒治小便頻數益智辛熱澀精固氣用熟地二兩山藥山萸丹皮歸尾五味柴胡各五錢茯神澤瀉各二錢半蜜丸硃砂為衣名益陰腎氣丸即明目地黃丸東垣治腎虛目昏加柴胡者所以升陽於上也加柴胡五味白朮當歸甘草名滋腎生肝飲治血虛氣滯或肩背絆痛或胃脘當心而痛或肝火鬱與胃中以致倦怠嗜臥飲食不思口渴咽燥及婦人小便自遺頻數無度凡傷寒後熱已退而見口渴者用之薛氏用治婦女鬱怒傷肝脾以致小便淋瀝不利月經不調兩肋脹悶小腹作痛寒熱往來胸乳作痛左關弦洪右關弦數此鬱怒傷肝脾血虛氣滯為患高鼓峰曰六味丸薛氏一變而為滋腎生肝飲用六味減半分兩而加柴胡五味白朮當歸甘草合逍遙而去白芍加五味合都氣意也以生肝故去芍藥而留白朮甘草以補脾補脾者生金以制木也以製為生天地自然之序也去山萸而加柴胡歸尾生地五味辰砂為衣名滋陰腎氣丸治目神水寬大漸散或如霧露中行漸觀空中有黑花視物二體久則光不收及內障神水淡白色高鼓峰曰又一變而為滋陰腎氣丸獨去山茱萸而加柴胡歸尾生地五味仍合逍遙都氣腎肝同治用歸尾生地者行瘀滯也柴胡疏木氣也去芍藥恐妨於行之疏之也名滋陰者厥陰也皆用五味者雖合都氣然實防木之反克瀉丁之義也去山茱萸不欲強木也去澤瀉而用參耆歸術陳皮甘草五味麥冬名人參補氣湯治腎水不足虛火上炎咳嗽膿血發熱作渴小便不調等證高鼓峰曰又一變而為人參補氣湯其義愈變化無窮真有游龍戲海之妙夫白朮之與六味其功相反焉得合之曰從合生脈來則有自然相通之義借茯苓以合五味異功之妙用歸耆以合養血之奇其不用澤瀉者蓋為發熱作渴小便不調則無再竭之理理無再竭便當急生生脈之所由來既當生脈異功之可以轉入也且水生高原氣化能出肺氣將敗故作渴不調此所以急去澤瀉而生金滋水復崇土以生金其苦心可不知哉加生地柴胡五味復等其分名加味地黃丸又名抑陰地黃丸治肝腎陰虛耳內癢痛出水或眼昏痰喘或熱渴便澀等證高鼓峰曰又一變而為加味地黃丸真愈出而愈奇矣柴胡從逍遙來生地從固本來五味仍合都氣其曰耳內癢痛出水或眼昏痰喘或熱渴便澀而總為肝腎陰虛則知陰虛半由火鬱而致也故用柴胡以疏之鬱火非生地不能涼故用生地用五味仍瀉丁以補金補金以生水也曰抑陰為鬱火太盛非疏之不可疏之所以抑之生地涼血便有瀉義瀉之所以抑之也加五味生地當歸名抑陰腎氣丸治諸臟虧損胸膈痞悶發熱潮熱晡熱或寒熱往來五心煩熱或口乾作渴月經不調或筋骨酸倦飲食少思或頭目不清痰氣上壅咳嗽晡甚或小便赤數兩足熱痛或腰膝痿軟肢體作痛等證去澤瀉加川楝子當歸使君子川芎以赤茯苓換白茯苓名九味地黃丸治腎疳加柴胡芍藥名疏肝益腎湯治胃脘痛而大便燥結者此肝血虛也逍遙散所不俞者此方妙加當歸芍藥柴胡棗仁山梔名滋水清肝飲治胃脘燥痛氣逆左肋上嘔吐酸水忽熱忽止等證左歸丸景嶽治真陰腎水不足不能滋養營衛漸至衰弱或虛熱往來自汗盜汗或神不守舍血不歸原或遺淋不禁或口燥舌乾或腰痠腿軟或昏暈眼花耳聾凡精髓內虧津液枯竭等證俱宜速壯水之主以培左腎之元陰而精血自充矣此方主之大懷熟八兩山藥萸肉枸杞菟絲子制鹿角膠敲碎炒珠四兩牛膝酒洗蒸熟三兩精滑者不用龜膠切碎炒珠四兩無火者不用丸法如前每食前滾清湯或淡鹽湯送下百餘丸如純陰失守虛火上炎者宜用純陰至靜之劑於本方去鹿膠枸杞加女貞子麥冬三兩如火爍肺金乾枯多嗽者加百合三兩如氣虛者加人參三四兩如大便燥結去菟絲子加肉蓯蓉三兩如血虛微滯加當歸四兩如腰膝痠痛加杜仲三兩鹽水炒用如臟平無火而腎氣不充者加破故紙三兩蓮肉去心胡桃肉各四兩龜膠不必用上凡五液皆主於腎故凡屬陰分之藥無不皆走腎有謂必須導引者皆見之不明爾左歸飲景嶽治腎水乾枯虛水上蒸脾胃陰土受虧以致飲食不進大便燥結甚至三陽癃閉將成噎膈治之於早無不愈也嘗以此方加歸芍治傷寒舌黑唇焦大渴引飲此必服攻伐寒涼之藥過多也此方救之治瘧疾而兼燥證熱重寒輕者此方更宜熟地三四錢或加至一二兩山藥甘枸杞二錢茯苓錢半炙甘草一錢萸肉一二錢畏酸者少用之如肺熱而煩者加麥冬二錢血滯者加丹皮二錢心熱而躁者加元參二錢血熱妄動者加生地三四錢陰虛不寧者加女貞子二錢上實下虛者加牛膝二錢以導之血虛而燥滯者加當歸二錢脾熱易飢者加芍藥二錢腎虛骨蒸多汗者加地骨皮二錢此壯水之劑乃一陰煎四陰煎之主方也按六味乃虛中挾濕熱而滯者宜之若純虛者無取澤瀉之泄丹皮之涼也宜以此甘純之劑平補之一陰煎景嶽此治水虧火勝之劑故曰一陰凡腎水真陰虛損而脈證多陽虛火發熱及陰虛動血等證或瘧疾傷寒屢散之後取汗既多脈虛氣弱而煩渴不止潮熱不退者此以汗多傷陰水虧而然也皆宜用此加減主之熟地三五錢生地白芍藥麥冬丹參二錢杜仲錢半甘草一錢如火盛躁煩者入真龜膠二三錢化服如氣虛者間用人參一二錢如心虛不眠多汗者加棗仁當歸各一二錢如汗多煩躁者加北五味十粒或加山藥山茱萸如見微火者加女貞子一二錢如虛火上浮或吐血或衄血不止者加澤瀉一二錢茜根二錢或加川續斷一二錢以澀之亦妙去杜仲丹參加知母地骨皮各一錢名加減一陰煎治證如前而火之甚者二陰煎景嶽此治心經有熱水不制火之病故曰二陰凡驚狂失志多言多笑或瘍疹煩熱失血等證此方主之生地三四錢麥冬二三錢棗仁二錢元參茯神木通錢半黃連一二錢生甘草一錢加燈心二十根或竹葉亦可如痰勝熱甚加九制膽星一錢或天花粉一錢五分三陰煎此治肝脾虛損精血不足及營虛失血等證故曰三陰凡中風血不養筋及瘧疾汗多邪散而寒熱猶不能止是皆少陽厥陰陰虛血少之病微有火者宜一陰煎無火者宜此方主之當歸二三錢熟地三五錢芍藥酒炒棗仁二錢人參隨宜炙甘草一錢如嘔惡者加煨姜三五片汗多煩躁加五味子十四粒汗多氣虛者加黃耆一二錢小腹隱痛加枸杞一二錢如有脹悶加陳皮一二錢如腰膝筋骨無力加杜仲牛膝四陰煎此保肺清金之劑故曰四陰治陰虛勞損相火熾盛津枯煩渴咳嗽吐衄多熱等證生地三四錢麥冬芍藥百合二錢生甘草一錢沙參二錢茯苓錢半如夜熱盜汗加地骨皮一二錢如痰多氣盛加貝母二三錢阿膠一二錢或天花粉亦可如金水不能相滋而乾燥者加熟地三五錢如多汗不眠神魂不寧加棗仁二錢如多汗兼渴加五味十四粒如熱甚者加黃柏一二錢鹽水炒用或元參亦可但分上下用之如血少經遲枯澀不至者加牛膝二錢如血熱吐衄加茜根二錢如多火便燥或肺乾咳咯者加天冬二錢或加童便亦可如火載血上行者去甘草加炒山梔一二錢五陰煎景嶽凡真陰虧損脾虛失血等證或見溏泄未甚者所重在脾故曰五陰忌用潤滑宜此主之熟地五七錢芍藥炒黃山藥炒二錢扁豆二三錢炒茯苓錢半甘草炙一二錢五味二十粒人參隨宜白朮炒一二錢加連肉去心二十粒七寶美髯丹邵應節治精血不足羸弱周痹腎虛無子消渴淋瀝遺精崩帶癰瘡痔腫等證周痹周身痿痹也由氣血不足無子由腎冷精衰消渴淋瀝由水不制火遺精由心腎不交崩帶瘡痔由營血不調何首烏大者赤白各一斤去皮切片黑大豆拌九蒸九曬白茯苓乳拌牛膝酒浸同首烏第七次蒸至第九次當歸酒洗枸杞酒浸菟絲子酒浸蒸各半斤破故紙黑芝麻拌炒四兩淨蜜丸鹽湯或酒下並忌鐵器何首烏澀精固氣補肝堅腎為君茯苓交心腎而滲脾濕牛膝強筋骨而益下焦當歸辛溫以養血枸杞甘潤而補水菟絲子益三陰而強衛氣補骨脂助命火而暖丹田此皆固本之藥使營衛調適水火相交則氣血太和而諸疾自已也何首烏流傳雖久服者尚寡明嘉靖間方士邵應節進此方世宗服之連生皇子遂盛行於世大補元煎景嶽治男婦氣血大壞精神失守急劇等證此回天贊化救本培原第一要方本方與前右歸飲出入互用人參補氣補陽以此為主少則用一二錢多則用一二兩熟地補精補陰以此為主少則用三四錢多則用一二兩山藥炒杜仲二錢當歸二三錢若泄瀉者去之萸肉一錢如畏酸吞酸者去之枸杞二三錢甘草炙一二錢如元陽不足多寒者加附子肉桂炮姜之屬隨宜用之如氣分偏虛者加黃耆白朮胸口多滯者不必用如血澀者加川芎去萸肉如滑泄者加五味故紙之類滋陰大補丸丹溪溫補心腎脾胃一切虛損神志俱耗筋力頓衰腰腳沉重肢體倦怠血氣羸乏瘦弱食減發熱盜汗遺精白濁牙齒浮痛等證熟地二兩牛膝酒浸枸杞酒浸山藥兩半茯苓乳拌小茴香杜仲薑汁炒斷絲遠志去心五味巴戟天酒浸肉蓯蓉酒浸萸肉一兩石菖蒲五錢加棗肉蜜丸鹽湯或酒下兩腎中間有命火乃先天之真陽人之日用云為皆此火也此火衰微則無以熏蒸脾胃飲食減少而精氣日衰矣蓯蓉巴戟能入腎經血分茴香能入腎經氣分同補命門相火之不足火旺則土強而脾能健暈矣熟地枸杞補水之藥水足則有以濟火而不亢不害矣杜仲牛膝補腰膝以助腎茯苓山藥滲濕熱以助脾山萸五味生肺液而固精遠志菖蒲通心氣以交腎遺精白濁由於心腎不交大棗補氣益血潤肺強脾此陰陽平補之劑而曰滋陰者腎為陰臟也此即楊氏還少丹去楮實也楮實軟骨敗陽楊氏用之甚謬丹溪減之殊得還少丹加續斷茯苓換茯神名打老兒丸五福飲景嶽凡五臟氣血虧損者此能兼治之足稱王道之最人參熟地隨宜當歸二三錢白朮炒錢半甘草炙一錢加薑棗凡氣血俱虛等證以此為主或宜溫者加姜附宜散者加柴麻升葛左右逢源無不可也宜涼者亦當隨宜加之加棗仁二錢遠志三五分制用名七福飲治氣血俱虛而心脾為甚者黑地黃丸治脾腎不足房事虛損形瘦無力面色青黃此脾腎兩傷之證亦治血虛久痔氣不攝血則妄行濕熱下流則成痔潔古曰此治血虛久痔之聖藥蒼朮油浸熟地一斤五味半斤乾薑春冬一兩秋七錢夏五錢棗肉丸米飲或酒下喻嘉言曰此方以蒼朮為君地黃為臣五味為佐乾薑為使治脾腎兩臟之虛而去脾濕除腎燥兩擅其長超超元箸視後人之脾腎雙補藥味龐雜者相去不已遠耶大營煎景嶽治真陰精血虧損及婦人經遲血少腰膝筋骨疼痛或血氣虛寒心腹疼痛等證當歸二三錢或五錢熟地三五七錢枸杞杜仲二錢牛膝錢半肉桂炙甘草一二錢如帶濁腹痛者加故紙一錢炒用如氣虛者加白朮人參中氣虛寒嘔惡者加炒焦乾姜一二錢小營煎景嶽治血少陰虛此性味和平之方也當歸二錢熟地三四錢芍藥酒炒山藥枸杞二錢炙草一錢如營虛於上而為驚恐怔忡不眠多汗者加棗仁茯神各二錢如營虛兼寒者去芍藥加煨姜如氣滯有痛者加香附一二錢引而行之虎潛丸治精血不足筋骨痿弱足不任地及骨蒸勞熱肝主筋血不足則筋痿腎主骨精不足則骨痿故步履為艱也骨蒸勞熱本乎陰虛黃柏鹽酒炒知母鹽酒炒熟地三兩虎脛骨酥炙一兩龜板酥炙四兩鎖陽酒潤兩半當歸酒洗兩半牛膝酒蒸白芍酒炒陳皮鹽水潤二兩羯羊肉酒煮爛搗丸鹽湯下冬加乾薑一兩丹溪加乾薑白朮茯苓甘草五味菟絲紫河車名補益丸治痿一方加龍骨名龍虎濟陰丹治遺泄知柏熟地所以壯腎水而滋陰歸芍牛膝所以補肝陰而養血牛膝又能引諸藥下行以壯筋骨蓋肝腎同一治也龜得陰氣最厚故以補陰而為君虎得陰氣最強故以健骨而為佐用脛骨者虎雖死猶立不僕其氣力皆在前脛故用以入足從其類也鎖陽益精壯陽養筋潤燥然數者皆血藥故又加陳皮以利氣加乾薑以通陽羊肉甘熱屬火而大補亦以味補精以形補形之義使氣血交通陰陽相濟也名虎潛者虎陰類潛藏也一名補陰丸蓋補陰所以配陽也凡陽勝者不必瀉陽只補其陰以配陽使水火均平自無偏勝之患矣參朮膏治中氣虛弱諸藥不應或因用藥失宜耗傷元氣虛證蜂起但用此藥補其中氣諸證自愈人參白朮等分水煎稠湯化服之兩儀膏治精氣內虧諸藥不應或以克伐太過耗損真陰者凡虛在陽分而氣不化精者宜參朮膏若虛在陰分而精不化氣者莫妙於此其有未至大病而素覺陰虛者用此調元尤稱神妙人參八兩或四兩大熟地一斤二味用好甜水或長流水十五碗浸一宿以桑柴文武火煎取濃汁若味有未盡再用水數碗煎渣取汁並熬稍濃乃入瓷罐重湯熬成膏入上白蜜四兩或半斤收之每以白湯點服若勞損咳嗽多痰加貝母四兩亦可天真丸治一切亡血過多形槁肢羸飲食不進腸胃滑泄津液枯竭久服益氣生血暖胃駐顏精羊肉七斤去筋膜脂皮批開入下藥末肉蓯蓉山藥濕者十兩當歸十二兩酒洗天冬去心一斤為末安羊肉內縛定用無灰酒四瓶煮令酒干入水二斗煮爛再入後藥黃耆五兩人參三兩白朮二兩為末糯米飯作餅焙乾和丸溫酒下如難丸用蒸餅杵丸喻嘉言曰此方可謂長於補矣人參羊肉同功十劑曰補可去弱人參羊肉之屬是也人參補氣羊肉補形而蓯蓉山藥為男子之佳珍合之當歸養營黃耆益衛天冬保肺白朮健脾而其製法尤精允為補方之首貞元飲治氣短似喘呼吸促急提不能升咽不能降氣道噎塞勢劇垂危者常人但知為氣急其病在上而不知元海無根肝腎虧損此子午不交氣脫證也尤惟婦人血海常虧者最多此證宜以此飲濟之緩之敢云神劑凡診此脈必微細無神若微而兼緊尤為可畏償庸衆不知妄云痰逆氣滯用牛黃蘇合及青陳枳殼破氣等劑則速其危熟地七八錢或一兩當歸二三錢炙甘草一二三錢如兼嘔惡或惡寒者加煨姜三五片如氣虛脈微至極者急加人參隨宜如肝腎陰虛手足厥逆加肉桂一錢三才封髓丹拔萃降心火益腎水滋陰養血潤而不燥天冬熟地人參五兩黃柏酒炒三兩砂仁兩半甘草炙七錢半麵糊丸用蓯蓉五錢切片酒一大盞浸一宿次日煎湯送下天冬以補肺生水人參以補脾益氣熟地以補腎滋陰以藥有天地人之名而補亦在上中下之分使天地位育參贊居中故曰三才也喻嘉言曰加黃柏以入腎滋陰砂仁以入脾行滯甘草以少變天冬黃柏之苦俾合人參建立中氣以伸參兩之權殊非好為增益成方之比也除後三味等分煎名三才湯治脾肺虛勞咳嗽除前三味名鳳髓丹治要治心火旺盛腎精不固易於施泄當歸地黃飲治腎虛腰腳疼痛等證當歸二三錢熟地三五錢山藥杜仲二錢牛膝錢半山萸一錢炙甘草八分如下部虛寒加肉桂一二錢甚者加附子如多帶濁去牛膝加金櫻子二錢或補骨脂一錢如氣虛者加人參一二錢枸杞子二三錢人參固本丸治肺癆虛極肺主氣氣者人身之根本也肺氣既虛火又克之則成肺癆有咳嗽咯血肺痿諸證也人參二兩天冬麥冬生地熟地四兩蜜丸肺主氣而氣根于丹田故肺腎為子母之臟必水能制火而後火不刑金也二冬清肺熱二地益腎水人參大補元氣氣者水之母也且人參之用無所不宜以氣藥引之則補陽以血藥引之亦補陰也地黃醴治男婦精血不足營衛不充等證宜制此常用之大熟地八兩曬乾以去水氣枸杞四兩用肥極者烘燥以去潤氣沉香一錢或白檀三錢亦可上約每藥一斤可用高燒酒十斤浸之不必煮但浸十日之外即可用矣凡服此者不可過飲服完又加酒六七斤浸半月再用參乳丸大補氣血人參末人乳粉等分蜜丸頓乳取粉法取無病年少婦人乳用銀瓢或錫瓢傾乳少許浮滾水上頓再浮冷水上立干刮取粉用如攤粉皮法按人乳乃陰血所化服之潤燥降火益血補虛所謂以人補人也然能濕脾滑腸膩膈久服亦有不相宜者唯製為粉則有益無損須用一婦人之乳為佳乳雜則其氣雜又須旋用經久則油膻人參大補元氣人乳本血液化成用之以後交補氣血實平淡之神奇也歸腎丸治腎肝真陰不足精衰血少腰痠腳軟形容憔悴遺泄痿弱等證此左歸右歸二方之次者也熟地八兩菟絲子制杜仲枸杞子茯苓萸肉山藥四兩當歸三兩煉蜜同熟地搗為丸桐子大每服百餘丸飢時淡鹽湯送下天王補心丹終南宣律師課誦勞心夢天王授以此方故名治思慮過度心血不足怔忡健忘心口多汗大便或祕或溏口舌生瘡等證生地四兩柏子仁炒研去油當歸酒洗棗仁天冬去心麥冬去心五味一兩人參元參丹參桔梗茯苓一用茯神遠志肉五錢蜜丸彈子大硃砂為衣臨臥燈心湯下一丸或噙含化一方有石菖蒲四錢菖蒲辛香開心除痰無五味子一方有甘草生地入心腎滋陰而瀉火故以為君養陰所以配陽取即濟之義也丹參當歸所以生心血血生於氣人參茯苓所以益心氣人參合麥冬五味又為生脈散蓋心主脈肺為心之華蓋而朝百脈百脈皆朝於肺補肺生脈脈即血也所以使天氣下降也天氣下降地氣上騰萬物乃生天冬元參苦寒而瀉火與麥冬同為滋水潤燥之劑遠志棗仁柏仁所以養心神而棗仁五味酸以收之又以斂心氣之耗散也桔梗清肺利膈取其載藥上浮而歸於心故以為使硃砂色赤人心寒瀉熱而重寧神讀書之人有宜常服者今醫有謂此方可廢不如以都氣統之亦屬臆見爾贊化血餘丹此藥大補氣血故能烏鬚髮壯形體其於培元贊化之功有不能盡述者血餘熟地八兩何首烏小黑豆汁拌蒸七次如無豆或人乳牛乳拌蒸胡桃肉肉蓯蓉酒洗去鱗甲茯苓乳拌蒸熟小茴香略炒巴戟肉酒浸剝炒乾杜仲鹽水洗菟絲制鹿角膠炒珠當歸枸杞四兩人參隨宜用無亦可煉蜜丸每服三五錢食前白湯下精滑者加白朮山藥各三兩便溏者去蓯蓉加補骨脂酒炒四兩陽虛者加附子肉桂孔聖枕中丹千金治讀書善忘久服令人聰明讀書易忘者心血不足而痰與火亂其神明也敗龜板酥炙龍骨研末入雞腹煮一宿遠志九節菖蒲等分為末每服酒調一錢日三龜者介蟲之長陰物之至靈者也龍者鱗蟲之長陽物之至靈者也假二物之陰陽以補吾身之陰陽假二物之靈氣以助吾心之靈氣也又人之精與志皆藏於腎腎精不足則志氣衰不能上通於心故迷惑善忘也遠志苦泄熱而辛散郁能通腎氣上達於心強志益智菖蒲辛散肝而香舒脾能開心孔而利九竅去濕除痰菖蒲為水草之精英神仙之靈藥又龜能補腎元武龜蛇屬腎腎藏志龍能鎮肝青龍屬肝肝藏魂使痰火散而心肝寧則聰明開而記憶強矣養元粉景嶽大能實脾養胃氣糯米一升水浸一宿瀝乾慢火炒熟山藥芡實蓮肉三兩川椒去目及閉口者炒出汗取紅末三錢共為末每日飢時以滾水一碗入白糖三匙化開入藥一二兩調服之或加使君子查肉各一兩亦可大補陰丸丹溪治水虧火炎耳鳴耳聾咳逆虛熱耳為腎竅耳鳴耳聾皆屬腎虛水不制火則為咳逆虛熱腎脈洪大不能受峻補者黃柏鹽酒炒知母鹽水炒四兩熟地敗龜板酥炙六兩豬脊髓和蜜丸鹽湯下四者皆滋陰補腎之藥補水所以降火所謂壯水之主以制陽光也加脊髓者取其能通腎命以骨入骨以髓補髓也人身腎命繫於脊骨斑龍丸治虛損理百病駐顏益壽鹿角膠鹿角霜菟絲子柏子仁熟地黃等分為末酒化膠為丸一方加補骨脂一方加鹿茸肉蓯蓉陽起石附子黃耆當歸棗仁辰砂亦名斑龍丸鹿角膠霜菟絲熟地皆腎經血分藥也大補精髓柏子仁入心而養心氣又能入腎而潤腎燥使心腎相交心志旺而神魂安精髓充而筋骨壯去病益壽不亦宜乎鹿一名斑龍睡時以首向尾善通督脈是以多壽頭為六陽之會茸角盅於鹿首豈尋常含血之屬所可擬哉成都道士常貨斑龍丸歌曰尾閭不禁滄海竭九轉靈丹都謾說唯有斑龍頂上珠能補玉堂關下穴元武豆補腎之功甚大羊腰子五十個甘枸杞二斤補骨脂一斤大茴香小茴香六兩肉蓯蓉十二兩大便滑者去之青鹽八兩如無蓯蓉此宜十二兩大黑豆圓淨者一斗淘洗上用甜水二斗以砂鍋煮前藥七味至半乾去藥渣入黑豆勻火煮乾為度如有餘汁俱宜拌滲於內取出用新布攤涼曬乾瓷瓶收貯日服之若陽虛者加附子一二兩更妙龜鹿二仙膏治瘦弱少氣夢遺泄精目視不明精極之證五勞之外又有六極謂氣極血極精極筋極骨極肌極也精生氣氣生神精極則無以生氣故瘦弱少氣氣弱則不能生神故目眊不明精氣不固水不能制火故遺泄而精愈耗也鹿角十斤龜板五斤枸杞一斤人參一斤先將鹿角龜板鋸截刮淨水浸桑火熬成膠再將人參枸杞熬膏和入每晨酒服三錢龜為介蟲之長得陰氣最全介蟲陰類鹿角遇夏至即解稟純陽之性陰生即解且不兩月長至一二十斤骨之速生無過於此者人身唯骨難長故能峻補氣血兩者皆用氣血以補氣血所謂補之以其類也人參大補元氣枸杞滋陰助陽此氣血陰陽交補之劑氣足則精固不遺血足則視聽明瞭久服可以益壽豈特已疾而已哉李時珍曰龜鹿皆靈而壽龜首常藏向腹能通任脈故取其甲以補心補腎補血以養陰也鹿首常返向尾能通督脈故取其角以補命補精補氣以養陽也二至丸補腰膝壯筋骨強腎陰烏鬚髮價廉而功大冬青子即女貞實冬至日採不拘多少陰乾蜜酒拌蒸過一夜粗袋擦去皮曬乾為末瓦瓶收貯或先熬旱蓮膏旋配用旱蓮草夏至日採不拘多少搗汁熬膏和前藥為丸臨臥酒服一方加桑椹干為丸或桑椹熬膏和入女貞甘平少陰之精隆冬不凋其色青黑益肝補腎時珍曰女貞上品妙藥古方罕用何哉旱蓮甘寒汁黑入腎補精故能益下而榮上強陰而黑髮也蟠桃果治遺精虛弱補脾滋腎最佳芡實蓮肉去心膠棗肉胡桃肉去衣熟地等分以豬腎六個摻大茴香蒸極熟同前藥末搗成餅每日服一個空心食前用滾白湯或好酒一二盅送下此方凡人參附子俱可隨意加用扶桑丸胡僧除風濕起羸尪駐容顏烏鬚髮卻病延年嫩桑葉去蒂洗淨曝乾一斤為末巨勝子即黑芝麻淘淨四兩白蜜一斤將芝麻擂碎熬濃汁和蜜煉至滴水成珠入桑葉末為丸一方桑葉為末芝麻蒸搗等分蜜丸早鹽湯晚酒下桑乃箕星之精其木利關節養津液其葉甘寒入手足陽明涼血燥濕而除風巨勝甘平色黑益腎補肝潤臟腹填精髓陶隱居曰八殼之中唯此為良夫風濕去則筋骨強精髓充則容顏澤卻病烏髭不亦宜乎歌曰扶桑扶桑高入云海東日出氣氤氳滄海變田幾億載此樹遺根今尚存結子如丹忽如黍緑葉英英翠可捫真人採竊天地氣留與紅霞共吐吞濯磨入鼎即靈藥芝術區區未可群餐松已有神仙去我今朝夕從此君葉兮葉兮願玉汝緑陰裡面有桃津羊肉湯韓只和治傷寒汗下太多亡陽失血惡人蜷臥時戰如瘧及産脫血虛韓祗和曰若止救逆效必遲矣與羊肉湯為效甚速病人色雖見陽是熱客上焦中下二焦陰氣已盛若調得下焦有陽則上焦陽氣下降丹田知所歸宿矣當歸白芍牡蠣煅一兩龍骨煅五錢附子炮生薑二兩桂枝七錢半每服一兩羊肉四兩加蔥白煮服當歸芍藥以補其陰附子薑桂以復其陽龍骨牡蠣以收其脫羊肉大補以生其氣血益氣聰明湯東垣治內障目昏耳鳴耳聾五臟皆稟氣於脾胃以達於九竅煩勞傷中使沖和之氣不能上升故目昏而耳聾也李東垣曰醫不理脾胃及養血安神治標不治本是不明理也黃耆人參五錢葛根蔓荊子三錢白芍藥黃柏二錢倍之如有熱煩亂春月漸加夏倍之如脾虛去之熱減少用升麻錢半炙甘草一錢每四錢臨臥服五更再服十二經脈清陽之氣皆上於頭面而走空竅因飲食勞役脾胃受傷心火太盛則百脈沸騰邪害空竅矣參苠甘溫以補脾胃甘草甘緩以和脾胃乾葛升麻蔓荊輕揚升發能入陽明鼓舞胃氣上行頭目中氣即足清陽上升則九竅通利耳聰而目明矣白芍斂陰和血黃蘗補腎生水蓋目為肝竅耳為腎竅故又用二者平肝補腎也秦艽鱉甲散謙甫治風勞骨蒸午後壯熱咳嗽肌瘦頰赤盜汗脈來細數風陽邪也在表則表熱在裡則裡熱附骨則骨蒸午後甚者陰虛也風火相搏則咳嗽蒸久血枯則肌瘦虛火上炎則頰赤睡而汗出曰盜汗陰虛也脈細為虛脈數為熱鱉甲炙柴胡地骨皮一兩秦艽知母當歸五錢烏梅一個青篙五葉汗多重加黃耆風生熱而熱生風非柴胡秦艽不能驅之使出鱉陰類用甲者骨以及骨之義烏梅酸澀能引諸藥入骨而斂熱青篙苦寒能從諸藥入肌而解蒸柴胡青蒿皆感少陽生髮之氣凡苦寒之藥多傷脾胃惟青蒿芬芳入脾獨宜於血虛有熱之人知母滋陰當歸和血地骨散表邪兼清裡熱又去汗除蒸之上品也地骨退有汗之骨蒸黃耆鱉甲散謙甫治男女虛勞客熱五心煩熱四肢怠惰咳嗽咽乾自汗食少或日哺發熱五心心窩手心足心也脾主四肢五心煩熱是心火陷於脾土之中宜升發火鬱四肢怠惰脾虛也咳嗽肺火也咽乾腎水不足相火上炎也自汗陽虛也食少脾胃弱也日西潮熱肺虛也黃耆蜜炙鱉甲炙天冬五錢柴胡秦艽地骨皮茯苓三錢桑白皮紫菀半夏芍藥生地黃甘草炙知母三錢半人參桔梗肉桂錢半每一兩加姜煎衛生減桂芍地骨名人參黃耆散治同鱉甲天冬芍地知母滋腎水而瀉肺肝之火以養陰地黃知母滋腎水天冬瀉肺火鱉甲芍藥瀉肝火黃耆人參桂苓甘草固衛氣而補脾肺之虛以助陽桑皮桔梗以瀉肺熱半夏紫菀以理痰嗽紫菀潤肺止嗽半夏化痰利咽故金匱治喉痹咽痛皆用半夏蓋辛能散亦能潤也秦艽地骨以散內熱而除蒸柴胡以解肌熱而升陽此表裡氣血交治之劑也秦艽扶羸湯直指治肺痿骨蒸或寒或熱成勞咳嗽聲嗄不出體虛自汗四肢倦怠肺痿有火熱傷肺而得之者有肺氣虛寒而得之者骨蒸骨里蒸蒸然熱陰虛也咳嗽陰火乘肺也或寒或熱陰陽不和也聲嗄火鬱在肺也自汗倦怠心脾虛而衛氣不充也柴胡二錢秦艽人參當歸鱉甲炙地骨皮錢半甘草炙紫菀半夏一錢加薑棗煎此即前方加當歸去黃耆茯苓生地芍藥天冬知母桑皮桔梗肉桂柴胡秦艽散表邪兼清裡熱柴胡解肌熱秦艽退骨蒸鱉甲地骨滋血而退骨蒸地骨皮涼血退有汗骨蒸參草補氣當歸和血紫菀理痰嗽潤肺除痰半夏發聲音表裡交治氣血兼調為扶羸良劑百合固金湯趙蕺庵治肺傷咽痛喘咳痰血肺金受傷則腎水之源絶腎脈挾咽虛火上炎故咽痛火上熏肺故喘咳痰因火生血因火逼熟地三錢生地二錢麥冬錢半百合芍藥炒生甘草當歸貝母一錢元參桔梗八分金不生水火炎水乾故以二地助腎滋水退熱為君百合保肺安神麥冬清熱潤燥元參利咽喉而降火貝母散肺鬱而除痰歸芍養血兼以平肝肝火盛則剋金桔梗清金功成上部載諸藥而上浮皆以甘寒培元清本不欲以苦寒傷生髮之氣也李士材曰蕺庵此方殊有卓見然土為金母清金之後急宜顧母否則金終不能足也醫貫曰咳嗽吐血未必成瘵也服四物知柏之類不已則瘵成矣胸滿膨脹悒悒不快未必成脹也服山楂神麯之類不止則脹成矣面目浮腫小便祕澀未必成水也服滲利之藥不止則水成矣氣滯膈塞未必成噎也服青皮枳殼寬快之藥不止則噎成矣補肺湯治肺虛咳嗽桑皮蜜炙熟地二錢人參黃耆蜜炙五味紫菀一錢入蜜少許和服肺虛而用參耆者脾為肺母氣為水母也虛則補其母用熟地者腎為肺子子虛必盜母氣以自養故用腎藥先滋其水且熟地亦化痰之妙品也丹溪曰補水以制相火其痰自除咳則氣傷五味酸溫能咳肺氣咳由火盛桑皮甘寒能瀉肺火紫菀辛能潤肺溫能補虛合之而名曰補肺蓋金旺水生咳嗽自止矣此治肺虛咳嗽若實火嗽者禁用劉宗厚曰因勞而嗽則非嗽為本也故此湯與金匱腎氣丸為少陰例藥仁齊直指曰肺出氣也腎納氣也肺為氣主腎為氣本凡咳嗽暴重自覺氣從臍下逆上者此腎虛不能收氣歸元當用地黃丸安腎丸毋徒從事於肺此虛則補子之義也醫貫曰五行唯肺腎二臟母病而子受邪何則肺主氣肺有熱氣得熱而上蒸不能下生於腎而腎受傷矣腎傷則肺益病蓋母藏子宮子隱母胎凡人肺金之氣夜臥則歸藏於腎水之中因肺受心火之邪欲下遁水中而腎水乾枯有火無可容之地由是復上而為病矣補肺阿膠散錢乙治肺虛有火嗽無津液而氣哽者火盛則津枯津枯則氣哽阿膠蛤粉炒兩半兜鈴焙甘草炙牛蒡子炒香一兩杏仁去皮尖七錢糯米一兩馬兜鈴清熱降火兜鈴象肺故入肺牛蒡子利隔滑痰潤肺解熱故治火嗽杏仁潤燥散風阿膠清肺滋腎益血補陰氣順則不哽液補則津生阿膠補血液火退而嗽寧矣土為金母故加甘草糯米以益脾胃時珍曰補肺阿膠散用馬兜鈴非取其補肺取其清熱降氣而肺自安也其中阿膠糯米乃補肺之正藥紫菀湯海藏治肺傷氣極勞熱久嗽吐痰吐血氣極六極之一也肺主氣元氣虛則陰火盛壯火食氣故成氣極火炎肺系故久嗽不已甚則逼血上行也及肺痿變癰紫菀洗淨炒阿膠蛤粉炒成珠知母貝母一錢桔梗人參茯苓甘草五分五味十二粒勞而久嗽肺虛可知即有熱證皆虛火也海藏以保肺為君故用紫菀阿膠二藥潤肺補虛消痰止嗽以清火為臣故用知母貝母二藥辛寒潤燥消痰以參苓為佐者扶土所以生金以甘桔為使者載藥上行脾肺桔梗載諸藥上行而能清肺甘草輔人參補脾五味滋腎家不足之水收肺家耗散之金久嗽者所必收也王母桃景嶽培補脾腎功力最勝白朮味甘者佳苦者勿用米泔浸一宿切片炒大懷熟蒸搗二味等分何首烏九蒸巴戟甘草湯浸剝炒枸杞三味減半上為末煉蜜丸龍眼大每服三四丸飢時嚼服滾湯送下或加人參其功尤大玉屏風散治自汗不止氣虛表弱易感風寒陽也者衛外而為固也陽虛則不能衛外故津液不固而易泄且畏風也此與傷風自汗不同彼責之邪實此責之表虛故補瀉各異黃耆炙防風一兩白朮炒二兩為末每服三錢黃耆補氣專固肌表故以為君白朮益脾脾主肌肉故以為臣防風去風為風藥卒徒而黃耆畏之故以為使以其益衛固表故曰玉屏風李東垣曰黃耆得防風而功益大取其相畏而相使也準繩曰卒中偏枯之證未有不因真氣不周而病者故黃耆為必用之君藥防風為必用之臣藥黃耆助真氣者也防風載黃耆助真氣以周於身者也亦有治風之功焉許胤宗治王太后中風口噤煎二藥熏之而愈況服之乎前藥等分煎名黃耆湯潔古用代桂枝湯治春夏發熱有汗脈微弱惡風寒者惡風甚加桂枝又用川芎蒼朮羌活等分名川芎湯以代麻黃湯治秋冬發熱無汗惡風寒者惡寒甚加麻黃妙香散王荊公治夢遺失精驚悸鬱結腎主藏精心主藏神邪火妄行心腎不交上實下虛則夢中遺失心虛神擾故多驚悸憂思氣滯則成鬱結山藥薑汁炒二兩人參黃耆遠志炒茯苓茯神一兩桔梗三錢木香二錢半辰砂另研甘草二錢麝香一錢為末每服二錢酒下心君火也君火一動相火隨之相火寄於肝膽腎之陰虛則精不固肝之陽強則氣不固陽即邪火也故精脫而成夢矣山藥益陰清熱兼能澀精故以為君人參黃耆所以固其氣遠志二茯所以寧其神神寧氣固則精自守其位矣且二茯下行利水又以泄腎中之邪火也桔梗清肺散滯木香疏肝和脾行氣故疏肝肝疏則木不剋土而脾和丹砂鎮心安魂麝香通竅解鬱二藥又能辟邪亦所以治其邪感也加甘草者用以交和乎中猶黃婆之媒嬰奼也黃婆脾也嬰兒奼女心腎也是方不用固澀之劑但安神正氣使精與神氣相依而自固矣以其安神利氣故亦治驚悸鬱結樓全善曰夢遺屬鬱滯者居大半庸醫不知其鬱但用澀劑固脫愈澀愈郁其病反甚矣參茯白朮散治脾胃虛弱飲食不消或吐或瀉土為萬物之母脾土受傷則失其健運之職故飲食不消兼寒則嘔吐兼濕則濡泄也飲食既少衆臟無以稟氣則虛羸日甚諸病叢生矣人參白朮土炒茯苓甘草炙山藥扁豆薏仁蓮肉去心陳皮砂仁桔梗為末每三錢棗湯或米飲調服治脾胃者補其虛除其濕行其滯調其氣而已參朮苓草山藥薏仁扁豆蓮肉皆補脾之藥也然茯苓山藥薏仁理脾而兼能滲濕砂仁陳皮調氣行滯之品也合參朮苓草暖胃而又能補中陳皮砂仁入補藥而宣滯桔梗苦甘入肺能載諸藥上浮又能通天氣於地道肺和則天氣下降使氣得升降而益和且以保肺防燥藥之偕上也休瘧飲此止瘧最妙之方也若汗散既多元氣不復或以衰老或以弱質而瘧有不能止者俱宜用此化暴善後之第一方也人參白朮炒當歸各三四錢何首烏制五錢炙甘草八分用陰陽水各一盞煎七分露一宿次早溫服如陽虛多寒宜溫中散寒者加乾薑肉桂之類甚者或加製附子如陰虛多熱煩渴喜冷宜滋陰清火者加麥冬生地芍藥甚者加知母或加黃芩如腎陰不足水不制火虛煩虛餒腰痠腳軟者加熟地山藥杜仲之類如邪有未盡而留連難愈者於此方加柴胡麻黃細辛紫蘇之屬自無不可如氣血多滯者或加酒水各一盞煎服藥後飲酒數杯亦可去白朮甘草加生薑陳皮名何人飲治同卷二下澀固門赤石脂禹餘糧湯仲景治傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止以上言再治之誤醫以理中與之利益甚言愈誤也理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便難經曰中焦中脘主腐熟水穀下焦者當膀胱上口主分別清濁主出而不內以傳道也靈樞曰水穀者常並居於胃中成糟粕而俱下於大小腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉然則利在下焦者膀胱不滲而下焦滑脫也餘糧甘平消痞硬而鎮臟腑石脂甘溫固陽虛而收滑脫乃利仍不止者膀胱不滲而水穀不分也利小便者導其水而分消之使腑司各行其所有事也赤石脂一斤碎禹餘糧一斤碎水六升煮二升去渣分三服澀可去脫重可達下二物澀以止脫重以固下甘以益氣李先知云下焦有病人難會須用餘糧赤石脂桃花湯仲景治少陰病二三日至四五日腹痛小便不利下利不止便膿血者喻嘉言曰腹痛小便不利少陰熱邪也而下利不止便膿血則下焦滑脫矣滑脫即不可用寒藥故取乾薑石脂之辛澀以溫經固脫而加粳米之甘以益中州蓋治下利必先中氣不下墜則滑脫無源而自止也赤石脂一斤一半全用一半篩末乾薑一兩粳米一升水七升煮米熟去渣納石脂末方寸匕日三服若一服愈余勿服此少陰傳經熱邪也陰經循行於里故腹痛下利仲景反用石脂乾薑之溫澀何意蓋下利至於不止熱勢已大衰而虛寒滋起矣傷寒便膿血皆是傳經熱邪成無己釋為裡寒誤矣王肯堂吳鶴皋非之是也程郊倩以為火衰不能生土毋乃迂乎汪訒庵未經臨證所見每隔一層其是成程而非王吳無足怪也故非固脫如石脂不可且石性最沉味澀易滯故稍用乾薑之辛散佐之用粳米獨多者取其和中而養胃也石脂用半全半末以全用則氣味不出純末又難於下咽所以斟酌其當而為之者也訶子散東垣治虛寒泄瀉水穀不化腸鳴腹痛脫肛及便膿血日夜無度御米殼去蒂蜜炒五分訶子煨去核七分乾薑炮六分橘紅五分上末空心服御米殼酸澀微寒固腎澀腸訶子酸澀苦溫收脫住瀉炮姜辛熱能逐冷補陽陳皮辛溫能升陽調氣共以固氣脫亦可收形脫也泄瀉為氣脫脫肛為形脫河間訶子散訶子一兩半生半煨木香五錢甘草二錢黃連三錢為末每服三錢用白朮芍藥湯調下治瀉久腹痛漸已瀉下漸少以此止之如下不止加厚朴一兩竭其餘邪唯積滯未清者宜之鞏堤丸治膀胱不藏水泉不止命門水衰小水不禁等證熟地菟絲酒製白朮炒二兩韭子炒破故紙酒炒益智仁酒炒北五味熟附子茯苓一兩為末山藥糊丸桐子大每服百餘丸空心滾湯或酒下如氣虛加人參一二兩更妙真人養臟湯謙甫治瀉痢日久赤白已盡虛寒脫肛肛門為大腸之使大腸受熱受寒皆能脫肛大腸者傳導之官腎者作強之官酒色過度則腎虛而泄母氣肺因以虛大腸氣無所主故脫肛小兒血氣未壯老人血氣已衰皆易脫肛亦治下痢赤白臍腹疼痛日夜無度罌粟殼去蒂蜜炙三兩六錢訶子面里煨一兩二錢肉豆蔻面里煨五錢木香二兩四錢肉桂八錢人參白朮炒當歸六錢白芍炒一兩六錢生甘草一兩八錢每服四錢臟寒加附子一方無當歸脫肛由於虛寒故用參朮甘草以補其虛肉桂肉蔻以祛其寒木香溫以調氣當歸潤以和血芍藥酸以收斂訶子罌殼則澀以止脫也此虛寒脫肛故宜大補氣血或加川芎以調血及升柴以升提之又有氣熱血熱而肛反挺出者宜用芩連槐柏或四物加升柴艽防之類丹溪脫肛方人參黃耆當歸川芎升麻此治氣血兩虛而脫肛者牡蠣散治陽虛自汗醒而汗出曰自汗屬陽虛者居多牡蠣煅研黃耆麻黃根一錢浮小麥百粒煎服陳來章曰汗為心之液心煩熱則汗不止牡蠣浮小麥之咸涼去煩熱而止汗陽為陰之衛陽氣虛則衛不固黃耆麻黃根之甘溫走肌表而固衛柏子仁丸治陰虛盜汗睡而汗出曰盜汗屬陰虛者居多柏子仁炒研去油三兩人參白朮半夏五味子牡蠣麻黃根一兩麥麩五錢棗肉丸米飲下五十丸日三服陳來章曰心血虛則睡而汗出柏子仁之甘辛平養心寧神為君牡蠣麥麩之咸涼靜躁收脫為臣五味酸斂收澀半夏和胃燥濕為佐濕能作汗麻黃根專走肌表引人參白朮以固衛氣為使固真丸治夢遺精滑菟絲子一斤淘洗淨用好酒浸三日煮極熟搗膏曬乾或用淨白布包蒸亦佳牡蠣煅金櫻子蒸熟茯苓酒拌蒸曬四兩蜜丸空心好酒送下三錢或鹽湯亦可金鎖固精丸治精滑不禁精滑者火炎上而水趨下心腎不交也沙苑蒺藜芡實蒸蓮鬚二兩龍骨酥炙牡蠣鹽水煮一日夜煅粉一兩蓮肉粉為糊丸鹽湯下蒺藜補腎益精蓮子交通心腎牡蠣清熱補水芡實固腎補脾合之蓮鬚龍骨皆澀精祕氣之品以止滑脫也治遺精大法有五心神浮越者辰砂磁石龍骨之類鎮之痰飲擾心者豬苓丸之類導之思想傷陰者潔古珍珠粉丸黃柏蛤粉等分滋陰降火思想傷陽者謙甫鹿茸蓯蓉菟絲等補陽陰陽俱虛者丹溪作心虛治用珍珠粉丸定志丸補之附本事豬苓丸豬苓末二兩先將一半炒半夏令黃取半夏為末糊丸更用豬苓末一半同炒微裂砂瓶養之申未間空心酒鹽湯任下釋曰半夏有利性豬苓導水蓋腎閉導氣使通之意也定志丸見眼目門苓朮菟絲丸治脾腎虛損不能收攝以致夢遺精滑困倦等證菟絲子酒蒸或五六兩或七八兩蓮肉去心白朮茯苓四兩杜仲酒炒三兩山藥二兩五味酒蒸一兩炙草五錢上用山藥末以陳酒煮糊為丸桐子大空心白滾湯或酒下百餘丸如氣虛不能收攝者加人參三四兩尤妙治濁固本丸治胃中濕熱滲入膀胱下濁不止淋病在溺竅屬肝膽部濁病在精竅屬腎膀胱部或由濕熱或由虛寒大抵熱者多而寒者少赤屬血白屬氣或由敗精瘀血壅塞竅道痛澀異常非是熱淋不宜用淋藥治甘草炙三兩豬苓黃蓮蓮鬚二兩黃柏益智仁砂仁半夏薑製茯苓一兩精濁多由濕熱與痰黃蓮瀉心火黃柏瀉腎火所以清熱二苓所以利濕半夏所以除痰濕熱多由於鬱滯砂仁益智辛溫利氣又能固腎強脾既以散留滯之氣且稍濟連柏之寒甘草和中而補土唯蓮鬚之澀則所以固基脫也祕元煎治遺精帶濁等證此方專主心脾金櫻子去核棗仁炒研芡實炒山藥炒二錢白朮炒茯神錢半人參一二錢炙甘草二錢遠志八分炒五味子十粒水煎食遠服此治久遺無火不痛而滑者可用之如尚覺有火熱者加苦參一二錢如氣大虛者加黃耆一二錢固陰煎治陰虛滑泄帶濁淋遺及經水因虛不固等證此方專主肝腎熟地三五錢菟絲子炒二三錢山藥炒二錢萸肉一錢甘草炙一二錢遠志炒七分五味子十四粒人參隨宜水煎食遠服如虛滑遺甚者加金櫻二三錢或醋炒文蛤一錢或烏梅二個如陰虛微熱而經血不止者加川續斷二錢如下焦陽氣不足而兼腹痛泄溏者加補骨脂吳茱萸之類隨宜用之如肝腎血虛而小腹痛血不歸經者加醋炒歸當二三錢如脾虛多濕或兼嘔惡者加白朮一二錢如氣陷不固者加炒升麻一錢如兼心虛不眠或多汗者加棗仁二錢炒用茯菟丹局方治遺精白濁及強中消渴菟絲子十兩五味子八兩山藥六兩白茯苓石蓮肉三兩將菟絲用酒浸浸過余酒煮山藥糊丸漏精鹽湯下赤濁燈心湯下白濁茯苓湯下消渴米飲下菟絲辛甘和平強陰益陽能治精寒淋渴五味滋腎生津石蓮清心止濁山藥健脾利濕皆澀精固氣之品也茯苓能通心氣於腎利小便而不走氣取其淡滲於補正中能泄腎邪也菟絲煎治心脾氣弱凡遇思慮勞倦即苦遺精者宜此主之山藥炒二錢棗仁炒茯苓一錢三分當歸錢半人參二三錢制菟絲子炒四五錢炙甘草一錢或五分遠志肉制四分鹿角霜為末每用加入四五匙水煎加鹿角霜末食前調服或加白朮二三錢水陸二仙丹治遺精白濁精與濁所出之竅不同便濁即是膏淋肝膽之火也精濁乃精氣滑出不便亦然此腎水不足淫火熏蒸故精離其位也金櫻膏取半黃者熬膏一斤熟則全甘而失澀味芡實一斤蒸熟為粉和丸鹽酒下金櫻芡實甘能益精潤能滋陰澀能止脫一生於水一生於山故名水陸二仙丹黏米固腸糕治脾胃虛寒或因食滯氣滯腹痛泄瀉久不止者多服自效白糯米滾湯淘洗炒香熟為粉每粉一兩加乾薑炒熟者二分半白糖二錢拌勻於飢時用滾水調服一二兩如帶微滯者加陳皮末二分或砂仁一分一法用陳老米粉亦妙桑螵蛸散寇氏治小便數而缺數便頻也缺便短也溺雖出於膀胱然泌別者小腸也小腸虛則便數小腸熱則便短能安神魂補心氣療健忘人參茯苓一用茯神遠志石菖蒲鹽炒桑螵蛸鹽水炒龍骨煅龜板酥炙一用鱉甲醋炙當歸等分為末臨臥服二錢人參湯下虛則便數故以螵蛸龍骨固之並能補腎澀精熱則便缺故以當歸龜板滋之人參補心氣菖蒲開心竅茯苓能通心氣於腎遠志能通腎氣於心並能清心解熱心者小腸之合也心補則小腸不虛心清則小腸不熱矣惜紅煎治婦人經血不固崩漏不止及腸風下血等證白朮山藥二錢白芍藥酒炒一錢五分荊芥穗炒地榆川續斷炒一錢炙甘草一錢北五味十四粒烏梅二個水煎食遠服如火盛者加黃芩黃連如脾虛兼脾泄者加破故紙人參人參樗皮散治臟毒挾熱下血久痢膿血不止挾熱者謂挾客熱及飲酒煎炒熏炙之熱也久痢不止氣虛滑脫也人參樗根白皮東引者去粗皮醋炙等分為末米飲或酒調下人參之甘以補其氣樗皮之苦以燥其濕寒以解其熱澀以收其脫使虛者補而陷者升亦劫劑也初起勿用玉關丸治腸風血脫崩漏不止帶濁不固諸藥難效者宜用此方兼煎藥治之及瀉痢滑泄不能止者白麵炒熟四兩枯礬文蛤醋炒黑二兩北五味一兩訶子二兩半生半熟共為末熟湯和丸桐子大以溫補脾腎等藥隨證加減煎湯送下或人參湯亦可如血熱妄行者以涼藥送下撲汗法白朮蒿本川芎各二錢半米粉兩半為末絹袋盛周身撲之治汗出不止又方龍骨牡蠣糯米等分為末撲之卷三上表散門桂枝湯仲景治太陽中風陽浮而陰弱發熱頭痛自汗惡風惡寒鼻鳴乾嘔及陽明病脈遲汗出多微惡寒者表未解也可發汗脈遲汗多屬陽明證以微惡寒尚兼太陽仍當從外解肌斷其入胃腑之路桂枝芍藥生薑三兩甘草二兩炙大棗十二枚熱服須臾啜稀熱粥以助藥力溫覆取微似汗不可令如水淋漓汗出病瘥停後服服一劑盡病證猶在者更作服喻嘉言曰妙用全在啜稀熱粥以助藥力殼氣內充則邪不能入面熱啜以繼藥之後則邪不能留法中之法若此世傳方書無此四字駸失初意更有已透微似之汗蓋覆強逼致令大汗淋漓者總不知解肌為何義爾所以服桂枝時要使周身縶縶然似乎有汗者無非欲其皮毛間竅暫開而邪散也然恐藥力易過又借熱粥以助其暖如此一時之久肌竅不致速閉則外受之邪盡從外解允為合法矣不識此意汗時不失之太過即失之不及太過則邪未入而先擾其營甚則汗不止而亡陽不及則邪欲出而早閉其門必至病不除而生變矣周揚俊曰風既傷衛則衛氣疏不能內護於營而汗自出矣汗者血之液也桂枝血分藥也苟非以血藥入透營分和營散邪芍藥護營固里則不但外邪不出且必內入而為腑患然後知和營則外邪出邪出則衛自密更不必用固表之藥而汗自止矣加白朮川芎羌活防風飴糖名疏邪實表湯節庵治同去芍藥薑棗名桂枝甘草湯仲景治發汗過多叉手冒心心下悸欲得按者加附子名桂枝加附子湯景仲治太陽病發汗逐漏不止惡風小便難四肢微急難以屈伸方中行已此亦太陽中風誤汗之變證夫固表斂汗無出桂枝有矣而欲復陽益氣所以有附子之加焉惡風為陽虛小便難為膀胱腑傷拘急難以屈伸因無津液以養此本桂枝證也誤用麻黃勢必至大汗而亡陽人身津液有幾堪漏而無已耶故以附子入桂枝湯中為固表回陽上劑去芍藥加附子名桂枝附子湯仲景治傷寒八九日風濕相搏身體煩疼不能轉側不嘔不渴脈浮虛而澀再加芍藥生薑各一兩人參三兩名桂枝新加湯仲景治傷寒汗後身痛脈來沉遲喻嘉言曰傷寒誤發汗後身反疼痛者乃陽氣暴虛邪不能盡出所致況脈見沉遲更無疑矣若尺遲乃素虛此則六部皆然為發汗新虛故於桂枝方中加芍姜以去邪人參以輔正仲景意中明明桂枝湯不欲與參並用以桂枝能解肌表之邪人參反固肌表之邪然在誤汗後正氣虛微餘邪不解有不得不並用之勢人參尚主半表故曰新加加芍藥者以誤汗而陽虛邪湊恐陽孤無偶和以芍藥俾不至散亂也加芍藥一倍名桂枝加芍藥湯仲景治太陽誤下腹滿時痛屬太陰也喻嘉言曰太陽病之誤下其變皆在胸脅以上此而腹滿時痛則其邪已入陰位所以屬太陰也仍用桂枝解肌之法以升舉陽邪但倍芍藥以收太陰之逆氣本方不增一味斯為神爾去桂加茯苓白朮名桂枝去桂加茯苓白朮湯仲景治服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利喻嘉言曰服桂枝湯治風而遺其寒所以不解而證變設更下之則邪勢乘虛入里益誤矣在表之風寒未除而在裡之水飲上逆故變五苓兩解表裡之法而用茯苓白朮為主治去桂枝者以已誤不可復用也然桂枝雖不可用其部下諸屬皆所必需倘並不用芍藥以收陰甘草薑棗以益虛而和脾胃何以定誤汗誤下之變耶故更一主將而一軍用命甚矣仲景立方之神也加厚朴杏仁名桂枝加厚朴杏仁湯仲景治太陽病下之微喘表未解也微喘邪猶在中上略為上逆故但疏利其氣而已均入桂枝湯者以表均未解也厚朴杏仁為下氣散結之聖藥蓋誤下則引邪入里即入不復外出利其下行散其熱結而喘自止矣然即非誤下而喘亦宜用此湯故仲景原文復申言此湯也去芍藥生薑加茯苓名茯苓桂枝甘草大棗湯甘瀾水煎仲景治汗後臍下悸欲作奔豚喻嘉言曰汗本心之液發汗後臍下悸者心氣虛而腎氣發動腎邪欲上凌心故臍下先悸取用茯苓桂枝直趨腎界預伐其邪所謂上兵伐謀也合麻黃湯名桂麻各半湯仲景仲景曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少不嘔渴清便一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更吐下也面色反有熱色者未欲解也以其不能得小汗出身必養宜桂枝麻黃各半湯二分合麻黃湯一分名桂枝二麻黃一湯仲景治服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解喻嘉言曰此亦風多寒少之證服桂枝湯治風而遺其寒汗反大出脈反洪大似乎風邪再襲故重以桂枝湯探之若果風邪之故立解矣若形如瘧日再發則邪本欲散又且淺而易散其所以不散者終為微寒所持故略兼治寒而汗出必解也二分合越婢一分名桂枝二越婢一湯仲景治太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可復發其汗喻嘉言曰此亦風多寒少之證無陽二字仲景言之不一乃亡津液之通稱也故以不可更汗為戒然非汗則風寒終不解惟取桂枝之二以治風越婢之一以治寒乃為合法越婢者石膏之辛涼也胃得之乃熱化津生以此兼解其寒也倍芍藥加黃耆名桂枝加黃耆湯金匱仲景云黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身當暮盜汗出者此營氣也若汗出已反發熱者久久身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之除甘草加黃耆三兩名桂枝五味湯金匱仲景曰血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之徐忠可曰陰陽寸口人迎也總是大概皆澀微此獨去澀字以微脈為主爾尺中小緊謂細尋之有小緊者此病邪直入之形正如明堂篇測病法所謂下鋭下向也然此由全體風濕血相搏痹其陽氣使之不仁故以桂枝壯氣行陽芍藥和陰薑棗以和上焦營衛協力驅風則病原拔而所入微邪亦為強弩之末矣立法之意重在引陽故嫌甘草之緩不若黃耆之強有力爾加栝蔞根名栝蔞桂枝湯金匱仲景曰太陽病其證備身體強兒兒然脈反沉遲此為痙栝蔞桂枝湯主之加龍骨牡蠣名桂枝加龍骨牡蠣湯金匱治男子失精女子夢交徐忠可曰陰虛之人大概當助腎故以桂枝芍藥通陽固陰甘草薑棗和中上焦之營衛使陽能生陰而以安腎寧心之龍骨牡蠣為補陰之主麻黃湯仲景治傷寒太陽證邪氣在表發熱頭痛身痛腰痛骨節痛項背強惡寒惡風但有一毫頭痛惡寒尚為在表無汗而喘脈浮而緊亦治太陽陽明合病喘而胸滿表邪壅盛陽氣不得宜發故逆而作喘若心下滿腹痛為實宜下之此胸中滿胸中去表猶近非裡實雖有陽明然與太陽合病尚為在表宜汗不宜下經曰陽明病脈浮無汗而喘者發汗則愈宜麻黃湯又曰陽明病應發汗反下之此為大逆或問兩經合病當用兩經之藥何以偏用麻黃湯耶蓋邪自太陽而來仍當提出太陽不欲其陷入陽明故不用葛根也亦治哮證哮喘由風寒客於背俞且肺內有膠固之痰復感寒而作此湯散寒利肺然唯氣實者可暫用麻黃去節三兩桂枝二兩杏仁七十枚去皮尖甘草炙一兩先煮麻黃數沸去沫內諸藥煎熱服覆蓋取微汗中病即止不必盡劑無汗再服凡用麻黃去節醋湯略泡曬乾備用庶免大發冬月生用傷寒初感始於太陽故以發汗為先汗出則愈活人云凡發汗病證仍在者三日內可二三汗之令腰以下周偏為度王海藏曰表證當汗脈浮急汗之脈沉緩汗之里證當下脈浮緩下之脈沉急下之三陽汗當急而下當緩三陰汗當緩而下當急按汗有大汗解表微汗解肌之殊下有急下少與微和滲利之別麻黃中空辛溫氣薄肺家專藥而走太陽能開腠散寒皮腠肺之所生寒從此入仍從此出桂枝辛溫能引營分之邪達之肌表桂入營血能解肌營衛和始能作汗杏仁苦甘散寒而降氣甘草甘平發散而和中經曰寒淫於內治以甘熱佐以苦辛是已除桂枝加石膏名麻黃杏仁甘草石膏湯仲景仲景曰發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯方中行曰不可更行桂枝湯則是已經用過也桂枝固衛寒不得泄而氣轉上逆所以喘益甚也無大熱者鬱伏而不顯見也以傷寒之表猶在故用麻黃以發之杏仁下氣定喘甘草退熱和中本麻黃正治之佐使也石膏有徹熱之功尤能助下喘之用故易桂枝以石膏誠為太陽傷寒誤汗轉喘之主治也或問發汗後不可更行桂枝湯桂枝即不可行麻黃可行耶無大熱石膏可行耶喻嘉言曰治傷寒先分營衛麻桂二湯斷無混用之理此證太陽之邪雖從汗解然肺中熱邪未盡所以熱雖少止喘仍不止故用麻黃髮肺邪杏仁下肺氣甘草緩肺急石膏清肺熱即以治足太陽之藥通治手太陰經也償誤行桂枝寧不壅塞肺氣而吐癰膿乎亦治溫瘧先熱後寒加白朮名麻黃加朮湯金匱仲景曰濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之徐忠可曰濕雖宜汗但汗大出則濕反不去則知汗中自有法故以麻黃湯為發汗之主而加朮一味以為固本清濕之地則內外兩得矣然發汗雖亦有火攻之法而非治濕也故又戒之去桂枝杏仁加附子名麻黃附子湯金匱仲景曰水之為病其脈沉小屬少陰小字宜玩觀沉小屬少陰句可知正水而不喘脈沉而加小即從少陰論治亦即石水治法所以石水不出方也浮者為風無水虛腫者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯徐忠可曰仲景於風水皮水裡水皆出方獨所云石水不出方觀所出之方似乎責之手足太陽手足太陰里水與急風兼責陽明而用石膏此獨另揭言水之為病脈沉小者屬少陰後即承之曰脈沉者宜麻黃附子湯然則此方或即所謂石水之主方耶又即承麻黃附子甘草方而曰脈浮者宜杏子湯即脈浮不與前風水皮水方相同豈非杏子方乃正水而間有脈浮者即為風水宜用此方耶正水之下寒多者似亦可用蓋麻黃附子甘草方即麻黃甘草二味爾以少陰而加附子發其龍火之真陽協力麻黃甘草以開久蝕之陰杏子湯因金囚不能暈水故以脈浮者責肺金之熱而瀉氣以泄其水之實爾經不顓言石水可知正水亦有屬少陰者故不若以脈沉為別爾惟麻黃附子湯為少陰水主方若脈浮則浮者為風故仍責肺而用杏子方爾若無水虛腫此即所謂風氣相搏氣強即為風水之屬也故亦主發汗除桂枝杏仁名甘草麻黃湯金匱仲景曰里水越婢加朮湯主之甘草麻黃湯亦主之徐忠可曰里水即一身面目黃腫脈沉而渴正水也麻黃髮其陽甘草以和之則陽行而水去即有裡熱不治自清爾且以防質弱者不堪石膏也水已成則氣壅肺熱故里水與風水俱有用石膏者不用桂枝可知麻黃無桂枝不全發表大能通徹營中之氣故用以治水爾單去桂麻黃不去節杏仁不去皮尖甘草生用名三拗湯局方治感冒風寒咳嗽鼻塞麻黃留節發中有收杏仁留尖取其發連皮則行皮甘草生用補中有瀉也忌汗諸證傷寒傷風辨陰陽表裡辨大青龍湯仲景曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之而厥逆筋惕肉瞤此為逆也以真武湯救之又曰傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之喻嘉言曰前條太陽中風四字括寒而言此傷寒二字括風而言風寒之脈證錯見則桂枝與麻黃二湯不可用不待言矣仲景原文但重乍有輕時六字早已挈明言但身重而無少陰之欲寐其為寒因可審況乍有輕時不似少陰之晝夜俱重又兼風因可審所以敢力驅其在表之風寒若脈微弱身重欲寐則內顧少陰且不遑矣敢發之乎麻黃六兩甘草炙桂枝二兩杏仁四十枚去皮尖石膏雞子大塊生薑三兩大棗十二枚先煮麻黃去沫內諸藥煎一服汗者止後服仲景制方之意本是桂枝麻黃二湯合用易芍藥以石膏者所以勝寒鬱之內熱且以助青龍之勢而興雲雨也然去芍藥之酸收增石膏之辛散外攻之力猛而無制在寒多風少及風寒兩停之證則用當而通神其有風無寒之證及微弱之脈若不知辨而誤用之有厥逆惕瞤而亡陽爾小青龍湯仲景曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之發熱惡寒頭痛身痛屬太陽表證仲景書中凡有里證兼表證者則以表不解三字該之內有水飲則水寒相搏水留胃中故乾嘔而噎水寒射肺故咳而喘水停則氣不化津不生故渴水漬腸間故下利水蓄下焦故小便不利而少腹滿又曰傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之喻嘉言曰風寒挾水飲上逆津液不下行故不渴渴則可知其津液不逆為寒去欲解之徵也乃用小青龍湯大率以輕劑助其欲解之勢爾麻黃去節桂枝芍藥酒炒細辛甘草炙乾薑三兩半夏五味子半升水一斗先煮麻黃減二升去上沫內諸藥煮取三升去渣溫服一升若微利者去麻黃加蕘花如雞子大熬令赤色麻黃髮汗利則不宜利水橫行也加蕘花導水也渴者去半夏加栝蔞根三兩半夏燥津液栝蔞根撤熱生津噎者去麻黃加附子一枚炮噎水寒塞窒氣也附子利氣而散水寒小便不利少腹滿去麻黃加茯苓四兩茯苓淡滲能通竅而利水道喘者去麻黃加杏仁半升去皮尖喘水氣射肺而聲息不利也加杏仁潤肺以下氣也周禹載曰素常有飲之人一感外邪傷皮毛蔽肺氣停於心下而上下之氣不利焉喘滿咳嘔相因而見於是以五味收金乾薑散陰半夏祛飲而尤妙在用細辛為少陰經表藥且能走水人之水氣大抵發源於腎故少腹滿小便不利因而作喘安知少陰不為遺害乃以細辛搜豁伏邪走而不留而後以上主散之藥皆靈動也金匱云病溢飲者當發其汗大青龍湯主之小青龍湯亦主之徐忠可注曰溢飲者水已流行歸四肢以不汗而致身體疼重蓋表為寒氣所侵而疼肌體著濕而重全乎是表但水寒相離猶之風寒兩傷內有水氣故以大青龍小青龍主之然大青龍合桂麻而去芍加石膏則水氣不甚而挾熱者宜之倘咳多而寒伏則必以小青龍為當蓋麻黃去杏仁桂枝去生薑而加五味乾薑半夏細辛雖表散而實欲其寒飲之下出也觀仲景論太陽中暍謂身熱疼重而脈微弱乃夏月傷冷水水行皮中所致一物瓜蒂湯主之然曰發其汗則惡寒甚而此獨主二湯發表為急豈非以溢飲所犯其源非中暍且腠理稍固不若夏月之易汗乎彼在夏月腠理本疏又中暍在先故主吐然則夏月身不熱非中暍而得是證其亦宜二湯可知也金匱云先渴後嘔者水停心下小青龍湯主之不治渴而專治水水去而渴自止矣金匱又云咳逆倚息不得臥小青龍湯主之徐忠可注曰此即支飲的證也不用十棗湯而用小青龍湯必以其挾表也然此必病發於未然而不得臥則勢亦孔亟故暫以桂枝治表姜半治飲爾加石膏名小青龍加石膏湯金匱治肺脹咳而上氣煩躁而喘脈浮者心下有水金匱曰咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之此條同是咳喘上氣脈浮然前條目如脫狀則喘多矣喘多責寒故以麻黃甘草為主而加石膏以清寒變之熱此獨加煩躁傷寒論中寒得風脈而煩躁者主以小青龍湯故亦主小青龍然壅則氣必熱故仍加石膏爾葛根湯治太陽病項背強𠘧𠘧無汗惡風者亦治太陽陽明合病必自下利者此條據喻注當去麻黃傷寒有並病有合病本經未解傳入他經有催併之義為並病二經三經同受邪者為合病合病者邪氣甚也太陽陽明合病其證頭痛腰痛肌熱鼻乾目痛脈浮大而長頭腰太陽也肌目鼻陽明也浮大太陽也脈長陽明也陽經合病必自下利邪並於陽則陽實而陰虛陽外實而不主裡則裡虛故下利吳鶴皋曰庸醫便為傷寒漏底不治不知與此湯以散經中表邪則陽不實而陰氣平利不治而自止矣趙嗣真曰合病者二陽經或三陽經同病不移者也並病者一經先受病又過一經兩經同病也如太陽陽明若並而未盡猶在兩經仲景所謂太陽證不罷而赤陽氣怫鬱在表不得越煩躁短氣是也猶當汗之以各半湯若並之已盡是謂證罷仲景所謂太陽證罷潮熱手足汗出大便硬而譫語是也法當下之以承氣湯是知罷則入腑不罷則不入腑太陽陽明並病治法也若太陽陽明合病主葛根湯太陽少陽合病主黃芩湯少陽陽明合病主承氣湯三陰有兩感而無合病合病不傳經並病亦與傳經異太陽多傳變太陽傳陽明水傳土也謂之微邪又謂巡經得度傳太陽傳少陽謂之越經傳太陽傳太陰謂之誤下傳太陽傳少陰謂之表裡傳水勝火火勝水此南北二方之變頃刻害人辨之不早必成不救太陽傳厥陰謂之首尾傳三陰不至於首唯厥陰與督脈上行與太陽相接又名巡經得度傳炎變至重不為不多矣葛根四兩麻黃生薑桂枝芍藥甘草炙二兩大棗十二枚擘先煮麻黃葛根去沫內諸藥煮溫服覆取微似汗不須啜粥余如桂枝法將息及禁忌成氏曰輕可去實葛根麻黃之屬是也此以中風表實故加二物於桂枝湯中除麻黃名桂枝加葛根湯仲景治太陽病項背強𠘧𠘧反汗出惡風者𠘧𠘧者頸不舒也頸屬陽明於太陽風傷衛中才見陽明一證即於桂枝湯中加葛根一味則兩經盡解去麻黃加半夏名葛根加半夏湯仲景治太陽陽明合病不下利但嘔喻嘉言曰此又以下利不下利辨別合病主風主寒之不同也風者陽也陽性上行故合陽明胃中之水飲而上逆寒者陰也陰性下行故合陽明胃中之水穀而下奔然上逆則必加半夏入葛根湯以滌飲止嘔但下奔則但用葛根湯以解兩經之邪不治利而利自止爾葛根湯即第一條桂枝湯加葛根不用麻黃者是也加黃芩名葛根解肌湯治發熱惡寒頭痛項強傷寒溫病麻黃附子細辛湯仲景治傷寒少陰病始得之反發熱脈沉者少陰病脈微細但欲寐是也太陽膀胱與少陰腎相為表裡腎虛故太陽之邪直入而脈沉餘邪未盡入里而表熱此證謂之表裡傳非兩感也麻黃二兩去節細辛一兩附子一枚炮去皮切八片先煮麻黃去上沫內辛附煮取去渣溫服日三太陽證發熱脈當浮今反沉少陰證脈沉當無熱今發熱故曰反也熱為邪在表當汗脈沉屬陰又當溫故以附子溫少陰之經以麻黃散太陽之寒而發汗以細辛腎經表藥聯屬其間是汗劑之重者去細辛加甘草名麻黃附子甘草湯仲景曰少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也喻嘉言曰不吐利煩躁嘔渴為無里證既無里證病尚在表可知故以甘草易細辛而微發汗又溫散之緩法也周揚俊曰言無里證則亦有反發熱之表在可知也二方皆治少陰表證少陰無發汗之法汗之必至亡陽惟此二證用之此方又名麻黃附子湯金匱用治水腫己見麻黃湯附方下此處因列少陰證治故不妨重出升麻葛根湯錢仲陽治陽明傷寒中風頭疼身痛發熱惡寒無汗口渴目痛鼻乾不得臥及陽明發斑欲出不出寒暄不時人多疾疫三陽皆有頭痛故頭痛屬表六經皆有身痛在陽經則煩痛拘急風寒在表故發熱惡寒寒外束故無汗熱入里故口渴陽明脈絡鼻俠目故目痛鼻乾陽明屬胃胃受邪故不安臥此其受邪之初猶未及乎狂也陽邪入胃裡實表虛故發斑細如蚊點為疹大若錦紋為斑升麻三錢葛根芍藥二錢甘草一錢炙加姜煎頭痛加川芎白芷川芎為通陰陽血氣之使白芷專治陽明頭痛身痛背強加羌活防風此兼太陽故兼二藥熱不退春加柴胡黃芩防風少陽司令柴芩少陽經藥夏加黃芩石膏清降火熱頭面腫加防風荊芥連翹白芷川芎牛蒡石膏升散解毒咽痛加桔梗清肺利膈咽斑出不透加紫草茸涼血潤腸用茸者取其初得陽氣觸類升發脈弱加人參胃虛食少加白朮腹痛倍芍藥和之陽明多氣多血寒邪傷人則血氣為之壅滯辛能達表輕可去實故以升葛辛輕之品發散陽明表邪陽邪盛則陰氣虛故用芍藥斂陰和血又用甘草調其衛氣也云岐子曰葛根為君升麻為佐甘草芍藥以安其中升麻甘草升陽解毒故又治時疫感時疫者必先入胃故用陽明胃藥傷寒未入陽明者勿服恐反引表邪入陽明也斑疹已出者勿服恐重虛其表也麻痘已見紅點則不可服陽明為表之裡升葛陽明正藥凡斑疹欲出未出之際宜服此湯以透其毒不可便服寒劑以攻其熱又不可發汗攻下虛其表裡之氣如內熱甚加黃連犀角青黛大青知母石膏黃芩黃柏玄參之類若斑勢稍退潮熱譫語不大便可用大柴胡加芒硝調胃承氣下之柴葛解肌湯節庵制此以代葛根湯治太陽陽明合病頭目眼眶痛鼻乾不眠惡寒無汗脈微洪太陽脈起目內眥上額交巔陽明脈上至額顱絡於目風寒上干故頭痛目痛眶痛也惡寒無汗屬太陽鼻乾不眠屬陽明脈洪將為熱也節庵曰此陽明在經之邪若在腑病另有治法柴胡葛根羌活白芷黃芩芍藥桔梗甘草加薑棗石膏一錢煎無汗惡寒甚者去黃芩寒邪在經故以羌柴芷葛散之寒將為熱故以黃芩石膏桔梗清之三藥並泄肺熱以芍藥甘草和之也柴胡升麻湯局方治少陽陽明合病傷風壯熱惡風頭痛體痛鼻塞咽乾痰盛咳嗽唾涕稠黏及陽氣鬱遏元氣下陷時行瘟疫劉宗厚曰傷風一證仲景與傷寒同論雖有麻黃桂枝之分至於傳變之後亦未嘗悉分之也諸家皆與感冒四氣並中風條混治惟陳無擇別立傷風一方在四淫之首且依傷寒以太陽為始分注六經可謂詳密但風本外邪諸方例用解表發表然受病之源亦有不同若表虛受風專用發表之藥必致汗多亡陽之證若內挾痰熱而受風亦宜內外交治不可專於解表也或曰此雲表虛與傷寒中風表虛同歟豫曰不同也彼以太陽中風而於有汗無汗分虛實實者加麻黃虛者加葛根俱解表也此雲表虛者當固守衛氣而散風者也柴胡前胡黃芩升麻葛根桑皮荊芥赤芍石膏加姜三片豉草粒陽明而兼少陽則表裡俱不可攻只宜和解在經宜和柴胡平少陽之熱升葛散陽明之邪三藥皆能升提清陽前胡消痰下氣而解風寒桑皮瀉肺利濕而止痰嗽荊芥疏風熱而清頭目赤芍調營血而散肝邪黃芩清火於中上二焦石膏瀉熱於肺胃之部風壅為熱故以石膏辛寒為君加姜豉者取其辛散而升發也九味羌活湯張元素即羌活沖和湯治傷寒傷風憎寒壯熱頭痛身痛項痛脊強嘔吐口渴太陽無汗及感冒四時不正之氣疫癘諸病有物有聲曰嘔氣逆則嘔有物無聲曰吐胃寒則吐邪熱在表則不渴傳裡則渴四時不正之氣謂天地間穢惡之氣及病氣死氣流行傳染也羌活防風蒼朮錢半細辛五分川芎白芷生地黃芩甘草一錢加生薑蔥白如風證自汗者去蒼朮加耆朮發表而即實表譬驅寇者隨關門也胸滿去地黃加枳殼桔梗喘加杏仁汗下兼行加大黃此足太陽例藥以代桂枝麻黃青龍各半等湯也藥之辛者屬金於人為義故能匡正黜邪羌防蒼細芎芷皆辛藥也羌活入足太陽為撥亂反正之主藥除關節痛痛甚無汗者倍之蒼朮入足太陰辟惡而去濕能除濕下氣及安太陽使邪氣不致傳足太陰脾白芷入足陽明治頭痛在額芎藭入足厥陰治頭痛在腦細辛入足少陰治本經頭痛皆能驅風散寒行氣活血而又加黃芩入手太陰以泄氣中之熱生地入手少陰以泄血中之熱黃芩苦寒生地寒滯二味苟用於發熱之後則當若初發熱猶當議減也防風為風藥卒徒隨所引而無不至治一身盡痛為使甘草甘平用以協和諸藥也藥備六經治通四時用者當隨證加減不可執一張元素曰有汗不得用麻黃無汗不得用桂枝若未瘥則其變不可言故立此方使不犯三陽禁忌但陰虛氣弱之人在所禁爾十神湯局方治時氣瘟疫癘氣初感頭痛發熱惡寒無汗咳嗽鼻塞聲重癘氣由口鼻而入直行中道流布三焦致沿門闔境傳染相似謂之瘟疫頭痛發熱惡塞無汗邪在表也咳嗽鼻塞聲重表實而氣不利也凡患時證而咳嗽者邪欲外出而易愈也麻黃葛根升麻川芎白芷紫蘇甘草陳皮香附赤芍加薑蔥白治傷寒須分六經見證用藥此則雖有發熱惡寒頭痛鼻塞等證然屬時氣瘟疫與傷寒不同故總以疏表辛香利氣之藥主之而又加芍藥甘草以和之吳綬曰此湯用升麻葛根能解利時行瘟疫癘氣非正傷寒之藥治太陽傷寒發熱用之則引邪入陽明傳變發斑矣慎之神朮散海藏治內傷冷飲外感寒邪而無汗者內傷冷飲則寒濕停於中經曰其寒飲食入胃則肺寒肺寒則外內合邪是也寒能澀血故無汗亦治剛痙先傷風後傷濕及太陽過汗濕家過汗産後血虛破傷風皆發痙其證頭搖口噤手足搐搦項背反張無汗為剛痙有汗為柔痙亦有剛柔不分者不可純作風治宜清熱化痰疏風養血亦有用大承氣者凡陽痙不厥逆其厥逆者皆陰痙也宜附子湯附子防風散桂心白朮湯蒼朮制防風二兩甘草一兩炙加生薑蔥白如太陽證發熱惡寒脈浮緊者加羌活浮緊帶洪者是兼陽明加黃芩浮緊帶弦數者是兼少陽加柴胡婦人加當歸防風辛溫升浮除風勝濕為太陽主藥蒼朮甘溫辛烈散寒發汗辟惡升陽能升胃中陽氣加甘草者發中有緩也除蒼朮加白朮二兩姜三片不用蔥名白朮湯海藏治前證有汗者蒼朮發汗白朮止汗亦治柔痙風而兼濕故多汗按神術白朮二湯乃代桂枝麻黃二湯者也喻嘉言曰此海藏得意之方蓋不欲無識者輕以麻黃桂枝之熱傷人也昌明仲景不得不表揚海藏之功太無神朮散蒼朮泔浸厚朴薑汁炒各一錢陳皮去白二錢甘草炙藿香石菖蒲各錢半治感山嵐瘴氣憎寒壯熱一身盡痛頭面腫大瘴瘧時毒濕熱時毒感於口鼻傳入陽明邪正交爭陰勝則憎寒陽勝則壯熱流於百節則一身盡痛上行頭面則為腫大名大頭瘟蒼朮辛烈升陽辟惡燥濕解鬱厚朴苦溫除濕散滿化食厚腸陳皮理氣通利三焦甘草和中匡正脾土此即平胃散而重用陳皮為君者也蓋人之一身以胃氣為主胃氣強盛則客邪不能入故治外邪必以強胃為先也加藿香菖蒲取其辛香通竅亦能辟邪而益胃也吳鶴皋曰太無此方但理脾胃而解瘴之妙自在其中不愧為丹溪之師矣局方神朮散茅朮二兩川芎白芷羌活藁本細辛炙甘草各一兩每服四錢加薑蔥煎治傷風頭痛無汗鼻塞聲重及風寒咳嗽時行泄瀉頭痛鼻塞咳嗽是傷風也傷風應有汗若無汗是挾寒也飧泄下利者清陽不升木邪剋土風兼濕也蒼藁辛羌芎芷各走一經祛風發汗而勝濕散三陽之邪而能升清者也加甘草者緩其中也許學士神朮散蒼朮一斤芝麻五錢研漿棗五十枚取肉搗丸治水飲結成澼囊水飲結成窠囊非蒼朮辛烈雄壯不能破之加芝麻者潤其燥也用棗肉者補土以制水也九製蒼朮散茅山蒼朮九蒸九曬為末治痰飲腹痛蔥豉湯肘後傷寒初覺頭痛身熱脈洪便當服此蔥白一握豉一升煎服取汗出如無汗加葛根三兩崔氏蔥通陽蔥中空為肺菜散手太陰陽明之邪豉升散均能發汗邪初在表宜先服此以解散之免用麻黃湯者之多所顧忌用代麻黃湯者之多所紛更也去淡豉加生薑名連須蔥白湯活人治同人參敗毒散活人治傷寒頭痛憎寒壯熱項強睛暗鼻塞聲重風痰咳嗽及時氣疫癘嵐瘴鬼瘧或聲如蛙鳴眼赤口瘡濕毒流注腳腫腮腫喉痹毒痢諸瘡斑疹風寒在表則惡寒發熱頭痛項強風寒在肺則鼻塞聲重痰多咳嗽聲如蛙鳴俗名蝦蟆瘟邪氣實也風寒濕熱之氣上干則目赤口瘡下流則足腫傷於陽明則腮腫結於少陰則喉痹壅於腸胃則毒痢發於皮膚則瘡疹人參羌活獨活柴胡前胡川芎枳殼桔梗茯苓一兩甘草五錢每服一兩加姜三片薄荷少許煎口乾舌燥加黃芩腳氣加大黃蒼朮膚癢加蟬蛻羌活入太陽而理遊風獨活入少陰而理伏風兼能去濕除痛柴胡散熱升清協川芎和血平肝以治頭痛目昏前胡枳殼降氣行痰協桔梗茯苓以泄肺熱而除濕消腫人參甘草輔正以匡邪疏導經絡表散邪滯故曰敗毒喻嘉言曰暑濕熱三氣門中推此方為第一三氣合邪豈易當哉其氣互傳則為疫矣方中所用皆辛平更有人參大力者荷正以祛邪病者日服二三劑使疫邪不復留詎不快哉奈何俗醫減去人參曾與他方有別耶又曰傷寒宜用人參其辨不可不明蓋人受外感之邪必先汗以驅之唯元氣旺者外邪始乘藥勢以出若素弱之人藥雖外行氣從中餒輕者半出不出重者反隨元氣縮入發熱無休矣所以虛弱之體必用人參三五七分入表藥中少助元氣以為驅邪之主使邪氣得藥一湧而出全非補養衰弱之意也即和解藥中有人參之大力者居間外邪遇正自不爭而退舍否則邪氣之縱悍安肯聽命和解耶不知者謂傷寒無補法邪得補而彌熾即痘疹瘧痢以及中風中痰中寒中暑癰疽産後初時概不敢用而虛人之遇重病可生之機悉置不理矣古方表汗用五積散參蘇飲敗毒散和解用小柴胡白虎湯竹葉石膏湯等方皆用人參領內邪外出乃得速愈奈何不察耶外感體虛之人汗之熱不退下之和之熱亦不退大熱呻吟津液灼盡身如枯柴醫者技窮正謂元氣已漓故藥不應手爾倘元氣未漓先用人參三五七分領藥深入驅邪何至汗和不應耶東垣治內傷外感用補中益氣加表藥一二味熱服而散外邪有功千古傷寒專科從仲景至今明賢方書無不用參何為今日醫家單除不用全失相傳宗旨使體虛之人百無一活曾不悟其害之也蓋不當用參而殺人者是與耆朮歸桂姜附等藥同行溫補之誤不謂與羌獨柴前芎半枳桔芩膏等藥同行汗和之法所致也安得視等砒鴆耶嘉靖己未江淮大疫用敗毒散倍人參去前胡獨活服者盡效萬曆己卯大疫用本方復效崇禎辛巳壬午大飢大疫道殣相望汗和藥中惟加人參者多活更有發斑一證最毒惟加參於消斑藥中全活甚衆凡饑饉兵荒之餘飲食起居不節致患時氣者宜用此法加陳廩米名倉廩散治噤口痢乃熱毒衝心食入即吐單陳廩米煎湯治痢後大渴飲水不止加大黃芒硝名硝黃敗毒散治熱毒壅積加黃芩名敗毒加黃芩湯治溫病不惡寒而渴加連翹金銀花名連翹敗毒散治瘡毒如有風熱加荊芥防風名荊防敗毒散亦治腸風下鮮血血鮮者為腸風隨感而見也血瘀者為臟毒積久而發也川芎茶調散局方治諸風上攻正偏頭痛惡風有汗憎寒壯熱鼻塞痰盛頭暈目眩正偏頭痛者風中於腦作止無時也中風故有汗惡風風邪在表故憎寒壯熱風寒傷於皮毛腠理密緻不得泄越氣並於鼻故鼻塞火升故痰盛痰熱上攻故頭暈目眩薄荷八錢芎藭荊芥四錢甘草炙羌活白芷二錢防風錢半細辛一錢每三錢茶調服一方加菊花一錢殭蠶三分名菊花茶調散治頭目風熱菊花清熱明目殭蠶消風化痰羌活治太陽頭痛白芷治陽明頭痛川芎治少陽頭痛細辛治少陰頭痛防風為風藥卒徒皆能解表散寒以風熱在上宜於升散也頭痛必用風藥者以巔頂之上惟風可到也薄荷荊芥並能消散風熱清利頭目故以為君辛香輕清能入肝經氣分而搜風熱肝風散則頭目清明同諸藥上行以升清陽而散鬱火清陽不升則濁陰上干故頭痛加甘草者以緩中也用茶調者茶能上清頭目也凡頭痛用羌防芎芷辛溫等藥由風木虛土寡於畏壅塞而成痛故用此助肝以升散之也若服辛散藥反甚者則宜用酸澀收而降之乃愈再造散節庵治陽虛不能作汗陶節庵曰治頭痛項強發熱惡寒無汗服發汗藥一二劑汗不出者為陽虛不能作汗名曰無陽證庸醫不識不論時令遂用麻黃重藥劫取其汗誤人多矣此方必脈證中有虛寒之實據方可用也人參黃耆桂枝甘草附子炮細辛羌活防風川芎煨姜棗二枚加炒芍藥一撮煎經曰陽之汗以天地之雨名之汗之無汗邪盛而真陽虛也故以參耆甘草薑桂附子大補其陽而以羌防芎細發其表邪加芍藥者散中有收且能滋調營衛為諸陽藥取汗之助也節庵曰人第知參耆能止汗而不知其能發汗以在表藥隊中則助表藥而解散也東垣丹溪治虛人感冒多用補中益氣加表藥即同此意麻桂飲景嶽治傷寒瘟疫陰暑痎瘧凡陰寒氣勝而邪有不能散者非此不可無論諸經四季凡有是證即宜是藥勿謂夏月不可用也不必厚蓋但取津津微汗透出為度此實麻黃桂枝之變方而其神效則大有同於二方者不可不為細察官桂一二錢當歸三四錢炙甘草一錢麻黃二三錢陳皮隨宜用或不用水一盞半加生薑五七片或十片煎八分去浮沫不拘時服若陰氣不足者加熟地三五錢若元氣大虛陰邪難解者當以大溫中飲更迭為用大溫中飲景嶽凡患陽虛傷寒及一切四時勞倦寒疫陰暑之氣身雖熾熱時猶畏寒即在夏月亦欲衣被蓋或喜熱湯或兼嘔惡泄瀉但六脈無力肩背怯寒邪氣不能外達等證此元陽大虛正不勝邪之候若非峻補托散則寒邪日深必至不救溫中自可散寒即此方也服後畏寒悉除覺有躁熱乃陽回作汗佳兆不可疑之畏之此外凡以素稟薄弱之輩或感陰邪寒疫發熱困倦雖未見如前陰證而熱邪未甚者但於初感時即速用此飲連進二三服無不隨藥隨愈真神劑也此方宜與理陰煎麻桂飲相參用熟地三五七錢於白朮三五錢當歸三五錢如泄瀉者不宜用或山藥代人參二三錢甚者一兩或不用甘草一錢麻黃一二三錢柴胡二三錢乾薑炒熱一二錢或用煨姜三五片水二盞煎八分去浮沫溫服或略蓋取微汗如氣虛加黃耆二三錢如寒甚陽虛者加附子一二錢如肚腹泄瀉宜少減柴胡加防風細辛亦可此方惟氣血兩虛而重感寒邪者宜之非正傷寒治法大羌活湯潔古治兩感傷寒內經曰傷寒一日巨陽受之太陽經脈循腰脊經頭項故頭項痛腰脊強二日陽明受之陽明主肉其脈俠鼻絡於目故身熱目疼而鼻乾不得臥三日少陰受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器絡於肝故煩滿而囊縮兩感者謂一日則太陽與少陰俱病有頭痛項強而又口乾煩渴也二日則陽明與太陰俱病有身熱膽語而又腹滿不欲食也三日則少陽與厥陰俱病有脅痛耳聾而又囊縮厥逆也此陰陽表裡俱病欲汗之則有里證欲下之則有表證故仲景不立治法吳鶴皋曰易老制此方意謂傳經者皆為陽邪一於升陽散熱滋養陰臟則感之淺者尚或可平也羌活獨活防風細辛防己黃芩黃連蒼朮甘草炙白朮三錢知母川芎生地一兩每服五錢熱飲此陰陽兩解之藥也氣薄則發泄故用羌獨蒼防芎細祛風發表升散傳經之邪寒能勝熱故用芩連知母生地防己清熱利濕滋培受傷之陰又用白朮甘草以固中州而和表裡之氣升不至峻寒不至凝間能回九死於一生也仲景兩感無治法又云兩感病俱作治有先後如表證急當先救表里證急當先救里李梃曰表裡俱急者大羌活湯陽證體痛而不下痢者為表急先以葛根麻黃解表後以調胃承氣攻裡陰證身痛而下利不止者為裡急先用四逆救里後以桂枝救表陰陽未分者陶氏沖和湯探之古法一日太陽少陰五苓散主之頭痛加羌活防風口渴加黃柏知母二日陽明太陰大柴胡湯三日少陽厥陰危甚大承氣加川芎柴胡救之劉宗厚曰傷有兼風兼濕不同表裡俱實俱虛之異大抵俱虛為多脈從陽者可治從陰者難治歸葛飲景嶽治陽明溫暑時證大煩大渴津液枯涸陰虛不能作汗等證當歸三五錢乾葛二三錢水二盞煎一盞以冷水浸涼徐徐服之得汗即解舉斑湯治瘟疫斑毒內陷吳又可曰瘟疫邪留血分裡氣壅閉不下則斑不出出則毒邪從外解矣如下後斑漸出更不可大下設有下證宜少與承氣緩服倘大下則元氣不振斑毒內陷則危宜托裡舉斑湯如下後斑毒隱伏反見循衣撮空脈微者本方加人參三錢得補發出者不死白芍當歸一錢升麻五分柴胡白芷七分穿山甲二錢水煎犀角消毒湯治瘟疫毒氣發斑痛癢牛蒡子炒防風二錢荊芥一錢甘草八分犀角磨汁每服三錢水煎入犀角汁服柴葛煎景嶽治瘟疫痘疹表裡俱熱能散毒養陰方見卷十一上嬰孩門疏邪飲附方卷三下湧吐門邪在表宜汗在上焦宜吐在中下宜下此汗吐下三法也今人惟知汗下而吐法絶置不用使遇當吐之證而不行湧越則邪氣壅結而不散矣經曰其高者因而越之又曰在上者湧之丹溪曰吐中就有發散之義張子和曰諸汗法古方多有之惟以吐發汗者世罕知之故豫嘗曰吐法兼汗其以此夫瓜蒂散仲景治卒中痰迷涎潮壅盛顛狂煩亂人事昏沉五癇痰壅食填太陰欲吐不出亦治諸黃急黃卒然發黃心滿氣喘命在須臾曰急黃或服此散或搐鼻或加丁香仲景云病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息此為胸中有寒也當吐之宜瓜蒂散諸亡血虛家不可與瓜蒂散喻嘉言曰寒者痰也痰飲內動身必有汗加以發熱惡寒全似中風但頭不痛項不強此非外入之風乃內蘊之痰窒塞胸間宜用瓜蒂散以湧出之也又曰病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散手足厥冷與厥陰之熱深厥深相似其脈乍緊則有時不緊殊不似矣可見痰結在胸故滿煩而不能食亦宜瓜蒂為吐法也甜瓜蒂炒黃赤小豆等分各別搗篩為散已合治之取一錢匕以香豉一合熱湯七合煮稀糜取汁和散溫頓服之快吐乃止吐時須令閉目緊束肚皮吐不止者蔥白湯解之良久不出者含砂糖一塊即吐諸亡血虛家老人産婦挾虛脈微者俱不可服非尺脈絶者不宜便服此恐損胃氣若止胸中窒塞悶亂以物探之得吐即止若探不出方以此湯吐之胸中痰食與虛煩者不同越以瓜蒂之苦湧以赤小豆之酸吐去上焦有形之物則木得舒暢天地交而萬物通矣十劑曰燥可去濕桑白皮赤小豆之屬是也赤豆瓜蒂並能行水濕痰涎頭痛胸滿寒熱脈緊不大者並宜此散吐之或問何謂木鬱曰厥陰少陽屬木於令為春乃人身生髮之氣也食者陰物也脾胃者坤土也飲食填塞太陰則土盛而反侮木生氣不得上升而木鬱矣吐去上焦有形之物則木得條達而遂其升生之氣矣當用而胃弱者改用參蘆除赤豆名獨聖散仲景曰太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也劉宏璧曰仲景於此病用一物瓜蒂散去胸中之水且變散為湯並無賴於赤小豆與漿水者蓋以一物驅逐其水則陽氣行而身重疼熱立解矣此則內因也由是推之如傷霧露之從乎上者可內鼻而解地濕之從乎下者可利小便而解上濕下流與下濕上甚為熱者可一汗而解也除赤豆加防風藜蘆名三聖散子和除赤豆加鬱金韭汁鵝翎探吐亦名三聖散治中風風癇痰厥頭痛除赤豆加全蠍五分吐風痰加淡豉治傷寒煩悶瓜蒂梔豉皆吐劑要知瓜蒂吐痰食宿寒梔豉吐虛煩客熱如未經汗下邪郁胸膈而痞滿者謂之實宜瓜蒂散此重劑也已經汗吐下邪乘虛客胸中而懊憹者宜梔豉湯此輕劑也丹溪用瓜蒂梔子苦參藜蘆等纍吐許白雲不透後以附子尖和漿水與之始得大吐也參蘆散治虛弱人痰涎壅盛人參蘆為末水調一二錢或加竹瀝和服滑痰服後以物微探吐之如不探亦未必吐也病人虛羸故以參蘆代藜蘆瓜蒂宣猶帶補不致耗傷元氣也丹溪曰人參補陽中之陰蘆反瀉太陰之陽亦猶麻黃苗能發汗根能止汗也梔子豉湯仲景治傷寒汗吐下後虛煩不眠劇者反復顛倒心中懊憹及大下後身熱不退心下結痛或痰在膈中汗吐下後正氣不足邪氣乘虛結於胸中故煩熱懊憹煩熱者熱而煩擾懊憹者懊惱憹悶也晝動為陽夜臥主陰陽熱未散陰氣未復故不得眠身熱去而心結痛者熱盡入里則為結胸熱不去而結痛者客熱散漫為虛煩熱仍在表故當越之梔子十四枚淡豉四合服令微吐煩為熱勝梔子苦寒色赤入心故以為君淡豉苦能泄熱腐能勝焦腎氣為腐心氣為焦豉蒸窨而成故為腐助梔子以吐虛煩故以為臣酸苦湧泄為陰也此吐無形之虛煩若膈有實邪當用瓜蒂散海藏曰煩氣也躁血也煩出於肺躁出於腎故用梔子治肺煩香豉治腎躁亦用作吐藥以邪在上焦吐之則邪散經所謂在上者因而越之也或問煩躁皆心為之何謂煩出於肺躁出於腎曰熱則煩熱甚則躁煩為陽躁為陰大抵皆心火為病火旺則金燥而水虧惟火獨在故肺腎合而為煩躁仲景曰病人舊微溏者不可與服喻嘉言曰舊微溏則大腑易動服此方不能上湧反為下泄矣緣內經有先泄而後生他病者治其本必先調之後乃治其他病故此示戒又曰諸梔豉一法證顯實煩虛煩之不同要皆可用以湧其餘熱乃因汗吐下後胸中陽氣不足最虛之處便是容邪之處正宜因其高而越之爾若謂津液內竭正氣暴虛餘邪不盡則仲景原有炙甘草湯一法寧敢妄湧以犯虛虛之戒耶加甘草名梔子甘草豉湯仲景治前證少氣者劉宏璧曰少氣則加甘草以和中人皆知之然既少氣謂是誤後中虛雖邪氣未退敢用梔豉以湧吐之乎乃知此證之少氣緣外邪內陷洵是熱傷元氣而不與但內弱者同此甘草所以不炙而用也加生薑名梔子生薑豉湯仲景治前證兼嘔者辛以散逆除淡豉加乾薑名梔子乾薑湯仲景治傷寒醫以丸藥大下之身熱不去微煩者喻嘉言曰丸藥大下徒傷其中而不能蕩滌其邪故梔子合乾薑用之亦溫中散邪之法也除淡豉加厚朴枳實名梔子厚朴湯仲景治傷寒下後心煩腹滿臥起不安者喻嘉言曰滿而不煩即里證已具之實滿煩而不滿即表證未罷之虛煩合而有之且臥起不安明是邪湊胸表腹裡之間無可奈何之象故取梔子以快湧其邪而合厚朴枳實以泄腹中之滿亦表裡兩解之法也加枳實大黃名梔子大黃湯仲景治酒疸發黃心中懊憹或熱痛亦治傷寒食復輕則消導重乃攻下加枳實名枳實梔子豉湯仲景治傷寒勞復大病瘥後起居作勞復生餘熱為勞復傷食者為食復加薤白名豉薤湯張文仲治傷寒下利如爛肉汁赤滯下伏氣腹痛諸熱證梔豉苦寒能升能散薤白辛溫能開胸痹及大腸氣滯加犀角大青名犀角大青湯治斑毒熱甚頭痛吐法此方可代瓜蒂三聖之屬凡邪實上焦或痰或食或氣逆不通等證皆可以此代之蘿蔔子搗碎以溫湯和攪取淡湯徐徐飲之少頃即當吐即有吐不出者亦從下行矣一法以蘿蔔子為末溫水調服一匙良久吐涎沫愈稀涎散治中風暴僕痰涎壅盛氣閉不通先通其關令微吐稀涎續進他藥不可令大吐醒後不可大投藥餌緩緩調治過恐傷人亦治喉痹不能進食皂角四挺去皮弦炙白礬一兩為末溫水調下五分或加藜蘆藜蘆能吐風痰善通頂令人嚏吳鶴皋曰清陽在上濁陰在下天冠地履無暴僕也若濁邪逆上則清陽失位而倒置矣故令人暴僕所以痰涎壅塞者風盛氣湧使然也經曰病發於不足標而本之先治其標後治其本故不與疏風補血而先吐其痰涎白礬酸苦能湧泄鹼能軟頑痰故以為君皂角辛能通竅鹼能去垢專制風木故以為使固奪門之兵也師曰凡吐中風之痰使咽喉疏通能進湯藥便止若盡攻其痰則無液以養筋令人攣急偏枯此其禁也丹溪曰胃氣亦賴痰以養不可盡攻攻盡則虛而愈劇張子和加藜蘆常山甘草名常山散吐瘧痰甘草合常山必吐乾霍亂吐方三因治乾霍亂欲吐不得吐欲瀉不得瀉腹中大痛者霍亂揮霍擾亂也外有所感內有所傷陰陽乖隔邪正交爭故上吐下瀉而中絞痛也邪在上焦則吐在下焦則瀉在中焦則吐瀉交作此濕霍亂證輕易治若不能吐瀉邪不得出壅遏正氣關格陰陽其死甚速俗名攪腸痧切勿與穀食即米飲下咽亦死燒鹽熱童便三飲而三吐之吐瀉不得邪結中焦咸能軟堅可破頑痰宿食炒之則苦故能湧吐童便本人身下降之氣引火下行乃其舊路味又鹹寒故降火甚速此由脾土鬱極而不得發以致火熱內擾陰陽不交而然鹽湧於上溺泄於下則中通矣方極簡易而有回生之功不可忽視準繩曰鹽調童便非獨用以降陰之不通也陰既不通血亦不行兼用行血藥也單用燒鹽熟水調飲以指探吐名燒鹽探吐法治傷食痛連胸膈痞悶不通手足逆冷尺脈全無食填太陰抑遏膽肝之氣不得上升兩實相搏故痛連胸膈陽氣不舒故手足逆冷下焦隔絶故尺脈不至咸潤下而軟堅能破積聚又能宣湧使不化之食從上而出則塞者通矣亦木鬱達之也經曰上部有脈下部無脈其人當吐不吐者死或曰食填太陰胸中痞亂兩寸脈當用事今反尺脈不見其理安在曰獨陽不生獨陰不長天之用在於地下則萬物生長地之用在於天上則萬物收藏此乃天地交而萬物通也故陽火之根本於地下陰水之源本於天上五臟主有形之物物者陰也陰者水也食塞於上是絶五臟之源源絶則水不下流兩尺之絶此其理也千金用此法三飲三吐通治霍亂蠱毒宿食腹痛冷氣鬼氣且曰此法大勝用藥凡有此疾者宜先用之又有中食證忽然厥逆口不能言肢不能舉者名曰食厥若作中風中氣治之死可立待宜先鹽吐之再用消食導氣之藥一法用鹽少許於熱鍋中炒紅色乃入清水煮至將滾未滾之際攪勻試其滋味稍淡乃可飲之每用半碗漸次增飲自然發吐以去病為度而止又法凡諸藥皆可取吐但隨證作湯劑探而吐之無不可也搐鼻法濕家鼻塞頭疼或頭額兩太陽痛宜行此法苦瓜蒂不拘多少為末令病人噙水一口將此藥一字吹入鼻中凡云一字者二分半也取一文四字之義出黃水愈濕家頭疼是濁邪干清陽之分也鼻者氣竅上通於腦下屬於肺濁邪干之故清竅不利瓜蒂苦而善湧瀉鼻竅受之則能出濁邪而瀉濕熱經曰客者除之此之謂也搐鼻如聖散治纏喉急痹牙關緊閉皂角去皮弦炙白礬雄黃藜蘆為末搐鼻當歸湯吐虛痰體弱痰干而吐不出者此方神效雖吐而絶不傷氣血也當歸五錢甘草頭一錢參蘆一錢逆流水煎卷四上攻下門凡攻氣者攻其聚聚可散也攻血者攻其瘀瘀可通也攻積者攻其堅在臟者可破可行在經者可針可灸也攻痰者攻其急真實者暫宜解標多虛者只宜求本也但諸病之實有微甚用攻之法分輕重大實者攻之未及可以再加微實者攻之太過每以致害所當慎也凡病在陽者不可攻陰病在胸者不可攻臟若此者病必乘虛內陷所謂引賊入門也病在陰者勿攻其陽病在裡者勿攻其表若此者病必因誤而甚所謂自撤藩蔽也大都治宜用攻必其病邪之甚者也若實邪既甚自與攻藥相宜不必雜之補劑蓋實不嫌攻若但略加甘滯便相牽制虛不嫌補若但略加消耗便覺相妨所以純虛者最不喜清熱實者最不喜暖然實而誤補不過增病病增者可解虛而誤攻必先脫元元脫者無治矣是皆攻法之要也其或虛中有實實中有虛此又當酌其權宜不在急宜攻急宜補之例雖然凡用攻之法所以除凶剪暴也亦猶後世之兵必不可無然必不得已乃可用之若或有疑再加詳慎蓋攻雖去邪無弗傷氣傷血實自古仁人所深忌者正恐其成之難敗之易爾大承氣湯仲景治傷寒陽明腑證陽邪入里胃實不大便發熱譫語自汗出不惡寒痞滿燥實堅全見雜病三焦大熱脈沉實者陽明外證身熱汗出不惡寒反惡熱是也此為在經仍當汗散若熱邪已入胃腑痞滿燥熱堅全見者為當下實則譫語亂言無次也虛則鄭聲一語頻言也陽明多血多氣法當自汗過汗亡液無水以制火腸胃有燥糞結而不下故妄見妄言也經曰何緣行陽明病曰太陽病若汗若下若利小便此亡津液胃中乾燥因轉屬陽明胃實大便難也又曰太陽初病發其汗汗先出不徹因轉屬陽明陽明證能食為中風風陽邪能消穀不能食為中寒寒陰邪不能消穀以此為辨胸悶不食為痞胸腹膨脹為滿大便枯少為燥腹滿痛不大便為實按之石硬為堅亦治陽明剛痙此太陽兼陽明證其證腹滿口噤臥不著席攀足齘齒而無汗謂之剛痙宜下之者以陽明主潤宗筋風寒濕熱傷陽明胃津液不行筋失所養故以此湯下濕熱行津液喻嘉言曰傷寒腹滿可下胸滿不可下謂熱邪尚在表也此證入里之熱極深極重陽熱既極陰血立至消亡小小下之尚不能勝必大下之以承領其一線之陰陰氣不盡為陽所劫因而得生者多矣既有下多亡陰之大戒復有急下救陰之活法學者深造端在斯矣經曰陽明居中土也萬物所歸無所復傳以胃為水穀之海四旁病皆傳入胃已入胃腑則不復傳他經矣大黃四兩酒洗王海藏曰邪氣居高非酒不到若用生者則遺高分之邪熱病愈後變生目赤喉痹頭腫膈上熱疾也芒硝三合厚朴半斤枳實五枚先煎朴實將熟內大黃煮二三沸傾碗內和芒硝服得利則止陶節庵曰去實熱用大黃無枳實不通溫經用附子無干姜不熱發表用麻黃無蔥白不發吐痰用瓜蒂無淡豉不湧竹瀝無薑汁不能行經絡蜜導無皂莢不能通祕結熱淫於內治以鹹寒氣堅者以咸軟之熱盛者以寒消之故用芒硝之鹹寒以潤燥軟堅大黃之苦寒以瀉熱去瘀下燥結泄胃強枳實厚朴之苦降瀉痞滿實滿經所謂土鬱奪之也陽明屬土大黃治大實芒硝治大燥大堅二味治有形血藥也厚朴治大滿枳實治痞二味治無形氣藥也然非大實大滿不可輕投恐有寒中結胸痞氣之變此大小陷胸湯之所由作也承順也十劑曰通可去滯泄可去閉使塞者利而閉者通正氣得舒故曰承氣仲景曰欲行大承氣先與小承氣若腹中轉矢氣者有燥屎也可以大承氣攻之若不轉矢氣者此但初硬後溏不可攻之攻之必脹滿不能食也又曰陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯此斷其入陽明之路仍從外解則不內攻也又曰陽明病應發汗醫反下之此為大逆皆仲景慎於攻下之意也喻嘉言曰陽明以胃實為正則皆下證也陽明之邪其來路則由太陽凡陽明證見八九而太陽證有一二未罷仍從太陽而不從陽明可汗而不可下也其去路則趨少陽凡陽明證雖見八九而少陽證略見一二則從少陽而不從陽明汗下兩不可用也惟風寒之邪已離太陽未接少陽恰在陽明界內亟為攻下則不再傳他經津液元氣兩無虧損矣庸愚無識必待七日傳經已盡方敢議下不知太陽有十餘日不解者若不辨經而但計日其誤下仍在太陽至陽明二三日即顯下證反以計日當面錯過及陽明已入少陽又以計日妄行攻下輕者重而重者死矣仲景法日數雖多但有表證而脈浮者猶宜發汗日數雖少若有里證而脈沉者即宜下之古人有治惡寒戰栗用大承氣下燥而愈者此陽邪入里熱結於裡表虛無陽故惡寒戰栗此陽盛格陰乃熱病非寒證誤投熱藥則死矣加甘草等分名三一承氣湯治大承氣證腹滿實痛調胃證譫語下利小承氣證內熱不便一切傷寒雜病蓄熱內甚燥實堅脹謂合三承氣為一方也成無己曰若大承氣證則用小承氣則邪不服若小承氣證反用大承氣則過傷元氣而腹滿不能食仲景所以分而治之後人以三方合而為一云通治三方之證及傷寒雜病內外一切所傷與仲景之方甚相違戾失軒岐緩急之旨使病人暗受其害將誰咎哉加柴胡黃芩甘草入鐵鏽水三匙墜熱開結名六一順氣湯節庵謂合三承氣三一承氣大柴胡大陷胸六方而為一方也治潮熱自汗發渴譫語狂妄斑黃腹滿便實正陽明腑病加人參甘草當歸桔梗薑棗名黃龍湯治邪熱傳裡胃有燥屎心下硬痛身熱口渴下利純清水有燥屎何以又下清水陶節庵曰此非內寒而利乃日飲湯藥而下滲也名熱結利庸醫妄謂漏底傷寒以熱藥止之殺人多矣年老氣血虛者去芒硝去芒硝加麻仁杏仁芍藥蜜丸名麻仁丸仲景治趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約趺陽胃脈也經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾主為胃行其津液者也今胃火乘脾約束津液但輸膀胱致小便數而大便難故名脾約與此丸潤燥通腸此太陽傳入陽明之證故仲景曰太陽陽明脾約是也按成氏釋此證謂脾弱胃強然本文但云脾約未嘗云脾弱也喻嘉言曰脾弱即當補矣何為反用大黃朴實乎此脾土過燥使腸胃津液枯槁致中消便難使脾果弱非溏即瀉焉能反約少胃中之穀食乎陽明證中凡宜攻下者惟恐邪未入胃大便勿硬又恐初硬後溏未可妄攻故先與小承氣試其轉失氣方可攻之皆是慮夫脾氣之弱也若脾約證在太陽即當下矣何待陽明耶朱丹溪曰此由久病大汗大下之後陰血枯槁內火燔灼熱傷元氣又傷於脾而成肺金受火氣無所攝腎為肺子肺耗則液虧金耗則木寡於畏土欲不傷其可得乎肺失傳送脾失轉輸故大便祕而小便數也理宜滋養陰血使火不熾而金化行木有制而脾土暈津液乃能入胃腸潤而通矣此方施之熱盛而氣實者則安若熱盛而血虛者勿膠柱而鼓瑟也當下諸證發汗不解腹滿痛者急下之下利三部脈皆平按之心下硬者急下之脈滑而數者有宿食也宜下之脈經曰滑為食病仲景曰滑則穀氣實又曰寸脈浮大按之反澀尺中亦微而澀知有宿食宜下之傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之內經曰諸脈皆屬於目針經曰熱病目不明熱不已者此腎水將絶不能照物也陽明病發熱汗多者急下之汗多則亡津液而內燥宜急下以存津液少陰病得之二三日口燥咽乾者急下之邪入未深便作口燥此腎水將干宜急下以救欲絶之水少陰證六七日腹脹不大便者急下之此少陰邪熱入胃腑也土勝則水乾宜急下以救腎水少陰病自利清水色純青心中必痛口中燥者急下之青為肝色肝邪乘腎故下利陽邪上攻故口燥此亦少陰傳入陽明腑證也厥陰證舌卷囊縮宜急下之此證仲景無治法按舌卷囊縮有寒極而縮者宜附子四逆加吳茱萸湯並灸關元氣海蔥尉等法又有陽明之熱陷入厥陰經陽明主潤宗筋宗筋為熱所攻勿榮而急引舌與睪丸故舌卷囊縮此為熱極當瀉陽以救陰以上皆大承氣證也張兼善曰胃為水穀之海四旁有病皆能傳入胃土燥則腎水乾故陽明與少陰皆有急下之條證雖不同其入腑之理則一故皆用大承氣有病循衣摸床兩手撮空者此胃熱也錢仲陽小兒藥證直訣云此肝熱也亦承氣湯主之樓全善曰嘗治循衣摸床撮空數人皆用大補氣血之劑惟一人兼振瞤脈代遂於補劑中加桂二分亦振止脈和而愈按譫語亦有因氣虛陽脫而然者當用參附大補之忌下諸證太陽病外證未解不可下脈浮大為在表不可下惡寒為邪在表不可下嘔為邪在上焦雖有陽明證不可下陽明病應發汗反下之此為大逆陽明病不能食攻其熱必噦胃中虛冷故也太陽陽明合病喘而胸滿宜麻黃湯肺氣清則胃邪自散不可下少陰病陽虛尺脈弱澀者不可下脈數不可下數為血虛下之則熱邪入里血愈虛而亡陰惡水者不可下下之裡冷不嗜食完穀出頭痛目黃者不可下諸四逆厥者不可下陽微不可下下之痞硬諸虛不可下諸動氣者不可下小承氣湯仲景一名三物厚朴湯治傷寒陽明證譫語便硬潮熱而喘及雜病上焦痞滿不通大黃四兩厚朴二兩姜炒枳實三枚麩炒水四升煮一升二合去渣分溫二服初服當更衣不爾者盡飲之若更衣勿服邪在上焦則滿在中焦則脹胃實則潮熱猶潮水之來其來有時陽明燥金旺於申酉故日晡潮熱傷寒潮熱為胃實無虛證陽邪乘心則狂故譫語胃熱干肺則喘故以枳朴去上焦之痞滿以大黃蕩胃中之實熱此痞滿燥實堅未全者故除芒硝欲其無傷下焦真陰也陽明證有正陽陽明有太陽陽明有少陽陽明自陽明經傳入胃腑不惡寒腹滿便硬者宜大承氣下之若汗多發熱微惡寒者為外未解其熱不潮未可與承氣若腹大滿不通者可與小承氣微和胃氣勿令大泄下謂陽明有在經者未全入腑尤宜審慎陽明少自病多由太陽傳入成無己曰自太陽少陽傳入者衆所共知自三陰傳入者鮮或能識三陰有急下之證多矣豈非仲景之微旨與經曰傷寒脈浮緩手足溫者系在太陰當發黃若小便利者不能發黃至七八日大便硬者陽明病也程郊倩曰此證謂之太陰陽明陽明為病本之胃實不特三陽受邪能轉屬陽明三陰亦能轉屬陽明推之少陰三大承氣厥陰一小承氣何非轉屬陽明之病哉金匱用治支飲胸滿更名厚朴大黃湯徐忠可曰言支飲則必稍偏矣然不引痛脅下亦不言脅支滿而只胸滿雖是偏而不甚偏故可直驅之而用小承氣氣順則自下也此即小承氣治腹滿之痛而閉者即曰三物湯蓋此重散結氣故以厚朴為主彼乃與七物湯對照言之也加羌活名三化湯機要治中風邪氣作實二便不通三化者使三焦通利復其傳化之常也加羌活者病本於風也然中風多虛氣上逆無用承氣之理非堅實之體不可輕投調胃承氣湯仲景治傷寒陽明病不惡寒反惡熱口渴便閟譫語腹滿中焦燥實及傷寒吐後腹脹滿者邪在表則身熱汗出而惡寒邪已入里則表證罷故不惡寒身熱汗出而反惡熱也汗多亡津熱又入里故口渴便閟無水以制火內有燥屎故妄見妄言而譫語吐後不解腹脹滿者熱入胃也然滿而痛不宜急下故少與調胃和之陽明病不吐不下而心煩者吐後煩為內煩下後煩為虛煩不吐不下心煩者胃有鬱熱也亦治渴證中消善食而溲大黃酒浸芒硝一兩甘草炙五錢少少溫服大黃苦寒除熱蕩實芒硝鹹寒潤燥軟堅二物下行甚速故用甘草甘平以緩之不致傷胃故曰調胃承氣去枳朴者不欲其犯上焦氣分也準繩曰陽明一證分為太陽正陽少陽三等按本草大黃酒浸入太陽經酒洗入陽明經浸久於洗故能引於至高之分仲景以調胃承氣收入太陽門而大黃注曰酒浸湯後曰少少溫服曰當和胃氣又本湯治不吐不下心煩者及發汗不解蒸蒸發熱者吐後腹脹滿者是太陽陽明去表未遠其病在上不當攻下故宜緩劑調扣之也至正陽陽明則曰急下之而大承氣湯大黃注曰酒洗洗輕於浸是微升其走下之性以治其中也至少陽陽明則去正陽而逼太陰其分為下故小承氣湯大黃不用酒製少陽不宜下故去芒硝又曰少與微溏之勿令大泄下此仲景之妙法也大承氣統治三焦小承氣不犯下焦調胃承氣不犯上焦加當歸薑棗煎名當歸承氣湯河間治裡熱火鬱或皮膚枯燥或咽燥鼻乾或便溺祕結或瘀血發狂加當歸入血分以潤燥調營亦與桃仁承氣同意加薑棗引入胃也除芒硝名大黃甘草湯金匱治食已即吐徐忠可曰食已即吐非復嘔病矣亦非胃弱不能消乃胃不容谷食已即出者也明是有物傷胃營氣閉而不納故以大黃通營分已閉之穀氣而兼以甘草調其胃爾外臺用治吐水大黃亦能開脾氣之閉而使散精於肺通調水道下輸膀胱也用大黃二兩半芒硝甘草各二兩又名破棺丹治多汗大渴便閉譫語陽結之證及諸瘡腫熱董廢翁云按承氣三方俱仲景成法所謂急下之以存真陰不使胃中津液為實熱之邪燔灼枯槁而死皆先賢至精至妙之旨也但後世腸胃脆薄者多氣血充實者少審之未的或致誤投一下之後變證蜂起卒致不救粗工殺人往往因此所以後賢師古人之意變古人之法凡審其人病系實邪而質非強壯脈不牢固者概用滋陰補水之劑如甘露飲四物湯或六味飲貞元飲或左歸飲去茯苓加花粉濃煎頻進令胃中津液充足實邪自解陰氣外溢則得汗陰血下潤則便通奏效雖遲實稱穩當此乃仲景功巨不可不知也又曰治感證大法總以始終照顧胃中津液為第一奧旨蓋邪之所感皮毛閉塞氣不外達鬱而成熱熱積皮毛不解漸而肌肉熱矣漸而各經絡無不熱矣漸而熱氣皆壅塞陽明府中熱矣此必然之勢也又況邇來稟賦漸薄且喜御酒肉厚味胃中素有濕熱者多一旦客熱交併區區陰津幾何能當此烈焰燎原乎凡感證之死皆由胃汁乾枯故也是以古人立法及其邪之在表血氣未傷之時當汗汗之欲熱從汗解則清寧安固而氣血全保不傷矣當其邪之在裡血氣漸虧之際可下下之欲熱隨便通則焦灼頓除而氣血可徐俟其來復矣其有氣血素虧之人三五日後不論表證解與未解里證急與不急一見口乾唇焦舌胎黑燥全用滋養清涼虛甚者並涼藥不用純陰重劑加人參升發運用但救得胃中津液不竭其人必不即死及其津液漸充汗自能來宿物自下至所謂胃中之津液非他即周身氣血所化乃後天之本也凡人平日之強弱及遇外感賊邪之難治易治可治不可治強半憑此粗工不知無論新久虛實但見身熱風藥混表一覺滿悶攻中破氣雜投不效大黃枳朴繼進必求一便以畢其技能豈慮熱得風而益熾陰被劫而速亡何其與先賢之意相反乎大陷胸湯仲景治傷寒下早表邪內陷膈內拒痛心下因硬成結胸證或重汗而復下之不大便五六日舌上燥渴日晡所小有潮熱從心上至小腹硬滿而痛不可近者按之硬痛者為結胸硬而不痛者為痞下之太早邪熱乘虛入結於心胸之間故硬而痛又有硬痛而無熱證者為寒實結胸白散主之結胸固當下然脈浮大者下之則死以其猶帶表邪下之重虛結而又結故死嘉言曰太陽誤下之脈主病皆在陽在表即有沉緊沉滑之殊皆不得以里陰名之六書云胸膈滿者胸間氣塞滿悶也非心下滿脅滿者脅肋脹滿也非腹中滿蓋表邪傳裡必先胸以至心腹入胃是以胸滿多帶表證宜微汗脅滿多帶半表半裡宜和解胸中痰實者宜湧之如結實燥渴便祕宜以此湯下之附白散巴豆一分去心皮炒黑研貝母桔梗各三分治寒實結胸巴豆辛熱以散寒結貝母苦辛以散痰熱結在胸故以桔梗浮而上之利膈清表故病在膈上必吐病在膈下必利也大黃二兩芒硝一升甘遂一錢為末先煮大黃去渣內芒硝煮一二沸內甘遂末溫服表邪入里結於高位以致三焦俱實手不可近證為危急非常藥所能平故以甘遂苦寒行水直達為君芒硝鹹寒軟堅為臣大黃苦寒蕩滌為使三藥至峻而有起死之功準繩曰邪結胸中處至高之分宜若可吐然邪氣與胸中陽氣相結不能分解壅於心下為硬為痛非虛煩膈實者所可同故須攻下也低者舉之高者陷之以平為期故曰陷胸也經又曰太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之朱丹溪曰太陽病在表而攻裡可謂虛矣原文曰太陽病脈浮而動數今得誤下動數變遲矣又曰胃中空虛又曰短氣躁煩虛之甚矣假曰陽氣內陷心下因硬而可迅攻之乎豈陷胸之力反緩於承氣一下再下寧不畏其虛乎前文曰結胸脈浮大者下之死又曰結胸證悉具煩躁者死今曰脈浮又曰煩躁大陷胸果可用乎若胃中空虛客氣動膈心中懊憹當以梔子豉湯吐去胸中之邪陶節庵曰結胸乃下早而成未曾經下者非結胸也乃表邪傳至胸中證雖滿悶尚為在表正屬少陽部分半表半裡之間只須小柴胡加枳桔以治未效則以小柴胡對小陷胸一服豁然若因下早而成者方用陷胸湯丸分淺深從緩治之不宜太峻上焦乃清道至高之分過下則傷元氣也崔行功曰傷寒結胸欲絶心膈高起手不可近用大陷胸湯不瘥者此下後虛逆氣已不理毒復上攻當用枳實理中丸先理其氣次調諸疾其效如神活人云誤下未成結胸中者急頻與理中湯自然解了蓋理中治中焦故也胃中雖和傷寒未退宜候日數足欲以承氣再下之蓋前來之下未是也其水結胸者用小半夏加茯苓湯小柴胡去棗加牡蠣主之又有血結胸證手不可近漱水不欲咽喜忘如狂大便黑小便利宜犀角地黃湯小陷胸湯仲景治傷寒誤下小結胸正在心下按之則痛脈浮滑者及痰熱塞胸前證上下俱硬此則正在心下前證痛不可近此則按之則痛結胸脈沉緊或寸浮關沉今脈浮滑知熱未深與此湯以除膈上結熱黃連一兩半夏半升栝蔞大者一枚黃連之苦寒以泄熱栝蔞之寒潤以滌垢半夏之辛溫以散結結胸多由痰熱結聚故用三物以除痰去熱也劉心山曰結胸多由痰飲凝結心胸故陷胸瀉心用甘遂半夏栝蔞枳實旋覆之類皆為痰飲而設也大陷胸丸仲景治傷寒結胸項強如柔痙狀有汗為柔痙胸膈實滿故項強而不能俯項屬太陽部位大黃八兩杏仁去皮尖葶藶炒芒硝各半升合研取如彈丸一枚別搗甘遂末一錢白蜜丸合煮服大黃之苦寒以泄熱芒硝之鹹寒以軟堅杏仁之苦甘以降氣葶藶甘遂取其行水而直達白蜜取其潤滑而甘緩十棗湯仲景治太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出頭痛心下痞硬引脅下痛乾嘔短氣汗出不惡寒表解而里未和邪熱內蓄有伏飲者下利嘔逆里受邪也汗出不惡寒表已解也頭痛痞硬引脅下痛乾嘔短氣邪熱內蓄而有伏飲也此為水氣上逆嘔逆頭痛與表證頭痛稍別周揚俊曰此證與結胸頗同故湯亦與陷胸相仿表解後攻與結胸之戒不殊也芫花炒黑甘遂大戟等分大棗十枚先煮棗去滓內前藥末強人服一錢虛人五分或棗肉為丸病不除者再服得快下後糜粥自養芫花大戟之辛苦以遂水飲甘遂苦寒能直達水氣所結之處以攻決為用三藥過峻故用大棗之甘以緩之益土所以勝水使邪從二便而出也十棗湯小青龍湯主水氣乾嘔桂枝湯主太陽汗出乾嘔姜附湯主少陰下利乾嘔吳茱萸湯主厥陰吐涎沫乾嘔王海藏曰表有水用小青龍里有水用十棗李時珍曰仲景治傷寒太陽證表未解心下有水氣而咳乾嘔發熱或喘或利小青龍湯主之表已解有時頭痛惡寒心下有水氣乾嘔痛引兩脅或喘或咳十棗湯主之蓋青龍散表邪使水從汗出內經所謂開鬼門也十棗逐里邪使水從二便出內經所謂潔淨腑去陳莝法也或問十棗湯桂枝去桂加茯苓白朮湯皆屬飲家俱有頭痛項強之證何也張兼善曰太陽經多血少氣病人表熱微渴恣飲水漿為水多氣弱不能施化本經血氣因凝滯致有頭痛項強之患不須攻表但宜逐飲飲盡則自安杜壬曰里未和者蓋痰與燥氣壅於中焦故頭痛乾嘔汗出短氣是痰膈也非十棗不能除但此湯不宜輕用恐損人於倏忽除大棗加大黃黑醜輕粉水丸名三花神佑丸河間治壯實人風痰鬱熱肢體麻痹走注疼痛濕熱腫滿氣血壅滯不得宣通及積痰翻胃服二丸後轉加痛悶此痰涎塞頓攻不開再加二丸快利則止加牽牛大黃大瀉氣血之濕加輕粉無竅不入以去痰積虛人尤不可輕用本方各五錢加黃柏三兩酒炒大黃煨兩半粥丸名小胃丹丹溪治胸膈腸胃熱痰濕痰赤金豆亦名八仙丹治諸積不行凡血凝氣滯疼痛腫脹蟲積結聚證堅宜此主之此丸去病極速較之硝黃稜莪之類過傷臟氣者大為勝之巴霜去皮膜略去油一錢五分生附子切略炒燥二錢皂角微炒焦二錢丁香木香天竺黃各二錢輕粉一錢硃砂二錢為衣為末醋浸蒸餅為丸蘿蔔子大硃砂為衣欲漸去每服五七丸欲驟行者每服一二十丸用滾水或煎藥或姜醋茶蜜茴香使君子煎湯為引送下若利多不止可飲冷水一二口即止蓋此藥得熱則行得冷即止也如治氣濕食滯鼓腫先用紅棗煮熟取肉一錢許隨用七八丸甚者一二十丸同棗肉研爛以熱燒酒加白糖少許送下如治蟲痛亦用棗肉和服只用清湯送下三物備急丸千金治食停腸胃冷熱不調腹脹氣急痛滿欲死及中惡客忤卒暴諸病食滯腸胃上焦不行下脘不通故痛脹欲死內實者法當下之巴豆霜大黃乾薑等分蜜丸小豆大每服二三丸中惡口噤者折齒灌之崔氏乾薑易桂枝名備急散大黃苦寒以下熱結巴豆辛熱以下寒結加乾薑辛散以宣通之乾薑辛溫開五臟六腑通四肢關節三藥峻厲非急莫施故曰備急太平丸治胸腹疼痛脹滿及食積氣積氣疝血疝邪實祕滯等證此方借些微巴豆以行群藥之力去滯最妙如欲其峻須用巴豆二錢陳皮厚朴木香烏藥白芥子草豆蔻三稜蓬莪朮煨乾薑牙皂炒煙斷澤瀉各三錢以上十一味共為細末另將巴豆用滾湯泡去皮心並膜稱足一錢用水一碗微火煮半碗將巴豆撈起用乳鉢研極細仍將煎湯攙入研勻然後量藥多少入蒸餅浸爛搗丸前藥如緑豆大每用三分或五分甚者一錢隨證用湯引送下凡傷食停滯即以本物湯下婦人血氣痛或紅花湯下或當歸湯下氣痛陳皮湯下疝氣茴香湯下寒氣薑湯下欲瀉者用熱湯送下一錢未利再服利多不止用冷水一二口即止硇砂丸本事治一切積聚痰飲心脅引痛硇砂巴豆去油三稜乾薑白芷五錢木香青皮胡椒二錢半乾漆炒大黃一兩檳榔肉豆蔻一個為末釅醋二升煮巴豆五七沸再下三稜大黃末同煎五七沸入硇砂熬成膏和諸藥杵丸緑豆大每服五丸薑湯下此治肉積氣積血積通劑也硇砂化肉食硇砂性大熱能爛五金本草言其能化人心為血故治膈噎癥瘕肉積有殊功乾漆散瘀血木香青皮行滯氣三稜破血而行氣肉蔻暖胃而和中白芷散風而除濕乾薑胡椒除沉寒固冷大黃巴豆能斬關奪門方內多辛熱有毒之品用之以破冷攻堅惟大黃苦寒假之以蕩熱去實蓋積聚既深攻治不得不峻用醋者酸以收之也玉機微義曰方中因白芷散水行氣故更言治痰飲也潔古曰壯人無積虛人則有之皆由脾胃怯弱氣血兩衰四時有感皆能成積若遽以磨堅破結之藥治之疾似去而人已衰矣乾漆硇砂三稜大黃牽牛之類得藥則暫快藥過則依然氣愈消疾愈大竟何益哉故善治者當先補虛使氣血旺積自消如滿坐皆君子則小人自無容地也不問何臟先調其中使能飲食是其本也敦阜丸治堅頑食積停滯腸胃痛劇不行等證木香山楂麥芽皂角丁香烏藥青皮陳皮澤瀉各五錢巴霜一錢上共為末用生蒜頭一兩研爛加熟水取汁浸蒸餅搗爛丸緑豆大每服二三十丸隨便用湯引送下如未愈徐徐加之木香檳榔丸子和治胸腹積滯痞滿結痛二便不通或瀉泄下痢裡急後重食瘧實積胸腹痞滿瀉痢由於飲食留滯濕熱鬱積而成二便不通由於熱結裡急後重由於氣滯按裡急後重有因火熱者火燥物而性急也有因氣滯者大腸氣壅不得宣通也有因積滯者腸胃有物結墜也有氣虛者中氣陷下不能升也有血虛者津枯腸燥虛坐努責是也當分證論治脈洪大而實為裡實宜下若脈浮大慎不可下莪朮醋煮三稜醋煮黃連吳萸湯炒黃柏酒炒枳殼陳皮去白青皮醋炒檳榔木香五錢大黃酒浸一兩香附黑牽牛二兩芒硝水丸量人虛實服一方加當歸酒洗張子和儒門事親無三稜枳殼只十味紺珠無三稜陳皮名木香導氣丸濕熱在三焦氣分木香香附行氣之藥能通三焦解六郁陳皮理上焦肺氣青皮平下焦肝氣瀉痢多由肝木克脾土枳殼寬腸而利氣而黑醜檳榔又下氣之最速者也氣行則無痞滿後重之患矣瘧痢由於濕熱鬱積氣血不和黃柏黃連燥濕清熱之藥三稜破血中氣滯莪朮破氣中血滯大黃芒砂血分之藥能除血中伏熱通行積滯併為摧堅化痞之峻品濕熱積滯去則二便調而三焦通泰矣蓋宿垢不除清陽終不得升故必假此以推蕩之亦通因通用之意然非實積不可輕投滑伯仁曰腸胃陽明燥金也下焦少陽相火也後重之用木香檳榔行燥金之郁也癃閉之用知母黃柏散相火之熾也百順丸治一切陽邪積滯凡氣積血積蟲積食積傷寒實熱祕結等證但各為湯引隨宜送下無往不利川大黃錦紋者一斤牙皂角炒微黃一兩六錢為末湯浸蒸餅為丸緑豆大每用五分或一錢或二三錢酌宜用引送下或用蜜丸亦可枳實導滯丸東垣治傷濕熱之物不得施化痞悶不安腹內硬痛積滯泄瀉大黃一兩枳實麩炒黃芩酒炒黃連酒炒神麯五錢白朮土炒茯苓三錢澤瀉二錢蒸餅為丸量多寡服飲食傷滯作痛成積非有以推蕩之則不行積滯不盡病終不除故以大黃枳實攻而下之而前瀉反止經所謂通因通用也傷由濕熱黃芩黃連佐之以清熱茯苓澤瀉佐之以利濕積由酒食神麯蒸窨之物化食解酒因其同類溫而消之芩連大黃苦寒太甚恐其傷胃故又以白朮之甘溫補土而固中也倒倉法丹溪黃牡牛肉肥嫩者二三十斤切碎洗淨用長流水桑柴火煮糜爛濾去滓取淨汁再入鍋中文武火熬至琥珀色則成矣擇一靜室明快不通風者令病人先一夜不食坐其中每飲一盅少食又飲積數十盅病在上者必吐病在下者必利病在中者吐而且利視所出物可盡病根乃止連進之急則逆上而吐多緩則順下而利多視病之上下而為緩急吐利後必渴不得與湯其小便必長取以飲之名輪回酒非惟止渴兼滌余垢行後倦臥覺飢先與米飲次與稀粥三日後方與厚粥軟飲飯羹調養半月一月精神煥發沉疴悉痊矣須戒色欲半年一年戒牛肉五年霞天膏即照前法每肉十二斤可熬膏一斤瓷罐盛之夏月水浸可留三日寒天久留生徵用重湯煮入煎劑調服入丸劑每三分加面一分煮糊或同蜜煉朱丹溪曰牛坤土也黃土之色也以順為德而法健為功者牡之用也肉胃之藥也液無形之物也積聚久則形質成依附腸胃回薄曲折之處以為窠臼豈銖兩之丸散所能窺其藩牖乎肉液充滿流行無處不到如洪水泛漲浮巫陳朽皆順流而下不能停留凡屬滯礙一洗而空澤枯潤槁補虛益損寧無精神煥發之藥乎其方傳於西域異人中年後行一二次亦卻病養壽之一助也王綸曰牛肉補中非吐下藥借補為瀉以瀉為補亦奇方也蜜煎導法仲景治陽明證自汗小便利大便祕者胃實自汗小便復利此為津液內竭非熱結也若與下藥則液愈耗矣雖大便硬不可攻之宜俟其欲大便然後用外導之法蜜七合銅器中微火煎頻攪勿令焦候凝如飴捻作錠子令頭鋭大如指長寸許摻皂角末少許乘熱納穀道中用手抱住大便出時乃去之加鹽少許亦可咸能潤燥軟堅蜜能潤腸熱能行氣皂能通竅津液內竭概不可攻須俟其欲便乃導而通之不欲以苦寒傷胃也徐忠可曰此為大便將行而不能潤利者設也結胸痞滿臟結胃有燥屎皆有見證今但自汗且小便利是津耗熱鬱而乾燥也豬膽導法仲景治證同前豬膽一枚取汁入醋少許用竹管長三四寸一半納穀道中將膽汁灌入頃當大便便祕者屬燥屬熱自汗者為亡津液當小便不利今反利是熱猶未實故不可攻豬膽汁寒勝熱滑潤燥苦能降醋酸善人故能引入大腸而通之也海藏法用蜜煎鹽相合或草烏未相合亦可蓋鹽能軟堅潤燥草烏能化寒消結可隨證陰陽所宜而用之準繩曰凡多汗傷津及屢經汗下不解或尺中脈遲弱元氣素虛人便欲下而不潤利者並宜導法但須分津液枯者用蜜導邪熱甚者用膽導濕熱痰飲固結薑汁麻油浸栝蔞根導惟下傍流水者導之無益非大承氣峻攻不效以實結在內而不在下也至於陰結便閉者宜於蜜道中加薑汁生附子末或削陳醬姜導之此補長沙之未備也大螺著小腹法宋季饒醫熊彥誠年五十五歲病前後便溺不通五日腹脹如鼓同輩環視皆不能措力與西湖妙果僧慧月相善遣信邀至訣別月驚馳而往於釣橋逢一異客揖之曰方外高人何孑孑走趨若是月曰一善友久患祕結痛危急欲往問客曰易事爾待奉施一藥即脫靴入水探一大螺而出曰事濟矣抵家以鹽半匙和殼生搗置病者臍下一寸三分用寬帛緊繫之仍辦溺器以須其通月未以為然姑巽謝之至熊家彥誠昏不知人妻子聚泣諸醫知無他策慢使試之曾未安席而暴下諸醫愧嘆而散月歸訪異人不見矣熊後十六年乃終此因熱祕而便溺不通大螺性寒而善分清故濁水之中一養大螺便能澄徹劑之以鹽取其善潤而已罨傷寒結胸法凡傷寒結胸其有中氣虛弱不堪攻擊內消須以此法外罨之則滯行邪散其效如神蔥白頭四兩生薑四兩生蘿蔔此味加倍如無以子代之上三味共搗一處炒熱用手巾或白布包作大餅罨胸前脹痛處此藥須分二包冷則輪換罨之無不即時開通汗出而愈但不宜大熱恐炮烙難受也又法以大蒜頭一二十個搗爛攤厚紙或薄絹上貼於脹處少頃即散用治一切腹脹無不神效竹葉熏法凡大便不通實結在肛門而不得下將烈火煮竹葉一鍋乘滾熱傾淨桶內上撒絛礬末一握坐上熏之即通蘿蔔菜熏法用蘿蔔菜如上法亦妙如無蘿蔔菜即青菜亦可卷四下消導門消者散其積也導者行其氣也脾虛不健則氣不流行氣不流行則停滯而為積或作瀉痢或成症痞以致飲食減少五臟無所資稟氣血日以虛衰因致危因者多矣故必消而導之峻劑已見攻下門茲集緩攻平治之劑枳朮丸潔古消痞除痰健脾進食白朮二兩土蒸枳實一兩麩炒為末荷葉包陳米飯煨乾為丸痞悶加陳皮氣痞加木香傷食加麥芽神麯東垣曰白朮甘溫補脾胃之元氣其味苦除胃中濕熱利腰臍間血過於枳實克化之藥一倍枳實苦寒泄胃中痞悶化胃中所傷是先補其虛而後化其傷則不峻矣荷葉中空色青形仰象震在人為少陽膽胃氣元氣穀氣甲膽上升之氣皆生氣也食藥感此氣化胃氣何為不上升乎燒飯與白朮協力滋益穀氣補令胃厚不致再傷其利廣矣王安道曰勞倦飲食雖俱為內傷誠不足矣飲食傷又當於不足之中分其有餘夫飢餓不飲食者胃氣空虛此為不足而傷也飲食自倍腸胃乃傷者此不足之中兼有餘而傷也惟其不足故補益惟其有餘故消導亦有物滯氣傷宜消補兼行者亦有物滯氣不傷但須消導者亦有不須消導但須補益者枳朮丸之類雖曰消導固有補益之意焉亦有所滯之物非枳丸之力所能去者備急丸煮黃丸瓜蒂散等潔古東垣亦未嘗委之而勿用也景嶽曰枳朮丸以白朮為君脾得其燥所以能健然佐以枳實其味苦峻有推牆倒壁之功此實乃攻於守之劑推脾氣不清而滯勝者正當用之若脾氣已虛非所宜也今人不察相傳為補脾之藥而朝吞暮吐或以小兒瘦弱制今常服則過足以傷其氣助其瘦弱用宜酌也金匱用枳實七枚白朮二兩作湯名枳朮湯治水飲心下堅大如盤邊如旋盤心下上為陽分也屬氣分之水加半夏一兩名半夏枳朮丸治脾濕停痰及傷冷食淋者加澤瀉一兩加陳皮半夏名橘半枳朮丸健脾消痞化痰加橘皮一兩名橘皮枳朮丸治飲食不消氣滯痞悶加木香一兩名木香枳朮丸治氣滯痞滿木香平肝行氣使木不剋土再加砂仁名香砂枳朮丸破滯氣消飲食強脾胃再加乾薑五錢名木香乾姜枳朮丸兼治氣寒再加人參陳皮名木香人參乾薑枳朮丸開胃進食加茯苓五錢乾薑七錢名消飲丸治停飲胸滿嘔逆加酒炒黃連黃芩大黃炒神麯橘紅各一兩名三黃枳朮丸治傷肉食濕面辛熱味厚之物填塞悶乳不快加神麯麥芽各一兩名三黃枳朮丸治內傷飲食或泄瀉平胃散局方治脾有停濕痰飲痞膈宿食不消滿悶嘔瀉土濕太過木邪乘不勝而侮之脾虛不能健運故有痰食留滯中焦致生痞滿諸證胃寒則嘔濕盛則瀉及山風瘴霧不服水土嵐瘴水土之病亦由胃虛故易感也蒼朮泔浸二錢厚朴薑製陳皮去白甘草炙一錢加薑棗煎傷食加神麯麥芽或枳實濕勝加五苓痰多加半夏脾倦不思食加參耆痞悶加枳殼木香大便祕加大黃芒硝小便赤澀加苓澤傷寒頭痛加蔥豉取微汗蒼朮辛烈燥濕而強脾厚朴苦溫除濕而散滿苦降能瀉實滿辛溫能散濕滿陳皮辛溫利氣而行痰甘草中州主藥能補能和為使泄中有補務令濕土底於和平也景嶽曰平胃者欲平治其不平也此為胃強邪實者設故其性味從辛從燥從苦而能消能散惟有滯有濕有積者宜之今見方家每以此為常服健脾之劑動輒用之而不察其可否其誤甚矣合二陳加藿香名除濕湯治傷濕腹痛身重足軟大便溏瀉加藁本枳殼桔梗名和解散局方治四時傷寒頭痛煩躁自汗咳嗽吐利加藿香半夏名藿香平胃散又名不換金正氣散局方治胃寒腹痛嘔吐及瘴疫濕瘧再加人參茯苓草果生薑烏梅名人參養胃湯治外感風寒內傷生冷夾食停痰嵐瘴瘟疫或飲食傷脾發為痎瘧老瘧也加麥芽炒曲名加味平胃散治宿食不消吞酸噯臭除蒼朮加木香草蔻乾薑茯苓名厚朴溫中湯治脾胃虛寒心腹脹滿及秋冬客寒犯胃時作疼痛散以辛熱佐以苦甘滲以甘淡氣溫胃和痛自止矣本方一兩加桑白皮一兩名對金飲子治脾胃受濕腹脹身重飲食不進肢酸膚腫和胃飲治寒濕傷脾霍乳吐瀉及痰飲水氣胃脘不清嘔惡脹滿等證陳皮厚朴各一錢五分乾薑炮一二錢炙甘草一錢此即平胃散之變方也凡嘔吐等證多有胃氣虛寒一聞蒼朮之氣亦能動嘔故以乾薑代之凡藿香木香丁香茯苓半夏扁豆砂仁澤瀉之類皆可隨宜增用之若胸腹有滯而兼時氣寒熱加柴胡以清利之保和丸治食積飲停腹痛泄瀉痞滿吐酸積滯惡食食瘧下痢傷於飲食脾不運化滯於腸胃故有泄痢食痢等證傷而未甚不欲攻以厲劑惟以和平之品消而化之故曰保和東垣曰傷飲者無形之氣也宜發汗利小便以導其濕傷食者有形之物也輕則消化或損其谷重則方可吐下脈經云大腸有宿食寒栗發熱有時如瘧輕則消導重則下之山楂三兩去核神麯炒茯苓半夏一兩陳皮萊蔔子微炒連翹五錢曲和丸麥芽湯下或加麥芽入藥亦可山楂酸溫收縮之性能消油膩腥膻之食收縮故食消陳曲辛溫蒸窨之物能消酒食陳腐之積蔔子辛甘下氣而制面麥芽鹹溫消穀而軟堅堅積堅痰傷食必兼乎濕茯苓補脾而滲濕積久心郁為熱連翹散結而清熱半夏能潤能燥和胃而健脾陳皮能降能升調中而理氣此傷於飲食而氣未病者故但當消導也加白朮白芍去半夏蔔子連翹蒸餅糊丸名小保和丸助脾進食加白朮二兩名大安丸或加人參治飲食不消氣虛邪微加白朮香附黃芩黃連厚朴枳實治積聚痞塊合越鞠丸扶脾開鬱芍藥枳實丸治食積痞滿及小兒腹大脹滿時常疼痛脾胃不和等證此方較枳朮丸其效更神白朮麵炒赤芍藥酒炒二兩枳實麩炒陳皮一兩荷葉湯煮黃老米糊為丸桐子大米飲或滾白湯任下百餘丸如臟寒加炒黃乾薑一二兩如脾胃虛加人參一二兩痞氣丸東垣治脾積在於胃脘大如盤久不愈令人四肢不收或發黃疸飲食不為肌膚金匱曰堅而不移者名積為臟病推移不定者名聚為腑病按痞病由陰伏陽蓄氣血不運而成處心下位中央填塞痞滿皆土病也與脹滿有輕重之分痞惟內覺滿悶脹滿則外有脹急之形也有中氣虛衰不能運化精微而成痞者有飲食痰積不能施化而成痞者有濕熱太甚上乘心下而成痞者古方用黃連黃芩枳實之苦以泄之厚朴半夏生薑之辛以散之人參白朮之甘苦溫以補之茯苓澤瀉之淡以滲之惟宜上下分消其氣果有內實之證庶可略施疏導世人苦於痞塞喜用利藥暫時通快藥過滋甚皆由不察中氣不暈所致爾黃連八錢厚朴五錢吳茱萸三錢白朮土炒黃芩二錢茵陳酒炒乾薑炮砂仁錢半人參茯苓澤瀉一錢川烏炮川椒炒五分桂巴豆霜四分蜜丸燈草湯下黃連瀉熱燥濕治痞君藥仲景治痞滿諸瀉心湯皆用之厚朴砂仁行氣而散滿茵陳苓瀉利水以實脾黃芩清肺而養陰椒萸燥脾而逐冷薑桂川烏補命火以生脾土而薑桂又能去瘀生新脾無積血心下不痞巴豆能消有形滯積為斬關奪門之將藉之以為先驅加參朮者以補脾元正氣正旺然後可以去邪也潔古曰養正積自除除吳茱白朮茯苓澤瀉茵陳川椒砂仁加菖蒲茯神丹參紅豆名伏梁丸治心積起臍上至心下大如臂令人煩心除吳茱砂仁桂術黃芩澤瀉加柴胡莪朮皂角昆布甘草名肥氣丸治肝積在左脅下有頭足令人發咳痎瘧不已除吳茱白朮砂仁黃芩茵陳澤瀉加紫菀桔梗天冬白蔻清皮陳皮三稜名息賁丸淡薑湯下治肺積在右脅下令人灑淅寒熱喘咳發肺癰秋冬黃連減半除吳茱白朮砂仁人參乾薑川椒黃芩茵陳加菖蒲丁香附子苦楝延胡獨活全蠍名賁豚丸淡鹽湯下治腎積發於小腹上至心下若豚狀上下無時令人喘咳骨痿及男子七疝女子瘕聚帶下此東垣五積方也雖有破滯削堅之藥多借人參之力贊助成功經曰大積大聚其可犯也衰其大半而止過者死十香丸治氣滯寒滯諸病木香沉香澤瀉烏藥陳皮丁香小茴香香附酒炒荔枝核煨焦各等分皂角微火燒煙盡減半為末酒糊丸彈子大者磨化服丸桐子大者湯引下㿗疝之屬溫酒下枳實消痞丸東垣治心下虛痞惡食懶倦右關脈弦脾虛不運故痞滿惡食脾主四肢虛故懶倦右關屬脾脈弦者脾虛而木來侮之也經曰太陰所至為積飲痞隔皆陰勝陽也受病之臟心與脾也因而鬱塞為痞者火與濕也蓋心陽火也主血脾陰土也主濕凡傷其陽則火怫鬱而血凝傷其陰則土壅塞而濕聚陰陽之分施治之法不可同也枳實麩炒黃連薑汁炒五錢厚朴姜炒四錢半夏曲麥芽炒人參白朮土炒茯苓三錢甘草炙乾薑二錢蒸餅糊丸枳實苦酸行氣破血黃連苦寒瀉熱開鬱並消痞之君藥厚朴苦降散濕滿而化食麥芽鹹溫破結氣而軟堅半夏燥痰濕而和胃乾薑去惡血而通關開五臟六腑通四肢關節皆所以散而瀉之也參朮苓草甘溫補脾使氣足脾運而痞自化既以助散瀉之力又以固本使不傷真氣也玉機微義曰此半夏瀉心湯加減法也內有枳朮四君平胃等藥利濕消痞補虛之劑也廓清飲治三焦壅滯胸膈脹滿氣道不清小水不利年力未衰通身腫脹或肚腹單脹氣實非水等證枳殼二錢厚朴一錢半大腹皮一二錢白芥子七分或一二錢陳皮二錢茯苓連皮用二三錢蘿蔔子生搗一錢如中不甚脹能食者不用澤瀉二三錢水煎食遠服內熱多火小便熱數者加梔子木通各一二錢身黃小便不利者加茵陳二錢小腹脹滿大便堅實不通者加生大黃三五錢肝滯脅痛者加青皮氣滯胸腹疼痛者加烏藥香附食滯者加山楂麥芽健脾丸治脾虛氣弱飲食不消白朮土炒人參二兩麥芽陳皮二兩山楂去核兩半枳實三兩神麯糊丸米飲下脾胃者蒼廩之官胃虛則不能容受故不嗜食脾虛則不能運化故有積滯所以然者由氣虛也參朮補氣陳皮利氣氣運則脾健而胃強矣山楂消肉食麥芽消穀食戊己不足胃為戊土脾為己土故以二藥助之使化枳實力猛能消積化痞佐以參朮則為功更捷而又不致傷氣也夫脾胃受傷則須補益飲食難化則宜消導合斯二者所以健脾也去山楂麥芽加茯苓炙甘草名益氣健脾丸治脾虛食少去山楂麥芽陳皮加當歸芍藥芎藭麥冬柏子仁名養營健脾丸治脾陰不足飲食不為肌膚血充然後肉長去人參枳實麥芽加香附木香半夏茯苓神麯黃連當歸芍藥一方無芍藥荷葉燒飯丸名理氣健脾丸治脾胃虛弱久瀉久痢去人參山楂麥芽加神麯川芎香附曲糊丸名舒郁健脾丸治脾氣鬱滯飲食不消去山楂麥芽加半夏膽星蛤粉茯苓神麯糊丸名化痰健脾丸治內傷挾痰去人參山楂麥芽加半夏山梔黃連水丸名清火健脾丸治脾虛有火去人參山楂麥芽加木香檳榔厚朴半夏甘草名和中健脾丸治胃虛飢不欲食仍用人參名妙應丸治胃虛不能食臟腑或結或泄去山楂加半夏青皮木香砂仁草蔻乾薑炙甘草茯苓豬苓澤瀉蒸餅丸名寬中進食丸東垣補脾胃進飲食解肝煎治暴怒傷肝氣逆脹滿陰滯等證如兼肝火者宜化肝煎方見瀉火門陳皮半夏厚朴茯苓一錢五分酥葉芍藥一錢砂仁七分加煨姜三五片如脅肋脹痛加白芥子一錢胸膈氣滯加枳殼香附藿香之屬排氣飲治氣逆食滯等證陳皮枳殼藿香一錢五分香附澤瀉烏藥二錢厚朴一錢木香七分或一錢水煎熱服如食滯者加山楂麥芽各二錢寒滯者加焦乾姜肉桂之屬氣逆之甚者加白芥子沉香青皮檳榔之屬嘔而兼痛者加半夏丁香之屬痛在小腹者加小茴香兼疝者加荔枝核煨熟搗碎用二三錢葛花解酲湯專治酒積或嘔吐或泄瀉痞塞頭痛小便不利酒熱而兼濕濕熱積於腸胃故見諸證葛花豆蔻砂仁一錢木香二分青皮陳皮人參白朮炒茯苓四分神麯炒乾薑豬苓澤瀉三分過飲無度濕熱之毒積於腸胃葛花獨入陽明令濕熱從肌肉而解豆蔻砂仁皆辛散解酒故以為君神麯解酒而化食木香乾姜調氣而溫中青皮陳皮除痰而疏滯二苓澤瀉能驅濕熱從小便出乃內外分消之劑飲多則中氣傷故又加參朮以補其氣也人參補氣最能解酒東垣曰酒大熱有毒無形之物也傷之只當發汗次利小便上下分消其濕氣今人或用酒證丸大熱之藥下之或用大黃牽牛下之是無形元氣受傷反損有形陰血陰血愈虛陽毒大旺元氣消亡而虛損之病成矣葛花解酒而發散不如枳椇枳椇一名雞距一名木蜜經霜黃赤而味甘其葉入酒酒化為水門外植此木者屋內釀酒多不佳大和中飲治飲食積滯留聚等證陳皮枳實二錢厚朴澤瀉山楂麥芽錢半砂仁五分水煎溫服脹甚者加白芥子胃寒無火或噁心者加炮乾薑一二錢疼痛者加木香烏藥香附之類痰多者加半夏小和中飲治胸膈脹悶或婦人胎氣滯滿等證扁豆炒山楂二錢陳皮茯苓厚朴錢半甘草五分加煨姜三五片嘔者加半夏一二錢脹滿而氣不順者加砂仁七八分火鬱於上者加炒梔子一二錢婦人氣逆血滯者加蘇梗香附之屬寒滯不行者加乾薑肉桂之屬鱉甲飲嚴氏治瘧久不愈腹中結塊名曰瘧母瘧久不愈為痎瘧多成癖於左脅之下名曰瘧母乃肝之積也瘧屬少陽膽經膽與肝相表裡久瘧屬在血分血亦肝所主也當以鱉甲為君隨證虛實而施佐使之藥鱉甲醋炙白朮土炒黃耆白芍酒炒檳榔草果麵煨厚朴陳皮甘草等分姜三片棗二枚烏梅少許煎久瘧必由脾虛白朮補脾氣黃耆補肺氣使氣足脾運方能磨積也川芎補肝而行血中氣滯芍藥助脾而散肝經火邪二藥並和厥陰營氣營血調則陰陽和矣陰陽不和而爭故發寒發熱檳榔下氣而攻積草果暖胃而祛寒厚朴破血而散滿陳皮理氣而消痰甘草和中而補土鱉甲鹹平屬陰色青入肝專能益陰補虛清熱散結故為痎瘧之君藥也小分清飲治小水不利濕滯脹腫不能受補等證如兼火者宜大分清飲方見卷七下燥濕門資生丸健脾開胃消食止瀉調和臟腑滋養營衛張三錫曰余初識繆仲淳時見袖中出彈丸咀嚼問之曰此得之祕傳飢者服之即飽飽食之即飢因疏其方已於醉飽後頓服二丸徑投枕臥夙興了無停滯始信此方消食之神也又善治胎前惡阻白朮米泔浸用山黃土拌九蒸九曬去土切片焙乾人參人乳浸飯鍋上蒸熟米仁三兩神麯查肉蒸橘紅二兩芡實淨肉麥芽雲苓去皮人乳拌飯鍋上蒸曬懷藥一兩五錢扁豆炒去殼蓮肉去心一兩桔梗米泔浸炒真藿香洗甘草蜜炙五錢川連薑汁炒白豆蔻仁微炒澤瀉二錢五分末之蜜丸每丸二錢重每服一丸醉飽後二丸細嚼淡薑湯下按此方九補九消即枳朮丸之意而推廣之立方較為穩妥名曰資生重脾胃也神香散治胸膈胃脘逆氣難解疼痛嘔噦脹滿痰飲隔噎諸藥不效者惟此最妙丁香白豆蔻仁或砂仁亦可等分為末清湯調下七分甚者一錢日數服不拘若寒氣作痛者薑湯送下卷五上和解門凡病兼虛者補而和之兼滯者行而和之兼寒者溫而和之兼熱者涼而和之和之為義廣矣亦猶土兼四氣其於補瀉溫涼之用無所不及務在調平元氣不失中和之為貴也故凡陰虛於下而精血虧損者忌利小水如四苓通草之屬是也陰虛於上而肺熱乾咳者忌用辛燥如半夏蒼朮細辛香附芎歸白朮之屬是也陽虛於上忌消耗如陳皮砂仁木香檳榔草之屬是也陽虛於下忌沉寒如黃柏知母梔子木通之屬是也大便溏泄忌滑利如天冬蓯蓉牛膝當歸柴胡童便之屬是也表邪未解忌收斂如五味棗仁地榆文蛤之屬是也氣滯者忌塞閉如黃耆白朮山藥甘草之屬是也凡邪火在上者不宜升火得升而愈熾矣沉寒在下者不宜降陰被降而愈亡矣諸動者不宜再動如火動者忌溫暖血動者忌辛香汗動者忌疏散神動者忌耗傷凡性味之不靜者皆所當慎其於剛暴更甚者則又在不言可知也諸靜者不宜再靜如沉微細弱者脈之靜也神昏氣怯者證之靜也肌體清寒者表之靜也口腹畏寒者里之靜也凡性味之陰柔者皆所當慎其於沉寒更甚者又在不言可知也夫陽主動以動濟動火上添油也不焦爛乎陰主靜以靜益靜雪上加霜也不寂滅乎凡前所論論其略爾而書不盡言言不盡意能因類而廣之斯知和之為義矣小柴胡湯仲景治傷寒中風少陽證往來寒熱寒為陰熱為陽里為陰表為陽邪客於半表半里陰出與陽爭陰勝則寒陽入與陰爭陽勝則熱又曰太陽行身之後屬膀胱寒水為表陽明行身之前屬胃燥金為表之裡邪在於中近後膀胱寒水則寒近前陽明燥金則熱也寒熱有定時者為瘧無定時者為往來寒熱以熱在表而淺邪惡正故惡寒寒已復熱此邪未並於表裡故寒熱微而無定時也胸脅痞滿心煩喜嘔半表半裡屬足少陽膽脈行於兩脅手少陽三焦之脈絡心包風邪干之心氣不得宣暢故煩滿或攻胸脅故又痞而痛也邪在表則不煩不嘔在裡則煩嘔表方傳裡故心煩喜嘔也默默不欲食邪在表則呻吟不安在裡則煩而悶亂邪自表而方傳裡故默默靜也經曰陽入之陰則靜邪在表則能食入里則不能食今在表裡之間故但不欲食未至於不能食也或脅下痛或腹中痛或渴或利裡虛協熱或咳或悸小便不利里有停飲耳聾口苦少陽膽脈絡於耳膽氣上溢故口苦脈弦肝與膽皆屬木故脈弦或汗後餘熱不解及春月時嗽瘧發寒熱婦人傷寒熱入血室血室衝脈也男女皆有之婦人傷寒七八日邪當傳裡值經水適來則邪不久入腑乘虛而入血室或經水適斷表邪乘虛亦入血室熱與血搏結而不行致有寒熱如瘧暮則譫語如見鬼狀在男子則下血譫語皆為熱入血室婦人傷寒與男子無異惟熱入血室妊娠傷寒為不同也小柴胡在經主氣在臟主血故更能入血室李東垣曰若血受病亦先調氣謂氣不調則血不行氣夫血婦也如婦人經病先柴胡以行經之表次四物以行經之裡亦先氣而後血也亦治傷寒五六日頭汗出微惡寒手足冷心下滿不欲食大便硬脈細者為陽微結仲景曰汗出為陽微假令純陰結不得復有外證脈雖沉緊不得為少陰病所以然者陰不得有汗今頭有汗故知非少陰也按三陰脈皆至頭胸中而遠不上循頭程郊倩曰熱難結而不甚也以有微惡寒之半表在至於脈沉雖似里陰矣則又有頭汗出之證以別之凡脈細脈沉脈緊皆陽熱鬱結之證無關少陰也可見陽氣一結不但陽證似陰陽脈亦似陰也經曰傷寒中風有柴胡證但見一證便是不必悉具又曰傷寒五六日發熱而嘔醫以他藥下之柴胡證仍在者復與柴胡湯必蒸蒸而振發熱汗出而愈或濕熱在半表半裡而發黃者仍與小柴胡湯雖雜證不能外也柴胡半斤黃芩人參甘草生薑三兩半夏半升大棗十二枚劈水一斗二升煮六升去渣再煎取三升溫服一升日三服喻嘉言曰少陽經用藥有汗吐下三禁故但取小柴胡湯以和之然一方之中柴胡欲出表黃芩欲入里半夏欲去痰紛紜而動不和甚矣故去渣復煎使其藥性合而為一漫無異同俾其不至於僨事爾又和非和於表亦非和於裡乃和於中也是必煎至最熱令藥氣並停胃中少頃隨胃氣以敷布表裡而表裡之邪不覺潛消默奪所以方中既用人參甘草復加生薑大棗不厭其復全藉胃中天真之氣為斡旋所謂大力者負之而走爾試即以仲景印仲景三黃附子湯中以其人陽邪入陰而熱熾非三黃不能除熱其人復真陽內微而陰盛非附子不有回陽然必各煎後乃得以各行其事而復煎以共行其事之義不亦彰彰乎嘔逆加生薑以散逆陳皮以理氣煩而不嘔去半夏人參加栝蔞以蕩鬱熱渴者去半夏加花粉以生津若不渴外有微熱去參加桂枝以解肌覆取微汗咳嗽去參棗生薑加五味以斂肺乾薑以散寒咳為氣逆肺寒戴元禮曰少陽有嗽無喘有喘非少陽也陽明有喘無嗽有嗽非正陽明也齒燥無津屬陽明火加石膏以清胃止渴虛煩加竹葉以涼心糯米以和胃痰熱加栝蔞貝母腹痛去黃芩以其寒中加芍藥合陽草能和里脅下痞硬去大棗甘令人滿加牡蠣咸能軟堅脅下痛加青皮芍藥脅為肝膽之部痛屬肝火二藥平肝心下悸經曰太陽證飲水多心下必悸水停心下故悸小便不利水蓄不行去黃芩苦反堅腎加茯苓淡能利水本經頭痛加川芎入肝活血散郁除風發黃加茵陳以利濕膽為清淨之腑無出無入其經在半表半裡不可汗吐下法宜和解仲景曰少陽中風耳聾目赤胸滿而煩不可吐下吐下則悸而驚釋曰邪在半表半裡以吐除煩吐則傷氣氣虛者悸以下除滿下則亡血血虛者驚又曰傷寒脈弦細頭痛發熱者屬少陽不可汗汗之譫語釋曰汗之亡津液少陽之邪因之入胃故譫語邪入本經乃由表而將至里當徹熱發表迎而奪之勿令傳太陰柴胡味苦微寒少陽主藥以升陽達表為君黃芩苦寒以降陰退熱為臣陽湊於陰則發熱用柴胡升陽氣使不陷入陰中則不熱陰湊於陽則發寒用黃芩降陰氣使不上入陽中則不寒又曰柴胡黃芩之苦寒以退熱半夏生薑之辛溫以退寒人參大棗甘草之甘溫以助正氣半夏辛溫能健脾和胃以散逆氣而止嘔人參甘草以補正氣而和中使邪不得復傳人里為佐邪在半表半裡則營衛爭表屬衛里屬營故用薑棗辛甘以和營衛為使也陶節庵曰本經證心下飽悶未經下者非結胸也乃表邪傳至胸中未入於臟尚為在表只須小柴胡加枳桔不效就以本方對小陷胸加枳桔一服豁然其效如神李時珍曰少陽證雖在半表半裡而胸膈痞滿實兼心肺上焦之邪心煩喜嘔默默不欲食又兼脾胃中焦之證故用黃芩以治手足少陽相火黃芩亦少陽藥也喻嘉言曰傷寒分表裡中三治表裡之邪俱盛則從中而和之於人參甘草半夏生薑大棗助脾之中但帶柴胡一味透表黃芩一味透里飲入胃中聽胃氣之升者帶柴胡出表胃氣之降者帶黃芩入里一和而表裡之邪盡解未盡者加工治之不相杆格矣徐忠可曰小柴胡湯為邪傳少陽恰在半表半裡和解之主方又能散諸經血凝氣聚故凡邪之表裡混雜者俱借之以提出少陽俾循經而散以柴甘生薑為定藥余則加減隨證爾吳綬曰小柴胡為半表半裡之劑太陽經之表熱陽明之標熱皆不能解也若夫陽氣虛寒面赤發熱脈沉足冷者服之立見危殆及內有虛寒大便不實婦人新産發熱皆不可用也李士材曰今人治傷寒不分陰陽表裡概用此方去參投之以為平穩殺人多矣不獨峻劑也喻嘉言曰虛勞發寒熱者乃衛虛則惡寒營虛則發熱爾緩調營衛俾不亢戰寒熱自止若誤用小柴胡俾汗多而衛傷於外便溏而營傷於內虛熱轉加病益甚矣去半夏加花粉名柴胡去半夏加栝蔞根湯金匱治往來寒熱而渴及勞瘧喻嘉言曰此仲景治少陽病全體大用之一方也仲景謂瘧邪盛衰出入必在少陽表裡之間小柴胡湯乃傷寒少陽經天然不易之法渴者去半夏加栝蔞實亦天然不易之法而施之於少陽邪傳陽明傷耗津液之證亦為天然不易之法蓋渴雖陽明津竭而所以致陽明津竭者全本少陽之邪觀內經刺法渴者取之少陽非以其木火之熱劫奪胃津而然耶故瘧邪進退於少陽即以此方進退而施其巧柴胡黃芩對治木火人參甘草扶助胃土栝蔞生津潤燥薑棗發越營衛若勞瘧之病其木火盛營衛衰津液竭所不待言故並可施此方以治之也去半夏人參薑棗加桂枝幹姜花粉牡蠣名柴胡桂枝幹薑湯仲景治傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也喻嘉言曰少陽證尚兼太陽所以誤下而胸間微結也太陽中篇結胸條內頭微汗出用大陷胸湯以其熱結在裡故從下奪之法也此頭汗出而胸微結用柴胡桂枝幹薑湯以里證未具故從和解之法也小柴胡方中減半夏人參而加桂枝以行太陽加乾薑以散滿栝蔞根以滋干牡蠣以軟結一一皆從本例也亦治瘧發寒多微有熱或但寒不熱服一劑如神喻嘉言曰此瘧之寒多熱少或但寒不熱非不似於牝瘧而微甚則大不同仲景不立論只附一方且云服一劑如神其邪之輕而且淺從可識矣蓋以衛氣在外營血在內胸中之陽氣散行於分肉之間今以邪氣痹之則外衛之陽反鬱伏於內守之陰而血之痹者愈瘀結而不散遇衛氣行陽二十五度而病發其邪之入營者既無外出之勢而營之素痹者亦不出而與陽爭所以多寒少熱或但有寒無熱也小柴胡湯本陰陽兩停之方可隨瘧邪之進退以為進退者加桂枝幹姜則進而從陽痹著之邪可以開矣更加牡蠣以軟其堅壘則陰陽豁然貫通而大汗解矣所以服一劑如神也其加芩連以退而從陰亦可類推合桂枝湯名柴胡桂枝湯仲景治傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者喻嘉言曰心下支結者邪結於心下之偏旁不中正也比小結胸之正在心下又較輕矣傷寒至六七日宜經傳已遍乃發熱微惡寒肢節煩疼微嘔其邪尚在三陽之界未入於裡雖心下支結而外證未除即不可用大陷胸湯以大陷胸湯主裡而不主表也亦不可用小陷胸湯以小陷胸湯主飲而不主表也夫支結之邪其在外者方盛其陷入者原少故但合用柴胡桂枝和解二法以治其表表邪去而支結自開矣除黃芩甘草加桂枝茯苓龍骨牡蠣鉛丹大黃名柴胡加龍骨牡蠣湯仲景治傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側喻嘉言曰此伏飲素積為變之最巨者蓋積飲之人津液素結原不足以充灌周身及遇外感一切汗吐下定法漫難輕試其誤下之變更有進於結胸者似此一證八九日過經乃下之可謂慎矣孰知外邪末盡乘虛而陷積飲挾之填滿胸中胸中既滿則膻中之氣不能四布而使道絶使道絶則君主孤危所以心驚而神亂也煩與嚴語本屬胃此則兼心小便不利本屬津液內竭此則兼小腸火燔一身盡重不可轉側者又神明內亂治節不行百骸無主之明徵也夫邪方在表裡其患已及神明於此而補天浴日寧復尋常表裡所辦故用人參茯苓之補以益心虛鉛丹之重以鎮心驚龍骨牡蠣之澀以為載神之舟楫一方而批郤導窾全收安內攘外之功後人不察謂是總三陽而和之之法豈其然哉按傷寒雖云傳足不傳手其實原無界限此證手少陰心主為邪所逼神明內亂因致譫語無倫較他證譫語之屬胃實者相去懸絶若復以治足經之法治之必無幸矣方中藥止九味用入心藥五種不以為復且用重澀藥三種不以為猛蓋都城震動勢必悉力入援非孤注可圖僥幸也至於痰飲摶膈最為剝床者但用半夏一味表邪內襲首發難端者但從太少之例用桂枝柴胡二味陽邪入陰最宜急驅者但用大黃一味是則治傷寒吃緊之處咸落第二義只從治心諸藥之後一案共結其局此等手眼豈凡近可識耶去柴胡黃芩加厚朴名厚朴生薑半夏甘草人參湯仲景治發汗後腹脹滿者喻嘉言曰吐後腹脹與下後腹脹俱為實以邪氣乘虛入里為實也若發汗後外已解而腹脹滿知非裡實之證由脾胃氣虛津液摶結陰氣內動壅而為滿也故以益胃和脾降氣滌飲為治也除半夏加當歸白芍大黃名柴胡飲子子和治肌熱蒸熱積熱汗後餘熱脈洪實弦數表為肌熱里為蒸熱壅為積熱亦治瘧疾喻嘉言曰於和法中略施攻補深中肯綮加桔梗名柴胡桔梗湯治春嗽合平胃散名柴平湯治濕瘧身痛身重加青黛薑汁和丸名清鎮丸潔古治嘔吐脈弦頭痛及熱嗽本方一分加四物二分名柴胡四物湯治婦人日久虛勞微有寒熱本方與四物各半名調經湯以前胡易柴胡名小前胡湯崔氏去風痰而降余治同加陳皮芍藥名柴胡雙解散節庵芍藥甘草湯治腹中不和而痛此陰陽氣血不和肝木乘脾而然腹痛有寒有熱有虛有實有食積有濕痰有死血有蟲寒痛者痛無增減或兼吐利熱痛者時痛時止腹滿堅結實痛者痛甚脹滿手不可按虛痛者按之即止食痛者痛甚則利利後痛減死血痛者痛有常處濕痰痛者脈滑痰氣阻礙不得升降蟲痛者時作時止面白唇紅大抵胃脘下大腹痛者多屬食積外邪繞臍痛者屬痰火積熱臍下少腹痛者屬寒或瘀血仲景用治誤表發厥腳攣吐逆與甘草乾薑湯以復其陽厥愈足溫者更作此湯以和其陰其腳即伸酸甘相合用補陰血白芍藥甘草炙各四兩脈緩傷水加桂枝生薑脈洪傷金加黃耆大棗脈澀傷血加當歸脈弦傷氣再加芍藥脈遲傷火加乾薑氣血不和故腹痛白芍酸收而苦泄能行營氣炙草溫散而甘緩能和逆氣又痛為木盛剋土諸痛皆屬肝木白芍能瀉肝甘草能緩肝而和解脾也王海藏曰稼穡作甘甘者已也曲直作酸酸者甲也甲已化土此仲景妙方也加白朮名白朮芍藥湯機要治脾濕水瀉身重困弱保命集曰瀉痢不止或暴下者皆太陰受病故不可離芍藥人不受濕則不利故須白朮黃芩湯仲景治太陽少陽合病自下利者合病者謂有太陽證之身熱頭痛脊強又有少陽證之耳聾脅痛嘔而口苦寒熱往來也自利者不因攻下而泄瀉也黃芩三兩芍藥甘草二兩大棗十二枚太陽陽明合病下利為在表與葛根湯以汗之少陽陽明合病下利為陽邪入里與承氣湯以下之此太陽少陽合病下利為在半表半裡與黃芩湯以和解之仲景之書一字不苟此證單言下利故此方亦單治下痢機要用之治熱痢腹痛更名黃芩芍藥湯潔古因之加木香檳榔大黃黃連歸尾官桂更名芍藥湯治下痢仲景此方遂為治瀉痢之祖方矣加半夏半升生薑二兩名黃芩加半夏生薑湯仲景治前證兼嘔者嘔胃氣逆也加半夏生薑以散逆氣千金曰生薑嘔家聖藥是散其逆氣也金匱云嘔家用半夏以治其水水去則嘔止是下其痰飲也亦治膽腑發咳嘔苦水如膽汁胃氣逆則嘔苦膽液泄則口苦除大棗名黃芩芍藥湯機要治熱痢腹痛後重身熱膿血稠黏及火升鼻血不止脈洪數外臺黃芩湯黃芩人參乾薑各三兩桂枝一兩大棗十二枚半夏半斤治乾嘔下利黃連湯仲景治傷寒胸中有熱而欲嘔胃中有寒而腹痛成氏曰濕家下後舌上如胎者以丹田有熱胸中有寒是邪氣入里而為下熱上寒也此傷寒邪氣傳裡而為下寒上熱也胃中有邪氣使陰不得升而獨治於下為下寒腹中痛陽不得降而獨治於上為胸中熱欲嘔吐宜與此湯以升降陰陽黃連炒乾薑炒桂枝甘草三兩人參二兩半夏半升大棗十二枚黃連苦寒泄熱以降陽薑桂辛溫除寒以升陰人參助正去邪半夏和胃止嘔甘草大棗調中止痛上中二焦寒熱交戰故以此和解之喻嘉言曰濕家下之舌上如胎者丹田有熱胸中有寒也仲景亦用此湯何耶蓋傷寒分表裡中三治表裡之邪俱盛則從中而和之故有小柴胡之和法至於丹田胸中之邪在上下不在表裡即變柴胡為黃連湯以桂枝代柴胡以黃連代黃芩以乾薑代生薑飲入胃中聽胃氣之上下敷布故不問下寒上熱上寒下熱皆可治之也夫表裡之邪則用柴芩用生薑之辛以散之上下之邪則用桂連用乾薑之辣以開之仲景聖法灼然矣溫膽湯集驗治膽虛痰熱不眠虛煩驚悸口苦嘔涎膽熱則口苦膽虛氣鬱致脾生痰涎而煩嘔傷寒病後多有此證半夏薑製茯苓或用茯神陳皮去白甘草枳寶麩炒竹茹加姜煎或加棗局方無茯苓如心虛加人參棗仁心內煩熱加黃連麥冬口燥舌乾去半夏以其行水耗津加麥冬五味花粉表熱未清加柴胡內虛大便自利去枳實加白朮內實心煩加黑梔子橘半生薑之辛溫以之導痰止嘔即以之溫膽戴氏云痰在膽經神不守舍亦令人不寐枳實破滯茯苓滲濕甘草和中竹茹開胃土之郁清肺金之燥涼肺金即所以平甲木也膽為甲木金能平木如是則不寒不燥而膽常溫矣經又云胃不和則臥不安又曰陽氣滿不得入於陰陰氣虛故目不得瞑半夏能和胃而通陰陽故內經用治不眠二陳非特溫膽亦以和胃也三因云心虛膽怯氣鬱生涎涎與氣搏變生諸證觸事易驚或夢寐不祥或短氣悸乏或自汗並溫膽湯主之嘔則以人參代竹茹經曰諸水病者故不得臥臥則驚驚則咳甚加人參棗仁遠志熟地名十味溫膽湯治夢遺驚惕越鞠丸丹溪統治六郁胸膈痞悶吞酸嘔吐飲食不消六郁者氣鬱血鬱痰鬱火鬱濕鬱食鬱也六者之中以氣為主氣行則鬱散矣吞酸嘔吐由於痰火飲食不消由氣不暈行丹溪曰氣升則鬱自降滑伯仁曰郁者結聚而不得發越當升者不得升當降者不得降當變化者不得變化所以傳化失常而病見矣氣鬱者胸膈痛濕鬱者周身痛或關節痛遇陰寒即發痰鬱者動則氣喘脈沉滑熱鬱者昏瞀便赤脈沉數血鬱者四肢無力能食食鬱者噯酸腹飽不能食香附醋炒蒼朮泔浸炒撫芎神麯梔子炒黑等分曲糊丸如濕鬱加茯苓白芷火鬱加青黛痰鬱加南星半夏栝蔞海石血鬱加桃仁紅花氣鬱加木香檳榔食鬱加麥芽山楂砂仁挾寒少加吳茱萸吳鶴皋曰越鞠者發越鞠郁之謂也香附開氣鬱蒼朮燥濕鬱撫芎調血鬱梔子解火鬱神麯消食鬱陳來章曰皆理氣也氣暢而鬱舒矣脾胃為水穀之海五臟六腑之主四臟一有不平則中氣不得其和而先郁矣此方藥兼升降者將欲升之必先降之將欲降之必先升之蒼朮辛烈雄壯固胃強脾能徑入諸經疏泄陽明之濕通行斂澀香附陰中快氣之藥下氣最速一升一降故郁散而平撫芎足厥陰藥直達三焦上行頭目下行血海為通陰陽氣血之使不但開中焦而已胃主行氣於三陽脾主行氣於三陰脾胃既布水穀之氣得行則陰陽臟腑皆由胃氣而得通利矣逍遙散局方治血虛肝燥骨蒸勞熱潮熱咳嗽有乾咳嗽者丹溪曰極為難治此係火鬱之證乃痰鬱其火邪在中用逍遙散以開之下用補陰之藥可愈往來寒熱口乾便澀月經不調凡肝膽兩經鬱火以致脅痛頭眩或胃脘當心而痛或肩胛絆痛或時眼赤痛連及太陽婦人鬱怒傷肝致血妄行赤白淫閉砂淋崩濁等證俱宜此方加減治之易曰風以散之是也當歸酒拌白芍酒炒錢半白朮土炒柴胡茯苓一錢甘草炙五分加煨姜薄荷煎肝虛則血病當歸芍藥養血而斂陰木盛則土衰甘草白朮和中而補土補土生金亦以平木柴胡升陽散熱合芍藥以平肝而使木得條達木喜條達故以瀉為補取疏通之義茯苓清熱利濕助甘術以益土而令心氣安寧茯苓通心腎煨姜暖胃去痰調中解鬱薄荷搜肝瀉肺理血消風疏逆和中諸證自已所以有逍遙之名醫貫論五郁曰東方先生木木者生生之氣即火氣也火附木中木鬱則火亦郁矣火鬱則土自郁土鬱則金鬱金鬱則水鬱五行相因自然之理也余以一方治木鬱而諸郁皆愈逍遙散是也方中柴胡薄荷二味最妙蓋膽乃甲木少陽之氣其氣柔嫩象草穿地而未伸此時若被寒風一郁即軟萎遏抑不能上伸不上伸則下克脾土而金水並病矣唯得溫風一吹鬱氣始得暢達也蓋木喜風搖寒則摧萎溫則發生柴胡薄荷辛能發散溫能入少陽古人立方之妙如此其甚者方中加吳茱炒連即左金丸黃連清心火吳茱氣臊肝氣亦臊同氣相求以平肝木木平則不生心火火不刑金而金能制木不直伐木而左金以制木此左金所以得名也此法之巧者然猶未也繼用六味地黃加柴胡芍藥以滋腎水俾能生木逍遙散風以散之也地黃飲雨以潤之也木有不得其天者乎此法一立木火之郁既舒木不下剋土土亦得滋潤無燥熇之患金水自能相生豫謂一法可通五法者如此推而廣之凡寒熱往來惡寒惡熱嘔吐吞酸嘈雜胸痛脅痛小腹膨脹頭暈盜汗黃疸瘟疫疝氣飧泄等證皆對證之方推而傷寒傷風傷濕除直中外凡外感者皆作郁看以逍遙散加減出入無不獲效如小柴胡湯四逆散羌活湯大同小異然不若此方之響應也償一服即愈少頃復發或頻發而愈甚此必下寒上熱之假證此湯不可復投當改用溫補之劑如陽虛以四君子湯加溫熱藥陰虛以六味湯加溫熱藥元機之士不須豫贅矣又曰豫以冬月正傷寒麻黃桂枝證作寒鬱治不惡寒者作火鬱治此豫創論也既曰寒邪何故入內而反為熱不知即是本身之火為寒所郁一步返歸一步久則純熱矣三黃解毒解其火也葛根升麻火鬱發之也三承氣土鬱奪之也小柴胡木鬱達之也此理甚簡易劉守真謂用麻黃桂枝必加涼藥子和六神通解加石膏於麻黃蒼朮中陶氏謂九味羌活可代三方皆非也不若逍遙散真可一方代三方也火為寒鬱熬煎腎水至木旺時無生髮滋潤之本故發熱而渴非外感也余以六味湯滋其水以柴胡舒其木活人多矣加丹皮山梔名八味逍遙散薛已治怒氣傷肝血少目暗目為肝竅經曰目得血而能視肝傷血少則目昏丹皮能瀉血中伏火梔子能瀉三焦鬱火故薛氏加之以抑肝氣兼以調經也醫貫曰古方逍遙散柴胡薄荷當歸芍藥陳皮甘草白朮茯神其加味者則丹皮梔子余以山梔屈曲下行泄水改用吳茱萸炒黃連按以加味逍遙散六味丸治郁自薛長洲始也然長洲之法實得之丹溪越鞠之芎藭即逍遙之歸芍也越鞠之蒼朮即逍遙之白朮也越鞠之神麯即逍遙之陳皮也越鞠之香附即逍遙之柴胡也越鞠之梔子即逍遙之加味也但越鞠峻而逍遙則和矣越鞠燥而逍遙則潤矣此則青出於藍後來居上亦從古作述之大凡如東垣之補中益氣比枳朮萬全無弊矣然豈可謂枳朮之謬而禁不用哉加熟地名黑逍遙散藿香正氣散局方治外感風寒內傷飲食憎寒壯熱頭痛嘔逆胸膈滿悶咳嗽氣喘及傷冷傷濕瘧疾中暑霍亂吐瀉感凡嵐瘴不正之氣者並宜增減用之元氣虛弱人慎用藿香紫蘇白芷大腹皮茯苓三兩白朮土炒陳皮半夏曲厚朴薑製桔梗二兩甘草一兩每服五錢加薑棗煎一方加木瓜氣脫能收氣滯能和傷食重者加消食藥藿香辛溫理氣和中辟惡止嘔兼治表裡為君蘇芷桔梗散寒利膈佐之以發表邪厚朴大腹行水消滿橘皮半夏散逆除痰佐之以疏里滯苓朮甘草益脾去濕以補正氣為臣使也正氣通暢則邪逆自除矣吳綬曰若太陽傷寒頭痛發熱骨節痛者此方全無相干如妄用之雖汗出亦不解變成壞證者多矣凡傷寒發熱脈沉元氣虛人並夾陰傷寒發熱者皆不可用戴元禮曰肥人多中以氣盛於外而缺於內也肺為氣出入之道人肥者必氣急氣急必肺邪盛肺金克肝木膽為肝之腑故痰涎壅盛治之必先理氣中後氣未盡順痰未盡降調理之劑當以藿香正氣散和星香散服此藥非特治中風之證中氣中惡霍乳尤宜合三味香薷飲名藿薷湯治伏暑吐瀉轉筋六和湯局方治夏月飲食不調內傷生冷外傷暑氣寒熱交作霍亂吐瀉及伏暑煩悶倦怠嗜臥口渴便赤中酒等證砂仁藿香厚朴杏仁半夏扁豆木瓜人參白朮赤茯苓甘草加薑棗煎傷暑加香薷傷冷加紫蘇一方無白朮一方有蒼朮藿香砂仁杏仁厚朴香能舒脾辛能行氣而砂仁厚朴兼能化食木瓜酸能平肝舒筋肝木乘脾故轉筋木瓜酸能斂肺助肺金以平肝邪故治霍亂轉筋扁豆赤茯淡能滲濕清熱而扁豆又能散暑和脾半夏辛溫散逆止嘔參朮甘溫補正以匡邪甘草補中協和諸藥薑棗發散而調營衛皆所以和之也吳鶴皋曰六和者和六腑也脾胃為六腑之總司先調脾胃則水精四布五經並行百骸九竅皆太和矣三解湯治時行瘧之通劑喻嘉言曰瘧發必有寒有熱蓋外邪伏於半表半里適在少陽所主之界出與陽爭陰勝則寒入與陰爭陽勝則熱即純熱無寒為疸瘧溫瘧純寒無熱為牝瘧要皆自少陽而造其極偏補偏救弊亦必還返少陽之界使陰陽協和而後愈也謂少陽而兼他經則有之謂他經而不涉少陽則不成其為瘧矣脈縱屢遷而弦之一字實貫徹之也柴胡麻黃去節澤瀉各三錢瘧邪藏於分肉之間邪正分爭並於表則在表並於里則在裡未有所並則在半表半裡麻黃之辛能散表邪由汗而泄澤瀉之咸能引里邪由溺而泄柴胡升陽退熱居表裡之間而和解之此但可以治實瘧虛者當辨其氣血晝發屬氣夜發屬血而加補劑清脾飲嚴用和治疸瘧脈弦數但熱不寒或熱多寒少膈滿不食口苦舌乾煩渴小便赤澀大便不利青皮厚朴醋炒柴胡黃芩炒半夏薑製茯苓白朮土炒甘草炙草果姜引一方加檳榔大渴加麥冬知母瘧不止加酒炒常山一錢烏梅二個常山劫痰截瘧烏梅斂陰清熱瘧為肝膽之邪然多因脾胃受傷而起脾屬濕土重感於暑濕故見前證也脾既受病木又克之故用青皮柴胡以破滯而伐肝半夏厚朴以行痰而平胃古云無痰不作瘧茯苓用以滲濕黃芩用以清熱草果辛熱能散太陰之積寒除痰而截瘧能清膏梁之痰蓋先去其害脾者而以白朮甘草調而補之也此即小柴胡湯加減從溫脾諸方而一變也張子和曰世醫以瘧為脾寒甚者歸之崇怪良可笑也劉宗厚曰盛暑陽極伏陰在內人或納涼澡浴寒客肌肉之間或飢飽勞役內傷而病作肌肉屬脾發則惡寒戰栗乃謂之脾寒爾實由風寒濕暍邪郁腠理夏時毛竅疏通而不為病至秋收斂之際表邪不能發越故進退不已往來寒熱勢如凌瘧人之狀所以名瘧古方多兼理內傷取效由脾胃和精氣通陰陽和解諸邪悉散實非脾病也世用發表解肌溫經散寒等法亦未嘗執於燥脾劫劑也吳鶴皋曰清脾非清涼之謂乃攻去其邪而脾部為之一清也劉宗厚因草果之辛熱而譏焉是未達嚴氏之精矣高鼓峰曰治瘧多方俱不得要唯此方為中正豫每用此加減無不愈者蓋瘧發寒熱原屬少陽半表半裡故必以小柴胡為君青皮以解脈之弦數厚朴以寬胃中之積滯草果以化痰消壅苓朮以實脾土此二味乃補正之義緣瘧固由外感然必內傷而後外始感焉此東垣之微旨也嚴氏立方最為的當但竟由飲食起者豫每以蒼朮易白朮加陳皮以合平胃之意熱多寒少者稍加黃連滑石寒多熱少者稍加前胡以發其鬱熱無不應手而驗能審此而消息之何至遷延久病困苦天下人哉若誤服湯藥病久者不可執此為不易之法是在學者神而明之爾如服寒藥而致胃傷者須以人參養胃湯養之服熱藥多者仍以小柴胡湯多加黃連丹皮生地以解之久而虛者補中益氣以救之發於夜者益母草飲以濟之益母草飲一名香紅飲用法雖殊然小柴胡之旨不可脫也薑茶飲治赤白痢及寒熱瘧生薑陳細茶每味三錢濃煎茶助陰姜助陽使寒熱平調並能消暑解酒食毒此方用之屢效勿以平淺而忽之也除生薑加陳白梅蜜水煎名梅蜜飲治熱痢除茶加木香肉蔻治冷痢蜜最能治痢痛瀉要方劉草窗治痛瀉不止脾虛幫瀉肝實故痛吳鶴皋曰此與傷食不同傷食腹痛得瀉便減今瀉痛不止故責之土敗木賊也戴氏曰水瀉而腹不痛者濕也痛甚而瀉瀉而能減者食積也瀉水腹痛腸鳴痛一陳瀉一陳火也或瀉或不瀉或多或少者痰也完穀不化者氣虛也白朮土炒三兩白芍酒炒二兩陳皮炒兩半防風一兩或煎或丸久瀉加升麻白朮苦燥濕甘補脾溫和中芍藥寒瀉肝火酸斂逆氣緩中止痛防風辛能散肝香能舒脾風能勝濕為理脾引經要藥東垣曰若補脾胃非此引用不能行陳皮辛能利氣炒香尤能燥濕醒脾使氣行則痛止皆以瀉木而益土也甘草黑豆湯解百藥毒兼治筋疝莖中挈痛挺脹不堪由用春方邪術而得之用此方者亦取其解毒甘草二兩黑豆半升蘇頌曰古稱大豆解百藥毒試之不然又加甘草其驗乃奇若治筋疝當用甘草梢以梢能徑達莖中也加大黃名大黃甘草湯治上中下三焦消渴正柴胡飲景嶽凡外感風寒發熱惡寒頭疼身痛痎瘧初起等證氣血和平宜從平散者柴胡一二三錢防風一錢陳皮錢半芍藥二錢甘草一錢生薑三五片如熱而兼渴者加乾葛一二錢如嘔惡者加半夏錢半如濕勝者加蒼朮一錢如胸腹有微滿者加厚朴一錢如寒氣勝而邪不易解者加麻黃一二三錢去浮沫或酥葉亦可柴陳煎景嶽治傷風兼寒咳嗽發熱痞滿多痰柴胡一二三錢陳皮錢五分半夏二錢甘草一錢生薑三五七片如寒勝者加細辛七八分如風勝氣滯者加酥葉錢半如冬月寒甚者加麻黃錢半氣逆多嗽者加杏仁一錢痞滿氣滯加白芥子五七分柴芩煎治傷寒表邪未解內外俱熱瀉痢煩渴喜冷氣壯脈滑數者宜此主之及瘧痢並行內熱去血兼表邪發黃等證柴胡黃芩梔子澤瀉木通枳殼如瘧痢並行鮮血純血者加芍藥二錢甘草一錢如濕勝氣陷者加防風一錢一柴胡飲景嶽一為水數從寒散也凡感四時不正之氣或為發熱或為寒熱或因勞因怒或婦人熱入血室或産後經後因冒風寒以致寒熱如瘧等證但外有邪而內兼火者須從涼散宜此主之柴胡一二三錢黃芩錢半芍藥二錢生地陳皮錢半甘草八分如內熱盛者加連翹一二錢如外邪盛者加防風一二錢如邪結在胸而痞滿者去生地加枳實一二錢如熱在陽明而兼渴者加花粉或葛根一錢甚者加知母石膏亦可二柴胡飲二為火數從溫散也凡遇四時外感或其人元氣充實臟氣素平無火或時逢寒勝之令本無內熱等證者皆不宜妄用涼藥以致寒邪不散則為害匪淺宜此主之陳皮錢半半夏細辛厚朴一二錢甘草八分柴胡錢半或二三錢生薑三五七片如邪盛者可加羌活防風白芷紫蘇之屬擇而用之如頭痛不止者加川芎一二錢如多濕者加蒼朮如陰寒氣勝必加麻黃一二錢或兼桂枝不必疑也三柴胡飲景嶽三為木數從肝經血分也凡素稟陰分不足肝經血少而偶遇風寒或感邪不深可兼補而散者或病後或産後感冒有不得不從解散而陰氣虛弱不能外達者宜此柴胡二三錢芍藥錢半甘草炙陳皮一錢當歸二錢溏泄者易以熟地生薑三五片如微寒咳嘔者加半夏四柴胡飲景嶽四為金數從氣分也凡元氣不足或忍飢勞倦而外感風寒或六脈緊數微細正不勝邪等證必須培助元氣兼之解散庶可保全宜此主之若但知散邪不顧根本未有不元氣先敗者察之慎之柴胡一二三錢人參隨宜炙甘草一錢當歸二三錢瀉者少用生薑三五七片如胸膈滯悶者加陳皮二錢五柴胡飲景嶽五為土數從脾胃也脾土為五臟之本凡中氣不足而外邪有不散者非此不可此與四柴胡飲相表裡但四柴胡飲止調氣分此則兼培血氣以逐外邪尤切於時用者也神效不可盡述凡傷寒瘧疾痘瘡皆所宜用芍藥炒白朮當歸二三錢柴胡一二三錢熟地三五錢炙甘草一錢陳皮酌用或不必用寒勝無火者減芍藥加生薑三五七片或炮姜一二錢或加桂枝二錢則更妙脾滯者減白朮氣虛者加人參隨宜勞倦傷脾下陷者加升麻一錢歸柴飲景嶽治營虛不能作汗凡真陰不足外感寒邪難解者此神方也當歸一兩柴胡五錢炙甘草八分或加生薑三五七片或加陳皮一錢或加人參大便多溏者以冬朮代當歸亦佳蘆根湯千金治傷寒病後嘔噦不下食蘆根一升竹茹一升生薑二兩粳米二合蘆根甘寒降伏火利小水竹茹甘寒除胃熱清燥金生薑辛溫祛寒飲散逆氣三者皆能和胃胃和則嘔止加粳米者亦藉以調中州也陰陽水又名生熟水治霍乳吐瀉有神功藥中治霍亂者最多然有寒熱二證萬一誤用立死不救倉猝患此脈候未審切勿輕投偏熱偏寒之劑惟飲陰陽水為最穩張子和曰霍亂吐瀉乃風濕暍三氣合邪也濕土為風木所克鬱則生熱心火上炎故吐吐者暍也脾濕下注故瀉瀉者濕也風急甚則轉筋轉筋者風也又邪在上焦則吐在下焦則瀉在中焦則吐瀉交作百沸湯新汲井水各半和服陰陽不分而擾亂故上吐下瀉而霍亂飲此輒定者分理其陰陽使和平也卷五下表裡門病在表者宜汗宜散病在裡者宜攻宜清至於表證未除里證又急者仲景復立大柴胡葛根黃芩等法合表裡而兼治之後人師其意則有防風通聖參酥五積諸劑姑採數方以為準則學者其引而伸之比例而善用之則得矣大柴胡湯仲景治傷寒發熱汗出不解陽邪入里熱結在裡里非三陰之裡乃胃腑也此為少陽陽明三陰亦有轉人陽明者如太陰有桂枝加大黃湯少陰有三大承氣厥陰一小承氣皆兼陽明證也心下痞硬嘔而下利張兼善曰裡虛者雖便難而勿攻裡熱者雖吐利而可下心煩喜嘔裡熱已甚結於胃中故下之則愈又曰傷寒下之早因作痞者裡虛協熱而利也因表裡不解故用桂枝人參湯解表和里若傷寒發熱汗出不解心下痞硬嘔吐而下利者此為實故以大柴胡下之或往來寒熱煩渴譫妄腹滿便祕表證未除里證又急脈洪邪在陽明或沉實弦數者沉實為邪在裡弦數為邪在少陽柴胡八兩半夏半升黃芩芍藥三兩生薑五兩大棗十二枚劈枳實四枚大黃二兩酒浸表證未除故用柴胡以解表里證又急故用大黃枳實以攻裡芍藥安脾斂陰能瀉肝火使木不剋土黃芩退熱解渴半夏和胃止嘔姜辛散而棗甘緩以調營衛而行津液此表裡交治下劑之緩者也陶節庵曰傷寒邪熱傳裡須看熱氣淺深用藥三焦俱傷則痞滿燥實堅全見宜大承氣湯邪在中焦則有燥實堅三證宜調胃承氣湯加甘草和中去枳朴者恐傷上焦氤氳之氣也邪在上焦則痞而實宜小承氣湯去芒硝者恐傷下焦真陰也若表證未除里證又急不得不下者則用大柴胡湯通表裡而緩治之大承氣最緊小承氣次之調胃承氣又次之大柴胡又次之蓋恐硝性燥急故不輕用周揚俊曰仲景於太陽入膀胱腑證則有五苓散少陽兼陽明腑證則有大柴胡湯皆表裡兩解之法也以前胡易柴胡名大前胡湯崔氏取其清降而治風痰柴胡加芒硝湯仲景治傷寒十三日不解胸脅滿而嘔日晡潮熱已而微利此本柴胡證知醫以圓藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以加芒硝湯主之傷寒十三日為再經已盡當解之時脅滿而嘔少陽也胸滿而日晡潮熱陽明也邪氣猶在表裡之間小柴胡湯見和解門加芒硝六兩表證誤下邪熱乘虛入胃以致下痢而滿嘔潮熱之證猶在故仍先與小柴胡湯以解外隨後以加芒硝湯以蕩胃熱亦與大柴胡兩解同意葛根黃連黃芩湯仲景治太陽病桂枝證發熱頭痛惡風自汗醫反下之利逐不止邪在表而反下之虛其腸胃表邪乘虛入里遂協熱而利不止也脈促者表未解也脈數而止曰促促為陽盛雖下利而脈促知表未解前證仍在也喘而汗出者汗出而喘為邪氣外盛所致喘而汗出為裡實氣逆所致與此湯散表邪清裡熱此湯主之葛根半斤甘草炙黃芩二兩黃連三兩先煮葛根內諸藥煎或加薑棗表證尚在醫反誤下邪入陽明之腑其汗外越氣上奔則喘下陷則利故舍桂枝而用葛根專主陽明之表葛根能升陽明清氣又為治瀉要藥加芩連以清裡熱甘草以調胃氣不治利而利自止不治喘而喘自止乃太陽陽明表裡兩解之變法也桂枝加大黃湯仲景治太陽誤下轉屬太陰腹滿大實痛者桂枝湯見表散門加大黃一兩芍藥三兩誤下而成結胸則邪在上仍屬太陽今腹滿而大實痛則邪已入太陰經曰諸痛為實痛隨利減故用桂枝以解未盡之表邪加大黃以下內陷之邪熱王海藏曰腹痛桂枝加芍藥大實痛桂枝加大黃何為不只用芍藥大黃而於桂枝內加之要知從太陽來以太陽為本也趙嗣真曰太陰腹痛有三有次第傳經之邪有直入本經之邪有下後內陷之邪此腹滿時痛為下後內陷之邪宜桂枝加芍藥湯大實痛者桂枝加大黃湯設遇本經直入陰邪腹滿實痛脈沉細者宜急用四物理中等以和之矣經又曰太陰病脈弱其人續自便利設當行大黃芍藥者宜減之以胃氣弱易動故也以太陰為寒臟其病多宜溫而不宜下也防風通聖散河間治一切風寒濕暑飢飽勞役內外諸邪所傷氣血怫鬱表裡三焦俱實憎寒壯熱邪在表頭目昏暈目赤睛痛風熱上攻耳鳴鼻塞口苦舌乾咽喉不利唾涕稠黏咳嗽上氣大便祕結熱結大腑小便赤澀熱蓄膀胱瘡瘍腫毒氣血怫鬱折跌損傷瘀血便血腸風痔漏手足瘛瘲驚狂譫妄肝風胃火丹斑癮疹風熱在胃也防風荊芥連翹麻黃薄荷川芎當歸白芍炒白朮山梔炒黑大黃酒蒸芒硝五錢黃芩石膏桔梗一兩甘草二兩滑石三兩加生薑蔥白煎自利去硝黃自汗去麻黃加桂枝涎嗽加薑製半夏防風荊芥薄荷麻黃輕浮解表使風寒從汗出而散之於上大黃芒硝破結通幽梔子滑石降火利水使風熱從便出而泄之於下風淫於內肺胃受邪桔梗石膏清肺瀉胃風之為患肝木受之川芎歸芍和血補肝黃芩清中上之火連翹散氣聚血凝甘草緩峻而和中重用甘草滑石亦猶六一利水瀉火之意白朮健脾而燥濕上下分消表裡交治而於散瀉之中猶寓溫養之意所以汗不傷表下不傷里也除大黃芒硝名雙解散麻黃防風荊芥薄荷川芎以解表黃芩梔子連翹石膏滑石以解里復有當歸白芍以和血桔梗甘草白朮以調氣故曰雙解再加人參補氣熟地益血黃柏黃連除熱羌活獨活天麻細辛全蠍祛風蜜丸彈子大每服一丸茶酒任下名祛風至寶丹喻嘉言曰此中風門不易之專方也五積散局方治少陰傷寒及外感風寒內傷生冷身熱無汗頭痛身痛項背拘急胸滿惡食嘔吐腹痛寒熱往來腳氣腫痛冷祕寒疝寒瘧惡寒無汗婦人經水不調上證皆寒濕為病白芷陳皮厚朴六分當歸川芎芍藥茯苓桔梗八分蒼朮枳殼七分半夏麻黃四分乾薑肉桂重表者用桂枝甘草三分加薑蔥煎又法除桂芷枳殼陳皮余藥慢火炒攤冷人桂芷同煎名熟料五積散用炒者助其溫散也有汗去蒼朮麻黃氣虛去枳桔加人參白朮腹痛挾氣加吳茱萸胃寒加煨姜陰證傷寒肢冷虛汗加附子婦人調經加醋艾麻黃桂枝所以解表散寒甘草芍藥所以和里止痛蒼朮厚朴平胃土而散滿陳皮半夏行逆氣而除痰芎歸姜芷入血分而祛寒濕枳殼桔梗利胸膈而清寒熱茯苓瀉熱利水寧心益脾所以為解表溫中除濕之劑去痰消痞調經之方也王海藏曰桂枝麻黃芍藥甘草即各半湯也蒼朴陳草即平胃散也枳桔陳茯半即枳桔半夏等湯也加芎歸治血又加乾薑為厚朴散此數藥相合為解表溫中之劑消痞調經之方雖為內寒外感表裡之分所制實非仲景表裡桂枝麻黃姜附之的方也惟在活法變而通之陶節庵曰夫病不身熱頭痛初起怕寒腹痛嘔吐泄瀉蜷臥沉默不渴脈沉遲無力人皆知為陰證矣至於發熱面赤煩躁揭去衣被脈大人皆不識認作陽證誤投寒藥死者多矣不知陰證不分熱與不熱不論脈之浮沉大小但指下無力重按全無便是伏陰急與五積散一服通解表裡之寒若內有沉寒必須姜附溫之若作熱治而用涼藥則渴愈甚而躁愈急豈得生乎此取脈不取證也按傷寒有舍證取脈者又有舍脈取證者本方能散寒積食積氣積血積痰積故名五積合人參敗毒散名五積交加散治寒濕身體重痛腰腳痠疼參蘇飲元戎治外感風寒內傷飲食發熱頭痛嘔逆咳嗽痰塞中焦眩暈嘈煩傷風泄瀉及傷寒已汗發熱不止已汗而熱不止猶有餘邪亦宜以此和解表裡則邪自散溢飲身重注痛者亦宜此方清利之人參紫蘇乾薑前胡半夏薑汁炒茯苓七錢半陳皮去白甘草枳殼麩炒桔梗木香二錢每五錢加薑棗煎外感多者去棗加蔥白肺中有火去人參加杏仁桑白皮瀉肺泄瀉加白朮扁豆蓮肉炒燥濕健脾元戎云此方有風藥解表氣藥和中外感風寒內積痰飲皆可用也合四物名茯苓補心湯尤能治虛熱及吐衄便血乃虛實表裡兼治之劑然不可過劉宗厚曰此出少陽柴胡例藥治感冒異氣挾痰飲之病本方云前胡葛根自能解肌枳殼橘紅輩自能寬中快膈毋以性涼為疑愚觀藥性非涼亦是辛平之劑去人參加川芎前胡易柴胡薑棗煎名芎蘇飲淡寮治傷風寒外有發熱頭痛惡寒內有咳嗽吐痰氣湧此因肺有實熱且表邪甚重故去人參而加川芎以除頭痛以柴胡易前胡者取其升散不取其清降也三黃石膏湯治傷寒溫毒表裡俱熱狂叫欲走煩躁大渴面赤鼻乾兩目如火身形拘急而不得汗或已經汗下過經不解三焦大熱譫狂鼻衄身目俱黃六脈洪數及陽毒發斑陶節庵曰此因熱在三焦閉塞經絡津液營衛不通遂成此證生石膏兩半黃芩黃連黃柏五錢梔子三十個炒黑麻黃去節淡豉二兩每服一兩姜三片棗二枚細茶一撮煎熱服表裡之邪熱俱盛故以黃芩瀉上焦之火黃連瀉中焦之火黃柏瀉下焦之火梔子通瀉三焦之火而以麻黃淡豉發散表邪石膏體重瀉火氣輕解肌亦表裡分消之藥也麻黃白朮湯東垣治大便不通小便赤澀身面俱腫色黃麻木身重如山喘促無力吐痰唾沫發熱時躁躁已振寒項額如冰目中溜火鼻不聞香臍有動氣少腹急痛東垣曰此宿有濕熱伏於營血之中木火乘於陽道為上盛短氣喘促為陰火傷氣四肢痿弱為腎水不足冬時寒水得令乘其肝木剋火凌木大勝必有大復故見諸證青皮陳皮黃連酒炒黃柏酒炒甘草炙升麻二分柴胡桂枝人參黃耆蒼朮泔浸白朮土炒厚朴豬苓三分澤瀉吳萸茯苓四分白豆蔻炒曲五分麻黃不去節六分杏仁四粒研分二服前證蓋因表裡俱傷陽氣抑不得升故風火濕熱鬱而為病也桂枝麻黃解表去風升麻柴胡升陽散火黃連黃柏燥濕清熱而黃柏又能補腎滋陰蔻朴青陳利氣散滿而青柴又能平肝蔻朴又能溫胃杏仁利肺下氣神麯化滯調中吳萸暖腎溫肝參耆甘草蒼白二術補脾益氣二苓澤瀉通利小便使濕去而熱亦行方內未嘗有通大便之藥蓋清陽升則濁陰自降矣此方蓋合四君五苓平胃麻黃吳萸解毒而為一方者也治證既多故所用表裡寒熱補瀉之藥俱備但皆氣藥而無血藥與五積不同香蘇飲局方治四時感冒頭痛發熱或兼內傷胸膈滿悶噯氣惡食內經曰卑下之地春氣常在故東南卑濕之區風氣柔弱易感風寒俗稱感冒受邪膚淺之名也由鼻而入在於上部客於皮膚故無六經形證唯發熱頭痛而已胸滿噯氣惡食則兼內傷也輕為感冒重者為傷又重者為中香附炒紫蘇二錢陳皮去白一錢甘草七分加薑蔥煎傷食加消導藥咳嗽加杏仁桑皮有痰加半夏頭痛加川芎白芷傷風鼻塞頭昏加羌活荊芥心中卒痛加延胡索酒一杯紫蘇疏表氣而散外寒香附行裡氣而消內壅橘紅能兼行表裡以佐之橘紅利氣兼能發表散寒蓋氣行則寒散而食亦消矣甘草和中亦能解表為使也水解散肘後治天行一二日頭痛壯熱麻黃四兩桂心甘草炙白芍二兩大黃黃芩三兩麻黃能開腠發汗桂心能引血化汗黃芩以清上中之熱大黃以瀉中下之熱甘草白芍能調胃而和中蓋天行瘟疫鬱熱自內達外與傷寒由表傳裡者不同故雖一二日之淺可以汗下兼行治法絶不同於傷寒也鬱熱畢竟外解為易大黃宜減用茵陳丸治時氣瘴氣黃病痎瘧赤白痢等證茵陳梔子鱉甲炙芒硝二兩大黃五兩常山杏仁炒三兩巴豆一兩去心皮炒豉五合蜜丸梧子大每服一丸或吐或利或汗如不應更服一丸不應則以熱湯投之老幼以意加減梔子淡豉梔豉湯也合常山可以湧吐合杏仁可以解肌大黃芒硝承氣湯也可以蕩熱去實合茵陳可以利濕退黃三藥名茵陳湯治黃正藥加巴豆大熱以去臟腑積寒加鱉甲滋陰以退血分寒熱此方備汗吐下三法故能統治諸病柴苓飲景嶽治風濕發黃發熱身痛脈緊表裡俱病小水不利中寒泄瀉等證柴胡二三錢茯苓豬苓澤瀉一錢白朮二三錢肉桂一二錢水一盞半煎服如寒邪盛者加生薑三五片如汗出熱不退者加芍藥一二錢四逆散仲景治傷寒少陰證陽邪入里四逆不溫熱結於裡或咳氣逆挾痰或悸挾飲或小便不利或腹中痛或泄利下重皆因熱結於裡傷寒邪在三陽則手足必熱至太陰則手足溫至少陽則熱邪漸深四肢逆而不溫至厥陰則手足逆冷經曰熱深厥亦深熱微厥亦微與此湯以散傳經之熱柴胡芍藥枳實甘草等分為末水調飲咳加五味子收逆氣乾薑散肺寒並主下利肺與大腸相表裡上咳下利治法頗同悸加桂枝道引陽氣小便不利加茯苓甘淡滲泄腹痛加附子補虛散寒泄利下重加薤白通大腸泄氣滯經曰諸四逆者不可下故用枳實泄結熱甘草調逆氣柴胡散陽邪芍藥收元陰以辛苦甘酸之品合表裡而交治之則陽氣敷布於四末矣卷六上祛風門六氣風淫為首故風病最多其淺而止在皮毛則為傷風其久而留於關節則為痿痹其最重而入於腑臟則為中風內經風痹痿厥四證各有專論獨風論中泛及雜風至論中風惟曰風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風不過兩述其名而已後論五臟並六腑之風亦但各述其狀而已賴仲景金匱書表章先聖語語金針大有端緒之可求矣仲景以後英賢輩出方書充棟何反漫無取裁坐令中風一證鮮書一之法治之百無一效如劉河間則主火為訓是火召風入火為本而風為標矣李東垣則主氣為訓是氣召風入氣為本而風為標矣朱丹溪則主痰為訓是痰召風入痰為本而風為標矣張景嶽則以為此證多屬氣脫本非風證竟以非風二字易中風二字其風雖超然豈無外邪乘虛而入以致卒倒者乎諸家所論俱太偏執因致客反勝主幾置中風一證於烏有矣喻嘉言曰此證陽虛邪害空竅為本而風從外入者必挾身中素有之邪或氣或痰或火而為標也喻氏所論甚圓而該蓋風為陽邪人身衛外之陽不固陽邪乘陽尤為易入即如偏枯不仁要皆陽氣虛餒不能充灌所致中風卒倒其陽虛更審設非陽虛其人必輕矯便捷何得卒倒耶要知風性善走空竅陽虛則風居空竅漸入臟腑此惟離照當空群邪始得畢散若胸中之陽不治風必不出矣中風門中大小續命湯及六經加減法雖曰治風依然後人之法也金匱取古今録驗續命湯治風痱之身無痛而四肢不收者仲景所重原不在此所重維何則驅風之中兼填空竅為第一義也空竅一實則風出而不復入其病瘳矣古方中有侯氏黑散深得此意仲景取為主方隨制數方輔其未備乃遵內經久塞其空之意也後人以無師之智爚亂成法中風之初治其表裡風邪非不外出而重門洞開出而復入乃至莫御者多矣侯氏黑散金匱治大風四肢煩重心中惡寒不足者外臺用治風癲菊花四十分白朮防風十分桔梗八分黃芩五分人參茯苓當歸川芎乾薑桂枝細辛牡蠣礬石三分十四味杵為散用溫酒調方寸匕日三服二十日再冷食服四十日禁一切魚肉大蒜共六十日止即藥積腹中不下熱食即下矣冷食自能助藥力此為中風家挾寒而未變熱者治法之準則也謂風從外入挾寒作熱此為大風證見四肢煩重豈非四肢為諸陽之本為邪所痹而陽氣不運乎然但見於四肢不猶愈體重不勝乎證又見心中惡寒不足豈非漸欲凌心乎然燥熱猶末乘心不猶愈於不識人乎故用參苓歸芎補其氣血為君菊花白朮牡蠣養肝脾腎為臣菊花入肝養陰病因風必傷肝故獨多又恐風邪乘虛併入心臟故也而加防風桂枝以行痹著之氣細辛乾薑以驅內伏之邪兼桔梗黃芩以開提肺熱為佐礬石所至卻濕解毒收澀心氣酒力運行周身為使且必為散酒服至六十日止又常冷食使藥積腹中不下填塞胸中之空竅而邪可不復入內經所謂塞其空竅是為良工之理也嘉言曰仲景制方皆匠心獨創乃於中風證首引此散豈非深服其長乎夫立方而但驅風補虛誰不能之至於驅之補之之中行其堵截之法則非思議可到方中取用礬石以固澀諸藥使之留積不散以漸填其空竅服之日久風自漸而熄所以初服二十日不得不用溫酒調下以開其痹者以後則禁諸熱食惟宜冷食如此再四十日則藥積腹中不下而空竅填矣空竅填則舊風盡出新風不受矣蓋礬性得冷即止得熱即行故囑云熱食即下矣冷食自能助藥力抑何用意之微耶風引湯金匱治大人風引癱瘓小兒驚癇瘛瘲日數十發巢氏用治腳氣大黃乾薑龍骨四兩牡蠣甘草二兩桂枝三兩寒水石滑石赤石脂白石脂紫石英石膏六兩十二味杵粗篩以葦囊盛之取三指撮井花水三升煮三沸溫服一升風邪內並則火熱內生五臟亢盛逆歸於心故以桂甘龍牡通陽氣安心腎為君然厥陰風木與少陽相火同居火發必風生風生必挾木勢侮其脾土故脾氣不行聚液成痰流注四末因成癱瘓故用大黃以蕩滌風火濕熱之邪為臣隨用乾薑之止而不行者以補之為反佐又取滑石石膏清金以伐其木赤白石脂厚土以除其濕寒水石以助腎水之陰紫石英以補心神之虛為使故大人小兒風引驚癇皆主之巢氏用治腳氣以石性下達可勝濕熱不使攻心也嘉言曰風者外司厥陰內屬肝木上隸手經下隸足經中見少陽相火所以風自內發者由火熱而生也風生必害中土土主四肢土病則四末不用聚液成痰癱患者以風火挾痰注於四肢故也觀金匱此方可見非退火則風不熄非填竅則風復生風火一熾則五神無主故其用藥如是之周到也又曰侯氏黑散專主補虛以熄其風此方兼主清熱火濕以除其風明此以治風之入臟者遊刃有餘何後世以為石藥過多舍之不用而用腦麝以散其真氣花蛇以增其惡毒智恥愚耶吾不解矣忠可曰河間謂風病多因熱甚良由將息失宜而心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無知多因喜怒悲憂恐五志過極此最確之論但云全無外風未免太偏不知熱能生風風亦能生熱故仲景既云脈微而數中風使然此偏中外風者也又以寸口脈微而緊亦為中風而實皮膚經絡風寒遞深者也又以寸口脈遲而緩亦為中風之脈然又分別言之曰營緩則為亡血亡血血虛也謂本氣先自病而外風因之也衛緩則為中風謂風強則然而以漸入內者也下則出風引湯方而方名全主於風以風為陽邪故熱也則知從亡血來是熱能生風而外邪又助之也從中風來是風能生熱以滯津液而痰涎壅膈也觀風引藥味全是和臟腑通經絡便是治風不專治風也是河間主熱之論仲景早引其端緒但不專主於熱謂實有陽虛而外邪入之為卒倒為偏枯為筋急瘛瘲者也若諸痿全起於肺熱因而傳入五臟為昏惑瘛瘲蝥悶暴喑皆屬於火為四肢不收舌本強足痿不收痰涎有聲皆屬於土悉是濕熱之病與中風之虛多風多寒多皆為中風之理全不相涉矣按黑散風引二湯喻氏以為仲景聖方而程云來金匱直解又云侯氏黑散風引湯防己地黃湯頭風摩散礬石湯所主皆非中風歷節之證是宋人較正附入唐人之方遂盡刪之又云仲景方書之祖復取侯氏方為法耶亦不過臆度之見爾防己地黃湯金匱治病如狂狀妄行獨語不休無寒熱其脈浮桂枝防風三分防己甘草一分以酒一杯漬之一宿絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服此亦風之迸入於心者也風升必氣湧氣湧必滯涎涎滯則流濕濕留壅火邪聚於心故以二防桂甘去其邪而以生地最多清心火涼血熱謂如狂妄行獨語不休皆心火熾盛之證也況無寒熱則知病不在表不在表而脈浮其為火盛血虛無疑後爾後人地黃飲子犀角地黃湯等實祖於此頭風摩散方金匱大附子炮鹽等分為散沐了以方寸匕摩疾上令藥力行頭風乃偏著之病故以附子劫之鹽清其邪桂枝芍藥知母湯金匱治諸肢節疼痛身體尪羸腳腫如脫頭眩短氣溫溫欲吐生薑五兩桂枝白朮知母防風四兩芍藥三兩附子炮麻黃甘草二兩九味以水七升煮取二升溫服七合日三服此類歷節病由風濕外邪而兼脾腎俱虛之方也謂諸肢節疼痛濕留關節也因而身體為邪所痹則尪羸濕從下受亦或自上注之總是濕喜歸下故腳腫如脫腎虛挾風故頭眩衛氣起於下焦腎元既虧三焦無主致太陽與陽明相牽制為病故胃氣欲下行而太陽制其氣在上太陽欲上行而胃濕相搏不利故短氣溫溫欲吐用桂枝湯去棗加麻黃以助其通陽加白朮防風以伸脾氣加知母附子以調其陰陽謂欲制其寒則上之鬱熱已甚欲治其熱則下之腎陽已痹故並加之爾烏頭湯金匱治病歷節不可屈伸疼痛亦治腳氣疼痛不可屈伸烏頭五枚㕮咀以蜜二升煎取一升即出烏頭甘草炙黃耆芍藥麻黃三兩將後四味㕮咀以水三升煮取一升去渣內蜜煎中更煎之服七合不知盡服之歷節病即行痹之屬也乃濕從下受挾風流注故或足腫而必發熱且更不可屈伸而疼痛故以甘芍和陰麻黃黃耆通肌肉之陽氣而借川烏之迅發以行其痹著礬石湯金匱治腳氣衝心此亦因風而自下而上也故方列中風門礬石二兩以漿水一斗五升煎三五沸浸腳良礬石收濕解毒故以之為外治然至衡心亦能治之蓋腳氣而至衝心皆由腎水挾腳氣以凌心得礬石之卻水而勢自不能相凌所以有護心之功也朮附湯近效治風虛頭重眩苦極不知食味暖肌補中益精氣附子一枚半炮去皮甘草炙白朮一兩三味銼每五錢煨姜五片棗一枚水盞半煎七分去滓溫服腎氣空虛風邪乘之漫無出路風挾腎中濁陰之氣厥逆上攻故頭重眩苦至極兼以胃氣亦虛不知食味此非輕揚風劑可愈故用附子暖其水臟白朮甘草暖其土臟水土一暖猶之冬月井中水土既暖陽和之氣可以立復而濁陰之氣不驅自下矣越婢加朮湯千金治內熱極則身體津脫腠理開汗大泄歷風氣下焦腳弱石膏半斤麻黃六兩白朮四兩甘草生薑二兩大棗十五枚六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風加附子一枚此治風極變熱之方也謂風勝則熱勝以致內熱極而汗多將必津脫津脫而表愈虛則腠理不能復固汗泄不已將必大泄風入營為厲內經曰厲者有營氣熱胕今風入營為熱即是厲風氣矣蓋風勝氣浮下焦本虛至厥陽獨行而濁陰不降無以養陰而陰愈虛則下焦腳弱故以麻黃通痹氣石膏清氣分之熱薑棗以和營衛甘草白朮以理脾家之正氣汗多而用麻黃賴白朮之扶正石膏之養陰以制之故曰越婢加朮湯所謂用人之勇去其暴也汗大泄而加惡風即須防其亡陽故加附子方內麻黃用根姜用炮姜為是小續命湯千金治中風不省人事神氣憒亂半身不遂丹溪曰左半身不遂屬血虛與瘀血以四物湯加桃仁紅花薑汁竹瀝右半身不遂屬氣虛與痰以四君子湯加竹瀝薑汁分氣血屬左右亦太拘著不甚驗也筋急拘攣口眼喎斜語言謇澀風濕腰痛痰火併多六經中風及剛柔二痙痙者項背強直手足反張也傷風有汗為柔痙以風能散氣也傷寒無汗為剛痙以寒能澀血也亦有血虛筋脈無所榮養而成痙者凡中風口開為心絶手撒為脾絶眼合為肝絶遺尿為腎絶鼻鼾為肺絶吐沫直視髮直頭搖面赤如妝汗綴如珠皆不治或只見一二證尚有得生者金匱中風篇曰寸口脈浮而緊緊則為寒浮則為虛虛寒相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎釋曰中絡者邪方入衛尚在經絡之外故但肌膚不仁中經則入營脈之中骨肉皆失所養故身體重著至中腑中臟則離外而內邪入深矣中腑必歸於胃者胃為六腑之總司也中臟必歸於心者心為神明之主也風入胃中胃熱必盛蒸其津液結為痰涎胃之大絡入心痰涎壅盛堵其出入之竅故中腑則不識人也諸臟受邪迸入於心則神明無主故中臟者舌縱難言廉泉開而流涎沫也廉泉穴在舌下竅通於腎津液之所出也防風一錢二分桂枝麻黃杏仁去皮尖炒研芎藭酒洗白芍酒炒人參甘草炙黃芩酒炒防己八分附子四分每服三錢加薑棗煎筋急語遲脈弦者倍人參加薏仁當歸去芍藥以避中寒煩躁不大便去桂附倍芍藥加竹瀝日久不大便胸中不快加大黃枳殼臟寒下痢去防己黃芩倍附子加白朮嘔逆加半夏語言謇澀手足戰抖加石菖蒲竹瀝身痛發搐加羌活口渴加麥冬花粉煩渴多驚加犀角羚羊角汗多去麻黃杏仁加白朮口燥去桂附加石膏此六經中風之通劑也鶴皋曰麻黃杏仁麻黃湯也治太陽傷寒桂枝芍藥桂枝湯也治太陽中風此中風寒有表證者所必用也人參甘草補氣川芎芍藥補血此中風寒氣血虛者所必用也風淫故主以防風挾濕佐以防己挾寒佐以附子挾熱佐以黃芩病來雜擾故藥亦兼該也嘉言曰中風之脈必有所兼兼寒則浮緊兼風則浮緩兼熱則浮數兼痰則浮滑兼氣則浮澀兼火則盛大兼陽虛則脈微兼陰虛則脈數或細如絲虛滑為頭痛緩遲為營衛衰然虛浮遲數正氣不足尚可補救急大數疾邪不受制必死無疑然數大未至急疾尚有不死者又曰世傳中風之人每遇外風一發宜進續命湯以御之殊為不然風勢才定更用續命湯重引風入是添蛇足也惟用甘寒藥頻頻熱服俾內不召風外無從入之路且甘寒一可息風二可補虛三可久服何樂不用耶保命集曰厥陰瀉痢不止脈沉遲手足厥逆膿血稠黏此為難治宜麻黃湯小續命湯汗之謂有表邪縮於內當散表邪則臟腑自安矣又曰厥陰風瀉以風治風小續命消風散主之易老六經加減法倍麻黃杏仁防風名麻黃續命湯治太陽中風無汗惡寒倍桂枝芍藥杏仁名桂枝續命湯治太陽中風有汗惡風去附子加石膏知母名白虎續命湯治陽明中風無汗身熱不惡寒加葛根倍桂枝黃芩名葛根續命湯治陽明中風身熱有汗不惡風倍附子加乾薑甘草名附子續命湯治太陰中風無汗身涼倍桂附甘草名桂附續命湯治少陰中風有汗無熱加羌活連翹名羌活連翹續命湯治中風六經混淆系少陽厥陰或肢節攀急或麻木不仁玉機微義曰此方無分經絡不辨寒熱虛實雖多亦奚以為易老治分六經庶乎合法去防風防己附子白芍加當歸石膏即古今録驗續命湯治中風痱身體不能自收持或拘急不得轉側內之營衛痹而口不能言冒昧不知痛處嘉言曰痱即痹之別名也風入而痹其營衛即身體不能自收口不能言冒昧不知痛處或拘急不得轉側也然營衛有虛有實虛者自內傷得之實者自外感得之此方則治外感之痹其營衛者故以得小汗為貴然已變越婢之制而加芎歸養血人參益氣矣其內傷而致營衛之痹者於補氣血藥中略加散風藥為制更可知矣録驗方去人參加乾薑黃芩竹瀝即千金大續命湯通治五臟偏枯賊風大秦艽湯機要治中風手足不能暈掉舌強不能言語風邪散見不拘一經者秦艽石膏三兩當歸酒洗白芍酒炒川芎生地酒洗熟地白朮土炒茯苓甘草炙黃芩酒炒防風羌活獨活白芷一兩細辛五錢每服一兩雨濕加生薑春夏加知母心下痞加枳殼此亦六經中風之通劑也中風虛邪也留而不去其病則實故用驅風養血之劑兼而治之以秦艽為君者以其主宰一身之風石膏所以去胃中總司之火羌活去太陽百節之風疼防風為諸風藥中之軍卒三陽數變之風邪責之細辛三陰內淫之風濕責之芩術去厥陰經之風則有川芎去陽明經之風則有白芷風熱干乎氣清以黃芩風熱干乎血涼以生地獨活療風濕在足少陰甘草緩風邪上干於肺用當歸熟地芍藥者所以養血於疏風之內以濟風藥之燥也嘉言曰此方既云養血而筋自柔何得多用風燥藥既云靜以養血何復用風藥以動之是言與方悖矣偶論三化湯愈風湯大秦艽湯皆似是而非者又曰四肢不舉皆屬脾土膏粱太過積熱內壅者為脾土於實宜瀉以開其壅食少體羸怠惰嗜臥者為脾土虛衰宜補以健其暈地黃飲子河間治中風舌喑不能言足廢不能行此少陰氣厥不至名曰風痱急當溫之風痱如癱瘓是也熟地巴戟去心萸肉蓯蓉酒洗附子炮官桂石斛茯苓石菖蒲遠志麥冬五味等分每服五錢入薄荷少許薑棗煎熟地以滋根本之陰巴戟蓯蓉官桂附子以返真元之火石斛安脾而祕氣山萸溫肝而固精菖蒲遠志茯苓補心而通腎臟麥冬五味保肺以滋水源使水火相交精氣漸旺而風火自息矣醫貫曰治中風當以真陰虛為本但陰虛有二有陰中之水虛有陰中之火虛火虛者專以河間地黃飲子為主水虛者當以六味地黃丸為主果是水虛辛熱之藥與參者之品俱不可加或曰風淫所勝治以辛涼何故反用桂附使火盛制金不能平木而風木益甚耶曰此是腎虛真陰失守孤陽飛越若非桂附何以追復其散失之元陽其痰涎上湧者水不歸元也面赤煩渴者火不歸元也惟桂附能引火歸元水火既歸其元則水能生木木不生風而風自息矣按腎氣厥不至舌下乃臟真之氣不上榮於舌本爾至其濁陰之氣必橫格於喉舌之間吞咯維艱昏迷特甚又非如不言之證可以緩調方中所用桂附巴蓯原為驅逐濁陰而設用方者不可執已見而輕去之也天麻丸易老養血祛風壯筋骨天麻祛風牛膝強筋二味用酒同浸三日焙乾用萆薢祛風濕強筋骨玄參各六兩壯水制火杜仲七兩使筋骨相著當歸十兩和血生地一斛益真陰羌活十兩去骨筋風附子炮一兩行經蜜丸一方有獨活五兩此方大意主治腎熱生風其以天麻入牛膝同制取其下達倍用當歸地黃生其陰血萆薢玄參清下焦之濕熱附子補下焦之真陽蓋唯腎中陽虛故風得以久據其地也用羌活之獨本者即真獨活不必更加也吁嗟多欲之人兩腎空虛有如烏風洞慘慘黯黯漫無止期環視風門諸藥有一能勝其病者乎此方雜在群方內未易測識特表而出之劉宗厚曰秦艽湯愈風湯雖皆有補血之藥而行經散風之劑居其大半將何以養血而益筋骨也天麻丸養血壯筋骨庶幾近理豨蘞丸張詠治中風喎僻語言謇澀風中於經肢緩骨痛風而兼濕及風痹走痛濕熱流注世俗所謂流火即內經所謂行痹痛痹也或十指麻木氣血不足或有濕痰死血在胃中也肝腎風氣風濕諸瘡豨蘞草以五月五日七月七日九月九日採者佳不拘多少揀去粗筋留枝葉花實蒸曬九次蜜丸豨蘞辛苦氣寒其味蘞臭必蒸曬九次加以酒蜜則苦寒之陰濁盡去而清香之美味見矣數不至九陰濁尚在不能透骨驅風而卻病也嘉言曰豨者豬也其畜屬亥乃風木所生之始取用其葉以治風凡腎臟生風之證服此其效最著其妙處全在氣味之蘞劣與腎中之腥臊同氣相求故能入腎而助其驅逐陰風之力也因治腎風之方百不得一特録此丸合前天麻丸兩發其義也豨蘞能驅風散濕行大腸之氣然風藥終燥若風痹由於脾腎兩虛陰血不足不由風濕而得者亦忌服之唐成訥有進豨蘞表宋張詠進豨蘞表云其草金菱銀線素莖紫亥節葉相對頗類蒼耳臣吃百服眼目清明積至千服鬚髮烏黑筋力輕健效驗多端活絡丹治中風手足不仁日久不愈經絡中有濕痰死血腿臂間忽有一二點痛川烏炮去臍皮草烏炮去皮膽星六兩地龍即蚯蚓洗焙乾乳香去油沒藥另研三兩三錢酒丸酒下膽星辛烈所以燥濕痰二烏辛熱所以散寒濕蚯蚓濕土所生欲其引烏星直達濕痰所結之處大易所謂同氣相求也風邪注於肢節久則血脈凝聚不行故用乳香沒藥以消瘀血乳香活血能去風伸筋沒藥能散瘀血生新血二藥並能消腫止痛故每相須而行三生飲治中風卒然昏憒不省人事痰涎壅盛語言謇澀等證東垣曰中風非外來風邪乃本氣自病也凡人年愈四旬氣衰之際或憂喜岔怒傷其氣者多有此證壯歲之時無有也若肥盛者則間有之亦是形盛氣衰而如此爾生南星一兩生川烏去皮生附子去皮五錢木香二錢每服一兩加人參一兩煎南星辛熱散風除痰附子重峻溫脾逐寒烏頭輕疏溫脾逐風二藥通行經絡無所不至皆用生者取其力峻而行速也重加人參所以扶其正氣少佐木香所以行其逆氣也醫貫曰觀東垣之論當以氣虛為主縱有風邪亦是乘虛而襲經曰邪之所湊其氣必虛是也當此之時豈尋常藥餌能通達於上下哉急以三生飲一兩加人參一兩煎服即蘇此乃行經治痰之劑斬關擒王之將必用人參兩許駕馭其邪而補助真氣否則不惟無益適以取敗觀先哲參耆參附其義可見若遺尿手撒口開鼻鼾為不治然服前藥多有生者喻嘉言曰臟為陰可勝純陽之藥腑為陽必加陰藥一二味制其僭熱經絡之淺又當加和營衛並宣道之藥牽正散直指方治中風口眼喎斜無他證者足陽明之脈俠口環唇足太陽之脈起於目內眥陽明內蓄痰熱太陽外中於風故牽急而喎斜也又木不及則金化縮短乘之木為金乘則土寡於畏故口眼喎斜口目常動故風生焉耳鼻常靜故風息焉白附子殭蠶全蠍等分為末每二錢酒調吳鶴皋曰艽防之屬可以驅外風而內生之風非其治也肝有熱則自生風與外感之風不同星夏之屬足以治濕痰而風虛之痰非其治也三藥療內生之風治虛熱之痰得酒引之能入經而正口眼又曰白附辛可驅風能去頭面遊風蠶蠍滷能軟痰殭蠶清化輕浮能上走頭面驅風散痰全蠍直走厥陰為治風要藥辛中有熱凡藥辛者必熱可使從風蠶蠍有毒可使破結藥有用熱以攻熱用毒以攻毒者大易所謂同氣相求內經所謂衰之以其屬也附改容膏萆麻子一兩冰片三分共搗為膏寒月加乾薑附子各一錢左喎貼右右喎貼左即正或用鱔魚血或用蜣螂搗敷亦良蓋三物皆追風拔毒之品也蠲痹湯嚴氏治中風身體煩痛項背拘急手足冷痹腰膝沉重舉動艱難諸證皆因營衛虛而風濕干之也經曰營虛則不仁衛虛則不用不仁皮膚不知痛癢也不用手足不能運動也岐伯曰中風大法有四一曰偏枯半身不遂也二曰風痱身無疼痛四肢不收也三曰風癔庵忽不知人也四曰風痹諸痹類風狀也嘉言曰難相類實有不同風則陽先受之痹則陰先受之爾致痹之因曰風曰寒曰濕互相雜和非可分屬但以風氣勝者為行痹風性善行故也以寒氣勝者為痛痹寒主收急故也以濕氣勝者為著痹濕主重滯故也黃耆蜜炙當歸酒洗赤芍酒炒羌活防風甘草炙片子薑黃酒炒加薑棗煎辛能散寒風能勝濕防風羌活除濕而疏風氣通則血活血活則風散黃耆炙草補氣而實衛黃耆畏防風合用而其功益大當歸赤芍活血而和營薑黃理血中之氣能入手足而祛寒濕也準繩曰凡風痹偏枯未有不因真氣不周而病者也治之不用黃耆為君人參歸芍為臣防風桂枝鉤藤荊瀝竹瀝薑汁韭汁葛汁梨汁乳汁之屬為佐而徒難沓乎烏附羌獨以涸營而耗衛如此死者醫殺之也胃風湯易老治風冷乘虛客於腸胃食泄注下完穀不化及腸風下血又治風虛能食牙關緊閉手足瘛瘲肉瞤面腫名曰胃風人參白朮土炒茯苓當歸酒洗芎藭芍藥酒炒桂等分加粟米百餘粒煎此即十全湯去黃耆地黃甘草胃風者胃虛而風邪乘之也風屬肝木能克脾土故用參朮茯苓以固脾氣而益衛當歸川芎以養肝血而調營芍藥瀉肝而能和脾肉桂散風而能平木木得桂而枯削桂釘木根其木即死又辛能散風故能住泄瀉而療風濕也玉機微義曰此方名治風而實非治風乃補血和血益胃之藥血痢而挾濕者實可倚仗東垣胃風湯白芷升麻各一錢二分麻黃不去節葛根各一錢柴胡羌活藁本蒼朮蔓荊草蔻黃柏當歸炙草各五分加薑棗煎亦治胃風證喻嘉言曰風入胃中何以反能食蓋風能生熱即內經疸成為消中之理也是方但去其風不去其熱殊不合內經之旨必加麥門冬竹瀝花粉石膏葳蕤生地梨汁甘寒之藥入升麻葛根甘草為劑始為克當解風散治風成寒熱頭目昏眩肢體疼痛手足麻痹上膈壅滯人參兩半麻黃二兩川芎獨活細辛甘草一兩為細末每五錢水盞半生薑五片薄荷葉少許煎八分不拘時服按風成為寒熱乃風入胃中而釀營衛之偏勝前胃風湯正驅胃風使從外解之藥此因風入既久胃氣致虛故以人參為君臣以麻黃川芎佐以獨活細辛使以甘草而和其營衛乃可收其外解之功也若夫久風成為飧泄則風已入於裡又當用人參為君桂枝白朮為臣茯苓甘草為佐使而驅其風於內此表裡之權衡內經之旨要也本方雖用風成寒熱四字漫無著落今並及之愈風丹治諸風證偏正頭痛防風通聖散四物湯黃連解毒湯各一料加羌活細辛甘菊花天麻獨活薄荷何首烏一兩蜜丸如彈子大每服一丸細嚼茶清下不拘時服按外風與身中之火熱相合以陽從陽必上攻於頭然風火盛營血必虧故其藥如是也清空膏東垣治正偏頭痛年深不愈及風濕熱上壅頭目及腦苦痛不止偏頭痛者少陽相火也丹溪曰有痰者多左屬風屬火多血虛右屬痰屬熱多氣虛準繩曰醫書多分頭痛頭風為二門然一病也淺而近者名頭痛深而遠者為頭風當驗其邪所從來而治之黃芩酒炒黃連酒炒羌活防風一兩柴胡七錢川芎五錢甘草炙兩半為末每服三錢茶調如膏白湯送下如少陰頭痛加細辛太陰頭痛脈緩有痰去羌活防風川芎甘草加半夏如偏頭痛服之不愈減羌活防風川芎一半加柴胡一倍散少陽相火如自汗發熱惡熱而渴此陽明頭痛只與白虎湯加白芷東垣曰太陰頭痛必有痰也少陰頭痛足寒而氣逆也太陰少陰二經雖不上頭然痰與氣壅於膈中頭上氣不得暢而為痛也頭為六陽之會其象為天乃清空之位也風寒濕熱干之則濁陰上壅而作實矣羌防入太陽柴胡入少陽皆辛輕上升祛風勝濕之藥川芎入厥陰為通陰陽氣血之使甘草入太陰散寒而緩痛辛甘發散為陽也芩連苦寒以羌防之屬升之則能去濕熱於高巔之上矣芩連用酒炒非獨制其寒欲其上升也丹溪曰清空膏諸般頭痛皆治惟血虛頭痛從魚尾相連痛者不治魚尾眼角也又云治少陽頭痛如痛在太陽厥陰者勿用蓋謂巔頂痛也頭痛用羌活防風柴胡川芎升麻細辛藁本之異者分各經也用黃芩黃連黃柏石膏知母生地之異者分各臟瀉火也用茯苓澤瀉者導濕也用參耆者補氣也用芎歸者養血也王海藏曰熱在至高之分當以輕劑抑之從緩治也若急服之上熱未除中寒生矣消風散治風熱上攻頭目昏痛項背拘急鼻嚏聲重及皮膚頑麻癮疹瘙癢婦人血風婦人衝任二經為風襲傷致生血病也厚朴薑汁炒陳皮去白甘草炙荊芥五錢防風蟬蛻羌活藿香殭蠶洗炒川芎茯苓人參二兩為末每服三錢茶湯下瘡癬酒下羌防荊芎之辛浮以治頭目項背之風殭蠶蟬蛻之清揚以去皮膚之風藿香厚朴以去惡散滿參苓甘橘以輔正調中使風邪無留壅也轉舌膏治中風瘛瘲舌謇不語涼膈散加菖蒲遠志各等分蜜丸彈子大硃砂為衣薄荷湯化下臨臥服此乃治心經蘊熱之方也正舌散治中風舌木強難轉語不正蠍梢二七個茯苓一兩末之每服一錢溫酒調又擦牙更效此乃治風涎壅塞之方也二丹丸治風邪健忘養神定志和血內安心神外華腠理得睡丹參熟地天冬去心兩半硃砂人參菖蒲遠志五錢茯神麥冬甘草一兩煉蜜丸桐子大每服五十丸至一百丸空心食前服按中風證心神一虛百骸無主風邪擾亂莫由驅之使出此方安神益虛養血清熱息風服之安睡功見一斑矣相傳用愈風湯吞下殊失用方之意排風湯治風虛冷濕邪氣入臟狂言妄語精神錯亂及五臟風發等症麻黃茯苓獨活一錢半甘草炙防風白朮當歸芍藥肉桂杏仁川芎白蘚皮五分加姜三片按虛風冷濕雖已入臟其治法必先宣之使從外散故用藥如是也涼膈散治心火上盛膈熱有餘目赤頭眩口瘡唇裂吐衄涎嗽稠黏二便淋閉胃熱發斑瘡疹黑陷諸風瘛瘲手足掣搦筋攣疼痛連翹梔子仁薄荷大黃芒硝黃芩甘草加棗二枚蔥一根清心散即涼膈散加黃連竹葉煎成去渣入蜜少許溫服如頭痛加防風川芎石膏按中風證大率風木合君相二火主病多顯膈熱之證古方用涼膈散最多不但二方已也如轉舌膏用涼膈散加菖蒲遠志活命金丹用涼膈散加青黛藍根蓋風火之勢上炎胸膈正燎原之地所以清心寧神轉舌活命涼膈之功居多不可以宣通腸胃之法輕訾之也滌痰湯治中風痰迷心竅舌強口不能言方見卷九上除痰門稀涎散治風涎不下喉中作聲如牽鋸或中濕腫滿半夏大者十四枚豬牙皂角一個炙咀作一服水二盞煎一盞入生薑自然汁少許服不能咽者徐徐灌之此以半夏治痰涎牙皂治風比而成方蓋因其無形之風挾有形之涎膠結不解用此二物俾涎散而風出也其有涎多難散可於卷三下湧吐門諸吐法參治之或用蘿蔔子合牙皂等分為末煎湯吐之其風多涎少人事不昏則用蝦半斤入醬蔥姜等水煮先吃蝦次吃汁後以鵝羽探引吐之活法在心無施不當也竹瀝湯治四肢不收心神恍惚不知人事口不能言竹瀝生葛汁二升生薑汁二合和勻分溫三服按人身之積痰積熱常招致外風結為一家令人心神恍惚如邪所憑實非邪也消風清熱開痰其神自安此方可頻服也貝母栝蔞散治肥人中風口眼喎斜手足麻木左右俱作痰治貝母栝蔞南星炮荊芥防風羌活黃柏黃芩黃連白朮陳皮半夏湯泡七次薄荷甘草炙威靈仙天花粉加姜煎按中風證多挾熱痰而肥人復素有熱痰不論左右俱作痰治誠為當矣但肥人多虛風瘦人多實火虛風宜用甘寒一派如竹瀝人參麥冬生地生葛汁生梨汁鮮淡竹葉汁石膏栝蔞葳蕤胡麻仁等藥此方三黃並用治瘦人實火或可治肥人虛風甚不宜也至泛論治熱痰之藥諸方中又唯此足擅其長存之以備實火生風生熱之選青州白丸子治風痰壅盛嘔吐涎沫口眼喎斜手足癱瘓及痰盛泄瀉肥人滑泄多屬之痰脈滑不食不飢多責之痰白附子南星二兩半夏水浸去衣七兩川烏去皮臍五錢四味俱生用為末生絹袋盛於井花水內擺出粉未出者以手揉令出渣再擂再擺以盡為度用磁盆日曝夜露每日一換新水攪而後澄春五夏三秋七冬十日去水曬乾如玉片以糯米粉作稀糊丸如緑豆大每服二十丸生薑湯下無時如癱瘓酒下此治風痰之上藥也然藥味雖經浸曝毒氣已殺溫性猶存熱痰迷竅非所宜施星附散治中風能言口不歪而手足拽曳者南星半夏各制茯苓殭蠶炒川烏去皮臍人參黑附子白附子八分煎成熱服得汗愈凡用附子藥多取冷服謂熱因寒用也此用烏頭附子人參一派溫補絶無發散之藥向非加以熱服亦何由而得汗耶此治虛風寒痰之主藥也風虛則熾痰寒則壅阻遏脾中陽氣不得周行故手足為之拽曳用此方熱服以助脾中之陽俾虛風寒痰不相互結乃至得汗則風從外出痰從下出分解而病愈矣治風六合湯治風虛眩暈方見卷一下理血門四物湯附方內三聖散治中風手足拘攣口眼喎斜腳氣行步不正當歸酒洗炒玄胡索微炒為末肉桂去粗皮等分為末每服二錢空心溫酒調下按此方治血虛風入之專劑也故取以治口眼喎斜之左急右緩者然血藥中而加地黃白芍秦艽杜仲牛膝風藥中而加天麻防風羌活白芷細辛或加獨活以去腎間風加萆薢以除下焦熱又當隨證酌量也加味六君子湯治四肢不舉屬於脾土虛衰者須用此專治其本不可加入風藥六君子每味一錢加竹瀝半小盞麥冬三錢加姜三片棗二枚口渴去半夏加葳蕤石膏虛甚不熱者加附子按中風門中從不録用此方所謂治末而忘其本也夫風淫末疾四肢不舉乃風淫於內虛者多實者少審其果虛則以六君子加甘寒藥如竹瀝麥冬之屬允為治虛風之儀式也薏苡仁湯治痹在手足濕流關節並治手足流注疼痛麻木不仁難以屈伸薏苡仁當歸芍藥桂心麻黃甘草蒼朮米泔浸炒加姜煎此治風濕相搏關節不利之證故以薏苡仁為君舒筋除濕其力和緩當倍之又倍加之至於麻黃雖難能通陽氣然在濕勝方中即無汗不可多用減之又減可也人參補氣湯治手指麻木人參黃耆二錢升麻柴胡芍藥生甘草炙甘草五味子五分按諸陽起於指手指麻木風已見端宜亟補其氣以御外入之風故用此為綢繆計也烏頭粥治痹在手足風淫末疾並治風寒濕麻木不仁此粥大治手足不遂及腫痛不能舉者宜服此預防之烏頭生研為末每用香熟白晚米二合入藥末四錢以砂罐煮作稀粥不可太稠下生薑汁一匙白蜜三匙攪勻空心溫啜之為佳如中濕多更加苡仁末三錢按四肢為諸陽之本本根之地陽氣先已不用況周身經絡之末乎故用烏頭合谷味先從營衛所生之地注力俾四末之陽以漸而充也桂枝五物湯治在上之痹方見卷三上桂枝湯附方內此乃金匱治血痹之方也血痹而用桂枝湯加黃耆以其風邪獨勝風性上行故其痹在上也其脈微澀寸口關上小緊緊處乃邪著之驗也然又曰寸口關上微尺中小緊外證身體不仁如風痹狀此方主之又可見風性善行隨其或上或下又皆主以此方矣桂枝湯為中風一證群方之祖不但中絡即中經中腑中臟藥中皆當加入本方以風從外入者究竟必驅從外出故也後人竟用續命湯為加減此方置之不録未免得流忘源矣又況源流俱失者哉十味銼散治在臂之痹又治中風血弱臂痛連及筋骨舉動難支附子炮黃耆當歸白芍一錢川芎防風白朮七分茯苓肉桂五分熟地酒洗焙乾二錢姜三片棗二枚臨臥服按臂痛乃筋脈不舒體盛者可去其筋脈中之風然既已血痹所受風燥之纍不淺故取此方養血之中加附子之力通其陽氣而用防風反佐黃耆出其分肉腠理之風也通痹散治腰以下至足風寒濕三氣合而成痹兩足至臍冷如冰不能自舉或因酒熱立冷水中久成此疾天麻獨活當歸川芎白朮藁本等分末之每服二錢熱酒調下此方因風寒濕三氣混合入於陰股其邪已過於營衛故變桂枝五物之制而用此散緩緩分出其邪也史國公藥酒方治中風語言謇澀風中舌木手足拘攣風燥其筋而血不濡也半身不遂邪並於虛痿痹不仁風而兼濕頑麻痿痹也晚蠶砂炒龜甲醋炒虎脛骨穌炙松節杵防風杜仲薑汁炒斷絲川萆薢川牛膝酒浸當歸酒洗白朮土炒羌活二兩蒼耳子炒槌碎秦艽四兩枸杞五兩茄根八兩蒸熟為粗末絹袋盛浸無灰酒三十斤煮熟退火毒服每日數次常令醺醺不斷防風羌活蒼耳秦艽松節茄根蠶砂萆薢既以祛風兼以燥濕松節能除骨節間之風茄根散血消腫能療凍瘡亦散寒之品當歸枸杞杜仲牛膝補陰潤燥養血榮筋白朮補氣而健脾脾主四肢虎脛驅風而壯骨風從虎故虎骨治風虎雖死猶立不僕其氣力皆在前脛且脛骨能入手足若腰脊痛又當用脊骨鱉甲亦厥陰血分之藥能益陰血而去肝風風濕去氣血旺則病除矣治風治痹藥酒方亦不為少此方平中之奇功效頗著後有增入白花蛇一條者此又以腸胃漫試其毒所不取也三因白散子治肝腎中風涎潮壅塞不語嘔吐痰沫頭痛眩暈兼治陰證傷寒六脈沉伏及霍亂吐瀉小便淋滴不通大附子去皮臍生滑石桂府者五錢半夏制七錢半為末每用二錢姜七片蜜半匙煎空心冷服按此方甚超但不明言其所以然且引兼治陰證傷寒霍亂吐瀉等證為言轉覺泛而不精矣蓋此即濁陰上逆之證緣肝腎之氣厥逆而上是以涎潮壅塞舌喑不語痰沫吐咯難出頭目重眩故非附子不能驅其濁陰然獨陰走下竅者也濁陰既上逆其下竅必不通故用滑石之重引濁陰仍順走前陰之竅亦因附子雄入之勢而利導之也更慮濁陰遇胸中之濕痰兩相留戀再加半夏以開其痰庶涎沫與濁陰具下矣獨活湯丹溪治風虛瘛瘲昏憒不覺或為寒熱筋急而縮為瘛緩而縱為瘲伸縮不已為瘛瘲俗謂之搐是也木曰曲直之象也肝虛而風乘之入於血脈則瘛瘲若在皮膚則為寒熱若移邪於所生則昏憒不覺也所生心也木能生火獨活羌活防風細辛桂心白薇當歸芎藭半夏人參茯神遠志菖蒲五錢甘草炙二錢半每服一兩加薑棗煎肝屬風木而主筋故瘛瘲為肝邪肝欲散急食辛以散之二活防風祛風細辛桂心溫經半夏除痰芎歸辛散風而溫和血血活則風散辛以散之即辛以補之也木喜條達故以散為補心為肝子肝移熱於心則昏憒故以人參補心氣菖蒲開心竅茯神遠志安心神白薇鹹寒退熱而治厥使風靜火息血活神寧而瘛瘲自已矣防風通聖散治諸風潮搐手足瘛瘲大便結邪熱暴甚肌肉蠕動一切風證方見卷五下表里門祛風至寶丹治諸風熱方見卷五下表里門防風通聖散附方內獨活寄生湯千金治肝腎虛熱風濕內攻腰膝作痛冷痹無力屈伸不便肝主筋腎主骨靈樞曰能屈而不能伸者病在筋能伸而不能屈者病在骨獨活桑寄生如無真者以續斷代之秦艽防風細辛當歸酒洗芍藥酒炒川芎酒洗熟地黃杜仲薑汁炒斷絲牛膝人參茯苓甘草桂心等分每服四錢獨活細辛入少陰通血脈偕秦艽防風疏經升陽以祛風桑寄生益氣血祛風濕偕杜仲牛膝健骨強筋而固下芎歸芍地所以活血而補陰參桂苓草所以益氣而補陽辛溫以散之甘溫以補之使氣血足而風濕除則肝腎強而痹痛愈矣丹溪曰久腰痛必用宜桂以開之方止腹脅痛亦然除獨活寄生加羌活續斷名羌活續斷湯資壽解語湯治中風脾緩舌強不語半身不遂防風附子天麻棗仁一錢羚羊角鎊官桂八分羌活甘草五分加竹瀝二匙薑汁二滴喻嘉言曰此方乃治風入脾臟舌強不語之證至於少陰脈縈舌本腎虛風入舌不能言吃緊之候古今從無一及方之豫每用此方去羌防加熟地何首烏枸杞子甘菊花胡麻仁天門冬治之獲效今特識於此方之下聽臨病之工酌用焉不換金丹退風散熱治中風口喎此方祛風之力頗大大勢風而挾寒痰氣窒閉者宜之或塗嘴處亦可荊芥穗甘草炙防風天麻殭蠶一兩薄荷葉三兩羌活川芎白附子烏頭蠍梢藿香葉半兩煉蜜丸彈子大每服一丸細嚼茶酒任下搜風順氣丸治風燥便祕因致氣閉不行暫時用之以疏風潤燥順氣殊不可少本方條下過於誇大謂久服百病皆除老者還少豈理也哉然又云孕婦勿服如服藥覺臟腑微痛以羊肚肺羹補之則其藥有偏峻不可久服明矣車前子二兩半白檳榔火麻子微炒去殼牛膝酒浸郁李仁湯泡去皮另研菟絲子制乾山藥二兩枳殼麩炒防風獨活一兩大黃五錢半生半熟煉蜜丸桐子大每服二十丸酒茶米飲任下空心臨臥各一服去腸中宿滯並腸風下血順風勻氣散治中風中氣半身不遂口眼喎斜半身不遂偏枯也經曰胃脈沉鼓澀胃外鼓大心脈小堅急皆病偏枯男子發左女子發右不喑舌轉可治蓋心是神機開發之本胃是水穀充大之標標本相得則膻中氣海之宗氣盈溢分布四臟三焦上下中外無不周偏若標本相失宗氣虛耗分布不周於經脈則偏枯不周於五臟則喑口眼喎斜者足陽明之脈俠口環唇塞則筋急熱則筋弛左寒右熱則左急而右緩右寒左熱則右急而左緩陽明燥金主緊縮風病而成筋縮木極似金反兼勝已之化燥之甚也治宜辛涼不可用桂附元戎曰酒濕之病亦能作痹證口眼喎斜半身不遂舌強不正渾似中風當瀉濕毒不可作風病治之而汗也衍義易簡言與此同及風氣腰痛白朮二錢烏藥錢半人參天麻五分沉香磨甘草炙青皮木瓜蘇葉白芷三分加姜煎按勻氣之說甚長身內之氣有通無壅外風自不能久居而易於解散故知勻氣即調氣之旨也若取其方以治口眼喎斜之右急左緩者當倍用生熟甘草加苡仁以緩其急加麥冬竹瀝以熄其風得效去白芷蘇葉可多服也戴復庵曰治風之法初得之即當順氣及其久也即當活血若不順氣遽用烏附若不活血遽用羌防天麻輩未見其能治也攝生飲調蘇合丸治一切卒中不論中風中寒中暑中濕中氣及痰厥飲厥之類初起或可用此先以皂角去皮弦細辛生南星半夏為末吹入鼻中俟其噴嚏即進前藥牙噤者中指點南星半夏細辛末並烏梅肉頻搽自開半夏百沸湯泡少頃一錢半南星圓白者濕紙里煨南木香蒼朮細辛生甘草石菖蒲一錢右件銼散分二服加生薑七厚片煎取其半乘熱調蘇合丸半丸灌下痰盛者加全蠍二枚炙按此方治卒中氣閉痰迷不得不用之劑但正氣素虛之人不能當腦麝及辛香摧枯拉朽之勢裁節而用十之二三可也諸香立散真氣虛風證大非所宜牛黃清心丸與蘇合丸異治熱阻關竅可用牛黃丸開之寒阻關竅可用蘇合丸開之其口開手撒遺尿等死證急用人參附子峻補間有得生者若牛黃蘇合之藥入口即斃此無異千鈞鎮一絲也烏藥順氣散治風氣攻注四肢骨節疼痛遍身頑麻及癱瘓語言謇澀腳氣步履多艱手足不遂先宜服此藥以疏氣逆凡中風證多挾中氣不但急中為然然後隨證投以風藥麻黃去節陳皮去白烏藥二兩白殭蠶炒去嘴川芎白芷甘草灸枳殼麩炒桔梗一兩乾薑五錢為末每服三錢水一盞姜三片棗二枚煎如憎寒壯熱頭痛身體倦怠加蔥白三寸煎並服出汗或身體不能屈伸溫酒調服八味順氣散治中風正氣虛痰涎壅盛白朮炒白茯苓青皮去穰炒白芷陳皮去白臺烏藥人參一錢甘草五分經曰邪之所湊其氣必虛故用四君子以補氣治痰之法利氣為先故用青皮白芷烏藥陳皮以順氣氣順則痰行而無壅塞之患矣此標本兼施之治也嚴用和云人之元氣強壯營衛和平腠理致密外邪焉能為害或因七情飲食勞役致真氣先虛營衛空疏邪氣乘虛而入故致此疾若內因七情而得者法當調氣不當治風外因六淫而得者亦當先調氣後以所感六氣治之此良法也宜八味順氣散嚴氏此說於理甚當其方較局方烏藥順氣散不用麻黃根桔殭蠶等風藥正先治氣後治風之妙旨後人反惜其說有未備且謂方中不當雜入白芷吹毛責備詎知白芷香而不燥正和營衛元善藥也和劑合兩方取用人參乾薑川芎陳皮桔梗厚朴白芷甘草白朮麻黃更加葛根治感風頭痛鼻塞聲重尚為合宜故知論方不可橫以已見也通頂散治初中風不知人事風鼓火盛痰涎上壅口噤不開風冷之氣客於胸中滯而不能發藜蘆甘草生用細辛人參川芎一錢石膏五錢為末用一字吹入鼻中有嚏者肺氣未絶可治中風不省人事病已急矣非平藥可以開其壅塞故用藜蘆與人參細辛取其相反而相用也藜蘆苦寒有毒入口即吐能通腦頂令人嚏與人參細辛相反細辛散風通竅溫經破痰肺苦氣上逆加石膏之重以墜之氣即火也痰隨火湧故用石膏辛寒入肺降火甘草之平以緩之芎藭之用取其清氣利竅而已芎藭升清陽而開諸郁為通陰陽氣血之使凡諸卒中尸厥鬱冒皆當發表還魂湯用麻黃桂枝清魂湯用荊芥及用皂角半夏搐鼻取嚏藜蘆砒石折齒取痰皆所以開發三焦使表邪流通也中暑忌用冷水閉表亦同此意瀉青丸治中風自汗昏冒發熱不惡寒不能安臥此是風熱躁煩之故也當歸川芎梔子羌活大黃防風龍膽草等分蜜丸彈子大每服一丸竹葉湯化下按此方以瀉青為名者乃瀉東方甲乙之義也風入厥陰風木之臟同氣相求其勢必盛所慮者虛而眩暈熱而躁煩虛也熱也其可以為壯實而輕瀉之乎審果壯實乃可施此審屬虛熱必以四物湯全方加人參竹瀝秦艽羌活八味為劑始合法度也舒筋保安散治左癱右瘓筋脈拘攣身體不遂腳腿少力乾溼腳氣及濕滯經絡久不能去宜用此以宣導諸氣虎骨酒炙萆薢五靈脂牛膝酒浸續斷白殭蠶炒松節白芍藥烏藥天麻威靈仙黃耆當歸防風一兩木瓜五兩用無灰酒一斗浸上藥二七日緊封扎日足取藥焙乾搗為細末每服二錢用浸藥酒調下酒盡用米湯調下此治風濕搏結於筋脈之間凝滯不散阻遏正氣不得通行故用藥如是也加味羚角散治筋痹肢節束痛羚羊角當歸白芍川芎附子薄荷獨活防風加姜三片此方治筋痹之義甚善蓋筋痹必以舒筋為主宜倍用羚羊角為君筋痹必因血不榮養宜以白芍川芎更加當歸為臣然恐羚角性寒但能舒筋不能開痹必少用附子之辛熱為反佐更少用薄荷獨活防風入風寒濕隊中而為之使也如聖飲節庵治剛柔二痙面赤項強頭搖口噤角弓反張與瘛瘲同法痙者太陽中風重感寒濕而為病也風則燥而動寒則引而緊濕則著而拘故頭搖口噤項強而反張也風挾寒則血澀無汗為剛痙風挾濕則液出有汗為柔痙羌活防風白芷柴胡甘草黃芩半夏川芎芍藥當歸烏藥加姜煎入薑汁竹瀝服柔痙加白朮桂枝剛痙加蒼朮麻黃口噤咬牙大便實加大黃羌防芎芷柴胡甘草辛甘以發散風邪用烏藥者治風須順氣也用歸芍者治風先活血也用半夏薑汁竹瀝者風必挾痰也用黃芩者風必生熱也柔痙加白朮桂枝有汗欲其無汗剛痙加蒼朮麻黃無汗欲其有汗口齒屬陽明陽明實則口噤咬牙而便祕故加大黃以泄胃熱也上中下通用痛風方丹溪黃柏酒炒蒼朮泔洗南星薑製神麯炒調中川芎上下行桃仁去皮尖搗龍膽草下行防己下行白芷一兩上行羌活上行威靈仙酒拌上下行桂枝三錢橫行紅花二錢半麵糊丸痛風有寒有濕有熱有痰有血之不同此方能通治之黃柏清熱蒼朮燥濕此二妙散也治痿正藥龍膽瀉火防己行水四者所以治濕與熱也南星燥痰散風桃仁紅花活血去瘀川芎為血中氣藥四者所以治痰與血也羌活祛百節之風白芷祛頭面之風桂枝威靈仙祛臂脛之風四者所以治風而又兼治寒也加神麯者所以消中州陳積之氣也疏風而兼祛寒以宣於上瀉熱利濕以泄於下活血燥痰消滯以調其中所以能兼治而通用也證不兼者以意消息可矣丹溪曰大法痛風用蒼朮南星川芎當歸白芷酒芩在上者加羌活桂枝威靈仙在下者加牛膝防己木通黃柏薄桂能橫行手臂領南星蒼朮諸藥至痛處三化湯治中風二便數日不行邪氣內實者以此方微利之嘉言曰風中經絡只宜宣之使散誤下則風邪乘虛入腑入臟釀患無竅若夫中臟之候多有平素積虛臟真不守者下之立亡不可不慎唯在胃腑一證內實便祕者間有可下然不過解其煩熱非大下也所謂一氣之微汗一旬之微利亦因可用始用之至於子和以下立法機要以中臟者宜下為言則指下為定法胡可訓耶然中臟有緩急二候中腑日久熱勢深極傳入臟者此屬可下而下必使風與熱俱去填其空竅則風不再生若開其壅瘀必反增風勢何以下為哉其卒虛身中急證下藥入口其人即不蘇矣可無辨與後世以中腑之便祕指為中臟見其誤下不致損人益信子和機要之法為可用設遇真中臟證下不中病難可復追矣方見卷四上攻下門附方內大黃厚朴枳實小承氣湯也上焦滿治以厚朴中焦滿破以枳實下焦實奪以大黃用羌活者不忘乎風也服後二便微行則三焦之氣無所阻塞而復其傳化之職矣故曰三化此乃攻裡之峻劑非堅實之體不可輕服蓋傷寒證胃熱腸枯不得不用大承氣以開其結然且先之以小承氣或調胃承氣恐誤用不當即傷人也在中風證多有虛氣上逆關隘阻閉之候斷無用大承氣之理古方取藥積腹中不下以漸填其空竅俾內風自熄奈何今人每開竅以出其風豈知竅空而風愈熾長此安窮也哉血痹湯治血痹多驚筋脈攣急人參黃耆肉桂當歸川芎代赭石羌活厥陰肝臟所主者血也所藏者魂也血痹不行其魂自亂今不通其血而但治其驚此不得之數也故用人參以開血為君黃耆肉桂當歸川芎為臣以代赭石元專通肝血者佐參耆之不逮少加羌活為使蓋氣者血之天也氣壯則血行然必以肉桂當歸大溫其血預解其凝泣之勢乃以代赭之重墜直入厥陰血分者開通其瘀壅而用羌活引入風痹之所緣厥陰主風風去則寒濕自不存爾三痹湯治氣血凝滯手足拘攣風寒濕三痹人參黃耆茯苓甘草當歸川芎白芍生地黃杜仲薑汁炒斷絲牛膝桂心細辛秦艽川獨活防風等分加薑棗煎喻嘉言曰此方用參耆四物一派補藥內加防風秦艽以勝風濕桂心以勝寒細辛獨活以通腎氣凡治三氣襲虛而成痹患者宜准諸此千金地黃湯治熱風心煩及脾胃熱壅食不下生地黃汁枸杞子汁荊瀝竹瀝五升真酥生薑汁一升人參天門冬八兩白茯苓六兩大黃梔子四兩以後五味為細末先煎地黃等汁內末藥調服方寸匙再漸加服以利為度按此方補虛清熱潤燥滌痰除風開通瘀壅美善具備誠足貴也因養血豁痰難於兩用姑舉此方為例以聽臨證酌量又四肢不舉具屬脾土而虛實分途異治苟其虛實不甚相遠此方更在所必用法無窮盡人存政舉未易言爾烏梅擦牙關方治中風口噤不開胃陽明之脈循頰車入齒縫風寒中之輕則戰栗鼓頷重則口噤不開有中風而口開不噤者筋先絶也不治烏梅揩擦牙齦涎出即開酸先入筋木能剋土酸屬木陽明胃屬土使牙關痠軟則開矣若以鐵器攪之恐傷其齒也藥湯氣蒸法許胤宗治唐柳太后病風脈沉而噤胤宗曰口不下藥宜以湯氣蒸之令藥入腠理周時可瘥遂造黃耆防風湯數十斛置於床下氣如煙霧次日便得語蓋鼻氣通於天無形之氣由鼻而入呼吸傳變無處不到黃耆甘而善補得防風而功益速驅風補虛兩得之矣又法王克明治盧州王守道風噤不能語以熾炭燒地熱灑以湯藥置病者於上須臾小蘇若此二者以病至垂危藥不能及亦治風之權變也清震湯治雷頭風頭面疙瘩腫痛憎寒壯熱狀如傷寒一云頭如雷鳴風動作聲也東垣曰病在三陽不可過用寒藥重劑誅伐無過處清震湯治之三陽之氣皆會於頭額從額至巔絡腦後者屬太陽從額至鼻下面者屬陽明從頭角下耳中耳之前後者屬少陽升麻蒼朮五錢荷葉一枚升麻性陽味甘氣升能解百毒蒼朮辛烈燥濕強脾能闢瘴癘局方升麻湯也荷葉色青氣香形仰象震震仰盂為雷述類象形以治之能助胃中清陽上行用甘溫辛散之藥以升發之使邪從上越且固胃氣使邪不傳裡也卷六下祛寒門寒之為病有陰邪犯於表者有生冷傷於內者有陰寒中於臟者此皆外來之寒人所易知者也至於本來之寒初無所感莫測其因人之病此者最多世之知此者最少丹溪曰氣有餘便是火夫今人之氣有餘者能十中之幾其有或因稟受或因喪敗以致陽氣不足者多見寒從中生而陽衰之病無所不致第其由來者漸形見者微當其未覺也孰為之意及其既甚也始知難治矧庸醫多有不識每以假熱為真火因後斃於無形無響又不知其幾也故惟高明見道之士常以陽衰根本為憂凡祛寒之法如乾薑能溫中亦能散表嘔惡無汗者宜之肉桂能行血善達四肢血滯多痛者宜之吳茱萸善暖下焦腹痛泄瀉者極妙肉豆蔻可溫脾胃飧泄滑利者最奇胡椒溫胃和中其類近於蓽茇丁香止嘔行氣其暖過於豆仁補骨脂性降而善閉故能納氣定喘止帶濁泄瀉製附子性行如酒故無處不到能救急回陽凡此之類皆性味溫熱之當辨者然用法尚有其要以散兼溫者散寒邪也以行兼溫者行寒滯也以補兼溫者補虛寒也第多汗者忌姜姜能散也失血者忌桂桂動血也氣短氣怯者忌故紙故紙降氣也大凡氣香者皆不利於氣虛證味辛者多不利於見血證所當慎也至於附子今人必待勢不可為不得已然後用之不知回陽之功當用於陽氣將去之際便當漸用以望挽回若用於既去之後死灰不可復燃矣但附子性悍獨任為難必得大甘之品如人參熟地炙甘草之類皆足以制其剛而濟其勇斯無往不利矣理中湯仲景治傷寒太陰病自利不渴王海藏曰上吐下瀉不止當渴而反不渴脈微細而弱者理中湯主之三陽傳陰經而下利者為協熱利陰寒直中陰經而下利者為寒利三陽下利身熱太陰下利手足溫少陰厥陰下利身冷其大較也下利雖有表症不可發汗以下利為邪氣內攻走津液而胃虛也寒多而嘔腹痛糞溏太陰脾經也腹滿而吐食不下自利腹痛為太陰病自利渴者為熱不渴喜嘔腹痛便溏皆虛寒所致外邪傳裡而腹痛者其痛不常陰寒在內而腹痛者痛無休止時欲作利大腹屬太陰少腹屬少陰臍下屬厥陰亦有挾食積與痰火者脈沉無力或厥逆拘急寒束於外或結胸吐蛔寒凝於中及感寒霍亂陰陽不和而揮霍撩亂或吐或瀉亦有寒熱二症若虛寒所致者宜此湯凡中宮虛寒氣不能理諸症俱宜用此分理陰陽安和胃氣白朮陳壁土炒二兩乾薑炮甘草炙人參一兩自利腹痛者加木香不痛利多者倍白朮渴者倍白朮益氣燥濕故能生津倦臥沉重利不止加附子此廉少陰證腹滿去甘草甘令人滿嘔吐去白朮加半夏薑汁白朮甘壅姜夏散逆臍下動氣去朮加桂白朮補氣桂泄奔豚悸加茯苓飲停則悸茯苓利水寧心發黃加茵陳寒實結胸加枳實本方等分蜜丸名理中丸仲景曰大病瘥後喜唾久不了了胃中有寒宜理中丸溫之宋徽宗食冰太過病脾疾國醫不效召楊介准大理中丸上曰服之屢矣介曰疾因食冰臣請以冰煎此藥是治受病之源也果愈人參補氣益脾故以為君白朮健脾燥濕故以為臣甘草和中補土故以為佐乾薑溫胃散寒故以為使以脾土居中故曰理中人身上脘清氣居多下脘濁氣居多而其所以能升清降濁者全賴中氣為之主本方加附子一枚名附子理中湯亦可作丸即四逆湯加參朮治中寒腹痛身痛四肢拘急漸傷曰傷卒中曰中有中臟中腑中經絡皮肉筋脈之殊治之當分微甚微則用不換金正氣散加附子附子五積散甚者臍腹痛四肢厥用附子理中湯姜附湯入肝加木瓜入肺加桑白皮入脾加於白朮入心加上茯神加桂枝倍甘草名桂枝人參湯仲景治太陽表證不除而數下之協熱而利心下痞硬表裡不解者欲解表裡之邪全藉中氣為敷布故用理中以和里而加桂枝以解表不名理中而名桂枝者到底先表之意也大抵陽熱為邪則腹滿而咽乾陰寒為邪則腹滿而吐利加枳實茯苓蜜丸名枳實理中丸崔行功治寒實結胸欲絶胸膈高起手不可近用大陷胸不瘥者崔行功曰此是下後虛逆氣已不理而毒復上攻氣毒相搏結於胸者用此丸先理其氣次療諸疾其效如神渴者加花粉自汗者加牡蠣粉去甘草加茯苓川椒烏梅名理中安蛔丸陶仲文治胃寒吐蛔蛔得甘則動故去甘草得酸則止得辛則伏故加椒梅加當歸白芍陳皮厚朴川椒入姜煎名溫胃湯治憂思鬱結脾肺氣凝脹滿上衝飲食不下加黃耆白芍陳皮藿香名黃耆湯海藏亦出理中例法加青皮陳皮名治中湯治前證腹滿痞悶兼食積者加陳皮茯苓名補中湯治泄瀉瀉不已加附子惡食食不化加砂仁加黃連茯苓名連理湯治傷暑瀉而作渴若外感盛暑內傷生冷者非此不可理陰煎治真陰虛弱脹滿嘔逆痰飲噁心吐瀉腹痛婦人經遲血滯等證熟地三五七錢或一二兩當歸二三錢或五七錢乾薑炒黃色一二三錢甘草炙一二錢或加肉桂一二錢加附子名附子理陰煎若風寒外感邪未深入但見發熱脈數不洪凡內無火證素稟不足者但用此湯加柴胡一錢半或二錢連進一二服其效如神若寒凝陰盛而邪有難解者必加麻黃一二錢放心用之或不用柴胡亦可恐其清利也若陰勝之時外感寒邪脈細惡寒或背惡寒者乃太陽少陰證也加細辛一二錢甚者再加附子一二錢若陰虛火盛其有內熱不宜用溫而氣血俱虛邪不能解者宜去薑桂單以三味與之加減或止加人參亦可若脾腎兩虛水泛為痰或嘔或脹者加茯苓一錢五分或加白芥子五分以行之若泄瀉不止及腎瀉者宜少用當歸或並去之加山藥扁豆吳茱萸破故紙肉豆蔻附子若腰腹有痛加杜仲牛膝若腹有脹滯疼痛加陳皮木香砂仁此理中湯之變方也凡脾腎中虛等證宜剛燥者當用理中六君之類宜溫潤者當用理陰大營之類又凡真陰不足或素多勞倦之輩因而忽感寒邪不能解散或發熱或頭身疼痛或面赤舌焦或雖渴而不喜冷飲或背心肢體畏寒但脈見無力者悉是假熱之證若用寒涼攻之必死宜速用此加減以溫補陰分托散表邪連進數服使陰氣漸充則汗從陰達而寒邪不攻自散此最切於時用者也六味回陽飲治命門火衰陰中無陽陰陽將脫等證人參一二兩或數錢製附子二三錢炮乾薑二三錢炙甘草一錢熟地五錢或一兩當歸身三錢如泄瀉者或動血者以冬朮代之如肉振汗多者加炙黃耆四五錢或一兩或冬白朮三五錢如泄瀉者加烏梅二枚或北五味二十粒如虛陽上浮加茯苓二錢如肝經鬱滯加肉桂二三錢四逆湯仲景治三陰傷寒四逆湯為少陰主藥然三陰通用之太陽證脈沉亦有用此者身痛腹痛下利清穀三陰裡寒自利居多惡寒不渴四肢厥冷治四肢厥逆故名四逆湯四肢者諸陽之本寒則血脈凝澀陽氣不能敷布故一身盡痛而手足厥冷也或反不惡寒面赤煩躁陰盛格陽於外裡寒外熱或乾嘔膈有寒飲或咽痛虛火上炎脈沉微細欲絶少陰脈有沉有緊有數而仲景統以微細言之蓋沉必重按始得緊數亦在沉細中見不似陽證浮大而緊敷也薛慎齊曰人知數為熱不知沉細中見數為寒甚真陰寒證脈營有七八至者但按之無力爾宜深察之附子一枚生用乾薑一兩甘草炙二兩冷服面赤者格陽於上也加蔥九莖以通陽喻嘉言曰陽虛之人雖有表證其汗仍出其手足必厥才用表藥立至亡陽不用表藥外邪不服故用前湯加蔥為治腹痛真陰不足也加芍藥二兩以斂陰咽痛陰氣上結也加桔梗一兩以利咽利止脈不出加人參二兩以助陽補氣血嘔吐加生薑二兩以散逆氣寒淫於內治以甘熱故以姜附大熱之劑伸發陽氣表散寒邪附子生用亦能發表甘草亦補中散寒之品又以緩姜附之僭上也甘草為君乾薑為臣附子為使必冷服者寒盛於中熱飲則格拒不納經所謂熱因寒用又曰治寒以熱涼而行之是也此制奇之大劑也肝腎道遠非大劑不能達仲景云傷寒醫下之續得下利清穀腹滿身痛者急當救里宜四逆湯清便自調身痛者急當救表宜桂枝湯蓋身痛尚屬表證急則先救里而後解表也厥陰篇曰大汗出熱不去內拘急四肢痛又下利厥逆而惡寒者四逆湯主之按厥陰證下利讝語有燥屎脈沉疾按之有力者為陽厥止宜下以小承氣湯如脈沉遲按之無力者則為陰厥宜四逆湯更須速灸之凡傳經熱邪則為陽厥溺赤而喜飲冷直中真寒則為陰厥陰縮而喜飲熱湯經曰凡陰陽不相順接便為厥手足逆冷是也三陰三陽之脈俱相接於手足陰主寒陽主熱陽氣內陷不與陰氣相順接則手足逆冷加人參一兩名四逆加人參湯治惡寒脈微復利利止亡血利雖止而津液已竭故云亡血再加茯苓六兩名茯苓四逆湯治汗下後病不解而煩躁去乾薑加芍藥三兩名芍藥甘草附子湯治傷寒發汗不解反惡寒者虛故也百問曰汗後惡寒人必虛下後發熱人必實除附子用甘草四兩乾薑二兩名甘草乾薑湯治傷寒脈浮自汗小便數微惡寒腳攣急用桂枝湯誤攻其表得之便厥咽中干煩躁吐逆與此湯以復其陽脈浮自汗便數惡寒陽不足也攻表重虛其陽得之便厥故與甘草益氣乾薑助陽俟厥愈足溫重與芍藥甘草湯各四兩以和陰慮辛熱傷陰隨興此湯和陰以復其津液證雖鄰於少陰而不敢用四逆其腳即伸除甘草加蔥白四莖名白通湯復陽通脈加吳茱萸名茱萸四逆湯治少陰厥陰腹痛加當歸木通名當歸四逆湯治感寒手足厥冷脈細欲絶及寒疝臍下冷引腰胯痛寒傷營血故加當歸木通能通血脈仲景當歸四逆湯見後加茵陳名茵陳四逆湯治陰黃加生脈散陳皮名回陽返本湯治陰盛格陽加官桂良薑半夏名漿水散潔古治虛寒水瀉冷汗脈微甚者嘔吐此為急病當歸四逆湯仲景治厥陰傷寒手足厥寒脈細欲絶當歸桂枝芍藥細辛三兩甘草炙通草即木通二兩大棗二十五枚仲景又曰其人素有久寒者加吳茱萸二升生薑半斤酒六升和煮名四逆加吳茱萸生薑湯四逆之名多矣而有因寒因熱之不同此則因風寒中血脈而逆故以當歸辛溫血中之氣藥為君通脈散逆必先去血中之邪故以桂枝散太陽血分之風細辛散少陰血分之寒為輔未有營衛不和而脈能通者故以芍藥甘草大棗調和營衛通草利九竅通血脈關節諸藥藉之以破阻滯而厥寒散矣真武湯仲景治少陰傷寒腹痛小便不利四肢沉重疼痛自下利者此為有水氣或咳或嘔或小便利傷寒脈沉細欲吐不吐心煩但欲寐五六日自利而渴者為少陰證凡人寤則氣行於陽寐則氣行於陰然必自少陰始故少陰證但欲寐陰氣勝也一有陽擾則反是矣周揚俊曰但欲寐非能寐昏昏如夢爾少陰屬腎腎病不能制水水飲停為水氣腹痛者寒濕內甚也四肢沉重疼痛寒淫外甚也小便不利自下利者濕勝而水穀不別也或咳或嘔皆停飲也及太陽病發汗汗出不解仍發熱心悸頭眩筋惕肉瞤振振欲劈地氣虛惡寒汗出過多則心悸汗為心液汗去心虛如魚失水則躍也水停心下亦心悸心屬火火畏水故悸也虛陽內動故頭眩汗多則液少不能榮養筋肉故筋惕惕而跳肉瞤而動也振振欲劈地者亡陽無奈欲劈地而入也程郊倩曰汗多亡陽夫人知之然有衛外之陽為周身營衛之主此陽虛遂有汗漏不止惡寒身痛之證有膻中之陽為上焦心肺之主此陽虛遂有叉手冒心及奔豚之證有腎中之陽為下焦真元之主此陽虛遂有發熱眩悸瞤振劈地之證有胃中之陽為中焦水穀生化之主此陽虛遂有腹脹滿胃不和而成心下痞之證救誤者須觀脈證知犯何逆以法治之腎之真陽盛則水皆內附而與腎氣同其收藏矣腎之陽虛不能制水則泛濫為病故上凌心而為眩悸中侮土而致嘔瀉也方名真武蓋取固腎為義喻嘉言曰汗雖出而熱不退則邪未盡而正已大傷況裡虛為悸上虛為眩經虛為瞤身振振搖無往而非亡陽之象所以行真武把關坐鎮之法也附子一枚炮白朮二兩炒茯苓白芍生薑三兩水寒相搏咳者加五味子細辛乾薑五味斂肺氣細辛乾薑散水寒小便利去茯苓以其滲利下利去芍藥加乾薑芍藥酸寒乾薑辛熱嘔去附子加生薑一倍附子僭上生薑散逆茯苓白朮補上利水能伐腎邪而療心悸生薑附子回陽益衛能壯真火而逐虛寒芍藥酸收能斂陰和營而止腹痛補陽必兼和陰不欲偏勝經曰寒淫所勝治以辛熱濕淫所勝佐以酸平真武北方之神一龜一蛇司水火者也腎命象之此方濟火而利水故以名焉程郊倩曰水氣唯太陽與少陰有之以二經同司夫水也然太陽從表得之膚腠不宜水氣為元府所遏故以小青龍發之少陰由下焦有寒不能制服本水客邪得深入而動其本氣緣胃陽衰而堤防不及也故用真武湯溫中鎮水收攝其陰氣按青龍主太陽表水十棗主太陽里水真武主少陰里水喻嘉言曰陽明少陽絶無用附子法唯太陽有不得不用之證蓋太陽膀胱為腎之腑腎中陽虛陰盛勢必傳出於腑以故才見脈微惡寒漏汗惡風心悸頭眩筋惕肉瞤躁擾等證從是傳經熱邪不得不用姜附以消陰而回陽也去生薑加人參二兩名附子湯仲景治少陰病身體痛手足寒骨節痛脈沉者腎主骨寒淫則痛此一身骨節盡痛乃陽虛陰盛而生內寒所致非外感也若以外感之痛治之則殺人矣故用參附助陽而勝腎寒加芍藥斂陰以為陽之附也及少陰病得之一二日口中和背惡寒者背為胸中之腑諸陽受氣於胸中轉行於背背為陽腹為陰陽氣不足陰氣內盛則背為之惡寒若風寒在表而惡寒則一身盡寒矣又有陰氣不足陽氣乘虛內陷陰中表陽新虛背微惡寒者經所謂傷寒無大熱口渴心煩背微惡寒者是也白虎加人參湯主之一為陰寒內盛一為陽氣內陷何以別之蓋陰寒為病內無燥熱則口中和陽氣內陷則消爍津液口燥舌乾而渴也欲辨陰陽寒熱之不同當以口中燥潤群之吳茱萸湯仲景治陽明證食谷欲嘔若得湯反劇者則屬上焦少陰證吐利手足厥冷煩躁欲死厥陰證乾嘔吐涎頭痛厥陰之脈挾胃乾嘔吐沫裡寒內格也厥陰之脈上巔頭痛寒氣上逆也按三陽皆有頭痛太陰少陰二經之脈不上循頭故無頭痛唯厥陰與督脈會於巔亦有頭痛然風溫在少陰濕溫在太陰而頭反痛是又不可拘拘者李東垣曰太陰頭痛必有痰也少陰頭痛足寒而氣逆也蓋太陰少陰二經雖不上循頭然痰與氣逆壅於膈中頭上氣不得暢而為痛也吳茱萸一升泡人參三兩大棗十二枚生薑六兩喻嘉言曰此明嘔有太陽亦有陽明若食谷而嘔則屬胃寒與太陽之惡寒嘔逆原為熱證者不同火熱上衝而嘔恐誤以寒藥治寒嘔也若服吳茱萸湯反劇者則仍屬太陽熱邪而非胃寒明矣宜葛根加半夏湯小柴胡湯梔子豉湯黃芩湯若少陰證吐利厥逆至於煩躁欲死腎中之陰氣上逆將成危候腎中陰盛上格乎陽而為吐逆故用吳茱散寒下逆人參薑棗助陽補土使陰寒不得上干溫經而兼溫中也吳茱為厥陰本藥故又治肝氣上逆嘔涎頭痛加附子名吳茱萸加附子湯治寒疝腰痛牽引睪丸尺脈沉遲大建中湯金匱治心胸中大寒痛嘔不能飲食腹中寒氣上衝皮起出見有頭足上下痛而不可觸近者陽受氣於胸中陽虛則陰邪得以中之陰寒之氣逆而上衝橫格於中焦故見高起痛嘔不可觸近之證心為陽寒為陰寒乘於心冷熱相激故痛寒乘於脾脾冷弱不消水穀故痛而嘔復不能飲食也蜀椒二合乾薑四兩人參二兩煎去滓內飴糖一升微煎溫服蜀椒辛熱入肺散寒入脾暖胃入腎命補火乾薑辛熱通心助陽逐冷散逆人參甘溫大補脾肺之氣飴糖甘能補土緩可和中蓋人以中氣為主用辛辣甘熱之藥大建其中臟之陽以祛其逆上之濁陰也小建中湯仲景治傷寒陽脈澀陰脈弦腹中急痛邪氣入里與正相搏則腹痛澀者血不足也弦者木剋土也太陽在表而無腹痛少陽在半表半裡有胸脅痛無腹痛陽明腹滿急痛者裡實也宜下之大柴胡湯小承氣湯三陰下利而腹痛者裡寒也宜溫之四逆湯附子理中湯腸鳴泄瀉而痛者裡虛有寒也宜小建中湯溫中散寒傷寒二三日心悸而煩悸者陽氣虛也煩者陰血虛也氣血內虛與此湯先建其里倍芍藥者酸以斂陰陰收則陽歸附也加飴糖者甘以潤土土潤則萬物生也通治虛勞悸衄裡急腹痛夢遺失精四肢痠痛手足煩熱咽燥口乾虛勞黃疸黃疸小便利而色白者是無熱也不可除熱當作虛寒治之喻嘉言曰虛勞病至於亡血失精精血枯槁難為力矣急宜建其中臟使飲食增而陰血旺故但用稼穡作甘之味生其精血而酸辛酸苦在所不用舍是無良法也桂枝生薑三兩芍藥六兩甘草一兩炙大棗十二枚入飴糖一升微火解服嘔家不可用建中以甜故也此即桂枝加芍藥湯但桂有厚薄爾按此湯以飴糖為君故不名桂枝芍藥而名建中今人用建中絶不用飴糖失仲景遺意矣吳鶴皋曰桂枝當是桂桂枝味薄故用以解表桂味厚故用以建里準繩曰脾居四臟之中生育營衛通行津液一有不調則失所育所行矣必以此湯溫健中臟故名建中脾欲緩急食甘以緩之故以飴糖為君甘草為臣桂枝辛熱辛散也潤也營衛不足潤而散之芍藥酸寒酸收也泄也津液不通收而行之故以桂芍為佐生薑辛溫大棗甘溫胃者衛之源脾者營之本針經曰營出中焦衛出上焦是已衛為陽益之必以辛營為陰補之必以甘辛甘相合脾胃健而營衛通故以薑棗為使李東垣曰傷寒論云陽脈澀陰脈弦法當腹中急痛以芍藥之酸土中瀉木為君飴糖炙草甘溫補脾養胃為臣水挾木勢亦來侮土肉桂大辛熱佐芍藥以退寒水薑棗辛甘而溫發散陽氣行於經脈皮毛為使或謂桂枝湯解表而芍藥少建中湯溫里而芍藥多何也皮膚為近則制小其服心腹為遠則制大其服所以不同也按此即表欲其散里欲其收之義小建中治腹痛者以木來剋土取芍藥為君土中瀉木也理中湯治腹痛者以水來侮土取乾薑為君土中瀉水也平胃散治腹痛自利者取蒼朮為君瀉土除濕也云岐子曰建中為補能補中焦之虛而不能補上焦下焦之虛調胃為瀉能瀉中焦之實而不能瀉上焦下焦之實加黃耆兩半名黃耆建中湯金匱治虛勞諸不足準繩曰血不足而用黃耆黃耆味甘加以甘草大能生血此仲景之妙法蓋稼穡作甘甘能補胃胃為氣血之海氣血所從生也經曰無陽則陰無以生以甘益胃而生血旨哉今人但知參耆為氣藥故特表而出之按補血湯黃耆五倍於當歸而云補血即此義亦治傷寒汗後身痛表虛惡寒脈遲弱者身痛乃六經俱有之證有表有里有寒有熱有風有濕陽證身痛但拘急陰寒身痛體勢沉重宛如被杖以此別之此證因過汗耗損陽氣血少不能榮養筋骨故痛陽虛故脈遲汗後故脈弱用黃耆甘草之甘以補中氣芍藥之酸以收陰氣桂枝辛熱外以益衛而實表內以和營而補虛使中氣建立則能生育營衛通行津液表不虛而身痛自汗皆止虛勞不足可愈矣十四味建中湯治氣血不足虛損勞瘠短氣嗜臥欲成勞瘵及陰證發斑或因汗吐下後中氣虛乏或因欲事損傷腎氣或因過服涼藥遂成陰證寒伏於下逼其無根失守之火上獨熏肺而發斑點其色淡紅隱隱見於肌表與陽證發斑色紫赤者不同此胃氣極虛若服寒涼立見危殆吳鶴皋曰以參耆桂附治斑法之變者也醫不達權安足語此寒甚脈微黃耆蜜炙人參白朮土炒茯苓甘草蜜炙半夏薑製當歸酒洗白芍酒炒熟地川芎麥冬肉蓯蓉附子肉桂加薑棗煎黃耆益衛壯氣補中首藥四君益氣四物養血陰陽調和則血氣各安其位矣半夏和胃健脾麥冬清心潤肺蓯蓉補命門相火之不足桂附引失守之火而歸元於十全大補之中而有加味要以強中而蕺外也除茯苓白朮麥冬川芎熟地蓯蓉名八味大建中湯治同除川芎熟地白朮附子蓯蓉加柴胡細辛陳皮名樂令建中湯治臟腑虛損身體羸瘦潮熱自汗將成勞療大能退虛熱生氣血喻嘉言曰樂令建中湯柴胡細辛為君意在退熱而陰虛之熱則不可退十四味建中湯用桂附蓯蓉意在復陽而陰虛之陽未必可復又在用方者之善為裁酌爾又曰二方治臟氣素虛以之兩建其脾腎之陽蓋虛勞之病多本脾腎故引伸建中之法乃後人超出之方也養中煎治中氣虛寒為嘔為泄者人參一二三錢山藥炒二錢白扁豆炒二三錢炙甘草一錢乾薑炒黃一二錢如噯腐氣滯者加陳皮一錢或砂仁四分如胃中空虛覺餒加熟地三五錢白通加人尿豬膽汁湯仲景治少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔而煩服此湯後脈暴出者死微續者生腎者胃之關也前陰利水後陰利谷寒邪客之則不能禁固故下利也與白通湯復陽散寒服後利不止厥逆無脈乾嘔煩者寒氣太甚內為格拒陽氣逆亂也服此湯後脈暴出者正氣因發泄而脫也故死脈微續者陽氣漸復也故生蔥白四莖乾薑一兩附子一枚炮人尿五合豬膽汁一合加減法同四逆湯蔥白之辛以通陽氣姜附之熱以散陰寒此白通湯也服而不應者乃陰盛格拒乎陽藥不能達少陰故加人尿豬膽汁為引取其與陰同類下咽之後冷體既消熱性便發情且不達而致大益經曰逆而從之從而逆之正者正治反者反治此之謂也以熱治寒以寒治熱為正治以熱治熱以寒治寒為反治亦曰從治謂從其性而伏之也按厥有陰陽二證陰厥者身涼不渴脈遲細而微陽厥者陽熱極而反厥雖厥而煩渴譫妄身復時溫而脈數也若陽厥極深至於身冷脈微欲絶為熱極而將死矣急以大承氣下之則厥愈所謂寒藥反能生脈而令身暖也若以熱藥助其陽則陰氣暴絶而死矣陰厥用白通四逆湯亦須急投緩則無及姜附白通湯治暴卒中寒厥逆嘔吐瀉利色清氣冷肌膚凜栗無汗盛陰沒陽之證附子炮去皮臍乾薑炮五錢蔥白五莖取汁豬膽大者半枚用水二大盞煎附姜二味至一盞入蔥汁並豬膽汁和勻服再用蔥一大握以帶輕束切去兩頭留二寸許以一面尉熱安臍上用尉斗盛炭火尉蔥白上面取其熱氣從臍入腹甚者連尉二三餅又甚者再用艾炷灸關元氣海各二三十壯臍下一寸五分名氣海二寸名丹田三寸名關元內外協攻務在一時之內令得陰散陽回身溫不冷次用附姜歸桂湯喻嘉言曰寒中少陰行其嚴令埋沒微陽肌膚凍裂無汗而喪神守急用附子乾薑加蔥白以散寒加豬膽汁引入陰分然恐藥力不勝尉蔥灼艾外內協攻乃足破其堅凝少緩須臾必無及矣又曰用姜附以勝陰復陽者取飛騎突入重圍搴旗樹幟使既散之陽望幟爭趨頃之復合爾不知此義者加增藥味和合成湯反牽制其雄入之勢必至藥緩無功矣附薑湯治卒暴中寒其人腠理素虛自汗淋漓身冷手足厥逆或外顯假熱躁擾乃陰盛於內逼其陽亡於外即前方不用蔥白也附子炮去皮臍乾薑炮五錢水二大盞煎至一盞加豬膽汁一蛤殼和溫冷服不用蔥尉及艾灼喻嘉言曰若其人真陽素擾腠理素疏陰盛於內必逼其陽亡於外魄汗淋漓脊項強硬用附子乾薑豬膽汁即不可加蔥及尉灼恐助其散而陽無由內附也宜撲止其汗陡進前藥隨加固護腠理不爾恐其陽復越也附姜歸桂湯治暴病用附薑湯後第二服隨用此繼之因附姜專主回陽而其所中寒邪先傷營血故加歸桂驅營分之寒才得藥病相當也附子炮去皮臍乾薑炮當歸肉桂二錢五分水二大盞煎至一盞入蜜一蛤殼溫服喻嘉言曰其次前藥中即須首加當歸肉桂兼理其營以寒邪中入先傷營血故也不爾藥偏於衛弗及於營與病即不相當邪不盡服必非勝算也附姜歸桂參甘湯治陽氣將回陰寒少殺略有端緒第三服即用此方附子炮去皮臍乾薑炮當歸肉桂一錢五分人參甘草二錢水二大盞煨姜三片自汗不用大棗二枚煎至一盞入蜜三蛤殼溫服喻嘉言曰其次前藥中即須加入人參甘草調元轉餉收功幃幄不爾姜附之猛直將犯上無等矣辛溫平補湯治暴中寒證服前三方後其陽已回身溫色活手足不冷吐利漸除第四方即用此平調臟腑營衛俾不致有藥偏之害附子炮去皮臍乾薑炮肉桂五分當歸人參甘草炙黃耆蜜炙白朮土炒白芍酒炒一錢五味子十二粒水二大盞煨姜三片大棗二枚煎至一盞入蜜五蛤殼溫服喻嘉言曰用前藥二三劑後覺其陽明在躬暈動頗輕神情頗悅更加黃耆白朮五味白芍大隊陰陽平補不可歇手蓋重陰見晛浪子初歸斯時搖搖靡定怠緩不為善後必墮前功也又曰用群隊之藥以培陰護陽其人即素有熱痰陽出早已從陰而變寒至此無形之陰寒雖散而有形之寒痰阻塞竅隧者無由遽轉為熱姜附固可弗施其牛黃竹瀝一切寒涼斷不可用若因其素有熱痰妄投寒劑則陰復用事陽即躁擾必墮前功也甘寒補氣湯治中寒服藥後諸證盡除但經絡間微有窒塞辛溫藥服之不能通快者第五方用甘平助氣藥緩緩調之人參炙麥冬白芍酒炒一錢黃耆蜜炙一錢二分生地黃二錢甘草炙七分牡丹皮八分淡竹葉鮮者取汁少許更炒乾者七分水二大盞煎至一盞入梨汁少許熱服無梨汁用竹瀝可代喻嘉言曰前用平補後已示銷兵放馬偃武崇文之意茲後復有頑痰留積經絡但宜甘寒助氣開通不宜辛辣助熱壅塞蓋辛辣始先不得已而用其毒陽既安堵即宜休養其陰何得喜功生事徒令病去藥存轉生他患漫無寧宇也益元湯活人治面赤身熱不煩而躁飲水不入口名戴陽證成氏曰煩躁者先煩漸至躁也躁煩者先躁而迤邐復煩也從煩至躁為熱先躁後煩謂怫怫然更作躁悶此為陰盛格陽也雖大躁欲於泥水中臥但飲水不得入口是也此氣欲脫而爭譬如燈將滅而復明矣按內熱曰煩謂心中郁煩為有根之火故但煩不躁及先煩後躁者皆可治外熱曰躁謂身體手足動擾欲裸衣入井為無根之火故但躁不煩及先躁後煩者皆不治大抵獨煩不躁者多屬熱惟悸者屬虛獨躁不煩者多屬寒而火邪者間或有之附子炮乾薑艾葉黃連知母人參麥冬五味子甘草加薑棗蔥白煎入童便一匙冷服附子乾薑艾葉回陽之藥協以連人參甘草補其陽虛退其陰火所謂甘溫能除大熱也黃連以折泛上之火知母以滋在下之陰以靜其躁蓋陽無陰則孤陽無所附麗故扶陽亦兼和陰也麥冬五味補肺清心合人參以生其脈加童便而冷服者熱因寒用也回陽救急湯節庵自注云即四逆湯治三陰中寒初病身不熱頭不痛惡寒戰栗四肢厥冷引衣自蓋蜷臥沉重腹痛吐瀉口中不渴或指甲唇青口吐涎沫或無脈或脈沉遲無力初病無身熱頭痛是無表邪邪不在陽也惡寒厥逆是寒中於里陽氣不宜於四肢也引衣自蓋蜷臥沉重是寒中少陰也腹痛吐瀉不渴是寒中太陰也指甲唇青口吐涎沫是寒中厥陰也至於沉遲無脈陰寒為已甚矣戰栗有屬陰者陽微陰勝邪氣內爭而正不勝故心寒足蜷鼓頷厥冷而一身戰搖也有屬陽者真陽來復正氣鼓動外爭而勝故身為振搖遂大汗以解也附子炮乾薑肉桂人參五分白朮茯苓一錢半夏陳皮七分甘草三分五味子九粒加姜煎入麝三釐調服無脈加豬膽汁若入心而通脈泄瀉加升麻黃耆嘔吐加薑汁吐涎沫加鹽炒吳茱萸寒中三陰陰盛則陽微故以附子薑桂辛熱之藥祛其陰寒而以六君溫補之藥助其陽氣五味合人參可以生脈加麝香者通其竅也栝蔞瞿麥丸金匱治小便不利有水氣其人渴栝蔞根二兩茯苓薯蕷三兩附子一枚炮瞿麥一兩煉蜜丸服以小便利腹中溫為知金匱治小便不利而淋且渴者用之以其胃中有熱腹中有寒故變八味丸之製為此丸見其人趺陽脈數即胃中有熱胃熱必消穀引食大便必堅小便必數是其淋而且渴為胃熱中消明矣故用栝蔞以清胃熱茯苓瞿麥以利小水然腎中寒水之氣上入於腹則腹中必冷故用附子以勝其寒方下云以小便利腹中溫為知制方之義可繹思也中滿分消湯東垣治中滿寒脹寒疝二便不通四肢厥逆食入反出腹中寒心下痞下虛陰躁奔豚不收或多食寒涼及脾胃久虛之人胃中寒則脹滿或臟寒生滿病此湯主之川烏乾薑蓽澄茄生薑黃連人參當歸澤瀉青皮麻黃柴胡二錢草蔻仁厚朴黃耆黃柏五分益智仁吳茱萸木香半夏茯苓升麻三分熱服川烏二姜吳茱澄茄益智草蔻除濕開鬱暖胃溫腎以祛其寒青皮厚朴以散其滿升麻柴胡以升其清茯苓澤瀉以降其濁人參黃耆以補其中木香以調其氣當歸以和其血麻黃以泄其汗半夏以燥其痰黃柏黃連以去濕中之熱又熱因寒用也李東垣曰中滿治法當開鬼門潔淨府開鬼門者發汗也潔淨府者利小便也中滿者瀉之於內謂脾胃有病令上下分消其濕下焦如瀆氣血自然分化如或大實大滿大小便不利者從權以寒熱藥下之溫胃飲治中寒嘔吐吞酸泄瀉不思飲食及婦人臟寒嘔惡胎氣不安等證白朮炒一二錢當歸一二錢人參一二三錢白扁豆炒二錢甘草炙一錢乾薑炒黃一二錢陳皮炒一錢如下寒帶濁者加故紙一錢如氣滯或兼胸腹痛者加藿香丁香白豆仁砂仁白芥子之屬如兼外邪及肝腎之病者加桂枝肉桂甚者加柴胡如脾氣陷而身熱者加升麻五七分如水泛為痰而胸膈痞滿者加茯苓一二錢如脾胃虛極大嘔大吐不能止者宜倍用參朮仍加柴胡胡椒二三分煎熟徐徐服如泄瀉者去當歸無滯去陳皮四神丸治腎瀉脾瀉腎瀉者五更時瀉也經曰腎者胃之關也前陰利水後陰利谷腎屬水水旺於子腎之陽虛不能健閉故將交陽分則瀉也脾瀉者脾之清陽下陷不能運化闌門元氣不足不能分別水穀不痛而瀉也闌門在大小腸之交主分別水穀兩證皆由腎命火衰不能上生脾土故也楊仁齊曰腎命之氣交通水穀自然克化破故紙四兩酒浸一宿炒五味子三兩炒肉豆蔻二兩面里煨吳茱萸一兩鹽湯泡用大棗百枚生薑八兩切片同煮棗爛去姜取棗肉搗丸每服二錢臨臥鹽湯下若平旦服之至夜藥力已盡不能敵一夜之陰寒也破故紙辛苦大溫能補相火以通君火火旺乃能生土故以為君肉蔻辛溫能行氣消食暖胃固腸五味鹹能補腎酸能澀精吳茱辛熱除濕燥脾能入少陰厥陰氣分而補火蓋久瀉皆由腎命火衰不可專責脾胃故大補下焦元陽使火旺土強泄瀉自止矣單用破故紙肉豆蔻名二神丸治同許學士曰有全不進食者服補脾藥皆不效豫授二神丸頓能進食此病不可全作脾治蓋腎氣怯弱真元衰削是以不能化食如釜鼎之下無火物終不熟也單用五味子吳茱萸名五味子散治同除五味吳茱萸加茴香一兩木香五錢姜煮棗丸亦名四神丸詹療治同茴香亦暖胃之藥木香行氣而實大腸用以疏肝和脾不使木盛剋土也薛氏醫案云脾胃虛寒下陷者補中益氣湯加木香肉果補骨脂脾氣虛寒不禁者六君子湯加炮姜肉桂命門火衰脾土虛寒者宜八味丸脾腎氣血俱虛者十全大補湯送四神丸大便滑利小便祕澀或肢體盡腫喘嗽吐痰為脾腎虧損宜金匱加減腎氣丸烏頭赤石脂丸金匱治心痛徹背背痛徹心赤石脂煅淬蜀椒一兩烏頭炮附子炮乾薑炮半兩蜜丸日三服不知稍加此乃陰寒之氣厥逆而上干橫格於胸背經脈之間牽連痛楚亂其氣血攪其疆界此而用氣分諸藥則轉益其痛勢必危殆仲景用蜀椒烏頭一派辛辣以溫散其險邪然恐胸背既亂之氣難安而即於溫藥隊中取用乾薑之泥赤石脂之澀以填塞厥氣所橫衝之新隧俾胸之氣自行於胸背之氣自行於背各不相犯其患乃除此煉石補天之精義也今人知有溫氣補氣行散氣諸法矣亦知有堵塞邪氣攻衝之竇令胸背陰陽二氣並行不悖者哉五君子煎治脾胃虛寒嘔吐泄瀉而兼濕者人參二三錢乾薑炒黃一二錢白朮茯苓二錢甘草炙一錢加陳皮一錢名六味異功煎證治同前而兼微滯者按此即四君子湯五味異功散之變方也感應丸治新舊冷積瀉痢等證木香肉豆蔻丁香兩半乾薑炮百草霜一兩杏仁一百四十粒去皮尖巴豆七十粒去心皮膜研去油巴豆杏仁另研同前藥末和勻用好黃蠟六兩溶化重絹濾去渣好酒一升於砂鍋內煮數沸候酒冷蠟浮用清油一兩銚內熬熟取蠟四兩同化成汁就銚內和前藥末乘熱拌勻丸如豆大每服三十丸空心薑湯下肉蔻逐冷消食下氣和中丁香暖胃助陽宣壅除癖木香升降諸氣和脾疏肝杏仁降氣散寒潤燥消積炮姜能逐錮冷而散痞通關巴豆善破沉寒而奪門宣滯寒積深錮非此莫攻百草霜和中溫散亦能消積治痢為佐也醫貫曰此方神妙不可言雖有巴豆不令人瀉其積自然消化李時珍曰一婦年六十餘溏瀉五載犯生冷油膩肉食即作痛服升澀藥瀉反甚脈沉而滑此乃脾胃久傷積冷凝滯法當以熱下之用臘匱巴豆丸五十粒服二日遂愈自此每用治瀉痢愈者近百人九痛丸金匱治久寒心痛兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷腫上氣落馬墜車血疾等附子三兩生狼牙炙香巴豆去皮心膜研人參乾薑吳茱萸一兩煉蜜丸桐子大酒下強人初服三丸日三服弱者二丸仲景於胸痹證後附九痛丸治久寒心痛以其久著之邪不同暴病故藥則加峻而湯改為丸取緩攻不取急蕩也久寒心痛乃久客之劇證即腎水乘心腳氣攻心之別名也痛久血瘀陰邪團結溫散藥中加生狼牙巴豆吳茱萸驅之使從陰竅而出以其邪據胸中結成堅壘非搗其巢邪終不去爾黃芽丸治脾胃虛寒或飲食不化或時多脹滿泄瀉吞酸嘔吐等證人參二兩焦乾姜二錢蜜丸芡實大常嚼服甚妙加甘草二錢為散名參姜散治脾肺虛寒嘔吐咳嗽氣短小兒吐乳等證二方或陳皮或蓽茇或茯苓皆可酌用導氣湯治寒疝疼痛陰氣積於內復為寒邪所襲營衛不調則成疝病囊冷結硬如石或引睪丸而痛名寒疝疝有七種寒疝水疝筋疝血疝氣疝狐疝癲疝也證雖見於腎病實本於肝以厥陰肝脈絡於陰器故也女子小腹有塊前陰突出及陰菌亦同此類但女子不名疝而名瘕川楝子四錢木香三錢茴香二錢吳茱萸一錢湯泡長流水煎此治疝之通劑也川楝苦寒能入肝舒筋使無攣急之苦又能導小腸膀胱之熱從小水下行為治疝之主藥木香升降諸氣通利三焦疏肝而和脾茴香能入腎與膀胱暖丹田而祛冷氣吳茱萸入肝腎氣分燥濕而除寒三者皆辛溫之品用以宣通其氣使小便下利蓋疝病多因寒濕所致寒去則濕自除也附子粳米湯金匱治腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子一枚炮半夏半升甘草一兩大棗十枚粳米半升以水八升煮米熟湯成去滓溫服一升日三服腹中陰寒奔迫上攻胸脅以及於胃而增嘔逆頃之胃氣空虛邪無所隔徹入陽位則殆矣是其除患之機所重全在胃氣乘其邪初犯胃尚自能食而用附子粳米湯以溫飽其胃胃氣溫飽則土厚而邪難上越胸脅逆滿之濁陰得溫無敢留戀必還從下竅而出曠然無餘此持危扶顛之手眼也胃關煎治脾腎虛寒作瀉或甚至久瀉腹痛不止冷痢等證熟地三五錢或一兩山藥炒扁豆炒二錢白朮炒焦乾姜一二三錢甘草一二錢吳茱萸制五七分瀉甚者加肉豆蔻一二錢麵炒或補骨脂亦可氣虛甚者加人參隨宜用陽虛下脫不固者加製附子一二三錢腹痛甚者加木香七八分或厚朴八分滯痛不通者加當歸二三錢滑脫不禁者加烏梅二個或五味子二十粒肝邪侮脾者加肉桂一錢佐關煎治生冷傷脾瀉痢未久腎氣未損者宜用此湯以去寒濕安脾胃此胃關之佐者也厚朴炒陳皮炒一錢山藥炒扁豆炒豬苓澤瀉二錢乾薑炒肉桂一二錢甘草七分如腹痛甚者加木香三五分吳茱萸亦可抑扶煎治氣冷陰寒或暴傷生冷致成瀉痢凡初起氣血未衰脾胃未敗或脹滿或嘔惡皆可先用此湯此胃關煎表裡藥也宜察虛實用之其有寒濕傷臟霍亂邪實者最宜用此厚朴陳皮烏藥錢半豬苓澤瀉二錢甘草炙一錢乾薑炮一二錢吳茱萸制五七分如氣滯痛甚者加木香五七分或砂仁亦可血虛多痛者加當歸二錢寒濕勝者加蒼朮錢半天台烏藥散治小腸疝氣牽引臍腹疼痛厥陰肝脈絡於陰器上入少腹疝病乃肝邪也肝主筋故牽引疼痛小腸經絡並於厥陰寒邪客於小腸少腹痛引睪丸上而不下痛入臍腹甚則上衝心胸故俗亦名小腸氣古人治法往往相類巴豆七十粒川楝子十個烏藥木香茴香鹽炒良薑炒青皮五錢檳榔二個先將巴豆微打破同川楝麩炒黑去麩及巴豆同餘藥為末酒下一錢烏藥散膀胱冷氣能消腫止痛川楝導小腸邪熱從小便下行木香青皮行氣而平肝良薑茴香散寒而暖腎檳榔性如鐵石能下水潰堅巴豆斬關奪門破血瘕寒積皆行氣祛濕散寒之品也薏苡仁附子散金匱治胸痹緩急之證薏苡仁二兩大附子一枚炮杵為散服方寸匕日三服胸中與太空相似天日照臨之所而膻中之宗氣又賴以包舉一身之氣者也今胸中之陽痹而不舒其經脈所過非緩即急失其常度總由陽氣不運故致然也用薏苡仁以舒其經脈用附子以復其陽則宗氣大轉陰濁不留胸際曠若太空所謂化日舒長曾何緩急之有哉四維散治脾腎虛寒滑脫之甚或瀉痢不能止或氣血下陷二陰血脫不禁者無出此方之右人參一兩乾薑炒黃製附子二錢甘草炙一二錢烏梅五分或一錢酌其病之微甚而用之或不用此即四味回陽飲也為末和勻用水拌濕蒸一飯頃取起烘乾再為末每服一二錢酒溫調下疝氣方丹溪治疝氣疼痛吳茱枳殼梔子棠球子即山楂之小者俱炒用荔枝核煅等分為末空心長流水煎湯下二錢吳茱入厥陰氣分溫肝逐寒山梔瀉三焦火熱由膀胱出枳殼行氣而破症山楂散瘀而磨積荔枝雙結形類睪丸能入肝腎闢寒散滯故假之以為引也丹溪曰疝病自素問而下皆以為寒世有寒而無疝者必有說以通之可也因思此病始於濕熱在經郁遏至久又感外寒濕熱被鬱而作痛只作寒論恐有未盡古方以烏頭梔子等分作湯其效亦速後因此方隨證加減無有不應須分濕熱多少而治之又有挾虛而發者當以參朮為君而佐以疏導其脈沉緊而豁大者是也按疏導藥即桃仁山楂枳實黑梔川楝吳茱延胡丁香木香之類山梔附子酒煎加鹽服名梔附湯丹溪曰烏頭治外束之寒梔子治內郁之熱鎮陰煎治陰虛於下格陽於上則真陽失守血隨而溢以致大吐大衄六脈細脫手足厥冷危在頃刻而失血不能止者速宜用此使孤陽有歸則血自安也如治格陽喉痹上熱當以此湯冷服熟地一二兩牛膝二錢甘草炙一錢澤瀉錢半肉桂一二錢製附子一二錢或五七分如兼嘔惡者加乾薑炒黃一二錢如氣脫倦言而脈弱極者宜速速多加人參隨宜用之橘核丸濟生治四種㿗疝莖囊睪丸腫硬不痛不癢為㿗疝亦有引臍腹絞痛者四種腸㿗卵㿗水㿗氣㿗也皆寒濕為病橘核川楝子海藻海帶昆布桃仁二兩延胡索厚朴枳實木通桂心木香五錢酒糊丸鹽湯或酒下橘核木香能入厥陰氣分而行氣桃仁延胡能入厥陰血分而活血川楝木通能導小腸膀胱之熱由小便下行所以去濕官桂能平肝暖腎補腎命之火所以祛寒厚朴枳實並能行結水而破宿血昆布藻帶咸潤下而軟堅寒行水以泄熱濕久為熱寒久亦為熱同為散腫消堅之劑也朱丹溪曰㿗疝不痛非痛斷房事與厚味不可若蒼朮神麯山楂白芷川芎枳實半夏皆要藥又宜隨時月寒熱加減有熱加梔子堅硬加朴硝秋冬加吳茱萸歸氣飲治氣逆不順厄逆嘔吐或寒中脾腎等證熟地三五錢茯苓扁豆二錢炮姜丁香陳皮一錢藿香錢半甘草八分中氣寒甚者加製附子肝腎虛寒者加吳茱萸肉桂或加當歸暖肝煎治肝腎陰寒小腹疼痛等證當歸二三錢枸杞子三錢茯苓小茴香烏藥三錢肉桂一二錢沉香一錢或木香亦可生薑三五片如寒甚者加吳茱萸乾薑再甚者加附子補火丸治冷勞氣血枯竭肉瘠齒落肢倦言微吳鶴皋曰凡人之身有真火焉寄於右腎行於三焦出入於甲膽聽命於天君所以溫百骸養臟腑充九竅者皆此火也為萬物之父故曰天非此火不能生物人非此火不能有生此火一息猶萬物無父故其肉衰而瘠血衰而枯骨衰而齒落筋衰而肢倦氣衰而言微也石硫黃一斤豬大腸二尺將硫黃為末入豬腸中爛煮三時取出去腸蒸餅為丸如梧子大每服十丸日漸加之凡服硫黃者忌食諸禽獸血硫黃火之精也亦號將軍大黃至寒亦號將軍故用之以補火以其大熱有毒故用豬臟爛煮以解之庸俗之人忌而罕用蓋不知其有破邪歸正返滯還清消陰回陽化魄生魂之力也吳鶴皋曰戴元禮有言曰諸涼藥皆滯惟黃連寒而不滯諸熱藥皆燥惟硫黃熱而不燥昔仁和吏早衰服之年至九十他如范文正公之金液丹得效之玉真丸和劑之來復丹半硫丸靈砂丹百選之二氣丹活人之返陰丹楊氏之紫霞丹但所主各有攸當爾按人有真陽虛衰桂附所不能補者非硫黃不能補之其性雖燥毒而卻疏利與燥澀者不同苟制煉得宜誠為救危妙藥若用之不當貽禍匪輕附金液丹硫黃十兩研末瓷盒盛水和赤石脂封口鹽泥固濟日乾地內埋一小罐盛水令滿安盒在內用泥固濟慢火養七日七夜加頂火一斤煅取出研末蒸餅丸米飲下治久寒痼冷勞傷虛損傷寒陰證來復丹太陰元精石舶上硫黃硝石各一兩硝黃同微炒不可火大柳條攪結成砂子五靈脂去砂石青皮陳皮各一兩醋和丸米飲下治伏暑泄瀉身熱脈弱玉機微義曰硝石性寒佐以陳皮其性疏快硫黃能利人若作暖藥葉止瀉誤矣此由啖食生冷或冒暑熱中脘閉結揮霍變亂此藥通利三焦分理陰陽服之甚驗若因暑火濕熱者勿用半硫丸半夏硫黃等分生薑糊丸治老人虛祕冷祕靈砂丹水銀三兩硫黃一兩煉成研細糯米糊丸治諸虛痼冷二氣丹硝石硫黃等分為末石器炒成砂再研糯米糊丸梧子大每服四十丸井水下治伏暑傷冷二氣交錯中脘痞結或嘔或泄霍亂厥逆返陰丹治陰毒傷寒心神煩躁四肢逆冷硫黃五兩硝石太陰元精石各一兩附子炮乾薑炮桂心各五錢用鐵銚先鋪元精末一半次鋪硝石末一半中間蓋硫黃末又著硝石一半蓋硫黃再以元精末蓋上用小盞合著炭三斤燒令得所勿令煙出研末和前藥末飯丸梧子大每服十五至二十丸艾湯下汗出為度本事方破陰丹治陰中伏陽煩躁六脈沉伏硫黃水銀各一兩陳皮青皮各五錢先將硫黃入銚熔開次下水銀鐵杖攪勻令無星細研糊丸每服三十丸如煩躁冷鹽湯下陰證艾湯下傷寒百問方硫黃五錢艾湯調下治身冷脈微厥而煩躁令臥汗出而愈黑鉛丹黑鉛硫黃各二兩將鉛熔化漸入硫黃候結成片傾地上出火毒研至無聲為度治陰陽不升降上盛下虛頭目眩暈黑錫丹治真元虛憊陽氣不固陰氣逆沖三焦不和冷氣刺痛飲食無味腰背沉重膀胱久冷夜多小便女人血海久冷赤白帶下及陰證陰毒四肢厥冷不省人事急用棗湯吞一百粒即便回陽此藥大能升降陰陽補虛益元墜痰除濕破癖黑錫去滓稱硫黃二兩葫蘆巴酒浸炒附子炮陽起石研細水飛肉豆蔻面里煨金鈴子蒸去皮核沉香舶茴香破故紙木香一兩肉桂半兩用鐵銚內如常法結黑錫硫黃砂子地上出火毒研令極細余藥並細末和勻自朝至暮以研至黑光色為度酒糊丸如桐子大陰乾入布袋內擦令光瑩每四十丸空心鹽薑湯下女人艾棗湯下急證用百丸喻嘉言曰此方用黑錫水之精硫黃火之精二味結成靈砂為君諸香燥純陽之藥為臣用金鈴子苦寒一味為反佐用沉香引入至陰之分為使凡遇陰火逆沖真陽暴脫氣喘痰鳴之急證舍此藥再無他法可施昌每用小囊佩帶隨身恐遇急證不及取藥且欲以吾身元氣溫養其藥藉手效靈厥功歷歷可紀即如小兒布痘與此藥迥不相值然每有攻之太過如用蜈蚣穿山甲桑蟲之類其痘雖勃然而起然頭面遍身腫如瓜匏瘡形濕爛難乾乃至真陽上越氣喘痰鳴兒醫撒手駭去昌投此丸領其陽氣下入陰中旋以大劑地黃湯峻補其陰以留戀夫真陽肌膚之熱反清腫反消濕爛反干而成厚靨如此而全活者不知凡幾因附本方項下以廣用方者之識五德丸治脾腎虛寒飧泄鶩溏等證或暴傷生冷或感時氣寒濕或酒濕傷脾腹痛作泄或飲食失宜嘔惡痛泄無火等證補骨脂四兩酒炒北五味或用肉豆蔻代之麵炒吳茱萸制木香二兩乾薑四五兩炒湯浸蒸餅丸桐子大每服六七十丸甚者百餘丸白滾湯或米湯或人參湯俱可下腹痛多嘔者加胡椒二兩更妙七德丸治生冷傷脾初患瀉痢肚腹疼痛凡年少氣血未衰及寒濕食滯凡宜和胃者無不神效此即佐關煎之偏裨也補骨脂炒四兩乾薑炒焦蒼朮炒臺烏藥吳茱萸木香茯苓一兩神麯糊為丸梧子大每服七八十丸或百丸白滾湯下唐鄭相國方治虛寒喘嗽腰腳痠痛破故紙十兩酒蒸為末胡桃肉二十兩去皮爛研蜜調如飴每晨酒服一大匙不能飲者熟水調忌藝臺油菜也羊血破故紙屬火入心包命門能補相火以通君火暖丹田壯元陽胡桃屬木能通命門利三焦溫肺潤腸補養氣血有木火相生之妙氣足則肺不虛寒血足則腎不枯燥久服利益甚多不獨上療喘嗽下強腰腳而已也古云黃柏無知母破故紙無胡桃猶水母之無蝦也李時珍曰命門在兩腎中央為生命之原相火之主腎命相通藏精而惡燥胡桃狀頗相類皮汁青黑故入北方佐破故紙潤燥而調血使精氣內充血脈通調諸證自然愈矣加杜仲一斤生薑炒蒜四兩名青娥丸治腎虛腰痛經曰腰者腎之腑轉移不能腎將憊矣再加牛膝酒浸黃柏鹽水炒川萆薢童便浸蜜丸治同加杜仲葫蘆巴小茴香萆薢名喝起丸治小腸氣痛引腰復陽丹治陽虛嘔吐泄瀉腹痛寒疝等證北五味炒甘草炙附子制炮姜胡椒一兩白麵二兩炒焦為末和勻入溫湯搗丸桐子大每服一錢隨證用藥引下三氣飲治氣血虧損風寒濕三氣乘虛內侵筋骨歷節疼痛之極及痢後鶴膝風痛等證當歸枸杞杜仲二錢熟地三錢或五錢甘草炙北細辛或代以獨活芍藥酒炒牛膝茯苓肉桂白芷附子一錢生薑三片如氣虛者加人參白朮隨宜風寒勝者加麻黃一二錢此飲亦可浸酒大約每藥一斤可用燒酒六七斤浸十餘日徐徐服之壽脾煎一名攝營煎治脾虛不能攝血等證凡憂思鬱怒積勞及誤用攻伐等藥犯損脾陰致中氣虧陷神魂不寧大便脫血不止或婦人無火崩淋等證兼嘔惡尤為危候速宜用此單救脾氣則統攝固而血自歸源此歸脾湯之變方其效如神若犯此證而再用寒涼則胃氣必脫無不即斃者白朮二三錢當歸山藥二錢棗仁錢半甘草炙一錢遠志制三五分炮姜一二三錢蓮肉去心炒草粒人參隨宜一二錢急者用一兩如血未止加烏梅二個凡畏酸者不可用或加地榆錢半亦可滑脫不禁加醋炒文蛤一錢下焦虛滑不禁加鹿角霜二錢為末攪入藥中服之氣虛甚者加炙黃耆二三錢氣陷而墜者加炒升麻五七分或白芷亦可兼溏泄者加補骨脂一錢炒用陽虛畏寒者加附子一二三錢血去過多陰虛氣餒心跳不寧者加熟地人參七八錢或一二兩一氣丹治脾腎虛寒不時易瀉腹痛陽痿怯寒等證此即參附湯之變方也人參製附子等分煉白蜜為丸如緑豆大每用白滾湯送下三五分或一錢凡藥餌不便之處或在途次隨帶此丹最妙九氣丹治脾腎虛寒如五德丸之甚者熟地八兩附子制四兩肉豆蔻麵炒吳茱萸焦姜補骨脂酒炒蓽茇五味子二兩粉甘草炙一兩煉蜜丸或山藥糊丸桐子大每服六七十丸或百丸滾白湯下如氣虛者加人參二兩或四兩尤妙聖朮煎治飲食偶傷或吐或瀉胸膈痞悶或脅肋疼痛或過用克伐等藥致傷臟氣而脈息無力氣怯神倦者速宜用此不得因其虛滿虛痞而畏用白朮此中虛實之機貴乎神悟也若痛脹覺甚者即以此煎送神香散最妙若用治寒濕瀉嘔吐證尤為聖藥白朮用冬朮味甘者炒五六七八錢或一兩乾薑炒赤肉桂一二錢陳皮酌用或不用若治虛寒瀉痢嘔吐等證則人參甘草之類當隨宜加用若治中虛感寒則麻黃柴胡之類亦隨宜加用卷七上消暑門暑本夏月之熱病左傳蔭暍人於樾下其名久矣在仲景謂之中暍凡盛暑烈日之時或於長途或於田野不辭勞苦致病頭疼煩躁肌體大熱大渴等證遇無汗者必以得汗為正治宜先散外邪得汗已方清其內若多汗者宜察氣之虛實火之微甚或清或補可也有畏暑食涼不避寒氣或於深堂大廈或於風地樹陰或乍熱乍寒之時不謹衣被以致寒邪襲於肌表而病發熱惡寒頭痛無汗身形拘急肢體痠疼等證惟宜溫散為主當以傷寒法治之又有不慎口腹過食生冷以致寒涼傷臟而為嘔吐瀉痢腹痛等證治宜溫中為主苟其不分表裡不察陰陽則殺人慘於刀刃矣消暑丸海藏治伏暑煩渴發熱頭痛脾胃不利半夏一斤醋五斤煮乾茯苓甘草半斤生用薑汁糊丸勿見生水熱湯下有痰生薑湯下長夏炎蒸濕土司令故暑必兼濕證見便祕煩渴或吐或利者以濕勝不得施化也此方不治其暑專治其濕用半夏茯苓行水之藥少佐甘草以和其中半夏用醋煮者醋能開胃散水斂熱解毒也使暑氣濕氣俱從小便下降則脾胃和而煩渴自止矣熱蒸其濕是為暑無濕則但為乾熱而已非暑也故肥人濕多即病暑者多瘦人火多即病熱者多本方一兩黃連二錢名黃連消暑丸治伏暑煩渴而多熱痰小半夏茯苓湯金匱治卒嘔吐心下痞膈間有水眩悸方見卷七下燥濕門四味香薷飲治感冒暑氣皮膚蒸熱頭痛頭重或煩渴或吐瀉香薷一兩厚朴薑汁炒扁豆炒五錢黃連姜炒三錢冷服香薷辛熱必冷服者經所謂治溫以清涼而行之也熱服作瀉香薷辛溫香散能入脾肺氣分發越陽氣以散皮膚之蒸熱厚朴苦溫除濕散滿以解心腹之凝結扁豆甘淡能消脾胃之暑濕降濁而升清黃連苦寒能入心脾清熱而除煩也李時珍曰有處高堂大廈而中暑者緣納涼太過飲冷太多陽氣為陰邪所遏反中入內故見頭痛惡寒之證用香薷以發越陽氣散水和脾則愈王履曰此非中暑蓋亦傷寒之類爾按香薷乃夏月發汗之藥其性溫熱只宜於受寒之人若暑火證服之反成大害凡元氣虛者用之適足以招暑今人謂能解暑概用代茶是開門揖盜也除扁豆名黃連香薷飲治中暑熱盛口渴心煩或下鮮血暑邪所逼加茯神治疸瘧獨熱不寒曰疸瘧當責之暑邪暑先入心故加茯神以寧心除黃連加木瓜甘草香附陳皮蒼朮紫蘇名二香散蓋合香蘇飲香薷飲為一方也治外感內傷身熱腹脹除黃連名三物香薷飲治傷暑嘔逆泄瀉再加茯苓甘草名五物香薷飲驅暑和中再加木瓜名六味香薷飲治中暑濕盛再加人參黃耆白朮陳皮名十味香薷飲治暑濕內傷頭重吐利身倦神昏喻嘉言曰傷寒夾陰誤用陽旦湯得之便厥傷暑夾陰誤用香薷飲入喉便喑後賢於香薷飲中加人參黃耆白朮陳皮木瓜兼治內傷誠有見也三物香薷飲加羌活防風治夏月僵仆手足搐搦名暑風或再加黃耆芍藥縮脾飲清暑氣除煩渴止吐瀉霍亂及暑月酒食所傷扁豆炒研乾葛二兩砂仁草果煨去皮烏梅甘草炙四兩每服四錢暑必兼濕而濕屬脾土暑濕合邪脾胃病矣故治暑必先去濕砂仁草果辛香溫散利氣快脾消酒食而散濕扁豆專解中宮之暑而滲濕濕盛則津不生而渴葛根能升胃中清陽而生津風藥多燥唯葛根能生津烏梅清熱解渴甘草補土和中大順散治冒暑伏熱引飲過多脾胃受濕水穀不分清濁相干陰陽氣逆霍亂吐瀉臟腑不調乾薑桂杏仁去皮尖甘草等分先將甘草用白砂炒次入姜杏炒過篩去砂淨合桂為末每服二三錢湯點服夏月過於飲冷餐寒陽氣不得伸越故氣逆而霍亂吐瀉也脾胃喜燥而惡濕喜溫而惡寒乾薑肉桂散寒燥濕杏仁甘草利氣調脾皆辛甘發散之藥升伏陽於陰中亦從治之法也吳鶴皋曰此方非治暑乃治暑月飲冷受傷之脾胃爾大蒜辛熱通竅故亦有宜用者若系火熱諸證而投此等辛熱之品禍不旋踵矣來復丹治伏暑泄瀉身熱脈弱方見卷六下祛寒門補火丸附方內枇杷葉散治中暑伏熱煩渴引飲嘔噦噁心頭目昏眩枇杷葉去毛炙陳皮去白焙丁香厚朴去皮薑汁炙五錢白茅根麥門冬乾木瓜甘草香薷錢半搗羅為末每服二錢水一盞生薑三片煎七分溫服溫湯調服亦得如煩躁用井花水調下小兒三歲以下可服五分更量大小加減冷香飲子治傷暑口渴霍亂腹痛煩躁脈沉微或伏附子炮陳皮一錢甘草炙草果錢半水盞半姜十片煎八分去渣井水頓冷服桂苓甘露飲河間治中暑受濕引飲過多頭痛煩渴濕熱便祕滑石四兩石膏寒水石甘草二兩白朮茯苓澤瀉一兩豬苓肉桂五錢每服三錢或五錢此五苓六一之合劑以清六腑之熱也張子和去豬苓減三石一半加人參乾葛各一兩藿香木香各一錢減桂只用一錢每服三錢亦名桂苓甘露飲治伏暑煩渴脈虛水逆渴欲飲水水入即吐名水逆清暑益氣湯東垣治長夏濕熱炎蒸四肢困倦精神減少胸滿氣促身熱心煩口渴惡食自汗身重肢體疼痛小便赤澀大便溏黃而脈虛者暑濕蒸人脾土受傷故肢倦便溏暑熱傷肺故氣促心煩口渴便赤濁氣在上則生䐜脹故胸滿惡食暑先入心汗為心液故自汗濕盛故身痛身重寒傷形表邪外盛故脈大而有餘暑傷氣元氣耗傷故脈虛而不足黃耆人參白朮炒蒼朮神麯炒青皮麩炒陳皮留白甘草炙麥冬五味當歸酒洗黃柏酒炒澤瀉升麻葛根薑棗煎熱傷氣參耆益氣而固表濕傷脾二術燥濕而強脾火盛則金病而水衰故用麥冬五味以保肺而生津肺為水之上源火旺剋金則金不能生水麥冬合人參生脈生津用黃柏以瀉熱而滋水青皮平肝而破滯當歸養血而和陰神麯化食而消積升葛解肌熱而升清清氣上升能生津液又風能勝濕澤瀉瀉濕熱而降濁陳皮理氣甘草和中合之以益氣強脾除濕清熱也東垣曰脾虛肺氣先絶故用黃耆閉腠理止汗益氣脾胃既虛陰火傷其生髮之氣營衛大虧血虛以人參補之陽旺自能生陰血也更加當歸和血又加黃柏以救腎水蓋甘寒瀉火火滅則心氣得平而安也心火乘脾故用炙草瀉火而補脾少用恐滋滿也中滿者去之若腹中急痛急縮者卻宜多用咳者去人參為清濁相干故以橘皮理之長夏濕勝故加二術澤瀉上下分消其濕熱也濕勝則食不化炒曲辛甘青皮辛溫消食快氣五味麥冬人參甘微酸寒瀉火熱而益肺金救庚金也醫貫曰有傷暑吐衄者暑傷心心虛不能生血不宜過用寒涼以傷心宜清暑益氣加丹皮生地犀角之類蓋暑傷心亦傷氣其脈必虛以參耆補氣斯無弊也除青皮澤瀉乾葛名黃耆人參湯東垣治暑傷元氣注夏倦怠胸滿自汗時作頭痛時痛時止為內傷證除白朮青皮麥冬五味加茯苓豬苓柴胡羌活防風連翹知母名補肝湯東垣治陰汗如水陰冷如冰腳痿無力清燥湯東垣治肺金受濕熱之邪痿躄喘促胸滿少食色白毛敗頭眩體重身痛肢倦口渴便祕經曰肺者相傳之官治節出焉火盛剋金則肺熱葉焦氣無所主而失其治節故肢體或縱或縮而成痿躄也火上逆肺故喘促肺主皮毛故色白毛敗濕熱填於膈中故胸滿壅於陽明則食少上升於頭則眩注於身則體重流於關節則身痛肺受火傷天氣不能下降膀胱絶其化源故口渴便赤黃耆錢半蒼朮炒一錢白朮炒陳皮澤瀉五分人參茯苓升麻三分當歸酒洗生地黃麥冬甘草炙神麯炒黃柏酒炒豬苓二分黃連一分五味子九粒柴胡三分肺屬辛金而主氣大腸屬庚金而主津燥金受濕熱之邪則寒水膀胱生化之源絶源絶則腎水虧金不能生水而痿躄諸證作矣金者水之母也氣者水之源也黃耆益元氣而實皮毛故以為君二術參苓甘橘神麯健脾燥濕理氣化痰所以運動其土土者金之母也麥冬五味保肺以生津當歸生地滋陰而養血黃柏黃連燥濕而清熱黃柏合蒼朮為二妙散治痿正藥加牛膝名三妙散升麻柴胡所以升清豬苓澤瀉所以降濁使濕熱從小便出則燥金肅清肺為高清之臟水出高原而諸證平矣朱丹溪曰今世風病大率與諸痿證混同論治古聖論風痿條目不同治法亦異夫風病外感善行數變其病多實發表行滯有何不可諸痿起於肺熱傳入五臟散為諸證其昏惑瘛瘲瞀悶暴病鬱冒矇昧暴喑皆屬於火其四肢不舉足痿舌強痰涎有聲皆屬於土悉是濕熱之病當作諸痿論治大抵只宜補養若以外感風邪治之寧免實實虛虛之禍乎或曰內經治痿獨取陽明何也曰只諸痿生於肺熱一語已見大意金體燥而居上主氣畏火者也土性濕而居中主四肢畏木者也嗜欲不節則水失所養火寡於畏而侮所勝肺得火邪而熱矣肺受熱邪則金失所養木寡於畏而侮所不勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不為人用而諸痿之病作矣瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而肺金不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿大法無過於此六一散河間治傷寒中暑表裡俱熱煩躁口渴小便不通瀉痢熱瘧霍亂吐瀉下乳滑胎解酒熱毒偏主石淋暑熱皆陽邪在表則發熱在裡則瀉痢霍亂在上則煩渴在下則便祕或熱瀉火氣煎灼精結成石則為石淋滑石六兩甘草一兩為末冷水或燈心湯調下丹溪曰泄瀉及嘔吐生薑湯下中寒者加硫黃少許滑石重能清降寒能瀉熱滑能通竅淡能行水使肺氣降而下通膀胱火退則肺氣下降故能祛暑住瀉止煩渴而利小便也小便利則大便實而瀉自止加甘草者和其中氣又以緩滑石之滑降也其數六一者取天一生水地六成之之義也故又名天水散劉河間曰統治上下表里諸病蓋取其能通除上下三焦濕熱也然唯體盛濕多之人宜服之以解暑利水使濕熱從小便出若無濕之人而服此則反耗其津液而渴轉甚矣又當用生脈散清癯無濕之人及肥人內夾虛寒誤用六一散解暑驅濕反促其臟腑氣絶者比比加辰砂少許名益元散鎮心神而瀉丙丁之邪熱也小腸為丙火心為丁火加薄荷少許清肺名雞蘇散加青黛少許清肝名碧玉散加紅曲五錢名清六丸治赤痢赤屬血分受傷紅曲能調六腑之血加乾薑五錢名溫六丸治白痢白屬氣分受傷乾薑能散濕熱之氣加生柏葉生車前生藕節名三生益元散治血淋加牛黃治虛煩不得眠除甘草加吳茱萸一兩名吳萸六一散治濕熱吞酸除滑石加黃耆六兩大棗煎熱服名黃耆六一散治諸虛不足盜汗消渴凡渴證防發癰疽宜黃耆六一散吞忍冬丸五苓散治暑濕為病發熱頭疼煩躁而渴方見卷七下燥濕門竹葉石膏湯治傷暑發渴脈虛人參白虎湯治太陽中暍身熱汗出足冷惡寒脈微而渴以上二方俱見卷八下瀉火門生脈散千金治熱傷元氣氣短倦怠口渴多汗肺虛而咳肺主氣火熱傷肺故氣短金為火制不能生水故口渴氣少故倦怠肺主皮毛虛故汗出虛火乘肺故咳李東垣曰津者庚大腸所主三伏之時為庚金受囚若亡津液汗大泄濕熱亢甚燥金受囚風木無制故風濕相搏骨節煩疼一身盡痛也凡濕熱大行金為火制絶寒水生化之源致肢體痿軟腳欹眼黑最宜服之人參麥冬五分五味子七粒肺主氣肺氣旺則四臟之氣皆旺虛故脈絶氣短也人參甘溫大補肺氣而瀉熱為君麥冬甘寒補水源而清燥金為臣五味酸溫斂肺生津收耗散之氣為佐蓋心主脈而百脈皆朝於肺補肺清心則氣充而脈復故曰生脈夏月火旺剋金當以保肺為主清晨服此能益氣而御暑也李東垣曰手陽明大腸手太陽小腸皆屬足陽明胃大腸主津小腸主液大腸小腸受胃之陽氣乃能行津液於上焦灌溉皮毛充實腠理若飲食不節胃氣不充大腸小腸無所稟氣故津液涸竭焉又曰夏月加黃耆甘草服之令人氣力湧出加陳皮炙甘草名五味子湯蒸餅為丸名補氣丸治肺虛少氣咳嗽自汗加黃耆為君甘草桔梗為佐名補氣湯治氣虛自汗怔忡再加茯神遠志木通名茯神湯治脈虛咳則心痛喉中介介或腫水葫蘆丸治冒暑毒解煩渴川百藥煎三兩人參二錢麥門冬烏梅肉白梅肉乾葛甘草半兩為細末麵糊丸如雞頭實大含化一丸夏月出行可度一日按諸葛孔明五月渡瀘深入不毛分給此丸于軍士故名水葫蘆曹孟德遙指前有梅林失於未備爾大黃龍丸治中暑身熱頭疼狀如脾寒或煩渴嘔吐昏悶不食舶上硫黃硝石一兩白礬雄黃滑石五錢白麵四兩五味研末入面和勻滴水丸如梧子大每服三十丸新汲井水下潑火散即地榆散治中暑昏迷不省人事欲死者並治傷暑煩躁口苦舌乾頭痛惡心不思飲食及血痢地榆赤芍藥黃連青皮去白等分每服三錢漿水調服若血痢水煎服總論消暑諸方喻嘉言曰元豐朝立和劑局萃集醫家經驗之方於中暑一門獨詳以夏月暑證五方歷試見聞廣爾其取用小半夏茯苓湯不治其暑專治其濕又以半夏茯苓少加甘草名消暑丸見消暑在消其濕名正言順矣其香薷飲用香薷扁豆厚朴為主方熱盛則去扁豆加黃連為君治其心火濕盛則去黃連加茯苓甘草治其脾濕其縮脾飲則以脾為濕所浸淫而重滯於扁豆葛根甘草中佐以烏梅砂仁草果以快脾而去脾所惡之濕甚則用大順散來復丹以治暑證之多瀉利者又即縮脾之意而推之也其枇杷葉散則以胃為濕所竊據而濁穢故用香薷枇杷葉丁香白茅根之辛香以安胃而去胃所惡之臭甚則用冷香引子以治暑證之多嘔吐者又即枇杷葉散而推之也醫者於熱濕虛寒淺深緩急間酌而用之其利溥矣而後來諸賢以益虛繼之河間之桂苓甘露飲五苓三石意在生津液以益胃之虛子和之桂苓甘露飲用人參葛根甘草藿香木香益虛之中又兼去濁或用十味香薷飲於局方五味中增人參黃耆白朮陳皮木瓜益虛以去濕熱乃至東垣之清暑益氣湯人參黃耆湯又補中實衛以去其濕熱肥白內虛之人所宜服者也中暑必兼躁煩熱悶東垣仿仲景竹葉石膏湯之制方名清燥湯仍以去濕為首務夫燥與濕相反者也而清燥亦務除濕非東垣具過人之識不及此矣又如益元散之去濕而加辰砂則並去其熱五苓散之去濕而加人參則益虛加辰砂減桂則去熱白虎湯加人參則益虛加蒼朮則勝濕合之局方則大備矣然尚有未備焉嘗觀暑風一證其卒倒頭乎中風而不可從風門索治百一選方雖有大黃龍丸初不為暑風立法管見從而贊之曰有中暍昏死灌之立蘇則其方亦可得暑風之一斑矣倘其人陰血素虧暑毒深入血分進以此丸寧不立至危殆乎良方復有地榆散治中暑昏迷不醒人事而欲死者但用平常涼血之藥清解深入血分之暑風良莫良於此矣後有用之屢效而美其名為潑火散者知言哉夫中天火運流金爍石而此能潑之益見暑風為心火暴甚煎熬陰血舍清心涼血之外無可撲滅爾綜群方而論之因其詳故益加詳焉卷七下燥濕門濕病有出於天氣者雨露之屬是也多傷人臟氣有出於地氣者泥水之屬是也多傷人皮肉筋脈有由於飲食者酒酪之屬是也多傷人六腑有由於汗液者如大汗沾衣不遑解換之屬是也多傷人膚腠有濕從內生者以水不化氣陰不從陽而然也悉由脾腎之虧敗其為證也在肌表則為發熱惡寒自汗在經絡則為痹重為筋骨疼痛腰痛不能轉側四肢痿弱痠痛在肌肉則為麻木胕腫黃疸按肉如泥不起在臟腑則為嘔惡脹滿小水祕澀黃赤大便泄瀉腹痛後重脫肛㿗疝等證凡肌表經絡之病濕由外而入者也飲食氣血之病濕由內而生者也此其在外者為輕在內者為重是固然矣然及其甚也則未有表濕而不連臟者里濕而不連經者此其濕病之變不為不多故凡治此者必當辨表裡察虛實而求其本也然濕證雖多而辨治之法其要惟三則一曰濕熱一曰寒濕一曰風濕蓋濕從土化而分旺四季故時當溫熱則火土合氣而病為濕熱時當寒涼則水土合德而病為寒濕此濕病之隨時令而為寒熱也其有與風相搏而病為風濕者其變尤為無常凡治濕熱者宜利宜清治寒濕者宜燥宜溫治風濕相搏者或微發其汗或顧其陽虛其法尤宜通變矣五苓散仲景治太陽病發汗後大汗出胃中干煩躁不得眠欲飲水者少少與之令胃氣和則愈若脈浮小便不利微熱消渴者此湯主之及中風發熱六七日不解而煩有表裡證渴欲飲水水入即吐名曰水逆表以外證未罷言里以煩渴屬腑言邪熱挾積飲上逆故外水格而不入及傷寒痞滿服瀉心湯不解渴而煩躁小便不利功擅蕩熱導飲故亦為消痞良方程郊倩曰邪在上焦而治在下焦者使濁陰出下竅而清陽之在上竅者自能宣化矣心邪不從心瀉而從小便瀉又一法也汪訒庵曰此乃正治非又一法也乃臟實而瀉其腑也通治諸濕腹滿水飲水腫嘔逆泄瀉水寒射肺或喘或咳中暑煩渴身熱頭痛膀胱積熱便祕而渴霍亂吐瀉痰飲濕瘧身痛身重此皆傷濕之見證也濕勝則脾不運土不能制水溢於皮膚則腫脹並於大腸則泄瀉水停心下則嘔逆水寒射肺則喘咳暑先入心故煩渴五苓利小水降心火故兼治中暑煩渴肺病則金不能生水膀胱熱則陽不能化陰故便祕而渴陰陽不利則霍亂吐瀉濕勝則身痛身重大抵下不通利則陰陽不能升降而變證多矣豬苓茯苓術炒共十八銖澤瀉一兩六銖半桂半兩按雜病當用桂傷寒證中表未解者仍當用枝兼取解表為末每服三錢服後多飲熱水汗出而愈傷暑者加硃砂燈心煎太陽之熱傳入膀胱之腑故口渴而便不通經曰淡味滲泄為陽二苓甘淡入肺而通膀胱為君水無當於五味故淡能利水茯苓走氣分豬苓走血分然必上行入肺清其化源而後能下降利水也鹹味湧泄為陰澤瀉甘鹹入腎膀胱同利水道為臣益土所以制水故以術之苦溫健脾去濕為佐膀胱者津液藏焉氣化則能出矣故以肉桂辛熱為使熱因熱用引入膀胱以化其氣使濕熱之邪皆由小水而出也有大熱如狂小便不利而用此湯者欲使太陽隨經之邪直達膀胱由溺而出也大熱利小便亦釜底抽薪之義陳來章曰治祕之道有三一曰肺燥不能化氣故用二苓澤瀉之甘淡以泄肺而降氣一曰脾濕不能升精故用蒼朮之苦溫以燥脾而升精一曰膀胱無陽不能化氣故用肉桂之辛熱以溫膀胱而化陰使水道通利則上可以止渴中可以去濕下可以泄邪熱也東垣曰五苓散太陽里之下藥也太陽高則汗而發之下則引而竭之渴者邪入太陽本也當下之使從膀胱出也里表之裡也太陽本膀胱腑也小便利者不宜用蓋太陽病熱而渴小便若利則胃中津液已耗不宜再用五苓以劫奪其津液也五苓散分陰陽膀胱經之半表半裡也理中湯治吐瀉理中氣而分陰陽也活人云脈浮大是表證當汗其人發熱煩渴小便赤卻當下此是表裡俱見五苓散主之五苓利水何以能止渴生津蓋濕熱壅於中焦則氣不得施化故津竭而小便不通也用五苓利其小水則濕熱下消津回而渴止矣亦內經通因通用之意東垣曰傷飲者無形之氣也宜發汗利小便以導其濕傷食者有形之物也輕則消化或損谷重則方可吐下若汗下之後內亡津液而便不利者不可用五苓恐重亡津液而益虧其陰也勿治之便利自愈一切陽虛不化氣陰虛而泉竭以致小便不利者若再用五苓以劫其陰陽禍如反掌不可不慎去桂名四苓散李東垣曰無惡寒證不可用桂周揚俊曰五苓為渴而小便不利者設若不渴則茯苓甘草湯足矣若但渴則四苓足矣加辰砂名辰砂五苓散並治小便不利用二術名二術五苓散治寒濕加茵陳名茵陳五苓散治濕熱發黃便祕煩渴加羌活名元戎五苓散治中焦積熱去桂澤瀉名豬苓散金匱治嘔吐病在膈上思飲水者但用肉桂茯苓等分蜜丸名桂苓丸治冒暑煩渴引飲過多腹脹便赤但用澤瀉五兩白朮二兩名澤瀉湯金匱治心下支飲常苦眩冒但用茯苓白朮等分名茯苓白朮湯治脾虛不能制水濕盛泄瀉再加郁李仁入薑汁服名白茯苓湯治水腫加川楝子治水疝加人參名春澤湯再加甘草合四君子亦名春澤湯治無病而渴與病瘥後渴者去桂加蒼朮甘草芍藥梔子黃芩羌活名二術四苓湯通治表裡濕邪兼清暑熱倍桂加黃耆如術之數治傷暑大汗不止加甘草滑石梔子入食鹽燈草煎名節庵導赤散治熱蓄膀胱便祕而渴如中濕發黃加茵陳水結胸加木通合益元散治諸濕淋瀝再加琥珀名茯苓琥珀湯謙甫治小便數而缺頻來而短少也合平胃散名胃苓湯一名對金飲子治中暑傷濕停飲夾食腹痛泄瀉及口渴便祕此上下分消其濕也按機要論泄瀉有屬風屬濕屬寒屬火此因於外感者也三因言七情感動臟氣不平亦致溏瀉此因於內傷者也外則當調六氣內則當調五臟又有因飲食所傷而泄者法當消導因風飧泄者當解散因痰積上焦致大腸不固而泄者當除痰有脾胃氣虛而泄者當補中益氣使胃氣升騰而泄自止合黃連香薷飲名薷苓湯治傷暑泄瀉合小柴胡湯名柴苓湯治泄瀉發熱口渴瘧疾熱多寒少口渴心煩以上三方並加薑棗煎豬苓湯仲景治陽明病脈浮發熱渴欲飲水小便不通成氏曰脈浮發熱熱在表也渴欲飲水熱在裡也小便不利熱結下焦津液不通也準繩曰此浮字誤也是脈字下脫一不字也活人云脈浮者五苓散脈沉者豬苓湯按太陽篇五苓散陽明篇豬苓湯桂術辛甘為陽主外阿膠滑石甘寒為陰主內若脈浮則當用五苓不當用豬苓矣少陰篇下利六七日咳而嘔渴心煩不得眠者豬苓湯主之雖不言脈沉然少陰之脈必沉也以此推之成氏隨文誤釋明矣少陰病下利六七日咳而嘔渴心煩不得眠下利不渴者裡寒也渴者陽邪入里心煩不眠知挾熱也咳而渴嘔有停飲也渴而下利知小便必不利是熱邪已入膀胱也宜利小便則熱降而便實通治濕熱黃疸口渴溺赤五苓瀉濕勝故用桂術豬苓瀉熱勝故用滑石豬苓茯苓澤瀉滑石阿膠一兩熱上壅則下不通下不通熱益上壅又濕鬱為熱熱蒸更為濕故心煩而嘔渴便祕而發黃也淡能滲濕寒能勝熱茯苓甘淡滲脾肺之濕豬苓甘淡澤瀉鹹寒瀉腎與膀胱之濕滑石甘淡而寒體重降火通行上下之濕阿膠甘平潤滑以療煩渴不眠要使水道通利則熱邪皆從小便下降而三焦俱清矣吳鶴皋曰以諸藥過燥故又加阿膠以存津液王好古曰滑石為至燥之劑徐之才曰燥可去濕桑白皮赤小豆之類是也蓋皆以行水之藥為燥也茯苓甘草湯仲景治傷寒水氣乘心厥而心下悸者先治其水隙治其厥不爾水漬入胃必作利也太陽證飲水過多水停心下必悸火畏水故心惕惕然動不自安也亦治傷寒汗出不渴者經曰傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之汗而不渴為邪未入里故但解表利水而兼和中亦治膀胱腑咳咳而遺溺茯苓桂枝二兩甘草一兩生薑三兩淡能滲水甘能寧心助陽故用茯苓辛能散飲溫能發汗解肌故用薑桂益土可以制水甘平能補氣和中故用甘草去生薑加白朮名茯苓桂枝白朮甘草湯仲景治傷寒吐下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振搖者逆滿氣衝寒邪伏飲上搏於膈也故令頭眩沉為在裡且既經吐下復發其汗則陽益虛而津液耗故振搖也與此湯導飲和中益陽固衛金匱用治心下有痰飲胸脅支滿目眩腎著湯金匱一名甘姜苓朮湯治傷濕身重腹痛腰冷不渴小便自利飲食如故病屬下焦腎主水濕性下流必舍於其所合而歸於坎勢也腰為腎之腑冷濕之邪著而不移故腰冷身重是著痹也此由身勞汗出衣里冷濕久久得之宣明用治胞痹膀胱熱痛澀於小便上為清涕風寒濕邪客於胞中氣不能化故水道不通足太陽經上額絡腦太陽經氣不得下行上入腦而流於鼻則為清涕乾薑炮茯苓四兩甘草炙白朮炒二兩有寒者加附子經心録加肉桂澤瀉杜仲牛膝治同喻嘉言曰腰冷如坐水中非腎之精氣冷也故飲食如故便利不渴且與腸胃之腑無預況腎臟乎故但用甘溫從陽淡滲行水之藥足矣小半夏加茯苓湯金匱三因名大半夏湯治卒嘔吐心下痞膈間有水眩悸水氣上逆則嘔停膈間則痞上干於頭則眩凌於心則悸半夏一升生薑半斤茯苓三兩半夏生薑行水氣而散逆氣能止嘔吐茯苓寧心氣而泄腎邪能利小便火因水而下行則悸眩止而痞消矣除茯苓名小半夏湯金匱治支飲嘔吐不渴亦治黃疸金匱云嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之嘔吐津液去必渴不可因渴而遽以為熱除茯苓生薑加人參白蜜名大半夏湯金匱治反胃食入即吐東垣曰辛藥生薑之類治嘔吐但治上焦氣壅表實之病若胃虛穀氣不行胸中閉塞而嘔者唯宜益胃推揚穀氣而已勿作表實用辛藥瀉之故服小半夏湯不愈者服大半夏湯立愈此仲景心法也越婢湯金匱治風水惡風一身悉腫脈浮不渴續自汗出無大熱者經曰肝腎並沉為石水並浮為風水水在皮膚故脈浮里無熱故不渴病本於風故汗出惡風無大熱者熱未盡退也麻黃六兩石膏八兩生薑三兩甘草二兩大棗十二枚惡風者加附子風水在肌膚之間用麻黃之辛熱以瀉肺石膏之甘寒以清胃肺主通調水道胃主分別水穀甘草佐之使風水從毛孔中出又以薑棗為使調和營衛不使其太發散耗津液也胃為十二經之主脾治水穀為卑臟若婢經曰脾主為胃行其津液是方名越婢者以發越脾氣通行津液外臺一名越脾湯即此義也防己黃耆湯金匱治風水脈浮身重汗出惡風及諸風諸濕麻木身痛東垣曰麻木為風人皆知之細核則有區別如久坐亦麻木繩縛之人亦麻木非有風邪乃氣不行也當補肺氣麻木自去矣亦有因氣虛而風邪入而踞之所以風為虛象氣虛其本也防己黃耆一兩白朮七錢半甘草炙五錢每服五錢加薑棗煎腹痛加芍藥喘加麻黃有寒加細辛氣上衝加桂枝熱腫加黃芩寒多掣痛加薑桂濕盛加茯苓蒼朮氣滿堅痛加陳皮枳殼蘇葉防己大辛苦寒通行十二經開竅瀉濕為治風腫水腫之主藥黃耆生用達表治風注膚痛溫分肉實腠理白朮健脾燥濕與黃耆並能止汗為臣防己性險而捷故用甘草甘平以緩之又能補土製水為佐薑棗辛甘發散調和營衛為使也去白朮薑棗加茯苓為君桂枝名防己茯苓湯金匱治水在皮膚四肢聶聶而動名皮水防己行經絡茯苓善滲泄黃耆達皮膚桂枝走肢節按五水脈浮惡風骨節疼痛名風水脈浮胕腫按之沒指其腹如鼓不惡風不渴名皮水當發其汗又云惡寒不渴名風水不惡寒而渴名皮水假令皮水不渴亦當發汗脈沉遲自喘名正水脈沉腹滿不喘水積胞中堅滿如石名石水脈沉遲發熱胸滿身腫汗如柏汁名黃汗加味腎氣丸金匱腎氣丸即桂附八味丸治婦人轉胞無車前牛膝治脾腎大虛肚腹脹大四肢浮腫喘急痰盛小便不利大便溏黃已成蠱證亦治消渴飲一溲一經曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚則為胕腫腎消者腎水衰竭龍雷之火不安其位上炎於肺消渴引飲飲入於胃下無火化直入膀胱故飲一溲一也用桂附辛熱引真火歸元地黃純陰壯真水滋腎為治下消之劑熟地黃四兩茯苓三兩乳拌山藥微炒丹皮酒洗山萸肉酒潤澤瀉酒浸牛膝酒浸車前子微炒肉桂一兩附子制熟五錢蜜丸土為萬物之母脾虛則土不能制水而洋溢水為萬物之源天一生水腎虛則水不安其位而妄行以致泛濫皮膚肢節之間因而攻之虛虛之禍不待言矣經曰毋盛盛毋虛虛貽人禍殃桂附八味丸滋真陰而能行水補命火因以強脾桂附補命門火火能生土土強則能防水陽能化陰陰化則便溺通加車前利小水而不走氣加牛膝益肝腎藉以下行使水道通而腫脹已又無損於真元也喻嘉言曰胃為水穀之海五臟六腑之源脾不能散胃之水精於肺而病於中肺不能通胃之水道於膀胱而病於上腎不能司胃之關時其輸泄而病於下以致積水浸淫無所底止又曰按此方濟生以附子為君此薛新甫重訂以茯苓為君然腎之關門不開必以附子回陽蒸動腎氣其關始開胃中積水始下以陽主開故也關開即不用茯苓牛膝車前而水亦下關閉即車前茯苓用至無算抑莫之如何矣用方者將君附子乎抑君茯苓乎張景嶽曰水腫證乃脾肺腎三臟相干之病蓋水為至陰故其本在腎水化於氣故其標在肺水惟畏土故其制在脾今肺虛則氣不化精而化水脾虛則土不制水而反克腎虛則水無所主而妄行求古治法惟金匱內加減腎氣湯為對證之方豫屢用之無不見效此雖壯水之劑而實即脾肺腎三臟之正治也蓋腎為先天生氣之源若先天元氣虧於下則後天胃氣失其所本而由脾及肺治節所以不行是以水積於下則氣壅於上而喘脹由生但宜峻補命門使氣復元則三臟必皆安矣今論其方如所用桂附以利陰中之滯熟地山藥山茱以養陰中之水也茯苓澤瀉車前以化陰中之陽也此能使氣化於精即所以治肺也補火生土即所以治脾也壯水通竅即所以治腎也補而不滯利而不伐凡病水腫於中年之後及氣體本弱者但能隨證加減用之其應如響誠諸方之第一更無出其右者又曰腫脹之治凡脾腎虛證如前論加減腎氣湯者誠然善矣然用之之法猶當因此擴充不宜執也余嘗治一陶姓之友年逾四旬因患傷寒為醫誤治危在呼吸乃以大劑參附熟地之類幸得挽回愈後喜飲未及兩月忽病足股盡腫脹及於腹按之如鼓堅而且硬因其前次之病中氣本傷近日之病又因酒濕度非加減腎氣湯不可遂連進數服雖無所礙然終不見效人皆料其必不可治余熟計其前後病因本屬脾腎大虛而今兼以滲利未免減去補力亦與實漏䳇者何異元氣不能復病必不能退遂悉去利水等藥而專用參附理陰煎仍加白朮大劑與之三劑而足腫漸消二十餘劑而腹脹盡退自後凡遇全虛者悉用此法無一不效舟車丸河間仿仲景十棗例制此湯治一切水濕治水腫水脹形氣俱實腫脹者水道壅遏也形氣俱實者口渴面赤氣粗腹堅大小便祕也陽水先腫上體肩背手膊手三陽經陰水先腫下體腰腹脛胕足三陰經腫屬脾脹屬肝腫則陽氣猶行如單脹而不腫者名鼓脹為木橫剋土難治腫脹朝寬暮急為血虛暮寬朝急為氣虛朝暮俱急為氣血俱虛腫脹由心腹而散四肢者吉由四肢而入心腹者危男自下而上女自上而下者皆難治腫脹唇黑則傷肝缺盆平則傷心臍出則傷脾足心平則傷腎背平則傷肺皆不可治腹脹身熱脈大者是逆也多死黑牽牛炒四兩大黃二兩酒浸甘遂麵裹煨大戟麵裹煨芫花醋炒青皮炒橘紅一兩木香五錢輕粉一錢水丸牽牛大黃大戟芫花甘遂皆行水之厲劑能通行十二經之水然腫屬於脾脹屬於肝水之不行由於脾之不運脾之不運由於木盛而來侮之是以不能防水而洋溢也青皮木香疏肝瀉肺而健脾與陳皮均為導氣燥濕之品使氣行則水行脾運則腫消也輕粉無竅不入能去積痰故少加之然非實證不可輕投減芫花大戟青皮陳皮木香加芒硝郁李仁名浚川散薑湯下五分治同疏鑿飲子治遍身水腫喘呼口渴大小便祕上證為濕熱甚而氣實也此為陽水陽水見陽證脈必沉數陰水見陰證脈必沉遲羌活秦艽檳榔商陸椒目大腹皮茯苓皮木通澤瀉赤小豆等分加姜皮煎外而一身盡腫內而口渴便祕是上下表里俱病也羌活秦艽解表疏風使濕以風勝邪由汗出而升之於上腹皮苓皮姜皮辛散淡滲所以行水於皮膚以皮行皮商陸檳榔椒目赤豆去脹攻堅所以行水於腹裡木通瀉心肺之水達於小腸澤瀉瀉脾腎之水通於膀胱二藥瀉水實瀉火也上下內外分消其勢亦猶神禹疏江鑿河之意也實脾飲嚴氏治肢體浮腫色悴聲短口中不渴二便通利脾胃虛寒土不能制水故水妄行而浮腫以無鬱熱故口不渴而便不祕此為陰水嚴氏曰治陰水發腫用此先實脾土白朮土炒茯苓甘草炙厚朴姜炒大腹子草豆蔻木香木瓜附子黑姜加薑棗脾虛故以白朮甘草補之脾寒故以姜附草蔻溫之脾濕故以大腹茯苓利之脾滯故以木香厚朴導之然土之不足由於木之有餘木瓜酸溫能於土中瀉木兼能行水與木香同為平肝之品使木不剋土而肝和則土能制水而脾實矣水病當以健脾為主使脾實而氣運則水自行宜參苓為君視所挾證加減苟徒用利水藥多致不救醫貫曰治腫滿先以脾土為主宜補中益氣湯六君子湯或疑水脹喘滿而用補劑不益脹滿乎曰肺氣既虛不可復行其氣腎水既衰不可復利其水服補劑初覺不快過時藥力得行漸有條理矣喻嘉言曰治水以實脾為先不但陰水為然然陰水者少陰腎中之真陽衰微不能封閉而泛濫無制爾方中不用桂而用厚朴大腹尚有可議麥門冬湯治水溢高原肢體皆腫經曰三焦者決瀆之官水道出焉上焦不治水溢高原中焦不治水停中脘下焦不治水蓄膀胱麥門冬五十枚姜炒粳米五十粒吳鶴皋曰肺非無為也飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱肺熱則失其下降之令以致水溢高原淫於皮膚而為水腫醫罕明此實脾導水皆不能愈故用麥冬清肺開其下降之源粳米益胃培乎生金之母此治病必求其本也或問此證何以辨之曰肢體皆腫小腹不急初起便有喘滿此其候也五皮飲淡寮治水病腫滿上氣喘急或腰以下腫五加皮地骨皮茯苓皮大腹皮生薑皮一方五加易陳皮羅氏五加易桑白皮治病後脾肺氣虛而致腫滿五加祛風勝濕地骨退熱補虛生薑辛散助陽水為陰邪大腹下氣行水茯苓滲濕健脾於散瀉之中猶寓補助之意皆用皮者水溢皮膚以皮行皮也大分清飲治積熱祕結小水不利或致腰腹下部極痛或濕熱不利黃疸溺血邪熱蓄血腹痛淋閉等證茯苓澤瀉木通二錢豬苓梔子枳殼車前子一錢如內熱甚者加黃芩黃柏龍膽之屬如大便堅硬脹痛者加大黃二三錢如黃疸小水不利熱甚者加茵陳二錢如邪熱蓄血腹痛者加紅花青皮各一錢五分小分清飲治小水不利濕滯脹腫不能受補等證茯苓澤瀉豬苓二三錢米仁二錢枳殼厚朴一錢如陰虛水不能達加生地牛膝各二錢如黃疸者加茵陳二錢無內熱而寒滯不行者加肉桂一錢萆薢分清飲治陽虛白濁小便頻數漩白如油名曰膏淋腎氣虛不能管束而小便數膀胱有熱則水道澀而清濁不分或敗精滲入胞中及服熱藥飲食痰積滲入皆成淋濁川萆薢石菖蒲烏藥益智仁等分甘草梢減半入鹽服一方加茯苓萆薢能解陽明厥陰濕熱去濁而分清史國信曰若欲興陽先滋筋力若欲便清先分肝火萆薢能泄陽明之濕入厥陰清肝火烏藥能疏邪逆諸氣逐寒而溫腎益智脾藥兼入心腎固腎氣而散結烏藥益智等分山藥糊丸名縮泉丸鹽湯下治便數石菖蒲開九竅而通心甘草梢達莖中而止痛使濕熱去而心腎通則氣化行而淋濁止矣此以疏泄而為禁止者也琥珀散治氣淋血淋膏淋砂淋心腎氣鬱清濁相干熱蓄膀胱溺澀而痛曰淋氣淋便澀餘瀝血淋尿血而痛膏淋便出如膏砂淋精結成石勞淋遇勞即發冷淋寒戰後溲大抵多屬於熱熱甚生濕則水液渾濁而為淋若冷氣滯於膀胱而作淋者十無一二也滑石二錢琥珀木通萹蓄木香當歸鬱金炒一錢為末服滑石滑可去著利竅行水萹蓄苦能下降利便通淋琥珀能降肺氣通於膀胱木通能瀉心火入於小腸小腸為心之腑主熱者也諸熱應於心者其水必自小腸滲入膀胱經所謂胞移熱於膀胱則癃溺血是也血淋由於血亂當歸能引血歸經氣淋由於氣滯木香能升降諸氣諸淋由心肝火盛鬱金能涼心散肝下氣而破血也大法鬱金琥珀開鬱青皮木香行氣蒲黃牛膝破血黃柏生地滋陰東垣用藥凡例小腹痛用青皮疏肝黃柏滋腎蓋小腹小便乃肝腎部位茵陳蒿湯仲景治傷寒陽明病但頭汗出腹滿口渴二便不利濕熱發黃脈沉實者經曰陽明病發熱汗出此為熱越則不發黃若但頭汗身無汗小便不利渴引水漿此為瘀熱在裡必發黃黃者脾胃之色也熱甚者身如橘色汗如柏汁頭為諸陽之會熱蒸於頭故但頭汗而身無汗夫熱外越則不里郁下滲則不內存今便既不利身又無汗故鬱而為黃內有實熱故渴熱甚則津液內竭故小便不利凡瘀熱在裡熱入血室及水結胸皆有頭汗之證乃傷寒傳變故與雜病不同濕在經則日晡發熱鼻塞在關節則身痛在臟腑則濡泄小便反澀腹或脹滿濕熱相搏則發黃熱勝色明而便燥濕勝色晦而便溏又黃病與濕病相似但濕病在表一身盡痛黃病在裡一身不痛茵陳六兩大黃二兩梔子十四枚炒茵陳發汗利水以泄太陰陽明之濕熱故為治黃主藥梔子為臣大黃為佐分泄前後則腹得利而解矣茵陳梔子能導濕熱由小便出大黃能導濕熱由大便出大黃易黃連名茵陳三物湯治同加厚朴枳實黃芩甘草入生薑燈草煎名茵陳將軍湯節奄治同去梔子大黃加附子乾薑治寒濕陰黃前證為陽黃如身黃而色暗者為陰黃宜此湯黃疸小便黃赤不利為裡實宜利小便或下之無汗為表實宜汗之或吐之若小便清是無熱也仲景云發黃小便自利當與虛勞門小建中湯自利腹滿而喘不可除熱而除之必噦小半夏湯主之王海藏曰內感傷寒勞役形體飲食失節中州變寒病生黃非外感而得只宜理中大小建中等方不可用茵陳禹功散子和治寒濕水疝陰囊腫脹囊如水晶陰汗不絶謂水疝蓋得之醉後而使內寒濕乘腎虛而流入也二便不利寒濕所凝不得施化也黑牽牛四兩茴香一兩炒為末每一錢薑汁調下或加木香一兩黑牽牛辛烈能達右腎命門走精隧行水泄濕兼通大腸風祕氣祕茴香辛熱溫散能暖丹田祛小腸冷氣同入下焦以泄陰邪也升陽除濕防風湯東垣治大便祕塞或裡急後重數至圊而不能便或有白膿或血慎勿利之利之則必至重病反鬱結而不通矣以此湯升舉其陽則陰自降矣通大便有用升麻者即此意也蒼朮泔浸四錢防風二錢茯苓白朮芍藥一錢如胃寒泄瀉腸鳴加益智半夏各五分薑棗煎蒼朮辛溫燥烈升清陽而開諸郁故以為君白朮甘溫茯苓甘淡佐之以健脾利濕防風辛溫勝濕而升陽白芍酸寒斂陰而和脾也劉宗厚曰飲食入胃輸精心肺氣必上行然後下降若脾胃有傷不能上升反下流肝腎而成泄利者法當填補中氣升之舉之不可疏下此東垣發前人所未發也羌活勝濕湯局方治濕氣在表頭痛頭重或腰脊重痛或一身盡痛微熱昏倦濕氣在表外傷於濕也濕邪著於太陽則頭項腰脊痛著於太陰則肩背痛著於陰陽之經則一身盡痛惟著故痛且重也濕鬱則為熱然濕乃陰邪故微熱而昏倦也東垣曰頭痛脊強乃太陽之經氣不行也此湯主之羌活獨活一錢川芎藁本防風甘草炙五分蔓荊子三分如身重腰中沉沉然中有寒濕也加酒洗漢防己附子經曰風能勝濕羌獨防藁芎蔓皆風藥也濕氣在表六者辛溫升散又皆解表之藥使濕從汗出則諸邪散矣藁本善治太陽寒濕荊防善散太陽風濕二活祛風勝濕兼通關節川芎能升厥陰清氣上治頭痛甘草助諸藥辛甘發散為陽氣味甘平發中有補也若水濕在裡則當用行水滲泄之劑喻嘉言曰經曰濕上甚為熱表之則易下之則難故當變常法而為表散吳鶴皋曰脾弱濕傷者二陳平胃之類主之濕盛濡泄者五苓六一之類主之水腫發黃者五皮茵陳之類主之今濕流關節非前藥所宜矣無竅不入唯風為能故凡關節之病非風藥不能到也三因用此湯加柴胡五分治臥而多驚悸多厭溲者邪在少陽厥陰也如淋加澤瀉五分經曰肝腎之病同一治此下焦風寒三經合病非風藥行經不可也除獨活蔓荊川芎甘草加升麻蒼朮名羌活除濕湯治風濕相搏一身盡痛除川芎加黃耆當歸蒼朮升麻名升陽除濕湯治水疝腫大陰汗不絶再加麥芽神麯豬苓澤瀉除當歸黃耆亦名升陽除濕湯東垣治脾虛瀉痢大橘皮湯治濕熱內攻心腹脹滿小便不利大便滑瀉小水並於大腸故小便不利而大便滑瀉及水腫等證滑石六錢甘草赤茯苓一錢豬苓澤瀉白朮土炒桂五分陳皮錢半木香檳榔三分加姜煎每服五錢赤茯豬苓澤瀉瀉火行水白朮補脾肉桂化氣此五苓散也滑石清熱利濕甘草瀉火調中此六一散也濕熱內甚故加檳榔峻下之藥陳皮木香行氣之品使氣行則水行以通小便而實大便也八正散局方治濕熱下注咽乾口渴少腹急滿小便不通濕熱下注小腹急滿則小便當行矣而卒不行者熱祕之也或淋痛尿血或因熱為腫車前子木通瞿麥萹蓄滑石甘草梢梔子炒黑大黃加燈草煎一方加木香木通燈草清肺熱而降心火肺為氣化之原心為小腸之合也車前清肝熱而通膀胱肝脈絡於陰器膀胱津液之腑也瞿麥萹蓄降火通淋此皆利濕而兼瀉熱者也滑石利竅散結梔子大黃苦寒下行此皆瀉熱而兼利濕者也甘草梢者取其徑達莖中甘能緩痛也雖治下焦而不專於治下必三焦通利水乃下行也朱丹溪曰小便不通有熱有濕有氣結於下宜清宜燥宜升有隔二隔三之治如不因肺燥但膀胱有熱則瀉膀胱此正治也如因肺燥不能生水則清金此謂隔二如因脾濕不運而精不升故肺不能生水則當燥脾健胃此謂隔三車前子茯苓清肺也黃柏黃芩瀉膀胱也蒼朮白朮燥脾健胃也又曰小便不通屬氣虛血虛實熱痰閉皆宜吐之以升其氣氣升則水自降氣虛用參朮升麻等先服後吐或就參耆藥中調理吐之血虛用四物湯先服後吐或就芎歸湯探吐之痰多二陳湯先服後吐或加香附木通實熱當利之或八正散蓋大便動則小便自通矣或問以吐法通小便其理安在曰譬如滴水之器上竅閉則下竅無自以通必上竅開而下竅始出也當歸拈痛湯東垣治濕熱相搏肢節煩痛肩背沉重或遍身疼痛或腳氣腫痛腳膝生瘡膿水不絶及濕熱發黃脈沉實緊數動滑者濕則腫熱則痛足膝瘡腫濕熱下注也發黃濕熱熏蒸脾胃也腳氣多主水濕亦有夾風夾寒之異濕熱勝而為病或成水泡瘡或成赤腫丹毒或如疝氣攻上引下俱可用此湯損益為治凡手足前廉屬陽明後廉屬太陽外廉屬少陽內廉屬厥陰內前廉屬太陰內後廉屬少陰以臂貼身垂下大指居前小指居後定之手足痛者當分是何經絡用本經藥為引行其氣血則愈太陽羌活防風陽明升麻白芷葛根少陽柴胡厥陰吳茱萸川芎青皮太陰蒼朮白芍少陰獨活細辛茵陳酒炒羌活防風升麻葛根蒼朮白朮甘草炙黃芩酒炒苦參酒炒當歸豬苓澤瀉知母一方加人參羌活透關節防風散留濕為君升葛味薄引而上行苦以發之白朮甘溫和平蒼朮辛溫雄壯健脾燥濕為臣濕熱相合肢節煩痛苦參黃芩知母茵陳苦寒以泄之酒炒以為因用血壅不流則為痛當歸辛溫以散之人參甘草甘溫補養正氣使苦寒不傷脾胃治濕不利小便非其治也豬苓澤瀉甘淡鹹平導其留飲為佐上下分消其濕使壅滯得宣通也玉機微義曰此方東垣本為治腳氣濕熱之劑後人用治諸瘡甚驗防己飲治腳氣足脛腫痛憎寒壯熱腳氣自外感得者山岡雨水或履濕熱之地自內傷得者生冷茶酒油麵濕熱之毒有濕有熱濕性下流故注於足濕熱分爭濕勝則憎寒熱勝則壯熱有兼頭痛諸證者狀類傷寒但脛腫掣痛為異爾此病忌用補劑及淋洗以濕熱得補增劇也亦不宜大瀉治之喜通而惡寒若腳氣衝心喘急不止嘔吐不休者死水凌火故也先痛而後腫者氣傷血也先腫而後痛者血傷氣也筋脈弛張腫痛者名濕腳氣宜利濕疏風捲縮枯細不腫而痛者名乾腳氣即熱也宜潤血清燥防己木通檳榔生地酒洗川芎白朮炒蒼朮鹽炒黃柏酒炒甘草梢犀角熱加黃芩時令熱加石膏肥人有痰加竹瀝薑汁或南星大便祕加桃仁紅花小便赤澀加牛膝或木瓜薏苡仁防己行水療風瀉下焦之濕熱檳榔攻堅利水墜諸藥使下行木通降心火由小腸出草梢泄脾火徑達腎莖黃柏生地滋腎陰而涼血解熱蒼白二術燥脾濕而運動中樞腫由血鬱川芎行血中之氣痛由肝實犀角涼心而清肝合之以清熱利濕消腫止痛也蒼朮丸治寒濕在脾泄瀉久不能愈者真茅山蒼朮米泔浸一宿切炒如無即以好白朮代之八兩破故紙酒浸曬乾炒白芍炒黃四兩厚朴薑汁炒雲苓二兩甘草炙川椒去閉口者炒出汗小茴香炒一兩為末糯米糊為丸桐子大每服食遠清湯下七八十丸卷八上潤燥門內經病機一十九條獨遺燥氣他凡秋傷於燥皆謂秋傷於濕歷代諸賢隨文作解弗察其訛賴喻嘉言特為正之大意謂春傷於風夏傷於暑長夏傷於濕秋傷於燥冬傷於寒覺六氣配四時之旨與五運不相背戾而千古之大疑始一快也夫燥金所傷本摧肝木甚則自戕肺金蓋肺金主氣而治節行焉此惟土生之金堅剛不撓故能生殺自由紀綱不紊若病起於秋而傷其燥金受火刑化剛為柔方圓且隨型埴欲仍清肅之舊其可得耶經謂咳不止而出白血者死白血謂色淺血而似肉似肺者非肺金自削何以有此試觀草木菁英可掬一乘金氣勿焉改容焦其上首而燥氣先傷上焦華蓋豈不明耶詳此則病機之諸氣膹郁皆屬於肺諸痿喘嘔皆屬於上二條明指燥病言矣生氣通天論秋傷於燥上逆而咳發為痿厥燥病之要一言而終與病機二條適相吻合矣要知肺氣不燥則諸氣稟清肅之令而周身四達亦何致恚郁耶諸痿喘嘔之屬於上者上亦指肺不指心也若統上焦心肺並言則心病不主痿喘及嘔也惟肺燥甚則肺葉痿而不用肺氣逆而喘鳴食難膈而嘔出三者皆燥證之極者也經文原有逆秋氣則太陰不收肺氣焦滿之文其可稱為濕病乎其左胠脅痛不能轉側嗌乾面塵身無膏澤足外反熱腰痛驚駭筋攣丈夫㿗疝婦人少腹痛目昧眥瘡則燥病之本於肝而散見不一者也肝臟見燥證固當急救肝葉勿令焦損然清其肺金除其燥本尤為先務若肺金自病不及於肝即專力救肺焦枯且恐立至尚可分功緩圖乎麥門冬湯金匱治火氣上逆咽喉不利麥門冬七升半夏一升人參三兩甘草二兩大棗十二枚粳米三合水一斗二升煮六升服一升日三夜一喻嘉言曰此胃中津液乾枯虛火上炎之證用寒涼藥而火反升徒知與火相爭知母貝母屢施不應不知胃者肺之母氣也仲景於麥冬人參粳米甘草大補中氣大生津液隊中增入半夏之辛溫一味用以利咽下氣此非半夏之功實善用半夏之功擅古今未有之奇矣炙甘草湯仲景治傷寒脈結代心動悸及肺痿咳唾多心中溫溫液液者脈動而中止能自還者曰結不能自還曰代氣血虛衰不能相續也心中動悸真氣內虛也肺痿濁唾多者以胃中之津液上供悉從燥熱化為涎沫也寶鑑用治厄逆甘草炙四兩生薑桂枝人參阿膠蛤粉炒二兩生地黃一斤麥冬去心麻仁研半斤大棗十二枚水酒各半煎內阿膠煬化服人參麥冬甘草大棗益中氣而復脈生地阿膠助營血而寧心麻仁潤滑以緩脾胃薑桂辛溫以散餘邪加清酒以助藥力也聖濟經云津液散為枯五臟痿弱營衛涸流濕劑所以潤之麻仁阿膠麥冬地黃之甘潤經益血復脈通陽也喻嘉言曰此仲景傷寒門中之聖方也千金翼用治虛勞外臺用治肺痿究竟本方所治亦何止二病哉外臺所取在於益肺氣之虛潤肺金之燥至於桂枝辛熱似有不宜不知桂枝能通營衛致津液則肺氣能轉輸涎沫以漸而下尤為要緊所以云治心中溫溫液液也玉機微義曰肺痿如咳久聲啞聲嘶咯血此屬陰虛火熱甚也吐涎沫而不咳不渴必遺尿小便數以上虛不能制下此肺中冷也必眩多涎唾用炙甘草乾薑湯以溫之肺痿涎唾多心中溫溫液液者用炙甘草湯此補虛勞也與補陰虛火熱不同故肺痿有寒熱之異清燥救肺湯治諸氣膹郁諸痿喘嘔二桑葉經霜者得金氣而柔順不凋取之為君去枝梗三錢石膏稟清肅之氣極清肺熱二錢半煅甘草和胃生金一錢人參生胃之津養肺之氣七分胡麻仁炒研一錢真阿膠八分麥門冬去心一錢二分杏仁泡去皮尖炒黃七分枇杷葉一片刷去毛蜜塗炙黃水一碗煎六分頻頻滾熱服痰多加貝母栝蔞血枯加生地黃熱甚加增石膏喻嘉言曰諸氣膹郁之屬於肺者屬於肺之燥也而古今治氣鬱之方用辛香行氣絶無一方治肺之燥者諸痿喘嘔之屬於上者亦屬於肺之燥也而古今治法以痿嘔屬陽明以喘屬肺是則嘔與痿屬之中下而唯喘屬之上矣所以千百方中亦無一方及於肺之燥也即喘之屬於肺者非表即下非行氣即瀉氣間有一二用潤劑者又不得其肯綮總之內經六氣脫誤秋傷於燥一氣指長夏之濕為秋之燥後人不敢更端其說置此一氣於不理即或明知理燥而用藥夾雜如弋獲飛蟲茫無定法示人也今擬此方名清燥救肺湯大約以胃氣為主胃土為肺金之母也其天門冬雖能保肺然味苦而氣滯恐反傷胃阻痰故不用也其知母能滋腎水清肺金亦以苦而不用其他苦寒降火傷胃之藥尤在所忌蓋肺金自至於燥所存陰氣不過一線爾倘更以苦寒下其氣傷其胃其人尚有生理乎誠仿此增損以救肺燥變生諸證如沃焦救焚不厭其頻庶克有濟爾通幽湯東垣治幽門不通上衝吸門噎塞不開氣不得下大便艱難名曰下脘不通治在幽門下脘即幽門胃之下口也人身上下有七門皆下衝上也幽門上衝吸門吸門即會厭氣喉上掩飲食者也沖其吸入之氣不得下歸肝腎為陰火所拒故膈噎不通濁陰不得下降而大便乾燥不行胃之濕與陰火俱在其中則腹脹作矣治在幽門使幽門通利泄其陰火潤其燥血生其新血則幽門通吸門亦不受邪膈噎得開脹滿俱去矣是濁陰得下歸地也當歸身升麻桃仁研紅花甘草炙原生地原熟地或加檳榔當歸二地滋陰以養血桃仁紅花潤燥而行血檳榔下墜而破氣滯加升麻者天地之道能升而後能降清陽不升則濁陰不降經所謂地氣上為云天氣下為雨也李東垣曰腎開竅於二陰經曰大便難者取足少陰夫腎主五液津液足則大便如常若飢飽勞役損傷胃氣及食辛熱味厚之物而助火邪火伏血中耗散真陰津液虧少故大便燥結少陰不得大便以辛潤之太陰不得大便以苦泄之傷食者以苦泄之血燥者以桃仁酒製大黃通之風燥者以麻仁加大黃利之氣塞者郁李仁杏仁皂角仁潤之不可概用牽牛巴豆之類下之損其津液暫得通快燥結愈甚遂成不救加大黃麻仁名當歸潤腸湯治同濟川煎凡病涉虛損而大便閉結不通則硝黃攻擊等劑必不可用若勢有不得不通者宜此主之此用通於補之劑也當歸三五錢牛膝二錢肉蓯蓉酒洗去咸二三錢澤瀉一錢五分升麻五七分或一錢枳殼一錢虛甚者不可用如氣虛加人參無妨礙如有火加黃芩腎虛加熟地潤腸丸東垣治腸胃有伏火大便祕澀全不思食風結血結風結即風祕由風搏肺臟傳於大腸或素有風病者亦多祕氣祕由氣不升降血祕由亡血血虛津液不足熱祕由大腸熱結冷祕由冷氣橫於腸胃凝陰固結津液不通非燥糞也仲景曰脈浮而數能食不大便者此為實名曰陽結脈沉而遲不能食身體重大便反硬名曰陰結李東垣曰實祕熱祕即陽結也宜散之虛祕冷祕即陰結也宜溫之大黃歸尾羌活五錢桃仁研大麻仁去殼一兩蜜丸一方有防風風濕加秦艽皂角子燒存性用歸尾桃仁潤燥活血羌活搜風散邪大黃破結通幽麻仁滑腸利竅血和風疏腸胃得潤則自然通利矣朱丹溪曰古方通大便皆用降氣品劑蓋肺氣不降則難傳送用枳殼沉香訶子杏仁等是也又老人虛人風人津液少而祕者宜滑之用胡麻麻仁阿膠等是也如妄以峻藥逐之則精液走氣血耗雖暫通而即祕矣必變生他證加防風皂角仁蜜丸名活血潤燥丸治同皂角得濕則滑濕滑則燥結自除去羌活加升麻紅花生熟二地名潤燥湯俱東垣方治同大黃煨熟當歸酒浸枳實炒等分蜜丸亦名潤腸丸治痔病肛門燥澀決津煎治婦人血虛經滯不能流暢而痛極者當以水濟水若江河一決而積垢皆去宜用此湯隨證加減主之此用補為瀉之神劑也當歸三五錢或一兩澤瀉一錢五分肉桂一二三錢熟地二三錢或五七錢或不用亦可烏藥一錢如嘔惡者加焦姜一二錢如陰滯不行者非加附子不可如氣滯而痛脹者加香附一二錢或木香七八分如血滯血澀者加酒炒紅花一二錢如小腹不暖而痛極者加吳茱萸七八分如大便結澀者加肉蓯蓉三錢或鎖陽亦可煮粥彌佳如氣虛者宜少用澤瀉烏藥之類甚者不用亦可韭汁牛乳飲丹溪治胃脘有死血乾燥枯槁食下作痛翻胃便祕胃脘有死血者嗜酒食辛躁暴多怒積久而成瘀熱也枯槁者血聚則肝氣燥燥熱故槁也瘀血阻礙故食下作痛翻胃而吐出也瘀血不去則新血不生故腸枯而便祕膈噎翻胃多因氣血兩虛胃槁胃冷而成飲可下而食不下槁在吸門即喉間之會厭也食下胃脘痛須臾吐出槁在賁門胃之上口也此上焦名噎食下良久吐出槁在幽門胃之下口也此中焦名膈朝食暮吐槁在闌門小腸下口也此下焦名翻胃又有寒痰瘀血食積壅塞胃口者或補或消或潤宜隨病施治韭菜汁牛乳等分時時呷之有痰阻者加薑汁一方去牛乳加陳酒治血膈尤捷韭汁辛溫益胃消瘀牛乳甘平潤燥養血瘀去則胃無阻血潤則大腸通而食得下矣治噎膈諸藥韭汁散瘀竹瀝薑汁消痰童便降火人乳牛乳潤燥補血蘆根汁止嘔茅根汁涼血甘蔗汁和胃荸薺消食騾尿殺蟲或加燒酒米醋白蜜和諸汁頓服亦佳朱丹溪曰反胃噎膈大便燥結宜牛羊乳時時咽之兼服四物湯為上策不可服人乳人乳有五味之毒七情之火也按噎膈不通服香燥藥取快一時破氣而燥血是速其死也不如少服藥飲牛乳加韭汁或薑汁或陳酒為佳活血潤燥生津湯丹溪治內燥津液枯少當歸白芍熟地黃一錢天冬麥冬栝蔞八分桃仁研紅花五分歸芍地黃滋陰養血栝蔞二冬潤燥生津桃仁紅花活血去瘀凡陰虛血燥而兼瘀滯者此方最宜甘露飲治胸中客熱牙宣口氣齒齦腫爛時出膿血吐血衄血目瞼垂重常欲合閉或即飢煩不欲食飲及目赤腫痛不任涼藥口舌生瘡咽喉腫痛瘡疹已發皆可服之又治脾胃受濕瘀熱在裡或醉飽房勞濕熱相搏致生疸病身目皆黃肢體微腫胸滿氣短大便不調小便黃澀或時身熱生地熟地天冬麥冬石斛茵陳黃芩枳殼枇杷葉甘草一方加桂苓名桂苓甘露飲此方創自潔古老人朱丹溪以為此心肺胃三經藥也主治胸中客熱口臭齒爛心煩咽痛等證許學士又去麥冬加犀角主治與上略同別如眼赤並一切瘡瘍已散未散皆可治之然小甘露飲去熟地者以手陽明胃與腎無相關之勢故加桔梗使與里合治胃則以腎為關故加熟地二冬也按此方以固本丸為主而加入他藥原因胃中濕熱下流歸坎則水源濁泛故見證如此而當日立方之意實從救腎起見清胃者自清胃而救原者自救原丹溪止言心肺胃猶未是全論高氏每於肝經有鬱火者加丹皮山梔去石斛甘草枇杷葉亦無不應驗則知水木同源之義若原有胃火而又挾肝木之勢者竟以原方加丹皮山梔等味亦無不效也丹溪言肺最妙然必須列證中有大便乾燥才合手足陽明兩經之藥爾至一變而為小甘露去枇杷葉熟地二冬枳殼而加升麻桔梗梔子則手陰明實證通治之義全見矣火盛渴甚者加知母走馬疳而急者加石膏黃連火蝕既久元氣虛者加人參真胃中燥火之神劑也附小甘露飲山梔黃芩生地升麻桔梗茵陳石斛甘草治脾勞實熱身體面目悉黃舌乾咽燥齒痛消渴方丹溪治渴證胃熱善消水穀渴而多飲為上消肺熱也多食善飢為中消胃熱也渴而小便數有膏為下消腎熱也皆火盛而水衰也經曰二陽結謂之消二陽者陽明也手陽明大腸主津病消則目黃口乾是津不足也足陽明胃主血熱則消穀善飢是血中伏火血不足也末傳能食者必發腦疽背瘡不能食者必傳中滿鼓脹皆不治之證氣分渴者喜飲冷水宜寒涼滲劑以清其熱血分渴者喜飲熱水宜甘溫酸劑以滋其陰上輕中重下危如上中平則不傳下腎消小便甜者為重水生於甘而死於咸小便本咸而反甘是生氣泄脾氣下陷入腎中為土剋水也多死黃連天花粉生地汁藕汁牛乳將黃連花粉為末調服或加薑汁蜂蜜為膏噙化地黃引子易簡治消渴煩躁咽乾面赤腎火上炎人參黃耆蜜炙甘草炙生地黃熟地黃天冬麥冬枇杷葉蜜炙石斛澤瀉枳殼麩炒此方生津補血潤燥止渴佐以澤瀉枳殼疏導二腑澤瀉瀉膀胱之火枳殼寬大腸之氣使小腑清利則心火下降心與小腸相為表裡經曰心移熱於肺傳為鬲消大腑流暢則肺經潤澤肺與大腸相為表裡宿熱既除其渴自止矣喻嘉言曰人參白虎湯專治氣分燥熱此湯專治血分燥熱竹葉黃耆湯兼治氣血燥熱宜辨證而擇用之附竹葉黃耆湯淡竹葉生地黃各二錢當歸川芎芍藥麥冬炒黃芩人參黃耆甘草半夏煅石膏各一錢治消渴氣血兩虛兼有胃火者治久嗽方千金潤肺散寒白蜜滑能潤肺生薑辛能散寒白蜜一斤生薑二斤取汁先稱銅銚知斤兩訖納蜜薑汁微火熬令薑汁盡唯有蜜斤兩在則止每含如棗大一丸日三服朱丹溪曰陰分嗽者多屬陰虛治用知母止嗽勿用生薑以其辛散故也宋洪邁有痰疾晚對上諭以胡桃三枚姜三片臥時嚼服即飲湯復嚼姜桃如前數靜臥必愈邁如旨服旦而痰消嗽止亦與此方同意瓊玉膏申先生治乾咳嗽有聲無痰謂之乾咳緣肺腎津枯所致若火鬱其痰而乾咳者當用升發之藥如逍遙散之類隨用滋陰之劑收功地黃四斤茯苓十二兩人參六兩白蜜二斤先將地黃熬汁去渣入蜜煉稠再將參苓末和入瓷罐封水煮半日白湯化服臞仙加琥珀沉香各五錢地黃滋陰生水水能制火白蜜甘涼性潤潤能去燥氣為水母土為金母故用參苓補土生金蓋人參益肺氣而瀉火茯苓清肺熱而生津也濕熱去則津生麻仁蘇子粥本事方治老人風祕許叔微曰一婦年八十四忽腹痛頭痛噁心不食醫皆議補脾治風清利頭目服藥難愈全不進食其家憂惶豫辨前藥皆誤此是老人風祕臟腑壅滯聚於胸中則腹脹噁心不思飲食上至於巔則頭痛不青也令作此粥兩啜而氣泄不結烘如椒者十餘枚漸得通利不藥而愈矣及産後大便不通婦人産後有三種疾鬱冒則多汗多汗則大便不通故難於用藥大麻仁紫蘇子等分洗淨合研再用水研取汁煮粥麻仁陽明正藥滑陽潤燥利便除風蘇子兼走太陰潤肺通腸和血下氣行而不峻緩而能通故老人産婦氣血不虛者所宜用也桑白皮等汁十味煎許仁則治氣嗽經久將成肺痿乍寒乍熱唾涕稠黏喘息氣上唇口焦乾亦有唾血者漸覺瘦悴小便赤少色敗毛聳此亦成蒸及久嗽成肺癰唾悉成膿出無多少桑白皮一升地骨皮三升二味合煎取汁三升生地汁五升生麥冬汁二升生葛根汁竹澀三升生薑汁白蜜棗膏一升牛酥三合以麥冬生地葛根竹澀薑汁和煎減半再內桑皮地骨汁和煎三分減一再入酥蜜棗膏攪勿停手煎如飴糖夜臥時取一胡桃大含之稍加至雞子大或盡日丸服亦得桑皮瀉肺水麥冬補肺生津地骨退熱除蒸竹瀝清痰通絡能除痰迷之有大熱者生薑祛寒而溫胃棗膏補土以生金地汁葛汁甘寒以除大熱白蜜牛酥甘潤以止久嗽也滋燥養營湯治炎爍肺金血虛外燥皮膚皴揭筋急爪枯或大便風祕肺主皮毛肝主筋爪肝血不足風熱勝而筋燥故外見皮毛枯槁肌膚燥癢內有筋急便祕之證當歸酒洗二錢生地黃熟地黃芍藥炒黃芩酒炒秦艽一錢防風甘草五分前證為血虛而水涸當歸潤燥養血為君二地滋腎水而補肝芍藥瀉肝火而益血為臣黃芩清爍肺之火而退陽艽防散肝膽之風而不燥風藥多燥艽防味辛能潤又秦艽能養血榮筋防風乃血藥之使吐血血崩皆用為使甘草甘平瀉火入潤劑則補陰血為佐使也白茯苓丸治腎消因中消之後胃熱入腎消爍腎脂令腎枯燥遂致此疾兩腿漸細腰腳無力腎消即下消乃上消中消之傳變飲一溲二溲如膏油王注曰肺主氣氣無病則氣能管束津液其精微者榮養筋骨血脈余者為溲肺病則津液無氣管攝而精微者亦隨溲下如膏油也茯苓黃連花粉萆薢熟地黃覆盆子人參元參一兩蛇床子七錢五分雞膍胵音皮鴟即雞肫皮三十具微炒石斛七錢五分蜜丸磁石湯送下茯苓降心火而交肺腎連清脾火而瀉心石斛平胃熱而澀腎熟地元參生腎水覆盆蛇床固腎精人參補氣花粉生津萆薢清熱利濕膍胵雞之脾也能消水穀通小腸膀胱而止便數善治膈消磁石色黑入腎補腎益精故加之以為使也喻嘉言曰友人病消渴後渴少止反加燥急足膝痿弱豫主是丸加犀角有醫曰腎病而以黃連犀角治心毋乃倒乎豫曰腎者胃之關也胃熱下傳於腎則關門大開心之陽火得以直降於腎心火灼腎燥不能濡豫用犀角黃連對治其下降之陽光寧為倒乎服之果效再用六味地黃丸加犀角而肌澤病起矣文蛤散本文云渴欲飲水不止者文蛤散主之文蛤一味杵為散以沸湯五合和服方寸匙金匱於小溲微覺不利蚤用文蛤一味治之方書從不録用詎知軟堅之品非劫陰即傷陰獨此一種平善無過兼可利水誠足寶乎按傷寒論用此治誤以水噀人面肌膚粟起之表證今消渴里證亦用之蓋取其功擅軟堅且利水徹熱爾黃耆湯本事方治心中煩躁不生津液不思飲食黃耆熟地黃芍藥五味子麥冬天冬人參甘草茯苓加薑棗烏梅煎黃耆人參補氣熟地芍藥補血烏梅五味斂耗生津天冬麥冬瀉火補水茯苓淡以利濕甘草甘以和中濕去氣運則脾和而思食津生而燥退矣宣明黃耆湯治心移寒於肺為肺消飲少溲多當補肺平心黃耆三兩五味子人參麥門冬桑白皮二兩枸杞子熟地黃兩半為末每服五錢宣明麥門冬飲子治心移熱於肺傳為膈消胸滿心煩精神短少人參茯神麥門冬五味子生地黃甘草炙知母葛根栝蔞根等分㕮咀每服五錢加竹葉十四片喻嘉言曰宣明二方為內經心移寒移熱兩證各出其治一種苦心非不可嘉然移寒移熱其勢頗鋭而生精養血其應差緩情非的對易老門冬飲子亦然豫謂心之移寒必先束肺之外郭用參耆補肺加散寒之藥可也而用枸杞熟地黃補腎則迂矣用桑白皮瀉肺其如外束之寒何至心之移熱治以鹹寒先入其心如文蛤散之類自無熱可移正直走大梁解圍之上著何不及之所以觀於海者難為水也易老門冬飲子治老弱虛人大渴人參枸杞子白茯苓甘草五味子麥門冬加姜煎喻嘉言曰按易老方即變宣明麥冬飲子去生地知母葛根加枸杞也方下不言心移熱於肺唯以治老弱虛人大渴而增枸杞之潤去地黃之泥知母之苦葛根之發立方於無過治本之圖不為迂矣豬膏湯治過勞四肢筋液耗竭數數轉筋爪甲皆痛不能久立名曰筋極肝主筋筋極六極之一也經曰陽氣者精則養神柔則養筋筋骨過勞耗其津液不能榮養故徑急而筋數轉也爪甲者筋之餘筋屬木猶木枯則枝葉皆萎也不能久立筋衰不能束骨也豬脂薑汁二升酒五合先將豬脂薑汁熬取三升再入酒分三服津竭筋枯非草木之藥卒能責效豬脂潤能養筋薑汁辛能潤燥酒和血而性善行取易達於四肢也除薑汁加金銀花煮酒飲治瘡疥最良豬膏發煎金匱治諸黃令病從小便出豬膏半斤亂髮如雞子大三枚二味和煎發消藥成分再服徐忠可曰此為黃疸之穀氣實者設也腎為胃關胃家穀氣實則氣閉而腎燥故以豬膏潤腎燥發灰利陰血則胃燥和而鬱解仲景於婦人胃氣下泄陰吹而正結者亦用此方注曰此穀氣之實也以豬膏發煎導之乃利陽明之陰以泄穀氣之實也然此之穀氣實又非谷疸之比蓋谷疸原由風寒不能消穀此則真穀氣過實熱而閉爾豫友駱天遊黃疸腹大如鼓百藥不效用豬膏四兩發灰四兩一劑而愈仲景豈欺我哉人參白虎湯原治太陽中喝汗出惡寒身熱而渴竹葉石膏湯治虛煩燥渴以上二方俱見卷八下瀉火門喻嘉言曰按此二方治火熱傷其肺胃清熱救渴之良劑也故消渴病之在上焦者必取用之東垣以治膈消潔古以治能食而渴者其不能食而渴者用錢氏白朮散倍加葛根而東垣論消渴末傳能食者必發腦疽背疽其不能食者必成中滿鼓脹一變其方為蘭香飲子用石膏知母生熟甘草人參加入蘭香防風白豆蔻仁連翹桔梗升麻半夏再變其方為生津甘露飲子用石膏人參生熟甘草知母加黃柏杏仁山梔蓽澄茄白葵白豆蔻白芷連翹薑黃麥門冬蘭香當歸身桔梗升麻黃連木香柴胡藿香全蠍而為之辭曰此制之緩也不惟不成中滿亦不傳下消矣三消皆可用豫實不敢信其然也乃至三因之石子薺耆湯潔古之清涼飲子俱從此方增入他藥引入他臟全失急救肺胃之意此後賢之所以為後賢耶甘麥大棗湯金匱治婦人臟燥悲傷欲哭象如神靈所作數缺伸亦補脾氣婦人血室先受積而鬱久為熱則臟為之燥靈樞曰一陰主關關至闔折則肝氣絶而喜悲則知燥氣乘肝為悲傷欲哭象如神靈所作病從血來故見陰象也靈樞曰胃病善伸數缺顏黑則知燥氣侵胃為缺伸但使肝氣津潤君火不亢則臟陰不燥何致乘肝侵胃今令悲傷缺伸其肝陰之熱可知心肺之熱亦可知故以甘麥大棗湯主之甘草三錢小麥一升大棗十枚以水六升煮取三升分溫三服小麥能和肝陰之客熱而養心液且有消煩利溲止汗之功故以之為君甘草瀉心火而和胃生金故以為臣大棗調胃而通津液利其上壅之燥故以為佐蓋病本於血心為血主肝之子也心火瀉而土氣和則胃氣下達肝臟潤肺氣調則燥止而病自除也卷八下瀉火門內經至真要大論所列病機凡言火者五言熱者四似皆謂之火也然諸病之見於諸篇者復有此言熱而彼言寒此言實而彼言虛者豈果本經之自矛盾耶蓋諸篇所言在專悉病情故必詳必盡本篇所言亦不過總言五運六氣之大約原非確指為實火實熱也故於篇末復以有無虛實四字總結於後此軒岐之明見萬世正恐後人誤以火熱二字悉認為真因而曉示如此此其火有虛實熱有真假從可知矣蓋火得其正即為陽氣此火之不可甚亦不可衰衰則陽氣之虛也火失其正是為邪熱此火之不可有尤不可甚甚則真陰傷敗也然陽以元氣言火以病氣言故凡病在元氣者不得以火論何也蓋人之元氣止於充足焉得有餘既非有餘則何以言火所謂無形者其化虛即此是也惟病在形體者乃可以察火證蓋其不在氣即在血所謂有形者其化實即此是也故凡火之為病其在外者必見於皮肉筋骨其在內者必見於臟腑九竅如果有熱證可據則火性急烈誠可畏也然實火止隨形質因謂之凡火又謂之邪火不過病之標爾洗之滌之又何難哉惟虛火則本於無氣之虛而再攻其火非挺即刃矣是以諸病之殺人而尤惟火病為最者正以凡火未必殺人而以虛作實則無不殺之矣瀉火諸藥黃連梔子瀉心肝大腸之火山梔仁降火從小便出其性能屈曲下行石膏瀉腸胃之火陽明經有實熱者非此不可黃芩清脾肺大腸之火黃柏瀉肝腎諸經之火知母清肺胃肝腎之火地骨皮退陰中之火善除骨蒸夜熱生地麥門冬清肝肺涼血中之火天門冬瀉肺大腸之火桑皮栝蔞梨汁貝母解上焦痰逆之火柴胡乾葛解肝脾諸經之鬱火龍膽草瀉肝腎膀胱之火槐花清肝腎大腸之火能解諸毒芍藥石斛清肝胃之火天花粉清痰止渴解上焦之火連翹瀉諸經之浮火元參清上焦之浮火山豆根解咽喉之火膽星開心脾胃脘之痰火青黛蘆薈胡黃連瀉五臟之疳熱鬱火苦參瀉疳蝕之火木通下行瀉小腸之火滑石利小腸膀胱之火澤瀉車前子利癃閉之火人中白清肝脾腎之陰火童便降陰中血分之浮火大黃朴硝瀉陽明諸經實熱之火人參黃耆白朮甘草除氣虛氣脫陽分散失之火熟地當歸枸杞山萸滋心腎不交陰分無根之火附子乾薑肉桂救元陽失位陰盛格陽之火凡此治火之法已若盡之然亦蘞蹄之說而神明存乎人矣黃連解毒湯相傳此方為太倉公火劑而崔氏治劉護軍又云其自制者治一切火熱表裡俱盛狂躁煩心邪入於陽則狂心為熱所擾則煩躁則煩之甚也口燥咽乾火盛津枯大熱乾嘔熱毒上逆錯語不眠熱昏其神崔尚書曰胃有燥屎令人錯語正熱盛亦令人錯語若祕而錯語者宜承氣湯通而錯語者宜黃連解毒湯吐血衄血傷寒吐衄血者當汗不汗蘊熱逼血上行也熱甚發斑熱毒入胃黃連黃芩黃柏梔子等分三焦積熱邪火妄行故用黃芩瀉肺火於上焦黃連瀉脾火於中焦王海藏曰黃連瀉心實瀉脾也子能令母實實則瀉其子黃柏瀉腎火於下焦梔子通瀉三焦之火從膀胱出蓋陽盛則陰衰故用大苦大寒兼三焦而統治之瀉其亢甚之火而救其欲絶之水也然非實熱不可輕投劉河間曰傷寒表熱極甚身痛頭痛不可忍或眩或嘔里有微熱不可發汗吐下擬以小柴胡天水涼膈之類和解恐不能退其熱勢之甚或大下後再三下後熱勢尚甚本氣損虛而脈不能實擬更下之恐脫而立死不下亦熱極而死或濕熱內盛小便赤澀大便溏泄頻並少而急痛者必欲作利也並宜黃連解毒湯水丸名三黃金花丸治中外諸熱寢汗咬牙夢語驚悸吐衄淋祕勞嗽骨蒸加大黃名梔子金花丸去梔子加大黃名大金花丸治略同去梔子名柏皮湯治三焦實熱用粥丸名三補丸治三焦有火嗌燥喉干二便閉結及濕痰夜熱經曰壯火食氣少火生氣故少火宜升壯火宜降今以黃芩瀉上黃連瀉中黃柏瀉下則壯火降而少火升氣得生而血得養三焦皆受益矣去芩連加甘草名梔子柏皮湯仲景治傷寒發黃身熱發黃為胃有瘀熱宜下之今發熱則勞已外出而不復內入矣故不唯不必下並不必發汗利小便但用梔子清肌表黃柏瀉膀胱以去其濕熱按傷寒發黃有在太陽膀胱者與陽明瘀熱在胃者不同故仲景亦有不可下當於寒濕中求之之說若瘀熱在裡亦有用麻黃連翹赤小豆湯發汗利水之劑者方見傷寒論去黃柏梔子加酒浸大黃名三黃瀉心湯金匱治心下痞熱心氣不足吐血衄血或問心氣不足而吐衄何以不補心而反瀉心丹溪曰少陰不足亢陽無輔致陰血妄行故用大黃瀉其亢甚之火又心本不足肺肝各受火邪而病作故用黃芩救肺黃連救肝肺者陰之主肝者心之母血之舍也肺肝火退則血歸經而自安矣寇宗奭曰以苦泄其熱就以苦補其心蓋一舉而兩得之吳鶴皋曰治病必求其本陽毒上竅出血則熱為本血為標能去其熱則血不治而自歸經矣李士材曰古人用大黃治虛勞吐血意甚深微蓋濁陰不降則清陽不升瘀血不去則新血不生也楊仁齊曰血遇熱則宣流故止血多用涼藥然亦有氣虛挾寒營氣虛散血亦錯行所謂陽虛陰必走是已法當溫中使血自歸經宜理中湯加木香七氣湯加川芎或甘草乾薑湯甚效又大黃用酒浸蒸曬九次蜜丸名三黃丸治三焦積熱頭項腫痛目赤口瘡心膈煩躁大便祕結小便赤澀及消渴羸瘦消渴羸瘦由於火炎水乾附子瀉心湯仲景治傷寒心下痞而復惡寒汗出者傷寒心下滿硬而痛者為結胸硬滿而不痛者為痞經曰心下痞按之濡關上浮者大黃黃連瀉心湯心下痞而復惡寒汗出者附子瀉心湯大抵諸痞皆熱故攻之多寒劑此加附子恐三黃重損其陽非補虛也或下後復汗或下後陽虛故惡寒汗出諸瀉心湯皆治傷寒痞滿滿在心胸不在胃也若雜病痞滿有寒熱虛熱之不同保命集云脾不能行氣於四臟結而不散則為痞傷寒之痞為寒鬱內熱宜苦泄雜病之痞為氣不滌暢宜辛散大黃二兩黃連黃芩一兩附子一枚炮去皮臍別煮取汁吳鶴皋曰心下痞故用三黃以瀉痞惡寒汗出故用附子以回陽非三黃不能去痞熱無附子恐三黃益損其陽寒熱並用斯為有制之兵矣喻嘉言曰此邪熱既盛真陽復虛之證故於三黃湯內加附子汁共成傾痞之功金匱有大黃附子湯亦同此意大黃細辛各二兩附子一枚炮治脅下偏痛發熱脈弦緊此寒也以溫藥下之陽中有陰當以溫藥下其寒後人罕識其旨有用寒藥而治熱痞大黃黃連之類也有陰陽不和而痞用寒熱藥者大黃黃連加附子之類也有陰盛陽虛而痞用辛熱多而寒藥少者半夏生薑甘草瀉心之類也經又曰傷寒大下後復發汗心下痞惡寒者表未解也當先解表乃可攻痞解表桂枝湯攻裡大黃黃連瀉心湯經又曰本以下之故心下痞與瀉心湯痞不解口渴而煩躁小便不利者五苓散主之此有停飲故也李東垣曰酒積雜病下之太過亦作痞傷蓋下多亡陰陰者脾胃水穀之陰也胸中之氣因虛下陷於心之分野故致心下痞宜升胃氣以血藥兼之若全用氣藥導之則痞益甚甚而復下也氣愈下降必變為中滿膨脹矣去附子黃芩名大黃黃連瀉心湯仲景治傷寒心下痞按之濡音軟關上脈浮經曰按之自濡但氣痞爾周揚俊曰以非痰飲結聚故無取半夏生薑也活人云結胸與痞關脈須皆沉若關脈浮而結者三黃以瀉肝李時珍曰仲景治心氣不足吐衄血者用瀉心湯實瀉心包肝脾胃四經血中之伏火也又治心下痞滿按之軟者用瀉心湯亦瀉脾胃之濕熱非瀉心也病發於陰而反下之則痞滿乃寒傷營衛邪結上焦胃之上脘在心故曰瀉心經曰太陰所至為痞滿又曰濁氣在上則生䐜脹是已病發於陽而反下之則結胸乃邪熱陷入血分亦在上脘故大陷胸湯丸皆用大黃亦瀉脾胃血分之邪而散其熱也若結胸在氣分只用小陷胸湯痞滿在氣分只用半夏瀉心湯按發陽發陰諸解不同終成疑案李氏則以寒傷為陰病熱陷為陽病然仲景所用皆寒藥未當有所分也周揚俊則謂總屬下早致然似為近理半夏瀉心湯仲景治傷寒下之早胸滿而不痛者為痞身寒而嘔飲食不下非柴胡證經曰傷寒五六日嘔而發熱柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯此難已下之不為逆必蒸蒸而振欲發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之若滿而不痛者此為痞柴胡不中與也宜半夏瀉心湯凡用瀉心者皆屬誤下之證非傳經熱邪也半夏半升黃連一兩黃芩甘草炙人參乾薑三兩大棗十二枚成氏曰否而不泰為痞苦先入心瀉心者必以苦故以黃連為君黃芩為臣以降陽而升陰也辛走氣散痞者必以辛故以半夏乾薑為佐以分陰而行陽也欲通上下交陰陽者必和其中故以人參甘草大棗為使以補脾而和中已下之後脾氣必虛則痞熱消而大汗以解矣舊注云此方藥味蓋本理中湯人參湯黃芩湯方王海藏曰外證全是下證而脈反細不可下者瀉心湯主之脈有力者黃連瀉心湯脈無力者半夏瀉心湯喻嘉言曰諸瀉心湯原以滌飲此證因嘔故推半夏為君程郊倩曰痞雖虛邪然表氣入里怫鬱於心陽之分寒亦成熱矣寒已成熱則不能外出而熱非實穢又不能下行唯用苦寒從其部而瀉之仍慮下焦之陰邪上入兼辛熱以溫之陰陽兩解不攻痞而痞自散所以寒熱互用若陰痞不關陽愈即鬱而未成熱只是上下陰陽部分拒格而成瀉心之法慨不可用也又曰人皆曰汗多亡陽不知下多亦亡陽以亡陰中之陽故曰亡陰爾下焦之陽驟虛氣必上逆則上焦之陽反因下而成實以火氣不下行故也治多瀉上補下心君得苦寒而安則反能從陽引之入陰故芩連梔子瀉亦成補若汗下相因有虛無實溫補猶恐不足前法一無所用矣除人參再加甘草一兩合前四兩名甘草瀉心湯仲景治傷寒中風醫反下之下利穀不化腹中雷鳴心下痞硬而滿乾嘔心煩醫復下之其痞益甚此非結熱但以胃虛客氣上逆故使硬也為下后里虛胃弱內損陰氣故加甘草以和中益胃復真陰退虛熱大要痞滿下利者為虛便閉者為實按甘草甘令人滿故中滿證忌之而別録甄權並云甘草能除滿以脾健運則滿除也觀仲景用以消痞豈非取其散滿哉又按此乃傷寒之下利腸鳴也雜證腸鳴亦多屬脾胃虛經云脾胃虛則腸鳴腹滿又云中氣不足腸為之苦鳴宜參朮補劑加甘草芩連枳實幹姜等丹溪曰腹中水鳴乃火激動其水也宜二陳湯加芩連梔子加生薑四兩名生薑瀉心湯仲景治汗解後胃中不和心下痞硬乾噫噯同食臭完穀不化脅下有水氣腹中雷鳴下利客氣上逆伏飲搏膈故痞硬中氣不和故干噯胃虛火盛邪熱不殺穀故完穀不化脅下有水氣土弱不能制水故腹中雷鳴下利謂之協熱利為汗後胃虛外損陽氣故加生薑以散邪滌飲益胃復陽劉河間曰瀉而水穀變色者為熱不變色而澄徹清冷者為寒若肛門燥澀小便黃赤水穀雖不變猶為熱也此因火性急速食下即出不及克化所謂邪熱不殺穀也白虎湯仲景治傷寒脈浮滑表有熱里有寒浮為在表滑為在裡裡寒指傷寒即病熱之本因也及三陽合病脈浮大腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則頭上生汗手足逆冷自汗出者腹滿身重口不仁讝語陽明證也面垢少陽證也遺尿太陽證也三證之中陽明為多屬表裡有邪發表則燥熱益甚故譫語攻裡則陰氣下竭而虛陽上脫必額汗出手足逆冷若自汗出者三陽熱甚也與此湯以解內外之熱通治陽明病脈洪大而長不惡寒反惡熱頭痛自汗口渴舌苔目痛鼻乾不得臥心煩躁亂日晡潮熱或陽毒發斑胃熱諸病邪熱盛故脈洪大外無寒邪故不惡寒反惡熱中風有汗傷寒無汗傳入陽明則有汗謂之熱越故陽明病法多汗裡熱故作渴陽明主肌肉故肌熱脈交頞中故目痛脈挾鼻金燥故鼻乾胃不和故臥不安人之陽氣晝日行陽二十五度平旦屬少陽日中屬太陽日晡屬陽明傷寒證中日晡潮熱為胃實無虛證胃熱失下則發斑石膏一斤知母六兩甘草二兩粳米六合先煮石膏數十沸味淡難出再投藥米米熟湯成溫服熱淫於內以苦發之故以知母苦寒為君熱則傷氣必以甘寒為助故以石膏甘草為臣津液內爍故以粳米甘平益氣為使不致傷胃也又煩出於肺躁出於腎石膏清肺而瀉胃火知母清肺而瀉腎火甘草和中而瀉心脾之火或瀉其子肺或瀉其母肺不專治陽明氣分熱也石膏甘草不但清裡兼能發表然必實熱方可用或有血虛身熱脾虛發熱及陰盛格陽面赤煩躁類白虎湯證誤投之不可救也按白虎證脈洪大有力類白虎證脈大而虛以此為辨又按陰盛格陽陽盛格陰二證最為難辨蓋陰盛極而格陽於外外熱而內寒陽盛極而格陰於外外冷而內熱經所謂重陰必陽重陽必陰重寒則熱重熱則寒是也當於小便分之便清者外雖燥熱而中必寒便赤者外雖厥冷而內實熱再看口中燥潤及舌苔淺深蓋舌為心苗應南方火邪在表則未生苔邪入里津液搏結則生苔而滑苔白者丹田有熱胸中有寒邪在半表半裡也熱入漸深則燥而澀熱聚於胃則黃宜承氣及白虎若熱病口乾舌黑乃腎水刑于心火熱益深而病篤矣然亦有苔黑屬寒者舌無芒刺口有津液也又當用溫補之劑尤宜細辨東垣曰邪在陽明肺受火克故用辛寒以清肺所以有白虎之名白虎西方金神也吳鶴皋曰如秋金之令行則夏火之炎退成氏曰立秋後不可服為大寒之劑易老曰有是病則投是藥苟拘於時何以措手若以白虎為大寒承氣又何以行於冬令乎太陽發熱而渴忌白虎表未解也陽明汗多而渴忌五苓豬苓津液大耗也加人參三兩名人參白虎湯仲景治傷寒渴欲飲水無表證者白虎解熱人參生津凡身發熱為熱在表渴欲飲水為熱在裡身熱飲水表裡俱有熱身涼不渴表裡俱無熱欲飲水者不可不與不可過與恣飲則有水結胸心下悸喘咳噦噎腫脹癃祕下利諸變證亦治傷寒無大熱口燥渴心煩背微惡寒者背為陽背惡寒口中和者少陰病也宜附子湯今熱未退而微惡寒為表未全罷尚屬太陽然燥渴心煩為里已熾與白虎湯解表邪清裡熱加人參補氣生津太陽病在表故惡寒少陽在半表半裡亦微惡寒陽明在裡故不惡寒反惡熱間有惡寒者與太陽合病也許叔微曰仲景云傷寒吐下後七八日不解表裡俱熱大渴燥煩者白虎加人參湯主之又云傷寒脈浮發熱無汗其表不解不可與白虎林億校正謂於此表裡瘥矣豫謂不然大抵白虎能除傷寒中暍表裡發熱前後二證或云表裡俱熱或云表熱裡寒皆可服以之一種發熱無汗其表不解全是麻黃與葛根證安可行白虎也亦治太陽中暍身熱汗出惡寒足冷脈微而渴身熱惡寒為在表足冷脈微又不可表亦治火傷肺胃傳為膈消喻嘉言曰肺消以地黃丸治其血分腎消以白虎湯治其氣分病不能除醫之罪也加蒼朮名曰虎加蒼朮湯治濕溫脈沉細者沉細屬濕先受暑後受濕暑濕相搏名濕溫其證脛冷腹滿頭痛身痛多汗渴而譫語李東垣曰動而傷暑火熱傷氣辛苦之人多得之宜人參白虎湯靜而傷暑濕勝身重安藥之人多得之宜蒼朮白虎湯加桂枝名桂枝白虎湯金匱治溫瘧但熱不寒骨節疼痛時嘔除粳米加人參名化斑湯治胃熱發斑脈虛者加柴胡黃芩半夏名柴胡石膏湯治暑嗽喘渴竹葉石膏湯仲景治傷寒解後虛羸少氣氣逆欲吐傷寒解後餘熱未盡津液不足故虛羸少氣虛熱上逆故欲吐亦治傷暑發渴脈虛竹葉二把石膏一斤人參三兩甘草炙二兩麥冬一升半夏粳米半升加姜煎竹葉石膏之辛寒以散餘熱竹葉能止喘促氣逆上衝人參甘草麥冬粳米之甘平以益肺安胃補虛生津半夏之辛溫以豁痰止嘔故去熱而不損其真導逆而能益其氣也又方竹葉石膏木通薄荷桔梗甘草亦名竹葉石膏湯治胃實火盛而作渴士材曰陽明外實則用柴葛以解肌陽明內實則用承氣以攻下此云胃實非有停滯但陽焰勝爾火旺則金囚故以竹葉瀉火以桔梗救金薄荷散火於上木通泄火於下甘草石膏直入戊土而清其中三焦火平則炎蒸退而津液生矣外實經也內實腑也戊土胃也白頭翁湯仲景治傷寒熱利下重欲飲水者陽熱之利與陰寒不同陰利宜理中四逆溫臟陽利糞色必焦黃熱臭便出作聲臍下必熱宜涼藥白頭翁二兩秦皮黃連黃柏三兩白頭翁苦寒能入陽明血分而涼血止澼秦皮苦寒性澀能涼肝益腎而固下焦漬水色青故能入肝除熱黃連涼心清肝黃柏瀉火補水並能燥濕止利取其寒能勝熱苦能堅腎澀能斷下也徐忠可曰此主熱利下重蓋下陷則傷陰陰傷則血熱雖後重而不用調氣之藥病不在氣爾周揚俊曰邪傳厥陰少陽其表也臟腑相連於法禁下故但謀去其熱熱除而是利自止矣甘桔湯金匱名桔梗湯治少陰咽痛喉痹肺癰吐膿乾咳無痰火鬱在肺手少陰心脈挾咽足少陰腎脈循喉嚨火炎則痛經曰一陰一陽結謂之喉痹一陰少陰君火一陽少陽相火也金匱云熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成難治火鬱在肺則乾咳無痰甘草二兩桔梗一兩或等分王好古加減法失音加訶子聲不出加半夏上氣加陳皮涎嗽加知母貝母咳渴加五味酒毒加葛根少氣加人參嘔加半夏生薑吐膿血加紫菀肺痿加阿膠胸膈不利加枳殼痞滿加枳實目赤加梔子大黃面腫加茯苓膚痛加黃耆發斑加荊芥防風痰毒加牛蒡子大黃不得眠加梔子甘草甘平解毒而瀉火桔梗苦辛清肺而利膈又能開提氣血表散寒邪排膿血而補內漏故治咽痛喉痹肺癰咳嗽取其辛苦散寒甘平除熱也金匱曰咳而胸滿振寒咽乾不渴時出濁唾腥臭為肺癰此湯主之喻嘉言曰此上提之法乘其新起提其敗血或從唾出或從便出足以殺其毒此因胸滿振寒不渴病尚在表用此開提肺氣若勢已入里又當引之從胃入腸此法不中用矣綱目曰喉痹惡寒為寒閉於外熱鬱於內忌用膽礬等劑點喉使陽郁不得伸又忌硝黃等寒劑下之使陽邪陷里宜用表藥提其氣升以助陽也如不惡寒脈滑實者又當用寒劑下之酸劑收之也外臺祕要曰五臟之尊心雖為主而肺居其上肺為華蓋下覆四臟合天之德通達風氣性愛溫而惡寒心火更炎上蒸其肺金被火傷則葉萎倚著於肝肝發癢則嗽因心肝虛弱不能傳陽於下焦遂至正陽俱躋變成嗽矣肺主皮毛遇寒則栗而粟起肺嗽因萎倚著於肝而成病由木能扣金與鳴也先養肺抑心肝虛熱和其腎則愈矣除桔梗名甘草湯金匱治同加防風名甘桔防風湯治同加防風荊芥連翹名如聖湯宋仁宗治上焦風熱加訶子和童便服名訶子清音湯治中風不語肺屬金主音金空則有聲風痰壅塞則不能言訶子斂肺清痰散逆破結桔梗利肺氣甘草和元氣童便降火潤肺或加木通以利機竅也足少陰腎脈挾舌本足太陰脾脈連舌本手少陰心別脈系舌本三經虛則痰涎塞其脈道舌不轉運而不能言或三脈亡血舌無血榮養而喑舌喑者中風不能轉運之類而咽喉聲音如故喉喑者勞嗽失音之類而舌本則能轉運言語也除甘草加枳殼名枳桔湯治胸中痞塞噫氣吐酸或咳枳殼桔梗苦下氣而散痞寒消熱而除咳活人云傷寒應發汗反下之遂成痞枳實理中丸最良審知是痞先用枳桔湯尤妙緣桔梗枳殼行氣下膈也加連翹薄荷竹葉梔子黃芩名桔梗湯治上焦壅熱喉痹熱腫又方桔梗桑皮貝母栝蔞當歸枳殼苡仁防己一作防風各五分黃耆七分杏仁百合甘草各三分加姜煎亦名桔梗湯濟生治肺癰吐膿嗌乾多渴保陰煎治男婦帶濁遺淋色赤帶血脈滑多熱便血不止及血崩血淋或經期太早凡一切陰虛內熱動血等證生地熟地芍藥二錢山藥川續斷黃芩黃柏錢半生甘草一錢如小水多熱或兼怒火動血者加焦梔子一二錢如夜熱身熱加地骨皮一錢五分如肺熱多汗者加麥冬地骨皮血熱甚者加黃連一錢五分如血虛血滯筋骨腫痛者加當歸二三錢如氣滯而痛者去熟地加青皮陳皮丹皮香附之屬如血脫血滑及便血久不止者加地榆一二錢或烏梅一二個或百藥煎一二錢文蛤亦可如少年或氣血正盛者不必用熟地山藥如肢節筋骨疼痛或腫者加秦艽丹皮各一二錢滋腎丸東垣又名通關丸治下焦邪熱口不渴而小便祕及腎虛蒸熱腳膝無力陰痿陰汗衝脈上衝而喘腎中有水有火水不足則火獨治故虛熱肝腎虛而淫熱壅於下焦故腳膝無力陰痿陰汗衝脈起於二陰之交直衝而上至胸水不制火故氣逆上而喘黃柏酒炒二兩知母酒炒一兩桂一錢蜜丸小便者足太陽膀胱所主生於肺金肺中伏熱水不能生是絶小便之源也渴而小便不通者肺氣不得降是也故用清燥金之正化氣薄淡滲之藥淡滲之藥若二苓澤瀉琥珀燈心木通車前瞿麥萹蓄之類皆能清金瀉火瀉火而清肺滋水之化源也若熱在下焦而不渴是絶其流而溺不泄也須用氣味俱厚陰中之陰藥治之王善夫病小便不通漸成中滿腹堅如石腿裂出水夜不得眠不能飲食東垣診治歸而至旦不寐因記素問曰無陽則陰無以生無陰則陽無以化又云膀胱者州都之官津液藏焉氣化則能出矣此病癃祕是無陰則陽無以化也此因膏粱積熱損傷腎水火又逆上而為嘔噦內關外格之證悉具死在旦夕矣遂處北方大苦寒之劑黃柏知母各一兩桂一錢為引須臾前陰如刀刺火燒溺如瀑泉腫脹遂消此證一在上焦氣分而渴一在下焦血分而不渴二者之殊至易辨兩又曰凡病在下焦皆不渴血中有濕故不渴也若膀胱陽虛陰無以化又當用八味腎氣丸按消渴證以渴為主而分氣血故血分亦有渴者淋證以淋為主而分氣血故血分亦有不渴者去桂名療腎滋本丸治腎虛目昏去桂加黃連名黃柏滋腎丸治上熱下冷陽極似陰水衰心煩單黃柏一味名大補丸治腎虛膀胱虛熱腰股痛而足心熱為末薑汁酒調服名潛行散治痛風腰以下濕熱流注升陽散火湯東垣治肌熱表熱四肢發熱骨髓中熱熱如火燎捫之烙手此病多因血虛得之及胃虛過食冷物抑遏陽氣於脾土並宜服此柴胡八錢防風二錢半葛根升麻羌活獨活人參白芍五錢炙甘草三錢生甘草二錢每服五錢加薑棗煎柴胡以發少陽之火為君升葛以發陽明之火羌活以發太陽之火獨活以發少陰之火為臣此皆味薄氣輕上行之藥所以升舉其陽使三焦暢遂而火邪皆散矣人參甘草益脾土而瀉熱芍藥瀉脾火而斂陰且酸斂甘緩散中有收不致有損陰氣為佐使也吳鶴皋曰經曰少火生氣天非此火不能生物人非此火不能有生揚之則光遏之則天今為飲食抑遏則生道幾乎息矣使清陽出上竅則濁陰自歸下竅而飲食傳化無抑遏之患矣東垣聖於脾胃治之必主升陽俗醫知降而不知升是撲其少火也安望其衛生耶又曰古人用辛散每佐以酸收故桂枝湯中亦用芍藥獨兵家之節制也除人參獨活加蔥白名火鬱湯治同火愈者內熱外寒脈沉而數火愈無焰故外寒沉為在裡沉而數知為內熱也陶節奄升陽散火湯人參白朮茯神甘草陳皮麥冬當歸芍藥柴胡黃芩加薑棗金器煎治傷寒叉手冒心循衣摸床譫語昏沉不省人事節庵曰俗醫不識誤認風證不知此乃肝熱乘肺元氣虛衰不能主持名撮空證小便利者可治有痰加姜炒半夏大便燥實譫語發渴加大黃泄瀉加白朮升麻陽虛故叉手自冒其心熱昏其神故循衣摸床小便利則肺氣猶降膀胱猶能化氣而腎水未枯故可治抽薪飲治諸凡火盛而不宜補者黃芩石斛木通梔子炒黃柏五錢枳殼錢半細甘草三分煎成食遠溫服如熱在經絡肌膚者加連翹天花粉以解之熱在血分大小腸者加槐蕊黃連以清之熱在陽明頭面或躁煩便熱者加生石膏以降之熱在下焦小水痛澀者加草龍膽車前以利之熱在陰分津液不至者加麥冬生地芍藥之類以滋之熱在腸胃實結者加大黃芒硝以通之徙薪飲治三焦氣火一切內熱漸覺而未甚者先宜清以此劑其甚者宜抽薪飲黃芩二錢麥冬芍藥黃柏茯苓丹皮錢半陳皮八分如多鬱氣逆傷肝脅肋疼痛或致動血者加青皮梔子龍膽瀉肝湯局方治肝膽經實火濕熱脅痛耳聾膽溢口苦筋痿陰汗陰腫陰痛白濁溲血脅者肝膽之部也火盛故作痛膽脈絡於耳故聾肝者將軍之官也謀慮出焉膽者中正之官也決斷出焉膽虛數慮而不決膽氣上溢故口為之苦肝主筋濕熱勝故筋痿肝脈絡於陰器故或汗或腫或痛白濁溲血皆肝火也龍膽草酒炒黃芩炒梔子酒炒澤瀉木通車前子當歸酒洗生地黃酒炒柴胡生甘草龍膽瀉厥陰之熱肝柴胡平少陽之熱膽黃芩梔子清肺與三焦之熱以佐之澤瀉瀉腎經之濕木通車前瀉小腸膀胱之濕以佐之然皆苦寒泄之藥故用歸地以養血而補肝用甘草以緩中而不使傷胃為臣使也東垣無黃芩梔子甘草亦名龍膽瀉肝湯治前陰熱癢臊臭此因飲酒風濕熱合於下焦為邪厥陰肝脈絡於陰器柴胡入肝為引澤瀉車前木通利小便亦除臊氣所謂在下者因而竭之生地龍膽苦寒以瀉濕熱肝主血當歸以滋肝血不足也一方除當歸生地木通澤瀉車前加人參五味天冬麥冬黃連知母亦名龍膽瀉肝湯治筋痿攣急口苦爪枯亦治前證加人參者扶土所以抑木用二冬五味者清金亦以平木潤燥所以養筋用黃連知母者上以瀉心火下以瀉腎火一為肝子一為肝母也清流飲治陰虛挾熱瀉利或喜冷或發熱或下純紅鮮血或小水赤痛等症生地黃芍藥茯苓澤瀉二錢當歸一二錢黃芩黃連一錢五分枳殼甘草一錢如熱甚者加黃柏小水熱痛者加梔子燥渴者加花粉麥冬當歸龍薈丸宣明治一切肝膽之火神志不寧驚悸搐搦躁擾狂越頭暈目眩耳鳴耳聾胸膈痞塞咽嗌不利腸胃燥澀兩脅痛引少腹肝移熱於肺而咳嗽肝屬風木主筋主怒主驚故搐搦驚狂皆屬肝火目為肝竅膽脈絡於耳二經火盛故目眩耳聾心脈挾咽歷膈腎脈貫膈循喉嚨水衰火盛故膈咽不利兩脅少腹皆肝膽經所循故相引而痛五臟六腑皆有咳然必傳以與肺肝之移邪則為肝咳亦治盜汗盜汗屬熱此與當歸六黃湯同意當歸酒洗龍膽草酒洗梔子炒黑黃連炒黃蘗炒黃芩炒一兩大黃酒浸青黛水飛蘆薈五錢木香二錢麝香五分蜜丸薑湯下肝木為生火之本肝火盛則諸經之火相因而起為病不止一端矣故以龍膽青黛直入本經而折之而以大黃芩連梔柏通平上下三焦之火也蘆薈大苦大寒氣臊入肝能引諸藥同入厥陰先平其甚者而諸經之火無不漸平矣諸藥苦寒已甚當歸辛溫能入厥陰和血而補故以為君少加木香麝香者取其行氣通竅也然非實火不可輕投化陰煎治水虧陰涸陽火有餘小便癃閉淋濁疼痛等證生地熟地牛膝豬苓澤瀉生黃柏生知母二錢緑豆三錢龍膽草一錢五分車前子一錢加食鹽少許若水虧居多而陰氣大有不足者可適加熟地用至一二兩亦可瀉青丸錢乙治肝火鬱熱不能安臥多驚多怒筋痿不起目赤腫痛肝屬風木木盛生火故發熱多甚於寅卯木旺之時按之在肉之下骨之上為肝熱肝膽之經行於兩脅風火干之故臥不安肝在志為怒故多怒肝虛膽怯故多驚肝主筋逢熱則縱故痿目為肝竅熱發於目故腫痛方見卷六上祛風門肝者將軍之官風淫火熾不易平也龍膽大黃苦寒味厚沉陰下行直入厥陰而散瀉之所以抑其怒而折之使下也羌活氣雄防風善散並能搜肝風而散肝火所以從其性而升之於上也少陽火鬱多煩躁梔子能散三焦鬱火而使邪從小便下行少陽火實多頭痛目赤川芎能上行頭目而逐風邪且川芎當歸皆血分之藥能養肝血而潤肝燥血虛故肝燥肝燥故多怒多驚又皆血中氣藥辛能散而溫能和一瀉一散一補同為平肝之劑故曰瀉青然必壯實之人方可施用餘子容曰時醫多執肝常有餘之說舉手便云平肝按聖濟經云原四時所化始於木究十二經之所食養於春女子受孕一月是厥陰肝經養之肝者乃春陽發動之始萬物生化之源故戒怒養陽使先天之氣相生於無窮是攝生之切要也不可泥於此說內經六節藏象論曰所謂得五行時之勝各以氣命其臟求其勝也皆歸始春蓋春屬肝木乃吾身升生之氣此氣若有不充則四臟何所稟承如春無所生則夏長秋收冬藏者何物乎五行之中唯木有發榮暢茂之象花葉茜蔥豔麗而可愛結果成實食之以全生皆此木也使天地而無木則世界黯淡無色矣由是言之培之養之猶恐不暇而尚欲剪之伐之乎外臺祕要曰五行五臟皆互相生肝雖處中而為臟首位在甲乙懷養懷仁故應春而王也為心之母餘臟循次而生焉人參瀉肺湯治肺經積熱上喘咳嗽胸膈脹滿痰多大便澀人參黃芩梔子仁枳殼薄荷甘草連翹杏仁去皮尖桑白皮大黃桔梗按人參肺熱反能傷肺此清肺經積熱以人參瀉肺立名可見瀉其肺熱必不可傷其肺氣也況人參之溫以一味清涼監之有餘如此大隊寒下之藥不推之為君其敢用乎瀉白散錢乙治肺火皮膚蒸熱肺主皮膚輕按即得重按全無是熱在皮毛灑淅寒熱邪在膚腠日晡尤甚申酉時燥金正旺之時喘嗽氣急肺苦氣上逆桑白皮地骨皮各一錢甘草五分粳米百粒桑白皮甘辛而寒行水降火瀉肺氣之有餘除痰止嗽能利二便而療熱渴地骨皮寒瀉肺中之伏火淡泄肝腎之虛熱涼血退蒸甘草瀉火而益脾粳米清肺而補胃並能瀉熱從小便出肺主西方故曰瀉白時珍曰此瀉肺諸方之準繩也瀉白散瀉肺氣分之火黃芩一物湯丹溪清金丸瀉肺金血分之火清金丸即黃芩炒為末水丸加人參五味茯苓青皮陳皮名加減瀉白散東垣治咳嗽喘急嘔吐加知母黃芩桔梗青皮陳皮亦名加減瀉白散寶鑑治咳而氣喘煩熱口渴胸膈不利除甘草粳米加黃芩知母麥冬五味桔梗亦名加減瀉白散羅謙甫治過飲傷肺氣出腥臭唾涕稠黏嗌喉不利口苦幹燥原文云桑皮地骨味苦微寒降肺中伏火而止嗽為君黃芩知母苦寒治氣出腥臭清肺利氣為臣五味酸溫以收肺氣麥冬苦寒治唾涕稠黏口苦幹燥為佐桔梗辛溫輕浮治痰逆利咽膈為使也利膈散治脾肺大熱虛煩上壅咽喉生瘡雞蘇葉荊芥穗防風桔梗牛蒡子炒人參甘草等分為末每服二錢不拘時沸湯點服咽喉口瘡甚加殭蠶按此方清上焦熱全用辛涼輕清之氣不雜苦寒降下之味其見甚超較涼膈散諸方為更勝化肝煎治怒氣傷肝而因氣逆動火致為煩熱脅痛動血等證青皮陳皮白芍二錢澤瀉如血見下部者以甘草代之梔子炒丹皮一錢五分土貝母二三錢如大便下血者加地榆小便下血者加木通各一錢五分如兼寒熱者加柴胡一錢如火盛加黃芩一二錢如脅腹痛脹加白芥子一錢脹滯多者勿用芍藥導赤散錢乙治小腸有火便赤淋痛面赤狂躁口糜舌瘡咬牙口渴心與小腸相表裡心熱則小腸亦熱故便赤淋痛心屬君火是五臟六腑火之主故諸經之熱皆應於心面赤煩躁咬牙口渴皆心熱也舌為心苗若心火上炎熏蒸於口則口糜口瘡輕手按至皮毛之下肌肉之上則熱日中大甚是熱在血脈為心熱心火亢甚小腸鬱結不能通利者此方主之如治白濁沙淋等證合逍遙散生地黃木通甘草梢淡竹葉生地涼心血竹葉清心氣葉生竹上故清上焦木通降心火入小腸君火宜木通相火宜澤瀉行水雖同所用各別君心火也相腎火也草梢達莖中而止痛便赤淋痛以共導丙丁之火由小水而出也小腸為丙火心為丁火心熱泄小腸釜底抽薪之義也易老用導赤散合五苓散治口糜神效經曰膀胱移熱於小腸膈腸不便上為口糜亦有用附子理中湯者因脾胃虛衰之火被逼上炎故用參朮甘草補其土姜附散其寒則火得所助接引退舍矣綱目曰心氣熱則上竄宜導赤散腎氣虛則下竄宜地黃丸天門冬散治肺壅腦熱鼻乾大便祕澀天門冬去心皮桑白皮升麻大黃枳殼麩炒甘草荊芥按此方藥味較人參瀉肺湯為少減然用升麻且升且降以散上焦壅熱可取清胃散東垣治胃有積熱上下牙痛牽引頭腦滿面發熱其牙喜寒惡熱或牙齦潰爛或牙宣出血或唇口頰腮腫痛足陽明胃脈循鼻外入上齒中挾口環唇循頰車上耳前主上牙齦喜寒飲而惡熱手陽明大腸脈上頸貫頰入下齒挾口主下牙齦喜熱飲而惡寒足陽明別絡腦故腦痛陽明之脈營於面故面熱二經熱盛故唇口齒頰病面腫痛也齒為骨屬腎牙宣牙齦出血或齒縫出血也亦名齒衄乃腎病若血多而湧出不止為陽明熱盛以陽明多氣多血也唇屬脾胃大腸經燥則干熱則裂風則瞤寒則揭若腫皴裂如蠶繭名曰繭唇唇吞者肌肉之本也人中平滿者為唇反唇反肉先死生地黃牡丹皮黃連當歸升麻一方加石膏黃連瀉心火亦瀉脾火脾為心子而與胃相表裡者也當歸和血生地丹皮涼血以養陰而退陽也石膏瀉陽明之大熱升麻升陽明之清陽清升熱降則腫消而痛止矣薛新甫曰濕熱甚而牙痛者承氣湯輕者清胃散大腸熱而齦腫痛者清胃散甚者調胃湯六鬱而痛者越鞠丸中氣虛而痛者補中益氣湯思慮傷脾而痛者歸脾湯腎經虛熱而痛者六味丸腎經虛寒而痛者還少丹重則八味丸甚屬風熱者獨活散茵陳散風寒入腦者羌活附子湯當臨時制宜附獨活散獨活羌活川芎防風各五錢細辛荊芥薄荷生地各二錢每服三錢玉女煎治水虧火勝六脈浮洪滑大少陰不足陽明有餘煩熱乾渴頭痛牙疼失血等證其效如神若大便溏泄者大非所宜生石膏三五錢熟地三五錢或一兩麥冬二錢知母牛膝一錢五分如火之盛極者再加梔子地骨皮之屬亦可如多汗多渴者加五味子十四粒如小水不利或火不能降者加澤瀉一錢五分或茯苓亦可如金水俱虧因精損氣者加人參二三錢尤妙瀉黃散治脾胃伏火口燥唇乾口瘡口臭煩渴易飢熱在肌肉口為脾竅唇者脾之外候口燥唇乾口瘡口臭皆屬脾火脾熱故煩熱易飢病名中消脾主肌肉故熱在肉分輕按重按皆不熱不輕不重乃得之遇夜尤甚者為脾熱實熱宜此湯及調胃承氣虛熱宜補中益氣湯按面上熱身前熱一身盡熱狂而妄言妄見皆足陽明肩背及熱足外廉脛踝後熱皆足太陽口熱舌乾中熱而喘足下熱而痛皆足少陰肩上熱項似拔耳前熱若寒皆手太陽身熱膚痛手少陰淋灑淅寒熱手太陰掌中熱手太陰少陰厥陰熱而筋縱不收陰痿足陽明厥陰又曰胃居臍上胃熱則臍以上熱腸居臍下腸熱則臍以下熱肝膽居脅肝膽熱則脅亦熱肺居胸背肺熱則胸背亦熱腎居腰腎熱則腰亦熱可類推也防風四兩藿香七錢山梔炒黑一兩石膏五錢甘草二兩上末微炒香酒調服山梔清心肺之火使屈曲下行縱小便出藿香理脾肺之氣去上焦壅熱辟惡調中石膏大寒瀉熱兼能解肌甘草甘平和中又能瀉火重用防風者取其升浮能發脾中伏火又能於土中瀉木也木盛剋土防風能散肝火吳鶴皋曰或問脾中有伏火何以不用黃連余曰燥矣又問既惡燥何以用防風余曰東垣有言防風乃風藥中潤劑也李東垣曰瀉黃散非瀉脾也脾中瀉肺也實則瀉其子以脾為生肺之上源故用石膏梔子之類錢乙瀉黃散白芷防風升麻枳殼黃芩錢半石斛一錢二分半夏一錢甘草七分治同前證或唇口皺瞤燥裂脾之華在唇瞤動也風也皴裂火也白芷升麻皆陽明藥防風祛風而散脾火燥在口唇故從其性而升發之也黃芩瀉中上之熱枳殼利中上之氣半夏能燥能潤發表開鬱石斛清脾平胃退熱補虛甘草和脾兼能泄火亦火鬱發之之義也地黃煎治積熱地黃汁四升三合茯神知母葳蕤四兩栝蔞根生薑汁鮮地骨皮生麥冬汁白蜜二升石膏八兩竹瀝三合上㕮咀以水一斗零二升先煮諸藥取汁三升去渣下竹瀝地黃麥冬汁緩火煎四五沸下蜜薑汁微火煎至六升初服四合日三服夜一服加至五七合四五月作散服之按此方生津涼血制火徹熱兼擅其長再加人參乃治虛熱之聖方也左金丸又名茱連丸治肝膽鬱火左脅作痛或胸脅痛不可忍吞酸吐酸筋疝痞結酒濕發黃肝火盛則脅痛吞酸吐酸亦由肝火上干肺胃從木之化故酸厥陰之脈絡陰器濕熱干之則成筋疝肝木過盛剋制脾土則成痞結亦治噤口痢湯藥入口即吐加糯米一撮濃煎但得三匙下咽即不復吐矣黃連六兩薑汁炒吳茱萸一兩鹽水泡水丸肝實則作痛心者肝之子實則瀉其子故用黃連瀉心清火為君使火不剋金金能制木則肝平矣吳茱辛熱能入厥陰肝行氣解鬱又能引熱下行故以為反佐一寒一熱寒者正治熱者從治以熱治熱從其性而治之亦曰反治故能相濟以立功也肝居於左肺居於右左金者謂使金令得行於左而平肝也東垣曰病機云諸嘔吐酸皆屬於熱此上焦受外來客邪也以雜病論之嘔吐酸水者甚則酸水浸其心次令牙酸不能相對以大辛熱療之必減若病機作熱攻之誤矣或問吞酸素問以為熱東垣以為寒何也丹溪曰吐酸與吞酸不同吐酸吐出酸水如醋平時津液隨上升之氣鬱而成積濕中生熱故隨木化遂作酸味非熱而何其有郁之久伏於腸胃之間咯不得上咽不得下肌表得風寒則內熱愈郁而酸味刺心肌表溫暖腠理開發或得香熱湯丸汁液得行亦可暫解非寒而何素問言熱言其體位東垣言寒言其末也豫當治吞酸用黃連吳茱制炒隨時令迭為佐使蒼朮茯苓為輔蒸餅為丸吞之仍教糖食蔬果自養則病易安丹溪之論亦未暢盡總之此證有熱有寒不可執一戴氏曰房勞腎虛之人胸膈多有脹痛此因腎虛不能納氣氣虛不能生血之故氣與血猶水也盛則流暢虛則未有不滯者所以作痛宜破故紙之類補腎芎歸之類補血若作尋常脅痛治則殆矣加炒芩蒼朮陳皮亦名茱連丸治同加芍藥等分為丸名戊己丸治熱痢熱瀉熱瀉者糞黃肛澀也戊為胃土己為脾土加芍藥伐肝瀉水使不克脾土除吳茱萸加附子一兩名連附六一湯治胃脘痛寒因熱用也用黃連一味吳茱萸浸一宿為丸名抑青丸大瀉肝火治左脅作痛單黃連煎服名瀉心湯治心熱約陰丸治婦人血海有熱經脈先期及過多者或兼腎火而帶濁不止及男婦大腸血熱便紅等證當歸白朮炒白芍酒炒生地茯苓地榆黃芩白石脂醋煅淬北五味丹皮續斷等分為細末煉蜜丸服火盛者加黃連兼肝腎之火盛者加知母黃柏各等分大腸血熱便紅者加黃連防風各等分導赤各半湯節庵治傷寒後心下不硬腹中不滿二便如常身無寒熱漸變神昏不語或睡中獨語目赤口乾不飲水與粥則咽不與勿思形如醉人名越經證傷寒不硬不滿二便如常病不在腑也神昏睡語不思食形如醉人此邪熱傳於手少陰心心火上而逼肺也邪熱入里故目赤舌乾邪熱在陰故不渴此證自足而傳手經故曰越經黃連黃芩犀角知母山梔滑石麥冬人參甘草茯神加燈心薑棗煎陳來章曰熱入心經涼之以黃連犀角梔子心熱上逼於肺清之以黃芩知母麥冬泄之以滑石甘草燈心者欲使心肺之邪熱從小腸膀胱出也故亦曰導赤然邪之越經而傳於心者以心神本不足也故又加人參茯神以補之消毒犀角飲治大人小兒內蘊邪熱痰涎壅甚腮項結核口舌生瘡及遍生瘡癤已潰未潰並宜服之犀角磨沖防風荊芥穗一錢鼠黏子炒二錢炙甘草一錢按此方專清上焦蘊熱與利膈散略同彼可多服此可暫服爾蓮子清心飲局方治憂思抑鬱發熱煩躁或酒色過度火盛剋金口苦咽乾漸成消渴遺精淋濁過勞即發四肢倦怠五心煩熱夜靜晝甚及女人崩帶煩躁遺精淋濁者心虛而有熱也心火妄動不能下交於腎故元精失守也過勞即發為勞淋勞則動其心火也晝偏熱者陽虛也崩中由損傷衛任氣血俱虛經曰陰虛陽搏謂之崩由陰虛而陽搏之血得熱而妄行也帶者病本於帶脈而得名赤屬血白屬氣由陰虛陽竭營氣不升衛氣下陷或濕痰濕熱蘊積而下流也石蓮肉人參黃耆茯苓柴胡三錢黃芩炒地骨皮麥冬車前子甘草炙二錢空心服參耆甘草所以補陽虛而瀉火東垣曰參耆甘草瀉火之聖藥助氣化而達州都膀胱也氣化則能出地骨退肝腎之虛熱柴胡散肝膽之火邪黃芩麥冬清熱於心肺上焦茯苓車前利濕於膀胱下部中以石蓮清心火而交心腎則諸證悉退也服蠻煎此方性味極清極輕善入心肝二臟行滯氣開鬱結通神明養正除邪大有奇妙生地麥冬白芍石菖蒲石斛丹皮茯神二錢陳皮一錢木通知母一錢五分如痰勝多郁者加貝母二錢痰盛兼火者加膽星一錢五分陽明火盛內熱狂叫者加石膏二三錢便結脹滿多熱者加元明粉二三錢調服或漸加大黃亦可氣虛神困者加人參隨宜普濟消毒飲東垣治大頭天行初覺憎寒體重次傳頭面腫盛口不能開上喘咽喉不利口渴舌燥俗云大頭天行親戚不相訪問染者多不救泰和間多有病此者醫以承氣加藍根下之稍緩翌日如故下之又緩終莫能愈漸至危篤東垣視之曰夫身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭面為腫盛以承氣瀉胃中之實熱是為誅伐無過病以適至其所為故遂處此方全活甚衆遂名普濟消毒飲子黃芩酒炒黃連酒炒五錢陳皮去白生甘草元參柴胡桔梗二錢連翹板藍根馬勃鼠黏子薄荷一錢殭蠶升麻七分為末湯調時時服之或蜜拌為丸噙化一方無薄荷有人參三錢亦有加大黃治便祕者或酒浸或煨用芩連苦寒瀉心肺之熱為君元參苦寒橘紅苦辛甘草甘寒瀉火補氣為臣連翹薄荷鼠黏辛苦而平藍根甘寒馬勃殭蠶苦平散腫消毒定喘為佐升麻柴胡苦平行少陽陽明之陽氣不得伸桔梗辛溫為舟楫不令下行為載也此解本之東垣而稍加刪潤然十書中無此方見於準繩約營煎治血熱便血無論脾胃大小腸膀胱等證皆可用生地芍藥續斷地榆黃芩槐花荊芥穗炒焦烏梅一個如火盛者加梔子黃連膽星之屬如氣虛者加人參白朮如氣陷者加升麻防風紫雪局方治內外煩熱不解狂易叫走發斑發黃口瘡腳氣瘴毒蠱毒熱毒藥毒黃金百兩寒水石石膏滑石磁石三斤水煮搗煎去渣入後藥升麻元參一斤甘草炙半斤犀角羚羊角沉香木香五兩丁香一兩並搗銼入前藥汁中煎去渣入後藥朴硝硝石二斤提淨入前藥汁中微火煎不住手將柳木攪候汁欲凝再加入後二味辰砂三兩研細麝香當門子一兩二錢研細入前藥拌勻合成退火氣冷水調服每一二錢本事方無黃金寒水石石膏滑石硝石以瀉諸經之火而兼利水為君磁石元參以滋肺腎為臣犀角羚角以清心寧肝升麻甘草以升陽解毒沉香丁香木香以溫胃調氣麝香以透骨通竅丹砂黃金以鎮驚安魂瀉心肝之熱為佐使諸藥用氣硝獨用質者以其水滷結成性峻而易消以瀉火而散結也碧雪治一切積熱咽喉口舌生瘡心中煩躁咽物妨悶致咽閉壅塞及天行時熱發狂昏憒芒硝朴硝硝石馬牙硝青黛石膏寒水石研水飛甘草等分將甘草煎湯二升去渣入諸藥再煎用柳木棍不住手攪令消溶得所入青黛和勻傾入砂盆內候冷結凝成霜研為細末每用少許含化津咽不拘時候如覺喉壅閉塞不能吞物即以小竹筒吹藥入喉中即愈按此方仿紫雪之制而不用黃金犀羚等貴重之藥亦為簡便人參清肌散治午前潮熱氣虛無汗熱發午前陽虛而陰火乘之也火燥熱鬱故無汗經曰陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒按此有餘乃病邪有餘陰陽和則無病過中則皆病也經又曰陽盛生外熱陰盛生內寒皆亢則為害非真陰真陽盛也人參白朮茯苓甘草炙半夏曲當歸赤芍藥柴胡乾葛加薑棗煎四君以補陽虛歸芍以調陰血半夏和胃而行痰柴葛升陽而退熱蓋以甘溫瀉火甘溫能除大熱辛溫活血汗即血也辛甘解肌有汗宜實表有汗宜解肌此之無汗與傷寒無汗不同故但解其肌熱而不必發出其汗也前藥各一兩加黃芩五錢每服三錢加薑棗煎名人參散許叔微治邪熱客於經絡痰嗽煩熱頭痛目昏盜汗倦怠一切血熱虛勞喻嘉言曰此邪熱淺在經絡未深入臟腑雖用柴葛之輕金藉參朮之力以達其邪又恐邪入痰隧用茯苓半夏兼動其痰合之當歸赤芍黃芩並治其血中之熱止用三錢為劑蓋方成和約庶敢用柴胡乾葛爾白朮除濕湯東垣治午後發熱背惡風四肢沉困小便色黃又治汗後發熱午後發熱熱在陰分陽陷陰中也背為陽腹為陰背惡寒者陽不得伸也脾主四肢四肢沉困濕勝而脾不運也小便黃濕兼熱也汗後而熱不退或陰虛或陽虛也人參赤茯苓甘草炙柴胡五錢白朮一兩生地黃地骨皮知母澤瀉七錢每服五錢如有刺痛加當歸七錢小便利減苓瀉一半陽陷陰中熱在血分故以生地滋其少陰而以知母地骨瀉血中之伏火也柴胡升陽以解其肌陽陷陰中故以柴胡提出其陽苓瀉利濕兼清其熱參朮甘草益氣助脾氣足陽升虛熱自退脾運而濕亦除矣方名除濕而治在退熱欲熱縱濕中而下降也石膏散外臺治勞熱骨蒸四肥微瘦有汗脈長者此指勞熱因陽邪入里傳為骨蒸令人先寒後熱漸成羸瘦者有汗胃實也脈長陽明證也石膏研細每夕新汲水服方寸匕取熱退為度石膏大寒質重能入里降火味辛氣輕能透表解肌雖寒而甘能緩脾火勞有實熱者非此不為功故外臺祕要名醫別録皆載之玄珠曰五行六氣水特其一爾一水既虧豈能勝五火哉醫不知邪氣未除便用補劑邪氣得補便入經絡至死不悟夫涼劑能清火養水熱劑能補火燥水理易明也勞為熱證明矣尚可補乎唯無熱無積之人脈微無力方可補之必察其胃中及右腎二火俱虧後用補劑可也證治要訣云治虛勞獨用熱藥者猶釜中無水而進火也過用冷藥者猶釜下無火而添水也非徒無益而又害之玉泉散亦名六一甘露散治陽明內熱煩渴頭痛二便祕結瘟疫斑黃及熱痰喘嗽等證石膏六兩生用粉甘草一兩為細末每服一二三錢新汲水或熱湯或人參湯調下或加硃砂三錢此益元散之變方也其功倍之清骨散治骨蒸勞熱火炎水虧真陰消爍故肌骨之間蒸蒸而熱也東垣曰晝熱夜靜者是陽氣旺於陽分也晝靜夜熱者是陽氣陷入陰中也名曰熱入血室晝夜俱熱者是重陽無陰也當急瀉其陽峻補其陰晝病則在氣夜病則在血銀柴胡錢半胡黃連秦艽鱉甲童便炙地骨皮青蒿知母一錢炙甘草五分地骨胡連知母之苦寒能除陰分之熱而平之於內柴胡秦艽青蒿之辛寒能除肝膽之熱而散之於表鱉陰類而甲屬骨能引諸藥入骨而補陰甘草甘平能和諸藥而退虛熱也二母散治肺癆有熱不能服補氣之劑者肺虛挾火或咳嗽發熱陰虛已甚再服補陽之藥則火益亢而陰愈虧故有雖病虛勞不能服溫補藥者知母貝母等分炒為末火旺爍金肺癆熱能受溫補者易治不能受溫補者難治故又設此法以滋陰用貝母化痰瀉肺火知母滋腎清肺金取其苦寒勝熱潤能去燥也元參升麻湯治發斑咽痛發斑者陽明胃熱也咽痛者太陰肺火也元參升麻甘草等分升麻能入陽明升陽解毒元參能入太陰清金制火甘草甘平能散能和故可利咽散斑也除元參加犀角射干黃芩人參名陽毒升麻湯治陽毒發斑頭項背痛狂躁罵詈咽腫吐血溫服取汗消斑青黛飲節庵治傷寒熱邪傳裡裡實表虛陽毒發斑血熱不散蒸於皮膚則為斑形如錦紋紫黑者熱極而胃爛也多死此或因陽證誤投熱藥或因下早表熱乘虛入胃或因下遲熱留胃中皆發斑有陰證發斑者元氣大虛寒伏於下逼其無根失守之火上獨熏肺傳於皮膚淡紅而稀少也宜大建中湯誤投寒劑則殆矣青黛黃連犀角石膏知母元參梔子生地黃柴胡人參甘草加薑棗煎入苦酒醋也一匙和服發斑雖由胃熱亦諸經之火有以助之青黛黃連以清肝火梔子元參以清心肺之火知母生地以清腎火犀角石膏以清胃火此皆大寒而能解鬱熱之毒者引以柴胡使達肌表柴胡清少陽相火使以薑棗以和營衛其用人參甘草者以和胃也胃虛故熱毒乘虛入里而發於肌肉也加苦酒者其酸收之義乎蒼耳散無擇治鼻淵鼻流濁涕不止名鼻淵乃風熱爍腦而液外滲也經曰腦滲為涕又曰膽移熱於腦則辛頞鼻淵即山根辛頞痠痛也原病式曰如以火爍金熱極則反化為水肝熱甚則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾皆火熱盛極消爍以致之也白芷一兩薄荷辛夷各五錢蒼耳子炒二錢半為末食前蔥茶湯調下二錢凡頭面之疾皆由清陽不升濁陰逆上所致白芷主手足陽明上行頭面通竅表汗除濕散風辛夷通九竅散風熱能助胃中清陽上行頭腦蒼耳疏風散濕上通腦頂外達皮膚薄荷泄肺疏肝清利頭目蔥白升陽通氣茶清苦寒下行使清升濁降風熱散而腦液自寧矣辛夷散嚴氏治鼻生息肉氣息不通不聞香臭鼻為肺竅氣清則鼻通氣熱則鼻塞濕熱甚盛蒸於肺門則生息肉猶濕地得熱而生芝菌也辛夷白芷升麻藁本防風川芎細辛木通甘草等分為末每服三錢茶調下外用燒礬為末加硇砂少許吹鼻中能消之經曰天氣通於鼻若胃中無痰火積熱是平時上升皆清氣也由濕火內焚風寒外束氣血壅滯故鼻生息肉而窒塞不通也辛夷升麻白芷辛溫輕浮能升胃中清氣上行頭腦防風藁本辛溫雄壯亦能上入巔頂勝濕祛風細辛散熱破結通精氣而利九竅芎藭補肝潤燥散諸鬱而助清陽此皆利竅升清散熱除濕之藥木通通中茶清苦寒以下行瀉火甘草和中又以緩其辛散也時珍曰肺開竅於鼻陽明胃脈挾鼻上行腦為元神之府鼻為命門之竅人之中氣不足清陽不升則頭為之傾九竅為之不利玉屑無憂散陳無擇治纏喉風痹咽喉腫痛咽物有礙或風涎壅滯口舌生瘡大人酒症小兒奶癖及骨屑哽塞元參黃連荊芥貫衆山豆根茯苓甘草砂仁滑石五錢硼砂寒水石三錢為末每一錢先抄入口徐以清水咽下元參黃連寒水石清火貫衆山豆根解毒滑石茯苓利水砂仁硼砂軟堅並能消骨鯁荊芥散結甘草和中故能統治諸病也丹溪曰咽痛必用荊芥虛火上火必用玄參又有氣血大虛虛火遊行無制客於咽喉遂成咽痛脈必浮大重取必澀宜濃煎人參湯細細呷之如用清降之藥立斃腎熱湯千金治腎熱耳流膿血不聞人聲耳為腎竅舌為心竅以舌非孔竅故心亦寄竅於耳十二經中除足太陽手厥陰其餘十經皆入絡耳中腎治內之陰心治外之陽清淨精明之氣上走空竅而耳聽斯聰矣若二經不調陰陽不和或煩勞陰虛或衛氣不下循經脈或得於風邪或經臟積熱或大怒氣逆或經飲痞隔或熱聚不散流出膿血或風熱搏結成核塞耳皆令暴聾宜通耳調氣安腎之劑磁石煅紅淬七次牡蠣鹽水煮煅粉白朮炒五兩麥冬芍藥四兩甘草一兩生地黃汁蔥白一升大棗十五枚分三服磁石體重辛鹹色黑補腎祛熱通耳明目故以為君牡蠣鹹寒軟痰破結生地大寒瀉火滋腎麥冬甘寒補肺清金肺為腎母又聲屬金王太僕曰肺虛則不能報息而耳聾白芍酸寒平肝和血經曰肝病氣逆則耳聾不聰又曰耳得血而能聽皆能生水而制火退熱而斂陰白朮甘草大棗補脾之品益土氣正以制能邪也土能防水經云頭痛耳鳴腸胃之所生也仲景曰耳聾無聞者陽氣虛也數者皆固本之藥使精氣充足邪熱自退耳竅自通加蔥白者以引腎氣上通於耳也緑豆飲凡熱毒勞熱諸火熱極不能退者用此最妙用緑豆不拘多寡寬湯煮糜爛入鹽少許或蜜亦可待冰冷或厚或稀或湯任意飲食之日或三四次不拘此物性非苦寒不傷脾氣且善於解毒除煩退熱止渴大利小水乃淺易中之最佳最捷者也若火盛口乾不宜厚但略煮半熟清湯冷飲之尤善除煩清熱香連丸直指治脾胃兩經中濕火傳變大腸下痢赤白膿血相雜裡急後重濕熱之積瘀乾血分則赤瘀干氣分則白赤白兼下者氣血俱病也後重裡急者氣滯不通也按裡急後重有因火熱者有因氣滯者有因積滯者有因氣虛者有因血虛者當審證論治黃連二十兩吳茱萸十兩同炒去茱萸用木香四兩八錢不見火醋糊丸米飲下一方等分蜜丸一方加甘草八兩黃連用蜜水拌蒸曬九次入木香為丸痢為飲食不節寒暑所傷濕熱蒸鬱而成黃連苦燥濕寒勝熱直折心脾之火故以為君用吳茱同炒者取其能利大腸壅氣且以殺大寒之性也裡急由於氣滯木香辛行氣溫和脾能通利三焦泄肺以平肝使木邪不克脾土氣行而滯亦去也一寒一熱一陰一陽有相濟之妙經所謂熱因寒用寒因熱用也嘉言云近日香蓮丸絶非舊法雜用消克瀉下之藥人自為政亦名香蓮殺人如麻真可痛恨加石蓮肉治噤口痢石蓮清心火開胃口加大黃治熱痢積滯大黃瀉胃熱蕩積滯加訶子龍骨名黃連丸宣明加吳茱萸肉豆蔻烏梅湯丸並治痢疾斷下烏梅龍骨肉豆蔻訶子皆澀大腸雪梨漿解煩熱退陰火此生津止渴之妙方也用清香甘美大梨削去皮用大碗盛清冷甘泉將梨薄切浸於水中少傾水必甘美但頻飲其水勿食其渣退陰火極速也大清飲治胃火煩熱狂躁嘔吐等證可與白虎湯出入酌用知母石斛木通一錢五分石膏生用三五錢或加麥門冬按人身熱病最多蓋素蘊之熱挾天時之熱而橫發爾是則胃氣清和遇暄熱而不覺其熱者乃為平人逮至積熱既久然後治之已為失算況於藥不對病乎所以肥人之病多因血肉過盛而積飲食之熱瘦人之病多因津液素衰而生火炎之熱治肥人之熱慮虛其陽治瘦人之熱慮虛其陰未可執方妄施矣茲所録以上諸方各宜自為推廣也卷九上除痰門內經只有積飲之說並無痰證之名至仲景始立四飲之名而痰飲居其一今後世相傳無論是痰非痰開口便言痰火有云怪病之為痰者有云痰為百病母者不知痰之為病必有所以致之者如因風因火而生痰者但治其風火風火息而痰自清也因虛因實而生痰者但治其虛實虛實愈而痰自平也未聞治其痰而風火可自散虛實可自調者此所以痰必因病而生非病之因痰而致也治之之法全在詳辨虛實果其年力猶盛血氣未傷或以肥甘過度或以濕熱盛行或逆氣內連肝膈皆能驟致痰飲但察其形氣病氣多屬有餘者即實痰也此則宜行消伐但去其痰無不可也如其形羸氣弱年及中衰或以多病或以勞倦或以憂思酒色致成勞損非風卒厥者或脈見細數臟無陽邪時為嘔惡泄瀉氣短聲喑等證但察其形氣病氣本非有餘者皆虛痰也此則但宜調補若或攻之無不危矣總之治痰之法但能使元氣日強則痰必日少即有微痰亦自不能為害而且充助胃氣若元氣日衰則水穀津液無非痰爾隨去隨生有能攻之使盡而且保元氣無恙者乎故善治痰者惟能使之不生方是補天之手苟不辨其虛實而欲一概攻之如王隱君所論內外百病皆生於痰悉用滾痰丸之類其亦但知目前而不知日後之患哉諸家治痰之法多有治其標者雖不可執亦不可竊也詳列如下苓桂朮甘湯金匱治心下有痰飲胸脅支滿目眩茯苓四兩桂枝白朮三兩甘草二兩痰飲陰象阻抑其陽用此陽藥化氣以伸其陽此正法也茲所主乃在胸脅支滿目眩者何耶靈樞謂心包之脈是動則病胸脅支滿然則痰飲積於心包其病自必若此目眩者痰飲阻其胸中之陽不能布水精於上也茯苓治痰飲伐腎邪通水道桂枝通陽氣和營衛開經絡白朮治風眩燥痰水除脹滿準繩云痰之本由於脾氣不足不能致精於肺而淤以成者也治痰宜先補脾脾復健運之常而痰自化矣甘草得茯苓則不資滿而反泄滿本草亦曰甘草能下氣除煩滿故用之也金匱曰短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之喻嘉言曰豫辨息論中已詳仲景分別呼吸言病之旨矣今短氣亦分呼吸各出一方呼氣之短用苓桂朮甘湯以通其陽陽氣化則小便能出矣吸氣之短用腎氣丸以通其氣陰腎氣通則小便之關門利矣二陳湯局方陳皮半夏貴其陳久則少燥散之性故名二陳治一切痰飲為病咳嗽脹滿嘔吐噁心頭眩心悸稠者為痰稀者為飲水濕其本也得火則結為痰隨氣升降在肺則咳在胃則嘔在頭則眩在心則悸在背則冷在脅則脹中脘有痰令人憎寒壯熱頭痛類外感表證久則潮咳夜重又類陰火內傷走注肢節疼痛又類風證但肌色如故脈滑不勻為異半夏薑製二錢陳皮去白茯苓一錢甘草五分加姜煎姜能製半夏之毒治痰通用二陳風痰加南星白附皂角竹瀝寒痰加半夏薑汁火痰加石膏青黛濕痰加蒼朮白朮燥痰加栝蔞杏仁食痰加山楂麥芽神麯老痰加枳實海石瓦硝氣痰加香附枳殼脅痰及在皮裡膜外加白芥子四肢痰加竹瀝半夏辛溫體滑性燥行水利痰為君痰因氣滯氣順則痰降龐安常曰善治痰者不治痰而治氣氣順則一身津液亦隨氣而順矣故以橘紅利氣痰由濕生濕去則痰消故以茯苓滲濕為臣中不和則痰涎聚又以甘草和中補土為佐也或曰有痰而渴宜去半夏代以栝蔞貝母吳鶴皋曰渴而喜飲水者易之渴而不能飲水者雖渴猶宜半夏也此濕為本熱為標濕極而兼勝已之化非真象也按貝母寒潤主肺家燥痰半夏溫燥主脾家濕痰雖俱化痰而寒濕燥潤各異脫或誤施貽害匪淺用者宜審之有血不足陰火上逆肺受火傷肅清之令不得下行由是津液渾濁生痰不生血者名燥痰當用潤劑如地黃門冬枸杞之類滋陰降火而痰自清若投二陳立見危殆有頭風眉梢骨痛投以風藥不效投以痰藥見功又有眼赤羞明與之涼藥不瘳異以痰劑獲愈有人坐處吐痰滿地不甚稠黏只是沫多此氣虛不能攝涎不可用利藥宜六君子加益智仁一錢以攝之去茯苓甘草名陳皮半夏湯再加桔梗名桔梗半夏湯去陳皮甘草名半夏茯苓湯治水氣嘔惡加黃芩名茯苓半夏湯宣明治熱痰加黃連梔子生薑名二陳加梔連生薑湯治膈上熱痰令人嘔吐去生薑治嘈雜加砂仁枳殼名砂枳二陳湯行痰利氣加膽星枳實名導痰湯治頑痰膠固非二陳所能除者加膽星以助半夏加枳實以成沖牆倒壁之功有痰飲流入四肢肩背痠痛手足疲軟誤以為風則非其治宜導痰湯加木香片子薑黃再加菖蒲治驚悸健忘怔忡不寐導痰湯加木香香附名順氣導痰湯治痰結胸滿咳逆上氣加枳實栝蔞蔔子山楂神麯治食積痰嗽發熱加蒼朮枳殼片子薑黃名加味二陳湯仁齊治痰攻眼腫並酒家手臂重痛麻木除甘草加乾薑薑汁糊丸名溫中化痰丸寶監治胸膈寒痰不快除茯苓甘草加黃連曲糊丸薑湯下名三聖丸治痰火嘈雜心懸如飢單用陳皮生薑名橘皮湯金匱治乾嘔噦及手足厥者單用半夏薑汁名生薑半夏湯金匱治似喘不喘似嘔不嘔似噦不噦心中憒憒然無奈者潤下丸治膈中痰飲廣陳皮去白八兩鹽水洗浸甘草二兩蜜炙蒸餅糊丸或將陳皮鹽水煮爛曬乾同甘草為末名二賢散薑湯下濕勝加星夏火盛加芩連陳皮燥濕而利氣濕去則痰消氣順則痰下食鹽潤下而軟堅潤下則痰降軟堅則痰化痰在膈中故用甘草引之入胃甘草經蜜炙能健脾調胃脾胃健則痰自行矣順氣消食化痰丸瑞竹堂治酒食生痰胸膈膨悶五更咳嗽過飲則脾濕過食辛熱油膩之物皆能生痰壅於胸膈故滿悶五更咳嗽由胃有積熱至此時火氣流入肺中故嗽半夏薑製膽星一斤青皮陳皮去白萊蔔子生用蘇子沉水者山楂麥芽神麯葛根杏仁去皮尖香附制一兩薑汁和蒸餅糊丸一方半夏南星白礬皂角生薑等分同煮至南星無點為度去皂角姜切同曬乾用痰由濕生半夏南星所以燥濕痰由氣升蘇子蔔子杏仁所以降氣痰由氣滯青皮陳皮香附所以導滯痰因於酒食葛根神麯所以解酒山楂麥芽所以化食濕去食消則痰不生氣順則咳嗽止痰滯既去滿悶自除也金水六君煎治肺腎虛寒水泛為痰或年邁陰虛血氣不足外受風寒咳嗽嘔惡多痰喘急等證神效妙劑此六君子湯之變方也當歸二三錢熟地三五錢陳皮一錢半半夏二錢茯苓二錢炙草一錢加生薑三五七片如大便不實而多濕者去當歸加山藥如痰盛氣滯胸膈不快者加白芥子七分如陰寒盛而嗽不愈者加細辛五七分如兼表邪寒熱者加柴胡一二錢金沸草散活人治肺經傷風頭目昏痛咳嗽多痰風盛則氣壅氣壅則痰升故頭目錯痛而咳嗽直指方云咳嗽感風者鼻塞聲重傷冷者悽清怯寒挾熱為焦煩受濕為纏滯瘀血則膈間腥悶停水則心下怔松三因方云一婦牙疼治療不效口頰皆腫以金沸草散大劑煎湯熏漱而愈旋覆花即金沸草前胡細辛一錢荊芥錢半赤茯苓六分半夏五分甘草炙三分加薑棗煎局方加麻黃赤芍無赤茯細辛如滿悶加枳殼桔梗有熱加柴胡黃芩頭痛加川芎風熱上壅荊芥輕辛發汗而散風痰涎內結前胡旋覆消痰而降氣半夏燥痰而散逆甘草發散而緩中茯苓行水細辛溫經蓋痰必挾火而兼濕故下氣利濕而證自平茯苓用赤者入血分而瀉丙丁也半夏白朮天麻湯東垣治脾胃內傷眼黑頭眩頭痛如裂身重如山噁心煩悶四肢厥冷謂之足太陰痰厥頭痛痰厥者濕痰厥逆而生也痰逆則上實故令頭痛目眩眼前見黑色也東垣曰太陰頭痛必有痰也少陰頭痛足寒而氣逆也太陰少陰二經雖不上循頭然痰與氣逆壅於膈中頭上氣不得暢而為痛也半夏薑製麥芽錢半神麯炒白朮炒一錢蒼朮泔浸人參黃耆蜜炙陳皮茯苓澤瀉天麻五分姜干三分黃柏二分酒洗每服五錢痰厥頭痛非半夏不能除半夏燥痰而能和胃頭旋眼黑虛風內作非天麻不能定黃耆人參甘溫可以補中亦可以瀉火二術甘苦而溫可以除痰亦可以益氣去濕故除痰健脾故益氣苓澤瀉熱導水陳皮調氣升陽神麯消食蕩胃中滯氣麥芽化結助戊己運行胃為戊土脾為己土乾薑辛熱以滌中寒黃柏苦寒以療少火在泉發躁也東垣曰夫風從上受之風寒傷上邪從外入令你頭痛身重惡寒此傷寒頭痛也頭痛耳鳴九竅不利腸胃之所生乃氣虛頭痛也心煩頭痛者過在手太陽少陰乃濕熱頭痛也如氣上不下頭痛巔疾者下虛上實也過在足太陽少陰甚則入腎寒濕頭痛也如頭半寒痛者先取手少陽陽明次取足少陽陽明此偏頭痛也有厥逆頭痛者所犯大寒內到骨髓髓者以腦為主腦逆故令頭痛齒亦痛有真頭痛者甚則腦盡痛手足寒至節死不治頭痛每以風藥治之者以高巔之上唯風可到味之薄者陰中之陽乃自地升天者也太陽頭痛惡風寒脈浮緊川芎羌活獨活麻黃之類為主少陽頭痛脈弦細往來寒熱柴胡黃芩為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根白芷石膏為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛湯主之厥陰頭項痛或吐涎沫厥冷脈浮緩吳茱萸湯主之血虛頭痛當歸川芎為主氣虛頭痛人參黃耆為主氣血俱虛頭痛調中益氣湯少加川芎蔓荊子細辛清空膏風濕頭痛藥也白朮半夏天麻湯痰厥頭痛藥也羌活附子湯厥逆頭痛藥也如濕氣在頭者以苦吐之不可執方而治按以苦吐之者瓜蒂散濃茶之類是也或搐去鼻中黃水亦治濕氣在頭之捷法六安煎治風寒咳嗽痰滯氣逆陳皮一錢五分半夏二三錢茯苓二錢甘草一錢杏仁一錢白芥子五七分年老氣弱者不用加生薑三五七片凡外感風邪咳嗽而寒氣盛者多不易散宜加北細辛七八分或一錢若冬月寒邪盛者加麻黃桂枝亦可若風勝而邪不盛者加防風一錢或蘇葉亦可若頭痛鼻寒者加川芎白芷蔓荊子皆可若兼寒熱者加柴胡蘇葉若風邪咳嗽不止而兼肺胃之火者加黃芩一二錢甚者再加知母石膏所用生薑止宜一片凡寒邪咳嗽痰不利者加當歸二三錢老年者尤宜若氣血不足者當以金水六君煎俱此參用凡時行初感痰勝而氣不順者加藿香一錢五分兼脹滿者加厚朴一錢暫開痰氣然後察其寒熱虛實而調補之若氣虛猝倒及氣平無痰者皆不可用此去杏仁白芥子加炒乾姜一二錢砂仁四分名和胃二陳煎治胃寒生痰噁心嘔吐滿悶噯氣去杏仁白芥子加豬苓澤瀉茯苓一錢五分白朮一二錢乾薑炒黃二錢名苓朮二陳煎治痰飲水氣停蓄心下嘔吐吞酸等證如肝腎兼寒者再加肉桂一二錢去杏仁加乾薑豬苓為末湯浸蒸餅為丸緑豆大白滾湯下名括痰丸治一切停痰積飲吞酸嘔酸脹悶如胸脅疼痛者加天台烏藥礞石滾痰丸王隱君治實痰老痰怪證百病風木太過剋制脾土氣不運化積滯生痰壅塞中上二焦回薄腸胃曲折之處謂之老痰變生諸證不可測識非尋常藥餌所能療也此丸主之青礞石一兩沉香五錢大黃酒蒸黃芩八兩將礞石打碎用焰硝一兩同入瓦罐鹽泥固濟曬乾火煅石色如金為度礞石煅過無金星者不堪用陳久者佳新煅者火毒硝毒未除研末和諸藥水丸量人虛實服之薑湯送下服後仰臥令藥在胸膈之間除逐上焦痰滯不宜飲水行動礞石剽悍之性能攻陳積伏歷之痰吐痰水上以礞石摻之痰即隨下故為利痰聖藥大黃蕩熱去實以開下行之路黃芩瀉肺涼心以平上僭之火沉香升降諸氣上至天而下至泉芩以導諸藥為使也然乃峻劑非體實者不可輕投王隱君曰痰證古今未詳方書雖有五飲諸飲之異而莫知其為病之源或頭風作眩目暈耳鳴或口眼蠕動眉稜耳輪痛癢或四肢遊風腫硬似疼非疼或為齒頰痿痛牙齒浮而痛癢或噯氣吞酸心下嘈雜或痛或噦或咽嗌不利咯之不出咽之不下其痰如墨有如破絮桃膠蜆肉之狀或心下如停水鐵心氣冷痛或夢寐奇怪之狀或足腕痠軟腰背骨節卒痛或四肢筋骨疼痛難以名狀並無常處以致手臂麻痛狀若風濕或脊上一條如線之寒起者或渾身習習如臥芒刺者或眼黏濕癢口糜舌爛喉痹等證或繞項結核狀若瘰癧或胸腹間如有二氣交紐噎息煩悶有如煙火上衝頭面烘熱或為失志癲癇或中風癱瘓或勞瘵荏苒之疾或風毒腳氣或心下怔忡如畏人捕或喘嗽嘔吐或嘔冷涎緑水黑汁甚為肺癰腸毒便膿攣跛內外為病百端皆痰所致其狀不同難以盡述蓋津液既凝為痰不復周潤三焦故口燥咽乾大便祕結面如枯骨毛髮焦槁婦人則因此月水不通若能逐去敗痰自然服餌有效余用滾痰丸以愈諸疾不可勝數特相傳於世云加元明粉一兩硃砂為衣治同減大黃黃芩各六兩加橘紅半夏各二兩甘草一兩竹瀝薑汁為丸名竹瀝達痰丸治同力稍和緩清膈煎治痰因火動氣壅喘滿內熱煩渴等證陳皮一錢五分貝母二三錢敲碎膽星一二錢海石木通二錢白芥子五七分如火盛痰不降者加童便一小盅如渴甚者加天花粉二錢如熱在上焦頭面紅赤煩渴喜冷者加生石膏二三錢如痰火上壅而小水不利者加澤瀉一二錢如痰火閉結大便不通而兼脹滿者加大黃數錢或朴硝一二錢酌宜用茯苓丸指迷方治痰停中脘兩臂疼痛脾主四肢脾滯而氣不下故上行攻臂其脈沉細者是也半夏曲二兩茯苓一兩乳拌枳殼五錢麩炒風化硝二錢半如一時未易成但以朴硝撒竹盤中少時盛水置當風處即干如芒硝刮取亦可用薑汁糊丸薑湯下半夏燥濕茯苓滲水枳殼行氣化痰軟堅去堅痰生薑製半夏之毒而除痰使痰行氣通臂痛自止矣嘉言曰痰藥雖多此方甚效痰飲流入四肢令人肩背痠痛兩手疲軟誤以為風則非其治宜導痰湯加木香薑黃各五分輕者指迷茯苓丸重者控涎丹若血虛不能榮筋而致臂痛宜蠲痹四物湯各半帖和服控涎丹三因一名妙應丸治人忽患胸背手足腰項筋骨牽引釣痛走易不定或手足冷痹氣脈不通此乃痰涎在胸膈上下誤認癱瘓非也甘遂去心大戟去皮白芥子等分為末糊丸臨臥薑湯服五七丸至十丸痰猛加丸數腳氣加檳榔木瓜松枝卷柏驚痰加硃砂全蠍驚氣成塊加穿山甲龜甲延胡索蓬朮熱痰加盆硝寒痰加胡椒丁香薑桂李時珍曰痰涎為物隨氣升降無處不到入心則迷成癲癇入肺則塞竅為喘咳背冷入肝則膈痛乾嘔寒熱往來入經絡則麻痹疼痛入筋骨則牽引釣痛入皮肉則瘰癧癰腫陳無擇三因方並以控涎丹主之殊有奇功此乃治痰之本痰之本水也濕也得氣與火則結為痰大戟能泄臟腑水濕甘遂能行經隧水濕直達水氣所結之處以攻決為用白芥子能散皮裡膜外痰氣唯善用者能收奇功也虛弱人慎用丹溪曰胃氣亦賴痰以養不可盡攻攻盡則虛而愈劇辰砂散靈苑治風痰諸癇癲狂心疾諸癇因驚恐憂怒火盛干心痰塞心竅發時卒倒搐掣叫吼吐涎食頃乃醒身熱脈浮在表者陽癇屬六腑易治身冷脈沉在裡者陰癇屬五臟難治其實痰火與驚而已癲狂亦由於此辰砂光明者一兩乳香光瑩者棗仁五錢炒溫酒調下恣飲沉醉聽睡一二日勿動若驚寤不可復治辰砂鎮心瀉心火乳香入心散瘀血棗仁補肝膽而寧心加人參一兩蜜丸彈丸大名寧志膏本事每服一丸薄荷湯下治同三子養親湯韓𢘅治老人氣實痰盛喘滿懶食痰不自動因火而動氣有餘便是火氣盛上壅故喘痰火塞胸故懶食紫蘇子沉水者白芥子萊蔔子各微炒研煎服或等分或看病所主為君白芥子除痰紫蘇子降氣萊蔔消食然皆行氣豁痰之藥氣行則火降而痰消矣吳鶴皋曰治痰先理氣此治標爾終不若二陳能健脾去濕有治本之功也李士材曰治病先攻其甚若氣實而喘則氣反為本痰反為標矣是在智者神而明之若氣虛者非所宜矣常山飲局方瘧久不已者用此截之瘧初起不宜截截則邪氣未盡變生他證發久則可截之常山燒酒炒二錢草果煨檳榔知母貝母一錢烏梅二個姜三片棗二枚半酒半水煎露一宿日未出時面東空心溫服渣用酒浸煎待瘧將發時先服一方有良薑甘草無檳榔一方加穿山甲甘草古云無痰不作瘧常山引吐行水祛老痰積飲檳榔下氣破積能消食行痰陰陽不和則瘧作陽勝則熱陰勝則寒知母滋陰能治陽明獨勝之火草果辛熱能治太陰獨勝之寒貝母清火散結瀉熱除痰烏梅酸斂澀收生津退熱斂陰故退熱合為截瘧之劑也趙以德曰常究本草知母草果常山烏梅檳榔穿山甲皆云治瘧集以成方者為知母性寒入足陽明治獨勝之熱使退就太陰草果溫燥治足太陰獨勝之寒使退就陽明二經和則無陰陽交錯之變是為君藥常山主寒熱瘧吐胸中痰結是為臣藥烏梅湧痰檳榔除痰癖破滯氣是為佐藥穿山甲穴山而居遇水而入則是出入陰陽貫穿經絡於營分以破暑結之邪為使藥也惟脾胃有郁痰者用之收效李士材曰常山生用多用則吐與甘草同用亦必吐若酒浸炒透但用錢許每見奇功未見其或吐也世人泥於老人久病忌服之說使良藥見疑沉疴難起抑何愚耶李時珍曰常山蜀漆劫痰截瘧須在發散表邪及提出陽分之後日後為陽用之得宜得甘草則吐得大黃則利得烏梅穿山甲則入肝得小麥竹葉則入心得秫米麻黃則入肺得龍骨附子則入腎得草果檳榔則入脾蓋無痰不作瘧一物之功亦在驅逐痰水而已截瘧七寶飲易簡治實瘧久發不止寸口脈弦滑浮大者脈弦為肝風滑為痰浮為在表大為陽若脈沉細微澀者禁用不問鬼瘧食瘧並皆治之常山酒炒草果煨檳榔青皮厚朴陳皮甘草等分用酒水各一盅煎熟絲綿蓋之露一宿於當發之早面東溫服經曰工不治其已發為其氣逆也凡瘧將來可服藥阻其來將去可服藥追其去若瘧勢正盛服藥與之混戰徒自苦爾但瘧之來去既遠藥不相及五不當一故服藥妙在將來將去之時常山能吐老痰積飲檳榔能下食積痰結草果能消太陰膏粱之痰陳皮利氣厚朴平胃青皮伐肝瘧為肝邪皆為溫散行痰之品加甘草入胃佐常山以吐瘧痰也玉機微義曰此方乃溫脾燥烈之藥蓋作脾寒治也用之亦效者值病人陰陽相併脾氣鬱結濁液凝痰閉塞中脘因得燥熱亦以暫開所以氣通而疾止若中氣虛弱內有鬱火之人復用燥熱愈劫愈燥咎將誰執楊仁齊曰瘧有水有血惟水飲所以作寒熱惟瘀血所以增寒熱常山能逐水故也若是血證當加桃仁五靈脂為佐入生薑蜜同煎苟無行血之品何以收十全之功耶保命集云瘧夜發者乃邪氣深遠而入血分為陰經有邪宜加桃仁於桂麻湯中發散血中之風寒滌痰湯嚴氏治中風痰迷心竅舌強不能言心在竅為舌心別脈系舌根脾脈連舌本散舌下腎脈挾舌本三脈虛則痰涎乘虛閉其脈道故舌不能轉運言語也若三脈亡血不能榮養而喑者又當加補血藥風痰塞其經絡舌強不能言其證為重若壅熱上攻舌腫不能轉者其證為輕半夏薑製膽星二錢五分橘紅枳實茯苓二錢人參菖蒲一錢竹茹七分甘草五分加姜煎心脾不足風邪乘之而痰與火塞其經絡故舌本強而難語也人參茯苓甘草補心益脾而瀉火陳皮南星半夏利氣燥濕而祛痰菖蒲開竅通心枳實破痰利膈竹茹清燥開鬱使痰火降則經通而舌柔矣喻嘉言曰此證最急此藥最緩有兩不相當之勢審其屬實用此湯調下牛黃丸審其屬虛用此湯調下二丹丸庶足開痰通竅二丹丸見祛風門有風中心脾者有痰塞心竅者有風寒壅滯者致舌本木強又有氣虛血虛腎虛及老人暴不能言者宜十全大補湯加菖蒲遠志星香散治中風痰盛體肥不渴者膽星八錢木香二錢為末服或加全蠍南星燥痰之品制以牛膽以殺其毒且膽有益肝膽之功肝膽之經屬風木佐以木香取其行氣以利痰也木香能疏肝氣和脾氣肥而不渴宜燥可知加全蠍者以散肝風也中風體虛有痰者宜六君子或四君子湯調下此散牛黃丸治風癇迷悶涎潮抽掣風暑濕或感風寒者或飲食不節逆於臟氣鬱而生涎閉塞諸經厥而乃成或數日一發或一日數發發則眩仆倒地昏不知人瘛瘲抽掣口目喎斜或隨臟氣作六畜之聲膽星全蠍去足焙蟬蛻二錢五分牛黃白附子殭蠶洗焙防風天麻錢半麝香五分煮棗肉和水銀五分細研入藥末為丸荊芥薑湯下牛黃清心解熱開竅利痰天麻防風南星全蠍辛散之味殭蠶蟬蛻清化之品白附頭面之藥去頭面遊風皆能搜肝風而散痰結麝香通竅水銀劫痰引以姜芥者亦以逐風而行痰也按牛黃丸之方頗多互有異同然大要在於搜風化痰寧心通竅多用冰麝牛雄金珠犀珀若中臟者宜之如中腑中血脈者反能引風入骨此方藥味頗簡故姑録之以概其餘也貝母丸消痰熱潤肺止嗽或肺癰肺痿乃治標之妙劑貝母一兩為末用砂糖或蜜和丸龍眼大或噙化或嚼服之若欲劫止久嗽每貝母一兩宜加百藥煎蓬砂天竺黃各一錢五分尤妙如無百藥煎即醋炒文蛤一錢亦可或粟殼亦可酌用若治肺癰宜加白礬一錢同貝母丸服如前法最妙清肺飲治痰濕氣逆而咳嗽肺受火傷則氣逆而為咳脾有停濕則生痰而作嗽病有五臟六腑之殊而其要皆歸於肺以肺為五臟華蓋下通膀胱外達皮毛為氣之主而出聲也大法新嗽脈浮為表邪宜發散脈實為內熱宜清利脈濡散為肺虛宜溫補久嗽曾經解利以致肺胃俱虛飲食不進宜溫中助胃兼治嗽藥素問曰肺之令人咳何也曰五臟六腑俱令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也五臟各以其時受病非其時各傳以與之有自外得者肺主皮毛風寒暑濕之邪自皮毛入內傳臟腑而為嗽也有自內發者七情飢飽內有所傷則邪氣上逆肺為氣出入之道故五臟之邪上蒸於肺而為嗽也然風寒暑濕有不為嗽者蓋所感者重不留於皮毛徑傷臟腑而成傷寒溫熱諸病七情亦有不為嗽者蓋病尚淺只在本臟未傳入肺所以傷寒以有嗽為輕而七情飢飽之嗽必久而後發也杏仁去皮尖貝母茯苓一錢桔梗甘草五味子橘紅五分加姜煎火嗽加青黛栝蔞海石食積痰加香附山楂枳實濕痰除貝母加半夏南星燥痰加栝蔞知母天冬午前嗽屬胃火宜清胃加石膏黃連午後嗽屬陰虛宜滋陰降火加芎歸芍地知柏二冬竹瀝薑汁傳送黃昏嗽為火浮於肺不可用涼藥宜五倍五味訶子斂而降之勞嗽見血多是肺受熱邪宜加歸芍阿膠天冬知母款冬紫菀之類久嗽肺虛加參耆如肺熱用沙參此治嗽之通劑也杏仁解肌散寒降氣潤燥貝母清火散結潤肺化痰五味斂肺而寧嗽茯苓除濕而理脾橘紅行氣甘草和中桔梗清肺利膈載藥上浮而又能開壅發表也清氣化痰丸治熱痰氣有餘則為火液有餘則為痰痰隨火而升降故治痰者必降其火治火者必順其氣也半夏薑製膽星兩半橘紅枳實麩炒杏仁去皮尖栝蔞仁去油黃芩酒炒茯苓一兩薑汁糊丸淡薑湯下此治痰火之通劑也半夏南星以燥濕氣黃芩栝蔞以平熱氣陳皮以順裡氣杏仁以降逆氣枳實以破積氣茯苓以行水氣水濕火熱皆生痰之本也氣之亢而為火猶民之反而為盜盜平則還為良民而復其業矣火退則還為正氣而安其位矣故化痰必以清氣為先也蘇子降氣湯局方治虛陽上攻氣不升降上盛下虛痰涎壅盛喘嗽嘔血或大便不利肺為氣主火升克肺故氣高痰湧或喘或嗽甚則嘔血也火炎津枯有升無降故大便不利又有氣痛便祕用通劑而愈不通故暫通復祕因而下血者亦當順氣氣順則自通當求溫暖之劑蘇子半夏前胡厚朴姜炒橘紅當歸一錢甘草炙肉桂五分加姜煎一方無桂有沉香蘇子前胡厚朴橘紅半夏皆能降逆上之氣兼能除痰氣行則痰行也數藥亦能發表既以疏內壅又以散外寒也風痰壅盛多挾外感當歸潤以和血甘草甘以緩中下虛上盛故又用官桂引火歸元也玉機微義曰此散郁和中之劑準繩曰口鼻出血皆由上盛下虛有升無降血隨氣升法當先順其氣氣降則血歸經矣宜蘇子降氣湯加人參阿膠各一錢下養正丹洛按方內多發表破氣動血之藥養正丹金石烹煉而成皆偶用治標之劑未可以為定訓也定喘湯治肺虛感寒氣逆膈熱而作哮喘膈有膠固之痰外有非時之感則令人哮喘由寒束於表陽氣並於膈中不得泄越故膈熱氣逆聲粗為哮外感之有餘也氣促為喘肺虛而不足也白果三十枚炒黃去殼麻黃薑製款冬花三錢桑白皮蜜炙蘇子二錢杏仁去皮尖黃芩錢半甘草一錢半夏三錢加姜煎表寒宜散麻黃杏仁桑皮甘草辛甘發散瀉肺而解表裡熱宜清款冬溫潤白果收澀善化濁痰定喘而清金蘇子降肺氣黃芩清肺熱半夏燥濕痰以共成散寒疏壅之功也七氣湯三因方名四七湯治七情氣鬱痰涎結聚咯不出咽不下胸滿喘急或咳或喘或攻衝作痛七情者喜怒憂思悲恐驚也七情之病令人氣結痰聚陰陽不得升降故有痞滿喘咳沖攻等證半夏薑汁炒五錢厚朴姜汁炒三錢茯苓四錢紫蘇二錢加薑棗煎氣鬱則痰聚故散郁必以行氣化痰為先半夏辛溫除痰開鬱厚朴苦溫降氣散滿紫蘇辛溫寬中暢肺定喘消痰茯苓甘淡滲濕益脾通心交腎痰去氣行則結散郁解而諸證平矣加白芍陳皮人參桂心亦名七氣湯三因治七情鬱結陰陽反戾吐利交作寒熱眩暈痞滿噎塞四七湯局方亦名七氣湯治七情郁痰涎結聚虛冷上氣或心腹絞痛或膨脹喘急針經云胃絡不和喘出於陽明之上逆真元耗散喘出於腎氣之上奔人參官桂半夏一錢甘草五分加姜煎心腹痛加延胡索能行血中氣滯氣中血滯李士材曰夫七情過極皆傷其氣丹溪以越鞠丸主之而此獨異者蓋郁久則濁氣閉塞而清氣日薄矣故雖痛雖膨而不用木香枳殼用人參以壯主氣之臟肺官桂以制謀慮之官肝者將軍之官謀慮出焉桂能平肝郁久生痰半夏為之驅逐郁故不和國老為之調停況桂性辛溫疏氣甚捷鬱結者還為和暢矣湯名四七者以四味治七情也玉機微義曰經云寒則氣收宜辛散之甘緩之此治氣虛寒鬱藥也白金丸治癲狂失心癲多喜笑尚知畏懼證屬不足狂多忿怒人莫能制證屬為陰此病多因驚憂痰血塞於心竅所致難經云諸陽為狂諸陰為癲白礬三兩鬱金七兩薄荷糊丸白礬酸鹹能軟頑痰鬱金苦辛能去惡血痰血去則心竅開而疾已矣百花膏治喘嗽不已或痰中有血虛人尤宜百合款冬花等分蜜丸龍眼大臨臥薑湯下或噙化加紫菀百部烏梅名加味百花膏款冬瀉熱下氣清血除痰百合潤肺寧心補中益氣併為理嗽要藥卷九下殺蟲門風字從蟲蟲風化也濕熱鬱久則生蟲腐草為螢陳麥為蛾之類果實外殼完整蟲生於內人之腸胃無物不受豈得無蟲三尸九遁理或有之其猖狂於腸胃為痛為嘔為嗽為嗜種種煩苦須仗醫藥自來殺蟲之方每多險峻今人腸胃脆薄須兼養胃益血理中乃妥至蛔蟲乃人身之常有者偶為食傷或吐或瀉出和中自安不可攻伐昧者不知妄用雷丸使君之類反致傷氣血而疾作矣烏梅丸仲景治傷寒厥陰證寒厥吐蛔傷寒臟厥者死臟厥者脈微而厥至七八日膚冷發躁無暫安時也蛔厥者蛔上入膈則煩須臾復止得食則嘔而又煩蛔聞食臭復出也此為臟寒當自吐蛔與烏梅丸溫臟安蛔亦治胃腑發咳咳而嘔嘔甚則長蟲出亦主久痢烏梅三百枚細辛桂枝人參附子炮黃柏六兩黃連一斤乾薑十兩川椒去汗當歸四兩苦酒醋也浸烏梅一宿去核蒸熟和藥蜜丸蛔得酸則伏故以烏梅之酸伏之蛔得苦則安故以連柏之苦安之蛔因寒而動故以桂附姜椒溫其中臟而以細辛當歸潤其肝腎人參用以助脾吐蛔為胃寒之故則成蛔厥宜理中湯加炒川椒五粒檳榔五分吞烏梅丸程郊倩曰烏梅丸於辛酸入肝藥中微加苦寒納上逆之陽邪而順之使下也雖曰安蛔實是安胃故並主久利見陰陽不相順接而下利之證皆可以此方括之也經曰凡陰陽不相順接便為厥方時行曰經云手之三陰從腹走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹是三陰三陽俱相接於手足者也陽氣內陷不與陰氣相順接故手足逆冷溫臟丸治諸蟲積既逐而復生者多由臟氣虛寒宜溫健脾胃以杜其源人參隨宜用川椒去閉口者炒出汗白芍酒炒茯苓細棐肉使君子煨取肉檳榔二兩白朮米泔浸炒當歸四兩炮姜吳茱萸湯泡一宿一兩為末神麯糊丸桐子大每服五七十丸或百丸飢時白湯下如臟寒甚者加製附子一二兩集效丸三因治蟲齧腹痛作止有時或耕起往來腹痛有作止者蟲齧則痛不齧則止也耕起往來者蟲不安其位也大黃炒兩半鶴蝨炒檳榔訶子皮蕪荑炒木香乾薑炒附子七錢五分蜜丸食前烏梅湯下婦人醋湯下蟲喜溫惡酸而畏苦故用姜附之熱以溫之烏梅訶皮之酸以伏之大黃檳榔蕪荑鶴蝨之苦以殺之木香辛溫以順其氣也蠟蟲丸治諸蟲積脹痛黃瘦等病蕪荑雷丸桃仁乾漆炒煙盡雄黃微炒錫灰皂角炒煙盡檳榔使君子等分輕粉減半細棐肉加倍如蟲積堅固者加巴豆霜與輕粉同湯浸蒸餅丸緑豆大每服五七分滾白湯下陸續服之使君子丸治蟲脹腹痛及食勞發黃喜食茶米炭土等物飲食停滯濕熱蒸郁則生諸蟲至脹滿齧痛或發黃身腫喜食生米茶葉土炭者蟲之所嗜也使君子去殼二兩南星薑製檳榔一兩上藥合炒如喜食生米用麥芽一斤炒喜食茶葉用茶葉炒喜食炭土用炭土炒取藥為末蜜丸每晨砂糖水下誘之以甘與炒以所嗜諸物同意獺肝丸肘後治鬼疰傳尸癆瘵此五疰之一其證使人寒熱沉沉默默不知所苦而無處不惡死後傳入乃至滅門獺肝一具須從獺身取下不爾多僞陰乾為末滾水服以二錢日三吳鶴皋曰獺肝治鬼疰此何以故凡物惡人而僻處晝伏而夜出者皆陰類也故假之以治陰疾獨用其肝者肝為厥陰藏魂之髒了也按物之惡人僻處晝伏夜出者狐鼠皆然不獨獺也諸肝皆有葉數唯獺肝一月一葉其間又有退葉獨異於他獸此其所以能治鬼疰也與掃蟲煎治諸蟲上攻胸腹作痛青皮小茴香炒吳茱萸一錢檳榔烏藥一錢五分細棐肉三錢碎烏梅二個甘草八分硃砂雄黃五分二味為極細末將前八味用水一盅半煎八分去渣隨入後二味末再煎三四沸攪勻徐徐服之如噁心作吐加炒乾姜一二錢或先啖牛肉脯少許俟一茶頃頓服之更妙化蟲丸治腸胃諸蟲為患腸胃之中無物不容所以變生諸蟲者緣正氣虛弱或誤食生蟲之物或濕熱蒸鬱而成猶物必先腐而後蟲生之義也鶴蝨胡粉炒楝東引未出土者檳榔蕪荑使君子五錢枯礬二錢五分為末水煮米糊作丸量人大小服之一歲兒可五分消渴殺蟲方夷堅志治消渴有蟲苦楝根取新白皮一握切焙入麝香少許煎空心服雖困頓不妨取下蟲三四條類蛔而色紅其渴乃止消渴一證有蟲耗其津液而成者蓋飲醇食炙積成胃熱濕熱生蟲理固有之臨病宜諦審也雄檳丸治腹痛胃痛干痛有時干痛者不吐不瀉而但痛也有時者淡食而飢則痛厚味而飽則否此為蟲也雄黃檳榔白礬等分飯丸每服五分雄黃之辛毒檳榔之苦降白礬之酸澀皆殺蟲之品也故合用以治之吳鶴皋曰古方殺蟲如雷丸貫衆乾漆蠟塵百部鉛灰之類皆其所常用者也有加附子乾薑者壯正氣也加苦參黃連者蟲得苦而伏也加烏梅訶子者蟲得酸而軟也加藜蘆瓜蒂者欲其帶蟲吐出也加芫花黑醜者欲其帶蟲瀉下也用雄黃川椒蛇床樟腦水銀檳榔者治瘡疥之蟲也用胡桐淚莨菪子韭子蟾酥者治齲齒之蟲也用川槿皮海桐皮者治風癬之蟲也用青葙子覆盆葉者治九竅䘌蝕之蟲也用敗鼓心桃符板虎糞骨死人枕獺爪鸛骨者驅癆瘵之蟲也
